<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB OMNI-SENSOR</title>
<style>
:root {
  --primary: #ff0000;
  --secondary: #00ff00;
  --bg: #050000;
  --panel: #1a0000;
  --btn-bg: #330000;
  --btn-active: #ff0000;
  --text: #ffcccc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

/* DASHBOARD SENSORS */
#sensorDashboard {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 2px;
  background: #000;
  border-bottom: 2px solid var(--primary);
  padding: 2px;
  font-size: 0.6rem;
  flex-shrink: 0;
}
.sensor-box {
  background: #111;
  padding: 4px;
  text-align: center;
  border: 1px solid #333;
}
.sensor-val {
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--secondary);
}
.alert-sensor {
  background: #550000;
  border-color: red;
  animation: blink 0.2s infinite;
}

@keyframes blink { 50% { opacity: 0.5; } }

#header {
  padding: 5px; background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.75rem; flex-shrink: 0;
  color: var(--primary);
}

#vizContainer {
  flex: 1; position: relative; background: #000;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  overflow: hidden;
}

#iaBox {
  z-index: 10; text-align: center; width: 90%;
  pointer-events: none;
}
#iaLabel { color: var(--secondary); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px; }
#iaText {
  font-size: 2.5rem; font-weight: 900; color: #fff;
  background: rgba(0,0,0,0.9); padding: 10px;
  min-height: 3.5rem; border: 1px solid var(--primary);
  text-transform: uppercase;
}

canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; opacity: 0.7; }
#cameraFeed { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 0; opacity: 0.2; display: none; }

#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  height: 35vh; overflow-y: auto; padding: 5px;
  display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px 2px; font-size: 0.6rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #fff;
  box-shadow: 0 0 10px var(--primary);
  border-color: #fff;
}

#startBtn {
  grid-column: span 4; font-size: 1.2rem; padding: 12px;
  background: #fff; color: #000; border: 3px solid var(--primary);
  font-weight: 900;
}

#barsArea { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.7rem; }
.bar-box { background: #220000; height: 8px; width: 100%; border: 1px solid #550000; margin-top:2px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.05s; background: var(--primary); }

#logZone {
  height: 40px; background: #000; border-top: 1px solid #333;
  padding: 2px 5px; font-size: 0.6rem; overflow-y: auto; color: #888;
  flex-shrink: 0;
}
.log-warn { color: yellow !important; }
.log-err { color: red !important; }
</style>
</head>
<body>

<!-- DASHBOARD CAPTEURS RÉELS -->
<div id="sensorDashboard">
  <div class="sensor-box" id="boxMotion">MOTION<br><span class="sensor-val" id="valMotion">0.0</span> m/s²</div>
  <div class="sensor-box" id="boxMag">MAGNETIC<br><span class="sensor-val" id="valMag">0</span> µT</div>
  <div class="sensor-box" id="boxLight">LIGHT<br><span class="sensor-val" id="valLight">0</span> Lux</div>
</div>

<div id="header">
  <div>MIC: <span id="micStatus">OFF</span></div>
  <div>BAT: <span id="batStatus">--%</span></div>
  <div>FREQ: <span id="freqStatus">0</span> Hz</div>
</div>

<div id="vizContainer">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="iaBox">
    <div id="iaLabel">DÉTECTION VOCALE RÉELLE</div>
    <div id="iaText">... INITIALISATION ...</div>
  </div>
</div>

<div id="controlsArea">
  <div id="barsArea">
    <div>INPUT <div class="bar-box"><div id="voiceBar" class="bar-fill"></div></div></div>
    <div>TRIGGER <div class="bar-box"><div id="threshBar" class="bar-fill" style="width:20%"></div></div></div>
  </div>

  <button id="startBtn">ACTIVER TOUS LES CAPTEURS</button>

  <div class="button-grid">
    <button id="monitorBtn">🎧 ÉCOUTE+</button>
    <button id="ghostBoxBtn">📻 GHOST BOX</button>
    <button id="recBtn">⏺ AUTO REC</button>
    <button id="evpBtn">🔮 EVP LOW</button>
    <button id="radarBtn">📡 RADAR HF</button>
    <button id="camBtn">📷 CAM</button>
    <button id="flashBtn">🔦 TORCHE</button>
    <button id="stopBtn" style="border-color:red; color:red">⏹ STOP</button>
  </div>
</div>

<div id="logZone"></div>

<script>
// Configuration initiale
const app = {
  running: false,
  simulation: false,
  ctx: null,
  source: null,
  gain: null,
  analyser: null,
  monitorGain: null,
  monitorDelay: null,
  monitorFeedback: null,
  ghost: null,
  ghostGain: null,
  noiseNode: null,
  noiseGain: null,
  stream: null,
  vidStream: null,
  recorder: null,
  isRec: false,
  recognition: null,
  config: {
    monitor: false,
    ghostBox: false,
    autoRec: false,
    evp: false,
    radar: false,
    cam: false,
    flash: false
  },
  dataArray: new Uint8Array(2048),
  lastAlpha: 0,
  motionThreshold: 1.5,
  lightBaseline: 0,
  pulseInterval: null
};

// Éléments DOM
const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'),
  mic: el('micStatus'),
  bat: el('batStatus'),
  freq: el('freqStatus'),
  voiceBar: el('voiceBar'),
  iaText: el('iaText'),
  canvas: el('canvas'),
  camera: el('cameraFeed'),
  valMotion: el('valMotion'),
  boxMotion: el('boxMotion'),
  valMag: el('valMag'),
  boxMag: el('boxMag'),
  valLight: el('valLight'),
  boxLight: el('boxLight')
};

// Journalisation
function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d);
  els.log.scrollTop = els.log.scrollHeight;
  console.log(msg);
}

// Initialisation complète
async function forceStart() {
  if(app.running) return;

  el('startBtn').textContent = "INITIALISATION...";
  el('startBtn').style.background = "orange";
  log("Initialisation Omni-Sensor...", 'log-suc');

  try {
    // 1. Vérifier les permissions
    await checkPermissions();

    // 2. Initialiser l'audio
    await initAudio();

    // 3. Initialiser les capteurs
    initSensors();

    // 4. Initialiser l'IA
    await initVoice();

    app.running = true;
    startUI("CAPTEURS ACTIFS");

  } catch (err) {
    console.error(err);
    log(`Erreur: ${err.message}`, 'log-err');
    setupSimulation();
    app.running = true;
    app.simulation = true;
    startUI("MODE SIMULATION");
  }
}

// Vérification des permissions
async function checkPermissions() {
  if (!navigator.permissions) {
    log("API Permissions non supportée", 'log-warn');
    return;
  }

  try {
    // Vérifier le microphone
    const micStatus = await navigator.permissions.query({name: 'microphone'});
    if (micStatus.state === 'denied') {
      throw new Error("Accès microphone refusé");
    }

    // Vérifier la caméra
    const camStatus = await navigator.permissions.query({name: 'camera'});
    if (camStatus.state === 'denied') {
      log("Accès caméra refusé", 'log-warn');
    }

  } catch (err) {
    log(`Erreur permissions: ${err.message}`, 'log-err');
  }
}

// Initialisation audio
async function initAudio() {
  log("Initialisation audio...");

  try {
    // Créer le contexte audio
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Résoudre le contexte suspendu (mobile)
    if (app.ctx.state === 'suspended') {
      await app.ctx.resume();
    }

    // Demander l'accès au microphone
    app.stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      },
      video: false
    });

    // Configurer les nœuds audio
    app.source = app.ctx.createMediaStreamSource(app.stream);
    app.gain = app.ctx.createGain();
    app.analyser = app.ctx.createAnalyser();
    app.analyser.fftSize = 2048;
    app.analyser.smoothingTimeConstant = 0.8;
    app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);

    // Connecter les nœuds
    app.source.connect(app.gain);
    app.gain.connect(app.analyser);

    // Configurer l'enregistrement
    app.recorder = new MediaRecorder(app.stream);
    app.recorder.ondataavailable = handleRecordingData;
    app.recorder.onstop = () => {
      app.isRec = false;
      log("Enregistrement terminé");
    };

    // Mettre à jour l'interface
    els.mic.textContent = "ON";
    els.mic.style.color = "#0f0";

    log("Audio initialisé avec succès", 'success');

  } catch (error) {
    log(`Erreur audio: ${error.message}`, 'error');
    throw error;
  }
}

// Initialisation des capteurs
function initSensors() {
  log("Initialisation des capteurs...");

  // 1. Mouvement
  if (window.DeviceMotionEvent) {
    window.addEventListener('devicemotion', handleMotion);
    log("Capteur de mouvement: OK");
  } else {
    els.valMotion.textContent = "N/A";
    log("Capteur de mouvement: Non supporté", 'log-warn');
  }

  // 2. Orientation
  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', handleOrientation);
    log("Capteur d'orientation: OK");
  } else {
    els.valMag.textContent = "N/A";
    log("Capteur d'orientation: Non supporté", 'log-warn');
  }

  // 3. Lumière
  if ('AmbientLightSensor' in window) {
    try {
      const sensor = new AmbientLightSensor();
      sensor.onreading = () => {
        const lux = Math.round(sensor.illuminance);
        els.valLight.textContent = lux;

        // Détection d'ombre
        if (app.lightBaseline === 0) app.lightBaseline = lux;
        if (Math.abs(lux - app.lightBaseline) > 50 && lux < app.lightBaseline) {
          triggerSensorAlert('boxLight', "OMBRE DÉTECTÉE");
        }
      };
      sensor.start();
      log("Capteur de lumière: OK");
    } catch (err) {
      els.valLight.textContent = "ERR";
      log(`Erreur capteur lumière: ${err.message}`, 'error');
    }
  } else {
    els.valLight.textContent = "N/A";
    log("Capteur de lumière: Non supporté", 'log-warn');
  }

  // 4. Batterie
  if ('getBattery' in navigator) {
    navigator.getBattery().then(battery => {
      updateBattery();
      battery.addEventListener('levelchange', updateBattery);
      battery.addEventListener('chargingchange', updateBattery);
      log("Batterie: OK");
    });
  } else {
    els.bat.textContent = "N/A";
  }
}

// Gestion des mouvements
function handleMotion(event) {
  if (app.simulation) return;

  const acc = event.accelerationIncludingGravity || event.acceleration;
  if (!acc) return;

  const x = acc.x || 0;
  const y = acc.y || 0;
  const z = acc.z || 0;
  const totalMotion = Math.abs(x) + Math.abs(y) + Math.abs(z);
  const relativeMotion = Math.abs(totalMotion - 9.8);

  els.valMotion.textContent = relativeMotion.toFixed(1);

  if (relativeMotion > app.motionThreshold) {
    triggerSensorAlert('boxMotion', "TREMBLEMENT DÉTECTÉ");
  }
}

// Gestion de l'orientation
function handleOrientation(event) {
  if (app.simulation || !event.absolute) return;

  const alpha = event.alpha || 0;
  els.valMag.textContent = Math.floor(alpha) + "°";

  // Détection de perturbation
  if (Math.abs(alpha - app.lastAlpha) > 50) {
    triggerSensorAlert('boxMag', "PERTURBATION MAGNÉTIQUE");
  }
  app.lastAlpha = alpha;
}

// Initialisation de l'IA vocale
async function initVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    els.iaText.textContent = "INDISPONIBLE";
    log("Reconnaissance vocale: Non supportée", 'log-warn');
    return;
  }

  try {
    app.recognition = new SpeechRec();
    app.recognition.continuous = true;
    app.recognition.interimResults = true;
    app.recognition.lang = 'fr-FR';

    app.recognition.onresult = (e) => {
      let txt = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        txt += e.results[i][0].transcript;
      }
      if (txt) {
        els.iaText.textContent = txt;
        if (e.results[e.results.length-1].isFinal) {
          log(`VOIX DÉTECTÉE: "${txt}"`, 'log-suc');
        }
      }
    };

    app.recognition.onerror = (e) => {
      log(`Erreur reconnaissance vocale: ${e.error}`, 'error');
    };

    app.recognition.onend = () => {
      if (app.running) {
        try {
          app.recognition.start();
        } catch (e) {
          log(`Erreur redémarrage reconnaissance: ${e.message}`, 'error');
        }
      }
    };

    app.recognition.start();
    log("Reconnaissance vocale: OK");

  } catch (error) {
    log(`Erreur reconnaissance vocale: ${error.message}`, 'error');
  }
}

// Gestion des données d'enregistrement
function handleRecordingData(event) {
  const blob = new Blob([event.data], { type: "audio/webm" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `recording_${Date.now()}.webm`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  log("Enregistrement sauvegardé", 'log-suc');
}

// Détection d'alerte de capteur
function triggerSensorAlert(boxId, msg) {
  const box = el(boxId);
  if (!box.classList.contains('alert-sensor')) {
    box.classList.add('alert-sensor');
    log(msg, 'log-err');
    if (navigator.vibrate) navigator.vibrate(200);
    setTimeout(() => box.classList.remove('alert-sensor'), 2000);
  }
}

// Mise à jour de la batterie
function updateBattery() {
  navigator.getBattery().then(b => {
    els.bat.textContent = Math.floor(b.level * 100) + "%" + (b.charging ? " ⚡" : "");
  });
}

// Mode simulation (si les capteurs ne sont pas disponibles)
function setupSimulation() {
  app.dataArray = new Uint8Array(1024);
  els.valMotion.textContent = "SIM";
  els.valMag.textContent = "SIM";
  els.valLight.textContent = "SIM";
}

// Démarrage de l'interface
function startUI(mode) {
  el('startBtn').textContent = mode;
  el('startBtn').classList.add('running');
  el('startBtn').style.background = "var(--primary)";
  els.iaText.textContent = "SURVEILLANCE...";

  // Activer les boutons
  document.querySelectorAll('#controlsArea button:not(#startBtn)').forEach(btn => {
    btn.disabled = false;
  });

  // Démarrer la boucle de visualisation
  resize();
  drawLoop();
  startPulseTimer();
}

// Arrêt du système
function stopSystem() {
  if (app.stream) {
    app.stream.getTracks().forEach(track => track.stop());
  }

  if (app.vidStream) {
    app.vidStream.getTracks().forEach(track => track.stop());
  }

  if (app.ctx) {
    app.ctx.close();
  }

  if (app.recognition) {
    app.recognition.stop();
  }

  if (app.pulseInterval) {
    clearInterval(app.pulseInterval);
  }

  // Supprimer les écouteurs
  window.removeEventListener('devicemotion', handleMotion);
  window.removeEventListener('deviceorientation', handleOrientation);

  // Réinitialiser l'interface
  app.running = false;
  el('startBtn').textContent = "ACTIVER TOUS LES CAPTEURS";
  el('startBtn').classList.remove('running');
  el('startBtn').style.background = "#fff";
  els.mic.textContent = "OFF";
  document.querySelectorAll('#controlsArea button:not(#startBtn)').forEach(btn => {
    btn.disabled = true;
    btn.classList.remove('active');
  });
  Object.keys(app.config).forEach(k => app.config[k] = false);
}

// Gestion des options
function toggleOpt(key) {
  if (!app.running) {
    log("Veuillez d'abord activer les capteurs", 'log-warn');
    return;
  }

  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  btn.classList.toggle('active');
  log(`${key}: ${app.config[key] ? 'ON' : 'OFF'}`);

  // Gestion spécifique des options
  switch (key) {
    case 'monitor':
      if (app.config[key]) {
        // Activer le monitoring audio
        if (app.monitorGain && app.monitorDelay) {
          app.analyser.connect(app.monitorDelay);
          app.monitorDelay.connect(app.monitorFeedback);
          app.monitorFeedback.connect(app.monitorDelay);
          app.monitorDelay.connect(app.monitorGain);
          app.monitorGain.connect(app.ctx.destination);
        }
      } else {
        // Désactiver le monitoring
        if (app.analyser && app.monitorGain) {
          app.analyser.disconnect(app.monitorDelay);
          app.monitorGain.disconnect(app.ctx.destination);
        }
      }
      break;

    case 'ghostBox':
      if (app.ghostGain && app.noiseGain) {
        app.ghostGain.gain.value = app.config[key] ? 0.1 : 0;
        app.noiseGain.gain.value = app.config[key] ? 0.05 : 0;
      }
      break;

    case 'cam':
      toggleCam();
      break;

    case 'flash':
      toggleFlash();
      break;
  }
}

// Gestion de la caméra
async function toggleCam() {
  if (app.config.cam) {
    // Désactiver la caméra
    if (app.vidStream) {
      app.vidStream.getTracks().forEach(track => track.stop());
    }
    app.vidStream = null;
    els.camera.style.display = 'none';
  } else {
    // Activer la caméra
    try {
      app.vidStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      els.camera.srcObject = app.vidStream;
      els.camera.style.display = 'block';
    } catch (e) {
      log(`Erreur caméra: ${e.message}`, 'error');
      app.config.cam = false;
      el('camBtn').classList.remove('active');
    }
  }
}

// Gestion de la torche
async function toggleFlash() {
  if (!app.vidStream) {
    log("Veuillez d'abord activer la caméra", 'log-warn');
    app.config.flash = false;
    el('flashBtn').classList.remove('active');
    return;
  }

  try {
    const track = app.vidStream.getVideoTracks()[0];
    await track.applyConstraints({
      advanced: [{ torch: app.config.flash }]
    });
  } catch (e) {
    log(`Erreur torche: ${e.message}`, 'error');
  }
}

// Boucle de dessin
function drawLoop() {
  if (!app.running) return;

  // Obtenir les données audio
  if (app.simulation) {
    // Simulation de données
    const t = Date.now() / 50;
    for (let i = 0; i < 1024; i++) {
      app.dataArray[i] = (Math.sin(i * 0.05 + t) + 1) * 50 + Math.random() * 20;
    }
  } else if (app.analyser) {
    app.analyser.getByteFrequencyData(app.dataArray);
  }

  // Calculer les niveaux
  let sum = 0;
  let lowFreqSum = 0;
  let highFreqSum = 0;
  const binSize = (app.ctx ? app.ctx.sampleRate / 2 : 22050) / app.dataArray.length;

  for (let i = 0; i < app.dataArray.length; i++) {
    const v = app.dataArray[i];
    sum += v;
    const freq = i * binSize;
    if (freq < 200) lowFreqSum += v;
    if (freq > 2000) highFreqSum += v;
  }

  const avg = sum / app.dataArray.length;
  els.voiceBar.style.width = Math.min(100, avg) + '%';

  // Enregistrement automatique
  if (app.config.autoRec && avg > 50 && !app.isRec) {
    startRecording(4000);
  }

  // Dessin sur le canvas
  const ctx = els.canvas.getContext('2d');
  ctx.fillStyle = 'rgba(5, 0, 0, 0.2)';
  ctx.fillRect(0, 0, els.canvas.width, els.canvas.height);

  const barW = (els.canvas.width / app.dataArray.length) * 2.5;
  let x = 0;

  for (let i = 0; i < app.dataArray.length; i++) {
    const v = app.dataArray[i];
    const barH = (v / 255) * els.canvas.height;

    let color = `rgb(${v}, 0, 0)`;
    if (app.config.evp) {
      const freq = i * binSize;
      if (freq < 200) color = `rgb(0, ${v}, ${v})`;
    }

    ctx.fillStyle = color;
    ctx.fillRect(x, els.canvas.height - barH, barW, barH);
    x += barW + 1;
  }

  // Radar HF
  if (app.config.radar) {
    const cx = els.canvas.width - 60;
    const cy = 60;
    const r = 50;

    ctx.strokeStyle = '#f00';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();

    if (highFreqSum / ((app.dataArray.length - 2000 / binSize) / binSize) > 60) {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      els.freq.style.color = "red";
    } else {
      els.freq.style.color = "var(--text)";
      const ang = (Date.now() / 1000) % (Math.PI * 2);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(ang);
      ctx.fillStyle = 'rgba(255,0,0,0.5)';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r, -0.1, 0.1);
      ctx.fill();
      ctx.restore();
    }
  }

  requestAnimationFrame(drawLoop);
}

// Enregistrement audio
function startRecording(duration) {
  if (!app.recorder || app.isRec) return;

  app.isRec = true;
  app.recorder.start();
  log(`Enregistrement démarré (${duration/1000}s)`);

  setTimeout(() => {
    if (app.isRec) {
      app.recorder.stop();
    }
  }, duration);
}

// Redimensionnement
function resize() {
  els.canvas.width = els.canvas.clientWidth;
  els.canvas.height = els.canvas.clientHeight;
}

// Animation de pulsation
function startPulseTimer() {
  if (app.pulseInterval) clearInterval(app.pulseInterval);
  app.pulseInterval = setInterval(() => {
    el('startBtn').style.opacity = el('startBtn').style.opacity === '0.7' ? '1' : '0.7';
  }, 2000);
}

// Configuration initiale
window.onload = () => {
  resize();
  log("OMNI-SENSOR PRÊT. Appuyez sur START.");
};

// Gestion du redimensionnement
window.onresize = resize;

// Configuration des boutons
document.getElementById('startBtn').onclick = forceStart;
document.getElementById('monitorBtn').onclick = () => toggleOpt('monitor');
document.getElementById('ghostBoxBtn').onclick = () => toggleOpt('ghostBox');
document.getElementById('recBtn').onclick = () => toggleOpt('autoRec');
document.getElementById('evpBtn').onclick = () => toggleOpt('evp');
document.getElementById('radarBtn').onclick = () => toggleOpt('radar');
document.getElementById('camBtn').onclick = () => toggleOpt('cam');
document.getElementById('flashBtn').onclick = () => toggleOpt('flash');
document.getElementById('stopBtn').onclick = stopSystem;

// Initialisation
log("Application chargée");
</script>
</body>
</html>
