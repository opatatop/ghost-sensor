<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY OUPS LAB - REALITY CORE</title>
<style>
:root {
  --primary: #00ff00; /* Vert "Réel" */
  --secondary: #003300;
  --bg: #000000;
  --panel: #050a05;
  --btn-bg: #111;
  --btn-active: #00ff00;
  --text: #ccffcc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* SCROLLING MATRIX BACKGROUND */
#matrixBg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(0deg, transparent 24%, rgba(0, 255, 0, .3) 25%, rgba(0, 255, 0, .3) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, .3) 75%, rgba(0, 255, 0, .3) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(0, 255, 0, .3) 25%, rgba(0, 255, 0, .3) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, .3) 75%, rgba(0, 255, 0, .3) 76%, transparent 77%, transparent);
  background-size: 50px 50px;
  z-index: -1; opacity: 0.1;
}

/* HEADER */
#header {
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  padding: 5px 10px;
  display: flex; justify-content: space-between;
  font-size: 0.8rem; color: var(--primary);
}
#micLock {
  font-weight: bold; color: red;
}
#micLock.locked {
  color: #00ff00;
}

/* STAGE */
#mainStage {
  flex: 1; position: relative;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
#iaText {
  font-size: 2rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 10px var(--primary);
  background: rgba(0,0,0,0.8);
  padding: 15px;
  border: 2px solid var(--primary);
  min-width: 80%;
  text-align: center;
  text-transform: uppercase;
}

/* CONTROLS */
#controls {
  background: var(--panel);
  border-top: 2px solid var(--primary);
  height: 45vh;
  overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 10px;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px; font-size: 0.7rem;
  font-weight: bold; cursor: pointer; font-family: inherit;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #000;
  box-shadow: 0 0 10px var(--primary);
}
button:disabled {
  opacity: 0.3; cursor: not-allowed;
}

#startBtn {
  width: 100%; font-size: 1.2rem; padding: 15px;
  background: #000; color: var(--primary); border: 2px solid var(--primary);
}

/* BARS */
#bars {
  display: flex; gap: 5px; margin-bottom: 10px;
}
.bar-container { flex: 1; background: #222; height: 10px; border: 1px solid #444; position: relative; }
.bar-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.1s; }

#logZone {
  height: 40px; background: #000; border-top: 1px solid #333;
  padding: 5px; font-size: 0.7rem; overflow-y: auto; color: #888;
}
.log-real { color: var(--primary) !important; font-weight: bold; }
.log-noise { color: yellow !important; }

</style>
</head>
<body>

<div id="matrixBg"></div>

<div id="header">
  <div>REALITY CORE</div>
  <div id="micLock">MIC: UNLOCKED</div>
  <div id="status">IDLE</div>
</div>

<div id="mainStage">
  <div id="iaText">... INITIALISATION ...</div>
</div>

<div id="controls">
  <div id="bars">
    <div class="bar-container" title="Niveau Audio"><div id="volBar" class="bar-fill"></div></div>
    <div class="bar-container" title="Confiance IA"><div id="confBar" class="bar-fill" style="background:yellow"></div></div>
  </div>

  <button id="startBtn" onclick="startSystem()">VERROUILLER MICRO & DÉMARRER</button>

  <div class="button-grid">
    <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE</button>
    <button id="gainBtn" onclick="toggleOpt('highGain')">⚡ GAIN MAX</button>
    <button id="filterBtn" onclick="toggleOpt('filter')">🔇 COUPER BASSES</button>
    <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
    
    <button id="vizSpec" onclick="setViz('spectrum')">SPECTRE</button>
    <button id="vizWave" onclick="setViz('wave')">ONDE</button>
    <button id="camBtn" onclick="toggleOpt('cam')">📷 CAMÉRA</button>
    <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ STOP</button>
  </div>
  
  <div style="font-size:0.7rem; color:#666; text-align:center;">
    NOTE: L'IA ne traduit que les mots réels. <br>
    Le bruit sans mots affichera [BRUIT].
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
let app = {
  running: false,
  ctx: null,
  stream: null, // IMPORTANT: Garder une référence globale pour ne jamais redemander
  vidStream: null,
  source: null,
  analyser: null,
  gainNode: null,
  filterNode: null,
  monitorGain: null,
  recorder: null,
  isRec: false,
  recognition: null,
  keepAliveOsc: null,
  config: {
    monitor: false,
    highGain: false,
    filter: false,
    autoRec: false,
    cam: false,
    vizMode: 'spectrum'
  },
  canvas: null, cCtx: null, width: 0, height: 0,
  lastSpeechTime: 0,
  wakeLock: null
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), ia: el('iaText'), status: el('status'),
  volBar: el('volBar'), confBar: el('confBar'),
  lock: el('micLock')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

// --- START UNIQUE ---

async function startSystem() {
  if(app.running) return;
  
  // Empêcher le double clic
  el('startBtn').disabled = true;
  el('startBtn').textContent = "VERROUILLAGE MICRO...";
  
  try {
    // 1. Contexte Audio
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();

    // 2. DEMANDE MICRO (UNE SEULE FOIS)
    // Si app.stream existe déjà, on le réutilise (ne redemande pas)
    if (!app.stream) {
      log("Demande d'accès Micro...", 'log-real');
      app.stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
          video: false 
      });
      log("Micro VERROUILLÉ.", 'log-real');
    }

    // 3. Chaîne Audio
    setupAudioGraph();

    // 4. Wake Lock
    try { app.wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    
    // 5. Keep-Alive (Essentiel pour empêcher la boucle d'autorisation)
    startKeepAlive();

    // 6. IA (RÉELLE UNIQUEMENT)
    startRealAI();

    // 7. Viz
    initViz();

    app.running = true;
    el('startBtn').textContent = "SYSTÈME ACTIF (VERROUILLÉ)";
    el('startBtn').style.background = "var(--btn-active)";
    el('startBtn').style.color = "#000";
    els.lock.textContent = "LOCKED & SECURE";
    els.lock.classList.add('locked');
    els.status.textContent = "SURVEILLANCE ACTIVE";
    
    drawLoop();
    log("Système Reality Core démarré. Traduction RÉELLE uniquement.", 'log-real');

  } catch (err) {
    console.error(err);
    log("ERREUR CRITIQUE: " + err.message, 'log-noise');
    el('startBtn').disabled = false;
    el('startBtn').textContent = "ERREUR - RÉESSAYER";
    el('startBtn').style.background = "red";
  }
}

function stopSystem() {
  // On NE ferme PAS le stream ici pour éviter de redemander au redémarrage ?
  // Non, pour être propre on ferme tout.
  if(app.wakeLock) { app.wakeLock.release(); app.wakeLock = null; }
  if(app.stream) {
      app.stream.getTracks().forEach(t=>t.stop());
      app.stream = null; // On libère vraiment
  }
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  if(app.recognition) app.recognition.stop();
  if(app.ctx) app.ctx.close();
  
  app.running = false;
  
  el('startBtn').disabled = false;
  el('startBtn').textContent = "VERROUILLER MICRO & DÉMARRER";
  el('startBtn').style.background = "#000";
  el('startBtn').style.color = "var(--primary)";
  els.lock.textContent = "MIC: UNLOCKED";
  els.lock.classList.remove('locked');
  els.ia.textContent = "ARRÊTÉ";
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
}

// --- AUDIO GRAPH ---

function setupAudioGraph() {
  app.source = app.ctx.createMediaStreamSource(app.stream);
  
  // Filtre Passe-Haut (Enlève le ronronnement du téléphone)
  app.filterNode = app.ctx.createBiquadFilter();
  app.filterNode.type = 'highpass';
  app.filterNode.frequency.value = 300;
  
  // Gain (Boost pour l'écoute, ne boost PAS l'IA car l'IA prend le stream brut)
  app.gainNode = app.ctx.createGain();
  app.gainNode.gain.value = 1.0;

  // Monitor (Sortie casque)
  app.monitorGain = app.ctx.createGain();
  app.monitorGain.gain.value = 0;

  // Analyser (Pour les graphiques)
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.analyser.smoothingTimeConstant = 0.5;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);

  // Connexions
  // Source -> Filtre -> Gain -> Analyser
  app.source.connect(app.filterNode);
  app.filterNode.connect(app.gainNode);
  app.gainNode.connect(app.analyser);
  
  // Monitor Branch
  app.gainNode.connect(app.monitorGain);
  app.monitorGain.connect(app.ctx.destination);

  // Recorder
  app.recorder = new MediaRecorder(app.stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

// --- KEEP ALIVE (FIX BOUCLE 3 SECONDES) ---

function startKeepAlive() {
  // Oscillateur silencieux connecté à destination
  // Cela force le navigateur à considérer le contexte Audio comme "actif en permanence"
  app.keepAliveOsc = app.ctx.createOscillator();
  const keepGain = app.ctx.createGain();
  keepGain.gain.value = 0.001; // Presque inaudible mais techniquement actif
  
  app.keepAliveOsc.connect(keepGain);
  keepGain.connect(app.ctx.destination);
  app.keepAliveOsc.start();
  
  // Réveil automatique au changement d'onglet
  document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && app.ctx && app.ctx.state === 'suspended') {
          app.ctx.resume();
      }
  });
}

// --- IA RÉELLE (SANS DICTIONNAIRE) ---

function startRealAI() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true; // Affiche les mots en cours de formation
      app.recognition.lang = 'fr-FR';
      
      app.recognition.onresult = (e) => {
          let txt = '';
          let isFinal = false;
          
          for(let i = e.resultIndex; i < e.results.length; i++) {
              txt += e.results[i][0].transcript;
              if(e.results[i].isFinal) isFinal = true;
          }
          
          if (txt) {
              // Affichage
              els.ia.textContent = txt;
              els.ia.style.color = "#fff";
              
              if (isFinal) {
                  log(`MOT DÉTECTÉ: "${txt}"`, 'log-real');
                  app.lastSpeechTime = Date.now();
              } else {
                  // Mot en cours (interim)
                  els.ia.style.opacity = 0.7;
              }
          } else {
              // Si le mot est vide mais qu'on est dans un event result
              // C'est que l'IA a entendu du bruit mais n'a pas reconnu de mot
              // On peut afficher un indicateur de "bruit" si on voulait, 
              // mais l'utilisateur a demandé "Pas de mots aléatoires".
              // On laisse le texte précédent s'effacer naturellement ou on met "..."
              // els.ia.textContent = "...";
          }
      };
      
      app.recognition.onerror = (e) => {
          if(e.error !== 'no-speech') {
              log(`Erreur IA: ${e.error}`, 'log-noise');
          }
      };
      
      app.recognition.onend = () => {
          // REDÉMARRAGE AUTO SEULEMENT SI LE SYSTÈME EST ACTIF
          // C'est crucial pour ne pas relancer si l'utilisateur a cliqué sur STOP
          if (app.running && app.config.monitor) { // On utilise monitor comme proxy "actif" ou un flag direct
              try { app.recognition.start(); } catch(e){}
          }
      };

      try {
          app.recognition.start();
          log("IA Réelle active. Écoute en cours.", 'log-real');
      } catch(e) {
          log("Erreur démarrage IA", 'log-noise');
      }
  } else {
      log("IA non supportée par ce navigateur", 'log-noise');
  }
}

// --- LOOP & LOGIC ---

function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  // Données Audio
  app.analyser.getByteFrequencyData(app.dataArray);
  
  let sum = 0;
  for(let i=0; i<app.dataArray.length; i++) sum += app.dataArray[i];
  const avg = sum / app.dataArray.length;
  
  // VU Meter
  els.volBar.style.width = Math.min(100, avg) + '%';
  
  // LOGIQUE "TOUS LES BRUITS"
  // Si le volume est haut, mais qu'aucun mot n'a été dit depuis 2 secondes
  // On affiche que le système capte du bruit
  const now = Date.now();
  if (avg > 40 && (now - app.lastSpeechTime > 2000)) {
      els.confBar.style.width = "100%";
      els.confBar.style.background = "red";
      els.status.textContent = "BRUIT DÉTECTÉ (ININTELLIGIBLE)";
      els.status.style.color = "yellow";
  } else {
      els.confBar.style.width = "0%";
      els.status.textContent = "SURVEILLANCE ACTIVE";
      els.status.style.color = "var(--primary)";
  }

  // Auto Rec
  if(app.config.autoRec && avg > 60 && !app.isRec) {
      app.isRec = true; app.recorder.start(); log("⚠ ENREGISTREMENT DÉCLENCHÉ", 'log-real');
      setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 4000);
  }

  // Dessin
  const ctx = app.cCtx, w = app.width, h = app.height;
  ctx.fillStyle = 'rgba(0, 10, 0, 0.2)'; // Trainée verte
  ctx.fillRect(0,0,w,h);
  
  if(app.config.vizMode === 'spectrum') {
      const barW = (w / app.dataArray.length) * 2.5;
      let x = 0;
      for(let i=0; i<app.dataArray.length; i++) {
          const v = app.dataArray[i];
          const barH = (v/255)*h;
          ctx.fillStyle = `rgb(0, 255, ${v})`;
          ctx.fillRect(x, h - barH, barW, barH);
          x += barW+1;
      }
  } else {
      // Waveform
      const timeData = new Uint8Array(app.analyser.fftSize);
      app.analyser.getByteTimeDomainData(timeData);
      ctx.lineWidth = 2; ctx.strokeStyle = '#00ff00'; ctx.beginPath();
      const sliceW = w / timeData.length;
      let x = 0;
      for(let i = 0; i < timeData.length; i++) {
          const v = timeData[i] / 128.0;
          const y = v * h/2;
          if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          x += sliceW;
      }
      ctx.stroke();
  }
}

// --- TOOLS ---

function toggleOpt(key) {
  if(!app.running && key !== 'cam') return;
  
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');
  
  if(key === 'monitor') {
      app.monitorGain.gain.value = app.config.monitor ? 1.0 : 0;
      log(app.config.monitor ? "Écute activée" : "Écute coupée");
  }
  
  if(key === 'highGain') {
      // Gain Software (n'affecte que l'écoute, pas l'IA qui prend le signal brut hardware)
      app.gainNode.gain.value = app.config.highGain ? 5.0 : 1.0;
      log(app.config.highGain ? "Gain MAX (Écoute)" : "Gain Normal");
  }
  
  if(key === 'filter') {
      app.filterNode.frequency.value = app.config.filter ? 1000 : 300;
      log(app.config.filter ? "Filtre Vocal (1000Hz)" : "Filtre Large (300Hz)");
  }
  
  if(key === 'cam') toggleCam();
}

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          const vid = document.createElement('video');
          vid.srcObject = app.vidStream; vid.autoplay = true; vid.muted = true; vid.playsInline = true;
          vid.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.2; z-index:-1;";
          document.body.appendChild(vid);
      } catch(e) { log("Erreur Cam", 'log-noise'); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null; document.querySelector('video')?.remove();
  }
}

function setViz(mode) {
  app.config.vizMode = mode;
  document.querySelectorAll('.button-grid button').forEach(b => b.classList.remove('active'));
  if(mode==='spectrum') el('vizSpec').classList.add('active');
  if(mode==='wave') el('vizWave').classList.add('active');
}

function initViz() {
  app.canvas = document.createElement('canvas');
  app.canvas.style.cssText = "width:100%; height:100%; position:absolute; top:0; left:0; z-index:-1;";
  document.getElementById('mainStage').insertBefore(app.canvas, el('iaText'));
  app.cCtx = app.canvas.getContext('2d');
  resize();
}
window.onresize = resize;
function resize() {
    if(app.canvas) {
        app.width = app.canvas.clientWidth;
        app.height = app.canvas.clientHeight;
        app.canvas.width = app.width;
        app.canvas.height = app.height;
    }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`REALITY_${Date.now()}.webm`; a.click();
  log("Fichier sauvé", 'log-real');
}

// INIT
window.onload = () => {
    log("REALITY CORE PRÊT. Pas de mots aléatoires.", 'log-real');
};
</script>
</body>
</html>
