<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY MOBILE LAB BYE KOMAR</title>
<style>
:root {
  --primary: #00ffd0;
  --bg: #000814;
  --panel: rgba(0, 0, 0, 0.9);
  --button: #001f30;
  --voice: #ffaa00;
  --evp: #aa00ff;
  --error: #ff0000;
  --success: #55ff55;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  touch-action: manipulation;
}

#header {
  padding: 15px;
  text-align: center;
  background: var(--panel);
  border-bottom: 2px solid var(--primary);
}

#controls {
  padding: 15px;
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

#visualization {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #000;
}

#logZone {
  height: 150px;
  overflow-y: auto;
  padding: 10px;
  background: rgba(0, 0, 0, 0.6);
  border-top: 1px solid var(--primary);
  font-size: 0.9em;
}

button {
  background: var(--button);
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 12px;
  margin: 5px 0;
  border-radius: 5px;
  font-weight: bold;
  touch-action: manipulation;
  width: 100%;
  cursor: pointer;
}

button:active {
  background: rgba(0, 31, 48, 0.8);
}

button:disabled {
  background: #333;
  color: #666;
  cursor: not-allowed;
}

#voiceBar {
  height: 12px;
  width: 0%;
  background: var(--voice);
  margin: 5px 0;
  transition: width 0.1s;
}

.status {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 0.9em;
}

.error {
  color: var(--error);
}

.success {
  color: var(--success);
}

.loading {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

#waterfallCanvas {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100px;
}

#radarCanvas {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 150px;
  height: 150px;
}

@media (max-width: 768px) {
  button {
    padding: 10px;
  }
}
</style>
</head>
<body>
<div class="loading" id="loadingScreen">
  <h2>ETERNITY LAB</h2>
  <div class="progress">Prêt...</div>
  <div id="initLog"></div>
</div>

<div id="header">
  <h3>ETERNITY MOBILE LAB</h3>
</div>

<div id="controls">
  <div class="status">
    <span>MIC: <span id="micStatus">OFF</span></span>
    <span>IA: <span id="aiStatus">OFF</span></span>
  </div>

  <div>
    <div>VOICE LEVEL:</div>
    <div id="voiceBar"></div>
  </div>

  <button id="startBtn">START</button>
  <button id="fftBtn" disabled>FFT 1024</button>
  <button id="recBtn" disabled>AUTO REC</button>
  <button id="evpBtn" disabled>EVP MODE</button>
  <button id="radarBtn" disabled>RADAR</button>
  <button id="wavBtn" disabled>WAV REC</button>
</div>

<div id="visualization"></div>
<div id="logZone"></div>

<!-- Bibliothèques -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// Configuration
const config = {
  fftSize: 1024,
  autoRec: false,
  evpMode: false,
  radar: false,
  spectro3D: false,
  aiEnabled: false
};

// État
const state = {
  audioContext: null,
  analyser: null,
  dataArray: null,
  stream: null,
  recorder: null,
  isRecording: false,
  cubes: [],
  scene: null,
  camera: null,
  renderer: null,
  model: null,
  initialized: false,
  librariesLoaded: { three: false, tfjs: false }
};

// DOM Elements
const elements = {
  micStatus: document.getElementById('micStatus'),
  aiStatus: document.getElementById('aiStatus'),
  voiceBar: document.getElementById('voiceBar'),
  logZone: document.getElementById('logZone'),
  startBtn: document.getElementById('startBtn'),
  fftBtn: document.getElementById('fftBtn'),
  recBtn: document.getElementById('recBtn'),
  evpBtn: document.getElementById('evpBtn'),
  radarBtn: document.getElementById('radarBtn'),
  wavBtn: document.getElementById('wavBtn'),
  loadingScreen: document.getElementById('loadingScreen'),
  visualization: document.getElementById('visualization')
};

// Logs
function log(msg, type = 'info') {
  const div = document.createElement("div");
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  if (type === 'error') div.style.color = "var(--error)";
  if (type === 'success') div.style.color = "var(--success)";
  elements.logZone.appendChild(div);
  elements.logZone.scrollTop = elements.logZone.scrollHeight;
  console.log(msg);
}

// --- FONCTIONS PRINCIPALES ---

// 1. Bascule START / STOP
async function toggleApp() {
  if (state.initialized) {
    // Arrêt
    stopApplication();
  } else {
    // Démarrage
    await startApplication();
  }
}

// 2. Démarrage
async function startApplication() {
  elements.loadingScreen.style.display = 'flex';
  document.querySelector('#loadingScreen .progress').textContent = "Initialisation...";

  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error("Microphone non supporté");
    }

    // Audio
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    state.stream = stream;
    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = state.audioContext.createMediaStreamSource(stream);
    
    state.analyser = state.audioContext.createAnalyser();
    state.analyser.fftSize = config.fftSize;
    state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
    source.connect(state.analyser);

    // Recorder
    state.recorder = new MediaRecorder(stream);
    state.recorder.ondataavailable = (e) => {
        const blob = new Blob([e.data], { type: "audio/webm" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `evp_${Date.now()}.webm`;
        a.click();
    };

    // Viz
    initVisualization();

    // Boutons secondaires
    enableControls(true);

    state.initialized = true;
    elements.micStatus.textContent = "ON";
    elements.startBtn.textContent = "STOP";
    
    updateVisual();
    log("Système actif", "success");

  } catch (error) {
    log(`Erreur: ${error.message}`, "error");
    console.error(error);
  } finally {
    elements.loadingScreen.style.display = 'none';
  }
}

// 3. Arrêt
function stopApplication() {
  if (state.stream) state.stream.getTracks().forEach(t => t.stop());
  if (state.audioContext) state.audioContext.close();
  
  // Nettoyage viz
  elements.visualization.innerHTML = ''; 
  state.cubes = [];
  state.scene = null;
  state.renderer = null;

  state.initialized = false;
  enableControls(false);
  elements.micStatus.textContent = "OFF";
  elements.startBtn.textContent = "START";
  log("Système arrêté");
}

// --- VISUALISATION ---

function initVisualization() {
  // Waterfall
  const canvas = document.createElement('canvas');
  canvas.id = 'waterfallCanvas';
  canvas.width = elements.visualization.clientWidth;
  canvas.height = 100;
  elements.visualization.appendChild(canvas);
  state.waterfallCtx = canvas.getContext('2d');

  // Radar
  const rCanvas = document.createElement('canvas');
  rCanvas.id = 'radarCanvas';
  rCanvas.width = 150; rCanvas.height = 150;
  elements.visualization.appendChild(rCanvas);
  state.radarCtx = rCanvas.getContext('2d');

  // 3D
  if (state.librariesLoaded.three) {
    initThreeJS();
  }
}

function initThreeJS() {
  try {
    state.scene = new THREE.Scene();
    state.camera = new THREE.PerspectiveCamera(75, elements.visualization.clientWidth / elements.visualization.clientHeight, 0.1, 1000);
    state.camera.position.z = 500;
    state.renderer = new THREE.WebGLRenderer({ alpha: true });
    state.renderer.setSize(elements.visualization.clientWidth, elements.visualization.clientHeight);
    elements.visualization.insertBefore(state.renderer.domElement, elements.visualization.firstChild);
  } catch(e) { console.error(e); }
}

function updateVisual() {
  if (!state.initialized) return;
  requestAnimationFrame(updateVisual);

  state.analyser.getByteFrequencyData(state.dataArray);
  
  // Volume bar
  const avg = state.dataArray.reduce((a,b)=>a+b,0) / state.dataArray.length;
  elements.voiceBar.style.width = Math.min(100, avg) + '%';

  // Auto Rec
  if (config.autoRec && avg > 30 && !state.isRecording) {
    state.recorder.start();
    state.isRecording = true;
    log("Enregistrement automatique...");
    setTimeout(() => { if(state.isRecording) { state.recorder.stop(); state.isRecording = false; }}, 3000);
  }

  // Draw Waterfall
  if (state.waterfallCtx) {
    const w = state.waterfallCtx.canvas.width;
    const h = state.waterfallCtx.canvas.height;
    const img = state.waterfallCtx.getImageData(0, 0, w, h-1);
    state.waterfallCtx.putImageData(img, 0, 1);
    for(let i=0; i<state.dataArray.length; i++) {
        state.waterfallCtx.fillStyle = `hsl(${200 - state.dataArray[i]}, 100%, 50%)`;
        state.waterfallCtx.fillRect(i * (w/state.dataArray.length), 0, 2, 1);
    }
  }

  // Draw Radar
  if (config.radar && state.radarCtx) {
    state.radarCtx.clearRect(0,0,150,150);
    state.radarCtx.strokeStyle = "var(--primary)";
    state.radarCtx.beginPath(); state.radarCtx.arc(75,75,60,0,Math.PI*2); state.radarCtx.stroke();
    
    const energy = state.dataArray.reduce((a,b)=>a+b,0);
    const angle = Math.random() * Math.PI * 2;
    const r = (energy/1000) * 60;
    state.radarCtx.fillStyle = "var(--primary)";
    state.radarCtx.beginPath(); state.radarCtx.arc(75 + Math.cos(angle)*r, 75 + Math.sin(angle)*r, 3, 0, Math.PI*2); state.radarCtx.fill();
  }

  // Draw 3D
  if (config.spectro3D && state.renderer) {
    if (state.cubes.length > 1000) {
        const old = state.cubes.shift();
        state.scene.remove(old);
    }
    for(let i=0; i<state.dataArray.length; i+=10) {
        const h = state.dataArray[i];
        const geo = new THREE.BoxGeometry(4, 4, h);
        const mat = new THREE.MeshBasicMaterial({ color: config.evpMode ? 0xaa00ff : 0x00ffd0 });
        const cube = new THREE.Mesh(geo, mat);
        cube.position.set(i - 100, -50, h/2);
        state.scene.add(cube);
        state.cubes.push(cube);
    }
    state.renderer.render(state.scene, state.camera);
  }
}

// --- GESTION BOUTONS ---

function enableControls(enabled) {
  elements.fftBtn.disabled = !enabled;
  elements.recBtn.disabled = !enabled;
  elements.evpBtn.disabled = !enabled;
  elements.radarBtn.disabled = !enabled;
  elements.wavBtn.disabled = !enabled;
}

// Event Listeners pour les boutons secondaires
elements.fftBtn.onclick = () => {
  config.fftSize = config.fftSize === 1024 ? 2048 : 1024;
  state.analyser.fftSize = config.fftSize;
  state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
  elements.fftBtn.textContent = `FFT ${config.fftSize}`;
  log(`FFT: ${config.fftSize}`);
};

elements.recBtn.onclick = () => {
  config.autoRec = !config.autoRec;
  elements.recBtn.style.background = config.autoRec ? "var(--primary)" : "";
  log(`Auto REC: ${config.autoRec ? "ON" : "OFF"}`);
};

elements.evpBtn.onclick = () => {
  config.evpMode = !config.evpMode;
  config.spectro3D = config.evpMode;
  elements.evpBtn.style.background = config.evpMode ? "var(--evp)" : "";
  log(`EVP Mode: ${config.evpMode ? "ON" : "OFF"}`);
};

elements.radarBtn.onclick = () => {
  config.radar = !config.radar;
  elements.radarBtn.style.background = config.radar ? "var(--primary)" : "";
  log(`Radar: ${config.radar ? "ON" : "OFF"}`);
};

elements.wavBtn.onclick = () => log("WAV REC non implémenté");

// Initialisation au chargement de la page
window.onload = () => {
  // Vérification libs
  state.librariesLoaded.three = typeof THREE !== 'undefined';
  state.librariesLoaded.tfjs = typeof tf !== 'undefined';
  
  if(state.librariesLoaded.three) log("Three.js OK", "success");
  else log("Three.js absent", "error");

  if(state.librariesLoaded.tfjs) {
      log("TensorFlow.js OK", "success");
      // Chargement modèle (simplifié pour éviter latence au start)
      tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/speech-commands/v1/tiny_speech_command_model.json')
        .then(m => { state.model = m; elements.aiStatus.textContent = "READY"; log("IA Ready"); })
        .catch(e => log("IA Load fail", "error"));
  } else {
      log("TF.js absent", "error");
  }

  // CACHER L'ÉCRAN DE CHARGEMENT
  elements.loadingScreen.style.display = 'none';
  log("En attente de démarrage...");

  // ATTACHER L'ÉVÉNEMENT START ICI !!!
  elements.startBtn.onclick = toggleApp;
};

// Resize
window.addEventListener('resize', () => {
  if(state.renderer) {
      state.renderer.setSize(elements.visualization.clientWidth, elements.visualization.clientHeight);
      state.camera.aspect = elements.visualization.clientWidth / elements.visualization.clientHeight;
      state.camera.updateProjectionMatrix();
  }
  if(state.waterfallCtx) state.waterfallCtx.canvas.width = elements.visualization.clientWidth;
});

</script>
</body>
</html>
