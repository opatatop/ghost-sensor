<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PuiSSancE MAXIMUM - VOIX PURE</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00aaff;
            --bg: #050505;
            --panel: #111;
            --text: #eee;
            --search: #ffaa00;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: 'Courier New', monospace;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            background: #000; border-bottom: 2px solid var(--primary);
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        h1 { margin: 0; font-size: 1.2rem; color: var(--primary); text-shadow: 0 0 5px var(--primary); }
        #status { font-size: 0.8rem; font-weight: bold; padding: 5px 10px; border: 1px solid var(--secondary); color: var(--secondary); }
        #status.active { background: var(--secondary); color: #000; box-shadow: 0 0 10px var(--secondary); }

        main { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        #visualizer {
            flex: 1; background: #000; position: relative; border-bottom: 1px solid #333;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        #displayOverlay {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            text-align: center; pointer-events: none; z-index: 10;
        }
        #mainText {
            font-size: 2rem; font-weight: bold; color: #fff;
            background: rgba(0,0,0,0.8); padding: 15px;
            text-transform: uppercase; border: 2px solid var(--primary);
            margin-bottom: 5px; min-height: 3.5rem;
        }
        #subText { font-size: 0.9rem; color: var(--secondary); letter-spacing: 2px; text-transform: uppercase; font-weight: bold;}

        #controls {
            background: var(--panel); padding: 15px;
            display: grid; gap: 10px;
            max-height: 40vh; overflow-y: auto;
        }
        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .control-row.full { grid-template-columns: 1fr; }

        button {
            background: #222; border: 1px solid var(--primary); color: var(--primary);
            padding: 18px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; font-family: inherit;
        }
        button:active { transform: scale(0.98); }
        button.active-mode { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        button.danger { border-color: #ff3333; color: #ff3333; }
        button.danger:active { background: #ff3333; color: #fff; }
        .btn-search { border-color: var(--search); color: var(--search); }

        #terminal {
            height: 120px; background: #000; border-top: 1px solid #333;
            padding: 8px; font-size: 0.7rem; overflow-y: auto; color: #888; font-family: monospace;
        }
        .log-line { margin-bottom: 4px; border-left: 2px solid #555; padding-left: 5px; }
        .log-sys { color: #aaa; }
        .log-ia { border-color: var(--primary); color: #fff; background: #002222; }
        .log-search { border-color: var(--search); color: #ffffaa; background: #222200; }
    </style>
</head>
<body>

<header>
    <h1>PUISSANCE <span style="font-size:0.6em">v6.0 PURE VOICE</span></h1>
    <div id="status">OFFLINE</div>
</header>

<main>
    <div id="visualizer">
        <canvas id="scopeCanvas"></canvas>
        <div id="displayOverlay">
            <div id="mainText">SYSTÈME PRÊT</div>
            <div id="subText">MODE RECHERCHE SANS PAGE WEB</div>
        </div>
    </div>
</main>

<div id="controls">
    <div class="control-row full">
        <button class="btn-search active-mode" onclick="App.startVoiceOnlyMode()">🎤 MODE RECHERCHE VOCALE</button>
    </div>
    <div class="control-row">
        <button onclick="App.startFullSystem()">⚡ MODE COMPLET</button>
        <button class="danger" onclick="App.stopSystem()">⏹ ARRÊTER</button>
    </div>
</div>

<div id="terminal">
    <div class="log-line log-sys">> v6.0 Initialisée.</div>
    <div class="log-line log-sys">> Lecture audio uniquement. Pas d'ouverture de fenêtre.</div>
</div>

<script>
/**
 * =========================================================================
 * ARCHITECTURE v6.0 - LECTURE AUDIO SEULE (PAS DE POPUP)
 * =========================================================================
 */

const AudioEngine = {
    ctx: null, stream: null, analyser: null, isInit: false,
    async init() {
        if (this.isInit) return true;
        try {
            const AC = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AC();
            if (this.ctx.state === 'suspended') await this.ctx.resume();
            this.stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
            this.analyser = this.ctx.createAnalyser();
            this.analyser.fftSize = 256;
            this.ctx.createMediaStreamSource(this.stream).connect(this.analyser);
            this.isInit = true;
            return true;
        } catch (e) {
            App.log("Erreur Micro : " + e.message, 'sys');
            return false;
        }
    },
    getDataArray() {
        if (!this.analyser) return new Uint8Array(0);
        const arr = new Uint8Array(this.analyser.frequencyBinCount);
        this.analyser.getByteFrequencyData(arr);
        return arr;
    },
    destroy() {
        if (this.stream) this.stream.getTracks().forEach(t => t.stop());
        if (this.ctx) this.ctx.close();
        this.isInit = false;
    }
};

const VisualEngine = {
    canvas: null, ctx: null, isRunning: false, animId: null,
    init() {
        this.canvas = document.getElementById('scopeCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
    },
    resize() {
        if (this.canvas) {
            this.canvas.width = this.canvas.parentElement.clientWidth;
            this.canvas.height = this.canvas.parentElement.clientHeight;
        }
    },
    start() { if (!this.isRunning) { this.isRunning = true; this.loop(); } },
    stop() { this.isRunning = false; if (this.animId) cancelAnimationFrame(this.animId); },
    loop() {
        if (!this.isRunning) return;
        const w = this.canvas.width, h = this.canvas.height;
        this.ctx.fillStyle = 'rgba(0,0,0,0.2)';
        this.ctx.fillRect(0,0,w,h);
        let data = AudioEngine.isInit ? AudioEngine.getDataArray() : new Uint8Array(128).map(()=>Math.random()*20);
        const barW = (w/data.length)*2.5;
        let x = 0;
        for(let i=0; i<data.length; i++) {
            const barH = (data[i]/255)*h;
            this.ctx.fillStyle = `rgb(0, ${data[i]+100}, 255)`;
            this.ctx.fillRect(x, h-barH, barW, barH);
            x+=barW+1;
        }
        this.animId = requestAnimationFrame(()=>this.loop());
    }
};

const BrainEngine = {
    recognition: null, synthesis: window.speechSynthesis, voice: null, isListening: false,

    init() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return false;
        this.recognition = new SR();
        this.recognition.continuous = true;
        this.recognition.interimResults = false;
        this.recognition.lang = 'fr-FR';

        this.recognition.onresult = (e) => {
            const text = e.results[e.results.length-1][0].transcript.trim();
            this.processInput(text);
        };

        this.recognition.onend = () => {
            // Si on est censé écouter mais qu'on s'est arrêté, on redémarre
            if (this.isListening && App.isRunning) {
                setTimeout(() => { 
                    if (this.isListening) try{this.recognition.start()}catch(e){} 
                }, 500);
            }
        };

        this.recognition.onerror = (e) => {
            if (e.error === 'not-allowed') { App.log("Micro refusé", 'sys'); App.stopSystem(); }
        };

        this.loadVoice();
        window.speechSynthesis.onvoiceschanged = () => this.loadVoice();
        return true;
    },

    loadVoice() {
        const voices = this.synthesis.getVoices();
        this.voice = voices.find(v => v.lang === 'fr-FR') || voices.find(v => v.lang.startsWith('fr'));
    },

    startListening() {
        if (!this.recognition) return;
        this.isListening = true;
        try { this.recognition.start(); } catch(e){}
        App.updateSubText("ÉCOUTE ACTIVE");
    },

    stopListening() {
        this.isListening = false;
        if (this.recognition) try { this.recognition.stop(); } catch(e){}
        App.updateSubText("TRAITEMENT...");
    },

    // FONCTION CRUCIALE : Parler et reprendre l'écoute ensuite
    speak(text, autoResume = true) {
        this.synthesis.cancel();
        if (!text) return;
        
        // On arrête l'écoute pour éviter que l'IA s'entende elle-même
        if(autoResume) this.stopListening();

        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'fr-FR'; u.pitch = 0.6; u.rate = 1.1;
        if (this.voice) u.voice = this.voice;
        
        u.onstart = () => { 
            App.updateMainText("RÉPONSE..."); 
            App.log("IA: " + text.substring(0, 50) + "...", 'ia'); 
        };
        
        u.onend = () => {
            // Une fois qu'elle a fini de parler, elle réécoute
            if (autoResume && App.isRunning) {
                App.updateMainText("ÉCOUTE...");
                this.startListening();
            } else {
                App.updateMainText("ATTENTE");
            }
        };
        
        this.synthesis.speak(u);
    },

    // LOGIQUE DE RECHERCHE PUREMENT AUDIO
    async performWebSearch(query) {
        App.log(`Recherche audio pour : "${query}"`, 'search');
        
        // On arrête l'écoute pendant la recherche
        this.stopListening();
        this.speak("Je cherche sur internet...", false); // false = ne pas relancer l'écoute tout de suite

        try {
            // Timeout de sécurité pour ne pas bloquer éternellement
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            const url = `https://fr.wikipedia.org/w/api.php?origin=*&action=query&format=json&prop=extracts&exintro&explaintext&redirects=1&titles=${encodeURIComponent(query)}`;
            
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            const data = await response.json();
            const pages = data.query.pages;
            const pageId = Object.keys(pages)[0];

            if (pageId !== "-1" && pages[pageId].extract) {
                let fullText = pages[pageId].extract;
                
                // Nettoyage intelligent : on garde les 3 premières phrases
                // On filtre les lignes vides ou parenthèses seules
                let sentences = fullText.split('.').filter(s => {
                    s = s.trim();
                    return s.length > 20 && !s.startsWith('(');
                });

                // On limite à 3 phrases max pour la lecture
                let summary = sentences.slice(0, 3).join('. ') + ".";
                
                // Si le résumé est trop court (cas équivoque), on le dit
                if (summary.length < 30) {
                    this.speak("Je n'ai trouvé qu'une information brève. " + summary, true);
                } else {
                    this.speak("Voici ce que j'ai trouvé : " + summary, true);
                }

            } else {
                throw new Error("Non trouvé");
            }
        } catch (e) {
            console.error(e);
            this.speak("Désolé, je n'ai pas trouvé d'information sur ce sujet.", true);
        }
    },

    processInput(text) {
        App.updateMainText(text.toUpperCase());
        const lower = text.toLowerCase();

        // 1. COMMANDE STOP
        if (lower === 'stop' || lower === 'arrête' || lower === 'tais-toi') {
            this.isListening = false; 
            if (this.recognition) this.recognition.stop();
            this.synthesis.cancel();
            App.updateSubText("PAUSE");
            this.speak("Mode arrêt.", false); // On relance pas l'écoute
            return;
        }

        // 2. COMMANDE RE ÉCOUTE
        if (lower.includes('réécoute') || lower.includes('re écoute') || lower === 'écoute') {
            if (!this.isListening) {
                this.startListening();
                this.speak("J'écoute.", false);
            }
            return;
        }

        // 3. MOTS CLÉS DE RECHERCHE
        // Liste étendue pour capter "c'est quoi", "dis moi", "info", etc.
        const searchKeywords = ['cherche', 'recherche', 'trouve', 'c\'est quoi', 'qu\'est-ce que', 'qui est', 'dis moi sur', 'info sur', 'wikipédia', 'explique'];
        
        // On vérifie si un mot clé est présent
        const isSearchIntent = searchKeywords.some(kw => lower.includes(kw));

        if (isSearchIntent) {
            // Extraction du sujet (on enlève les mots clés)
            let cleanQuery = text;
            searchKeywords.forEach(kw => {
                // Regex pour remplacer le mot clé (insensible à la casse) par vide
                const regex = new RegExp(kw, 'gi');
                cleanQuery = cleanQuery.replace(regex, '');
            });
            cleanQuery = cleanQuery.trim();

            if (cleanQuery.length > 2) {
                this.performWebSearch(cleanQuery);
                return;
            }
        }

        // 4. QUESTIONS LOCALES
        let response = null;
        if (lower.includes('qui es-tu') || lower.includes('ton nom')) response = "Je suis PuiSSancE, votre assistant vocal connecté.";
        else if (lower.includes('heure')) {
            const d = new Date();
            response = `Il est ${d.getHours()} heures ${d.getMinutes()}.`;
        }
        else if (lower.includes('merci')) response = "Je vous en prie.";

        if (response) {
            this.speak(response, true);
        } else if (this.isListening) {
            // Comportement par défaut : Répétition
            this.speak(text, true);
        }
    }
};

const App = {
    isRunning: false,
    init() {
        VisualEngine.init();
        BrainEngine.init();
        this.log("v6.0 Prête. Mode Audio Pur.", 'sys');
    },
    log(msg, type='sys') {
        const t = document.getElementById('terminal');
        const d = document.createElement('div');
        d.className = 'log-line log-'+type;
        d.innerText = `[${new Date().toLocaleTimeString('fr-FR')}] ${msg}`;
        t.appendChild(d); t.scrollTop = t.scrollHeight;
    },
    updateMainText(t) { document.getElementById('mainText').innerText = t; },
    updateSubText(t) { document.getElementById('subText').innerText = t; },
    updateStatus(active) {
        const b = document.getElementById('status');
        if (active) { b.classList.add('active'); b.innerText="ONLINE"; }
        else { b.classList.remove('active'); b.innerText="OFFLINE"; }
    },
    startFullSystem() {
        this.stopSystem();
        this.log("Démarrage Complet...", 'sys');
        AudioEngine.init().then(ok => {
            if(!ok) return;
            VisualEngine.start();
            BrainEngine.startListening();
            this.isRunning=true;
            this.updateStatus(true);
            BrainEngine.speak("Système complet actif.");
        });
    },
    startVoiceOnlyMode() {
        this.stopSystem();
        this.log("Mode Voix Seule...", 'sys');
        VisualEngine.start();
        BrainEngine.startListening();
        this.isRunning=true;
        this.updateStatus(true);
        BrainEngine.speak("Mode recherche activé. Posez vos questions.");
    },
    stopSystem() {
        this.isRunning=false;
        AudioEngine.destroy();
        VisualEngine.stop();
        BrainEngine.stopListening();
        BrainEngine.synthesis.cancel();
        this.updateMainText("SYSTÈME OFF"); 
        this.updateSubText("");
        this.updateStatus(false);
        const c = document.getElementById('scopeCanvas');
        c.getContext('2d').clearRect(0,0,c.width,c.height);
    }
};

window.onload = () => App.init();
</script>
</body>
</html>
