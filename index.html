<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB - PHYSIQUE QUANTIQUE</title>
<style>
:root {
  --primary: #00ffff; /* Cyan Plasma */
  --secondary: #bf00ff; /* Violet Dimension */
  --bg: #050011; /* Deep Space */
  --panel: #0a0022;
  --btn-bg: #1a0033;
  --btn-active: #00ffff;
  --text: #e0e0ff;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

/* BACKGROUND STARS */
.stars {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
  radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
  radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
  background-size: 550px 550px, 350px 350px, 250px 250px;
  background-position: 0 0, 40px 60px, 130px 270px;
  opacity: 0.3;
  z-index: -1;
}

#header {
  padding: 5px; background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.7rem; flex-shrink: 0;
  color: var(--primary);
  box-shadow: 0 0 10px var(--secondary);
}

#vizContainer {
  flex: 1; position: relative; background: rgba(0,0,0,0.5);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  overflow: hidden;
  border-top: 1px solid rgba(0,255,255,0.2);
  border-bottom: 1px solid rgba(0,255,255,0.2);
}

#iaBox {
  z-index: 10; text-align: center; width: 90%;
  pointer-events: none;
  background: rgba(0,0,20,0.8);
  border: 1px solid var(--secondary);
  padding: 10px;
  box-shadow: 0 0 15px var(--secondary);
}
#iaLabel { color: var(--secondary); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px; }
#iaText {
  font-size: 1.8rem; font-weight: 900; color: #fff;
  min-height: 3rem; 
  text-transform: uppercase;
  text-shadow: 0 0 8px var(--primary);
}

canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; opacity: 0.9; mix-blend-mode: screen;}

#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  height: 45vh; overflow-y: auto; padding: 5px;
  display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
}

.control-group {
  border: 1px solid #4400aa;
  padding: 5px;
  margin-bottom: 5px;
  background: rgba(0,0,20,0.5);
}
.group-title {
  background: #220044; color: #bf00ff; padding: 2px 5px;
  font-size: 0.65rem; font-weight: bold; margin-bottom: 5px;
  text-transform: uppercase;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px;
}

button {
  background: var(--btn-bg); border: 1px solid #4400aa;
  color: var(--primary); padding: 8px 1px; font-size: 0.6rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #000;
  box-shadow: 0 0 10px var(--primary);
  border-color: #fff;
}

#startBtn {
  grid-column: span 4; font-size: 1.1rem; padding: 12px;
  background: #000; color: var(--primary); border: 2px solid var(--primary);
  font-weight: 900; letter-spacing: 2px;
}

/* SLIDERS */
.slider-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.6rem; margin-bottom: 2px;
}
input[type="range"] { width: 50%; accent-color: var(--secondary); }

#barsArea { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.6rem; }
.bar-box { background: #110022; height: 8px; width: 100%; border: 1px solid #330066; margin-top:1px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.05s; background: var(--primary); }

#logZone {
  height: 40px; background: #000; border-top: 1px solid #330066;
  padding: 2px 5px; font-size: 0.55rem; overflow-y: auto; color: #aa88ff;
  flex-shrink: 0;
}
.log-suc { color: var(--primary) !important; }
.log-warn { color: #ff00ff !important; }

</style>
</head>
<body>

<div class="stars"></div>

<div id="header">
  <div>SENSOR: <span id="micStatus">OFF</span></div>
  <div>DIMENSION: <span id="aiStatus">JANUS</span></div>
  <div>MHD: <span id="keepAliveStatus">INACTIVE</span></div>
</div>

<div id="vizContainer">
  <canvas id="canvas"></canvas>
  <div id="iaBox">
    <div id="iaLabel">ANALYSE SPECTRALE & IA</div>
    <div id="iaText">... INITIALISATION CAPTEURS ...</div>
  </div>
</div>

<div id="controlsArea">
  <!-- BARS -->
  <div id="barsArea">
    <div>DENSITÉ ÉNERGÉTIQUE <div class="bar-box"><div id="voiceBar" class="bar-fill"></div></div></div>
    <div>SEUIL RÉSONANCE <div class="bar-box"><div id="monitorBar" class="bar-fill" style="background:var(--secondary)"></div></div></div>
  </div>

  <button id="startBtn" onclick="startSystem()">ACTIVER SYSTÈME JPP</button>

  <!-- GROUPE MHD -->
  <div class="control-group">
    <div class="group-title">Magnéto-Hydrodynamique (Audio)</div>
    <div class="slider-row"><span>Gain Capteur</span><input type="range" id="boostRange" min="1" max="10" step="0.5" value="5"></div>
    <div class="slider-row"><span>Écoute Latérale</span><input type="range" id="monVolRange" min="0" max="1" step="0.01" value="0"></div>
    <div class="button-grid">
      <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE</button>
      <button id="invertBtn" onclick="toggleOpt('invert')">⚛ MASSE NÉGATIVE</button>
      <button id="warpBtn" onclick="toggleOpt('warp')">🌀 TORSION</button>
      <button id="reverbBtn" onclick="toggleOpt('reverb')">🌊 ÉCHO COSMIQUE</button>
    </div>
  </div>

  <!-- GROUPE ONDES -->
  <div class="control-group">
    <div class="group-title">Ondes Gravitationnelles & Plasma</div>
    <div class="slider-row"><span>Fréquence Vacuum</span><input type="range" id="sweepRange" min="1" max="100" value="20"></div>
    <div class="button-grid">
      <button id="ghostBtn" onclick="toggleOpt('ghostBox')">📻 RÉCEPTEUR VIDE</button>
      <button id="plasmaBtn" onclick="setNoise('plasma')">🔥 PLASMA</button>
      <button id="voidBtn" onclick="setNoise('void')">⚫ VIDE</button>
      <button id="quantumBtn" onclick="setNoise('quantum')">💎 QUANTUM</button>
    </div>
  </div>

  <!-- GROUPE ANALYSE -->
  <div class="control-group">
    <div class="group-title">Analyse & IA</div>
    <div class="button-grid">
      <button id="voiceBtn" onclick="toggleOpt('voice')">🗣 IA TRADUCTION</button>
      <button id="camBtn" onclick="toggleOpt('cam')">📷 CAMÉRA</button>
      <button id="interBtn" onclick="toggleOpt('radar')">📡 INTERFÉROMÈTRE</button>
      <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ CAPTURE ANOMALIE</button>
      <button id="clearBtn" onclick="clearLog()">🗑 CLEAR LOGS</button>
      <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ ARRÊTER</button>
    </div>
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
let app = {
  running: false,
  ctx: null, 
  source: null, 
  // Noeuds
  filter: null,       
  analysisGain: null, 
  monitorGain: null,  
  analyser: null,
  warpNode: null, // Phaser/Flanger
  convolver: null,
  // Ghost Box (FM Synth)
  carrier: null, modulator: null, modulatorGain: null, noiseNode: null, noiseGain: null,
  // Stream
  stream: null, vidStream: null, recorder: null, isRec: false,
  recognition: null,
  keepAliveOsc: null,
  config: { 
    monitor: false, invert: false, warp: false, reverb: false, 
    ghostBox: false, voice: false, autoRec: false, radar: false, cam: false,
    noiseType: 'plasma'
  },
  canvas: null, cCtx: null, width: 0, height: 0,
  wakeLock: null
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), mic: el('micStatus'), keep: el('keepAliveStatus'), ai: el('aiStatus'),
  voiceBar: el('voiceBar'), monBar: el('monitorBar'), iaText: el('iaText'),
  canvas: el('canvas'),
  sMon: el('monVolRange'), sBoost: el('boostRange'), sSweep: el('sweepRange')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

// --- START SYSTEM ---

async function startSystem() {
  if(app.running) return;
  
  el('startBtn').textContent = "CALIBRATION CAPTEURS...";
  el('startBtn').style.background = "var(--secondary)";

  try {
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();

    app.stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false 
    });

    setupAudioNodes(app.stream);
    setupVisuals();

    try { app.wakeLock = await navigator.wakeLock.request('screen'); log("Wake Lock: ACTIF"); } catch(e) {}
    startKeepAlive();
    startVoice();

    app.running = true;
    el('startBtn').textContent = "SYSTÈME JPP ACTIF";
    el('startBtn').style.background = "var(--primary)";
    els.mic.textContent = "CALIBRÉ";
    els.mic.style.color = "#0f0";
    els.keep.textContent = "FLUX STABLE";
    
    drawLoop();
    log("Capteurs de plasma actifs. Écoute dimensionnelle.", 'log-suc');

  } catch (err) {
    log("Erreur Init: " + err.message, 'log-warn');
    el('startBtn').textContent = "ERREUR";
    el('startBtn').style.background = "red";
  }
}

function setupAudioNodes(stream) {
  app.source = app.ctx.createMediaStreamSource(stream);
  
  // Filtre
  app.filter = app.ctx.createBiquadFilter();
  app.filter.type = 'highpass';
  app.filter.frequency.value = 300;

  // Gains
  app.analysisGain = app.ctx.createGain();
  app.analysisGain.gain.value = parseFloat(els.sBoost.value);

  app.monitorGain = app.ctx.createGain();
  app.monitorGain.gain.value = 0;

  // Analyser
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.analyser.smoothingTimeConstant = 0.5;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);

  // EFFET WARP (Torsion) - Delay Modulé (Chorus/Flanger simple)
  app.warpNode = app.ctx.createDelay();
  app.warpNode.delayTime.value = 0.05; // 50ms
  const warpLFO = app.ctx.createOscillator();
  warpLFO.frequency.value = 0.5; // Vitesse de torsion
  const warpLFOGain = app.ctx.createGain();
  warpLFOGain.gain.value = 0.01; // Profondeur
  warpLFO.connect(warpLFOGain);
  warpLFOGain.connect(app.warpNode.delayTime);
  warpLFO.start();

  // Réverb
  app.convolver = app.ctx.createConvolver();
  app.convolver.buffer = createImpulseResponse(2.5, 2.0, false); // Grand écho cosmique

  // GHOST BOX (FM SYNTHESIS - Son plus "Alien")
  // Porteuse (Carrier)
  app.carrier = app.ctx.createOscillator();
  app.carrier.type = 'sine';
  app.carrier.frequency.value = 440;
  app.carrierGain = app.ctx.createGain();
  app.carrierGain.gain.value = 0;
  
  // Modulateur
  app.modulator = app.ctx.createOscillator();
  app.modulator.type = 'sawtooth';
  app.modulator.frequency.value = 10; // Fréquence de balayage
  app.modulatorGain = app.ctx.createGain();
  app.modulatorGain.gain.value = 500; // Indice de modulation (étendue des fréquences)
  
  app.modulator.connect(app.modulatorGain);
  app.modulatorGain.connect(app.carrier.frequency); // FM Synth !
  app.carrier.connect(app.carrierGain);
  app.carrierGain.connect(app.monitorGain);
  
  app.carrier.start();
  app.modulator.start();

  // Bruit de fond (Vacuum noise)
  createNoiseBuffer();
  app.noiseNode = app.ctx.createBufferSource();
  app.noiseNode.buffer = app.noiseBuffer;
  app.noiseNode.loop = true;
  app.noiseGain = app.ctx.createGain();
  app.noiseGain.gain.value = 0;
  app.noiseNode.connect(app.noiseGain);
  app.noiseGain.connect(app.monitorGain);
  app.noiseNode.start();

  // ROUTAGE
  // Source -> Filter -> Analysis -> Analyser
  app.source.connect(app.filter);
  app.filter.connect(app.analysisGain);
  app.analysisGain.connect(app.analyser);

  // Source -> Filter -> Warp -> Monitor
  app.filter.connect(app.warpNode);
  app.warpNode.connect(app.monitorGain);
  app.filter.connect(app.monitorGain); // Signal direct
  
  // Réverb insert
  app.filter.connect(app.convolver);
  app.convolver.connect(app.monitorGain);

  app.monitorGain.connect(app.ctx.destination);

  app.recorder = new MediaRecorder(stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

function createImpulseResponse(duration, decay, reverse) {
  const sampleRate = app.ctx.sampleRate;
  const length = sampleRate * duration;
  const impulse = app.ctx.createBuffer(2, length, sampleRate);
  const left = impulse.getChannelData(0);
  const right = impulse.getChannelData(1);
  for (let i = 0; i < length; i++) {
    const n = reverse ? length - i : i;
    left[i] = (Math.random() * 2 - 1) * Math.pow(1 - n / length, decay);
    right[i] = (Math.random() * 2 - 1) * Math.pow(1 - n / length, decay);
  }
  return impulse;
}

function createNoiseBuffer() {
    const bufferSize = app.ctx.sampleRate * 2;
    const buffer = app.ctx.createBuffer(1, bufferSize, app.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    app.noiseBuffer = buffer;
}

// --- KEEP ALIVE ---
function startKeepAlive() {
  app.keepAliveOsc = app.ctx.createOscillator();
  const keepGain = app.ctx.createGain();
  keepGain.gain.value = 0;
  app.keepAliveOsc.connect(keepGain);
  keepGain.connect(app.ctx.destination);
  app.keepAliveOsc.start();
  document.body.addEventListener('click', () => {
      if(app.ctx && app.ctx.state === 'suspended') app.ctx.resume();
  }, {once:false});
}

function stopSystem() {
  if(app.wakeLock) { app.wakeLock.release(); app.wakeLock = null; }
  if(app.stream) app.stream.getTracks().forEach(t=>t.stop());
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  if(app.recognition) app.recognition.stop();
  if(app.ctx) app.ctx.close();
  
  app.running = false;
  
  el('startBtn').textContent = "ACTIVER SYSTÈME JPP";
  el('startBtn').style.background = "#000";
  els.mic.textContent = "OFF";
  els.keep.textContent = "INACTIVE";
  els.iaText.textContent = "SYSTÈME ARRÊTÉ";
  
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
}

// --- OPTIONS LOGIC ---

function toggleOpt(key) {
  if(!app.running && key !== 'cam') { log("Système requis", 'log-warn'); return; }
  
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');

  if(key === 'monitor') {
      app.monitorGain.gain.value = app.config.monitor ? parseFloat(els.sMon.value) : 0;
  }

  if(key === 'invert') {
      app.analysisGain.gain.value = app.config.invert ? -parseFloat(els.sBoost.value) : parseFloat(els.sBoost.value);
  }

  if(key === 'warp') {
      // Activer/Désactiver le Warp (Torsion)
      // On le déconnecte du monitor si OFF
      if(app.config.warp) {
         log("Torsion Espace-Temps ACTIVE", 'log-warn');
      } else {
         log("Torsion DÉSACTIVE");
      }
  }

  if(key === 'ghostBox') {
      const vol = app.config.ghostBox ? 0.2 : 0;
      app.carrierGain.gain.value = vol;
      app.noiseGain.gain.value = vol * 0.3;
  }

  if(key === 'voice') {
      if(app.config.voice) startVoice(); else app.recognition.stop();
  }
  if(key === 'cam') toggleCam();
}

els.sMon.oninput = (e) => {
    if(app.config.monitor) app.monitorGain.gain.value = parseFloat(e.target.value);
    els.monBar.style.width = (parseFloat(e.target.value)*100) + '%';
};
els.sBoost.oninput = (e) => {
    const val = parseFloat(e.target.value);
    app.analysisGain.gain.value = app.config.invert ? -val : val;
};
els.sSweep.oninput = (e) => {
    // Change la vitesse du modulateur FM
    if(app.modulator) app.modulator.frequency.value = parseFloat(e.target.value);
};

function setNoise(type) {
    app.config.noiseType = type;
    // Ajustement des paramètres FM selon le type de "vide"
    if(type === 'plasma') {
        app.carrier.type = 'sawtooth'; app.modulator.type = 'square';
    } else if (type === 'void') {
        app.carrier.type = 'sine'; app.modulator.type = 'sine'; app.modulatorGain.gain.value = 100;
    } else { // Quantum
        app.carrier.type = 'triangle'; app.modulator.type = 'sawtooth';
    }
    log(`Matière: ${type.toUpperCase()}`);
}

// --- IA "JPP" ---

function startVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true;
      app.recognition.lang = 'fr-FR';
      app.recognition.onresult = (e) => {
          let txt = '';
          for(let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
          if(txt) {
              // Habillage scientifique
              els.iaText.textContent = `RÉSONANCE: "${txt}"`;
              if(e.results[e.results.length-1].isFinal) log(`Séquence Détectée: "${txt}"`, 'log-suc');
          }
      };
      app.recognition.onerror = (e) => {};
      app.recognition.onend = () => { if(app.running && app.config.voice) try{app.recognition.start()}catch(e){} };
      try{ app.recognition.start(); } catch(e){}
  }
}

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          const vid = document.createElement('video');
          vid.srcObject = app.vidStream; vid.autoplay = true; vid.muted = true; vid.playsInline = true;
          vid.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.3; z-index:0; filter: hue-rotate(90deg);"; // Filtre étrange
          els.canvas.parentNode.insertBefore(vid, els.canvas);
      } catch(e) { log("Erreur Caméra", 'log-warn'); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null; document.querySelector('video')?.remove();
  }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`JPP_DATA_${Date.now()}.webm`; a.click();
  log("Données Spectrales Sauvegardées", 'log-suc');
}

function clearLog() { els.log.innerHTML = ''; }

// --- DRAW LOOP (VISUELS SCIENTIFIQUES) ---

function setupVisuals() {
    app.canvas = els.canvas;
    app.cCtx = app.canvas.getContext('2d');
    resize();
}

function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  app.analyser.getByteFrequencyData(app.dataArray);
  
  let sum = 0;
  for(let i=0; i<app.dataArray.length; i++) sum += app.dataArray[i];
  const avg = sum / app.dataArray.length;
  els.voiceBar.style.width = Math.min(100, avg) + '%';

  if(app.config.autoRec && avg > 60 && !app.isRec) {
      app.isRec = true; app.recorder.start(); log("⚠ ANOMALIE ÉNERGÉTIQUE CAPTÉE", 'log-warn');
      setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 4000);
  }

  const ctx = app.cCtx, w=app.width, h=app.height;
  // Fade très sombre pour effet de trainée
  ctx.fillStyle = 'rgba(5, 0, 17, 0.15)';
  ctx.fillRect(0,0,w,h);

  // Mode Interféromètre (Radar) ou Spectre Standard
  if(app.config.radar) {
      const cx = w/2, cy = h/2;
      const maxR = Math.min(w,h)/2 - 20;
      
      // Cercles de Fresnel (Simulés)
      ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
      ctx.beginPath(); ctx.arc(cx,cy,maxR,0,7); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,maxR*0.7,0,7); ctx.stroke();
      
      // Scan Line
      const angle = (Date.now() / 1000) % (Math.PI*2);
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
      ctx.fillStyle = 'rgba(191, 0, 255, 0.5)';
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,maxR,-0.05,0.05); ctx.fill(); ctx.restore();
      
      // Interférences (Blips)
      if(avg > 40) {
           const r = (avg/255) * maxR;
           const bx = cx + Math.cos(angle)*r;
           const by = cy + Math.sin(angle)*r;
           ctx.fillStyle = '#fff';
           ctx.beginPath(); ctx.arc(bx,by,3,0,7); ctx.fill();
           // Ligne vers centre
           ctx.strokeStyle = 'rgba(255,0,255,0.5)';
           ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(bx,by); ctx.stroke();
      }
  } else {
      // Spectre de Fréquence (Style Onde)
      ctx.beginPath();
      const sliceW = w / app.dataArray.length;
      let x = 0;
      for(let i=0; i<app.dataArray.length; i++) {
          const v = app.dataArray[i];
          const barH = (v/255)*h;
          
          // Couleur "Néon"
          const r = 0, g = v, b = 255; // Cyan to Blue
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          
          // Dessin symétrique (comme une onde) ou barres
          if(app.config.warp) {
              // Effet Warp : Lignes courbes
              ctx.lineTo(x, h/2 + Math.sin(i*0.1 + Date.now()/200)*v*0.5);
          } else {
              ctx.fillRect(x, h - barH, sliceW, barH);
          }
          x += sliceW;
      }
      if(app.config.warp) {
          ctx.strokeStyle = '#00ffff';
          ctx.stroke();
      }
  }
}

window.onresize = resize;
function resize() {
    if(app.canvas) {
        app.width = app.canvas.clientWidth;
        app.height = app.canvas.clientHeight;
        app.canvas.width = app.width;
        app.canvas.height = app.height;
    }
}

window.onload = () => {
    setupVisuals();
    log("ETERNITY LAB JPP INITIALISÉ.");
    log("Prêt pour l'analyse du modèle Janus.", 'log-suc');
};

</script>
