<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPRA ETERNITY - EDITION FINALE</title>
    <style>
        :root {
            --primary: #00ffff;
            --secondary: #bc13fe;
            --bg: #050510;
            --panel: #0a0a20;
            --text: #e0e0ff;
            --danger: #ff3333;
            --active-btn: #fff;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: 'Courier New', monospace;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            background: #000; border-bottom: 2px solid var(--primary);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        h1 { margin: 0; font-size: 1.2rem; color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .header-icons { display: flex; gap: 10px; }
        .icon-btn {
            background: none; border: 1px solid var(--secondary); color: var(--secondary);
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .icon-btn:active { background: var(--secondary); color: #fff; transform: scale(0.9); }

        main { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        #visualizer { flex: 1; background: #000; position: relative; border-bottom: 1px solid #333; }
        canvas { width: 100%; height: 100%; display: block; }
        
        #displayOverlay {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            text-align: center; pointer-events: none; z-index: 10;
        }
        #mainText {
            font-size: 1.8rem; font-weight: 900; color: #fff;
            background: rgba(0,0,0,0.8); padding: 10px;
            text-transform: uppercase; border: 2px solid var(--primary);
            margin-bottom: 5px; min-height: 3rem;
        }
        #subText { font-size: 0.8rem; color: var(--secondary); letter-spacing: 2px; font-weight: bold; }

        /* NOUVELLE GRILLE DE BOUTONS */
        #actionGrid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; background: var(--panel);
            border-bottom: 1px solid #333;
        }
        .grid-btn {
            background: #1a1a1a; border: 1px solid #444; color: #ccc;
            padding: 10px 2px; border-radius: 4px; text-align: center; font-size: 0.7rem; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 5px; font-weight: bold;
        }
        .grid-btn.active-state {
            background: var(--secondary); color: #fff; border-color: #fff; box-shadow: 0 0 10px var(--secondary);
        }
        .grid-icon { font-size: 1.2rem; }

        /* CONTROLES */
        #controls {
            background: var(--panel); padding: 15px;
            display: grid; gap: 10px;
            max-height: 35vh; overflow-y: auto;
        }
        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .control-row.full { grid-template-columns: 1fr; }

        button {
            background: #111; border: 1px solid var(--primary); color: var(--primary);
            padding: 15px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; font-family: inherit; border-radius: 4px;
        }
        button:active { transform: scale(0.98); }
        button.active-mode { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        button.danger { border-color: var(--danger); color: var(--danger); }
        button.danger:active { background: var(--danger); color: #fff; }

        /* MODAL RÉGLAGES */
        #settingsModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200;
            flex-direction: column; padding: 20px; overflow-y: auto;
        }
        .modal-content {
            max-width: 500px; margin: 0 auto; width: 100%; background: #111;
            border: 2px solid var(--secondary); padding: 20px; border-radius: 8px;
        }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        label { color: #fff; font-size: 0.9rem; }
        input[type=range] { width: 50%; accent-color: var(--secondary); }
        .close-btn { float: right; color: var(--danger); cursor: pointer; font-size: 1.5rem; }

        /* TERMINAL */
        #terminal {
            height: 80px; background: #000; border-top: 1px solid #333;
            padding: 8px; font-size: 0.6rem; overflow-y: auto; color: #888; font-family: monospace;
        }
        .log-line { margin-bottom: 2px; border-left: 2px solid #555; padding-left: 5px; }
        .log-sys { color: #aaa; }
        .log-rec { color: var(--danger); border-color: var(--danger); font-weight: bold; } /* Enregistrement */
        .log-ia { border-color: var(--secondary); color: #fff; background: #220022; }
        .log-det { color: var(--primary); border-color: var(--primary); } /* Détection */
    </style>
</head>
<body>

<header>
    <h1>SUPRA <span style="font-size:0.6em; color:var(--secondary)">ETERNITY FINAL</span></h1>
    <div class="header-icons">
        <button class="icon-btn" onclick="App.toggleSettings()">⚙</button>
    </div>
</header>

<main>
    <div id="visualizer">
        <canvas id="scopeCanvas"></canvas>
        <div id="displayOverlay">
            <div id="mainText">SYSTÈME PRÊT</div>
            <div id="subText">MODE RÉPONSE</div>
        </div>
    </div>
</main>

<!-- GRILLE D'ACTIONS -->
<div id="actionGrid">
    <div class="grid-btn" onclick="App.toggleSettings()">
        <span class="grid-icon">⚙️</span><span>RÉGLAGES</span>
    </div>
    <div class="grid-btn" id="btnSound" onclick="FeatureEngine.toggleMute()">
        <span class="grid-icon">🔊</span><span>SON</span>
    </div>
    <div class="grid-btn" id="btnPower" onclick="FeatureEngine.togglePower()">
        <span class="grid-icon">⚡</span><span>PUISSANCE</span>
    </div>
    <div class="grid-btn" id="btnDetect" onclick="FeatureEngine.toggleDetection()">
        <span class="grid-icon">📡</span><span>DÉTECTION</span>
    </div>
    <div class="grid-btn" id="btnNoise" onclick="FeatureEngine.toggleWhiteNoise()">
        <span class="grid-icon">🌊</span><span>BRUIT BLANC</span>
    </div>
</div>

<div id="controls">
    <div class="control-row full">
        <button class="active-mode" onclick="App.startVoiceOnlyMode()">🎤 ACTIVER SUPRA (RÉPONSE)</button>
    </div>
    <div class="control-row">
        <button onclick="App.startFullSystem()">⚡ MODE COMPLET (VISUEL)</button>
        <button class="danger" onclick="App.stopSystem()">⏹ ARRÊTER</button>
    </div>
</div>

<div id="terminal">
    <div class="log-line log-sys">> Supra Eternity Final initialisé.</div>
    <div class="log-line log-sys">> Mode Réponse activé par défaut.</div>
</div>

<!-- MODAL RÉGLAGES -->
<div id="settingsModal">
    <div class="modal-content">
        <span class="close-btn" onclick="App.toggleSettings()">×</span>
        <h2 style="color:var(--primary); margin-top:0;">PARAMÈTRES</h2>
        <h3 style="color:#aaa; font-size:0.8rem;">VOIX</h3>
        <div class="setting-row">
            <label>Hauteur</label>
            <input type="range" id="pitch" min="0.1" max="2" step="0.1" value="0.6" oninput="Config.update('pitch', this.value)">
        </div>
        <div class="setting-row">
            <label>Vitesse</label>
            <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1.1" oninput="Config.update('rate', this.value)">
        </div>
        <h3 style="color:#aaa; font-size:0.8rem; margin-top:20px;">DÉTECTION</h3>
        <div class="setting-row">
            <label>Sensibilité</label>
            <input type="range" id="sensitivity" min="10" max="100" step="1" value="50" oninput="Config.update('sensitivity', this.value)">
        </div>
        <button style="width:100%; margin-top:20px;" onclick="App.toggleSettings()">FERMER</button>
    </div>
</div>

<script>
/**
 * =========================================================================
 * SUPRA ETERNITY FINAL - MODE RÉPONSE + MODULES
 * =========================================================================
 */

// --- CONFIG ---
const Config = {
    data: { pitch: 0.6, rate: 1.1, volume: 1.0, sensitivity: 50, isActive: false },
    load() {
        const saved = localStorage.getItem('supra_final_config');
        if (saved) this.data = { ...this.data, ...JSON.parse(saved) };
        this.updateUI();
    },
    save() { localStorage.setItem('supra_final_config', JSON.stringify(this.data)); },
    update(key, value) { this.data[key] = value; this.save(); },
    updateUI() {
        document.getElementById('pitch').value = this.data.pitch;
        document.getElementById('rate').value = this.data.rate;
        document.getElementById('sensitivity').value = this.data.sensitivity;
    }
};

// --- AUDIO ENGINE (AVEC BRUIT BLANC) ---
const AudioEngine = {
    ctx: null, stream: null, analyser: null, isInit: false,
    // Bruit Blanc
    noiseNode: null, noiseGain: null, noiseBuffer: null,
    
    async init() {
        if (this.isInit) return true;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            if (this.ctx.state === 'suspended') await this.ctx.resume();
            this.stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
            this.analyser = this.ctx.createAnalyser();
            this.analyser.fftSize = 256;
            this.ctx.createMediaStreamSource(this.stream).connect(this.analyser);
            this.isInit = true;
            return true;
        } catch (e) { return false; }
    },

    // Générateur de Bruit Blanc
    initWhiteNoise() {
        if (!this.ctx) return;
        const bufferSize = 2 * this.ctx.sampleRate;
        this.noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const output = this.noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }
        this.noiseNode = this.ctx.createBufferSource();
        this.noiseNode.buffer = this.noiseBuffer;
        this.noiseNode.loop = true;
        this.noiseGain = this.ctx.createGain();
        this.noiseGain.gain.value = 0.05; // Volume faible par défaut
        this.noiseNode.connect(this.noiseGain);
        this.noiseGain.connect(this.ctx.destination);
        this.noiseNode.start(0);
    },

    toggleWhiteNoise(active) {
        if (!this.ctx && active) { this.init().then(() => this.initWhiteNoise()); return; }
        if (!this.noiseNode) this.initWhiteNoise();
        if (this.noiseGain) this.noiseGain.gain.setTargetAtTime(active ? 0.1 : 0, this.ctx.currentTime, 0.1);
    },

    getDataArray() {
        if (!this.analyser) return new Uint8Array(0);
        const arr = new Uint8Array(this.analyser.frequencyBinCount);
        this.analyser.getByteFrequencyData(arr);
        return arr;
    },
    
    getAverageVolume() {
        if (!this.analyser) return 0;
        const data = this.getDataArray();
        let sum = 0;
        for(let i=0; i<data.length; i++) sum += data[i];
        return sum / data.length;
    },

    destroy() {
        if (this.noiseNode) { this.noiseNode.stop(); this.noiseNode = null; }
        if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
        if (this.ctx) { this.ctx.close(); this.ctx = null; }
        this.analyser = null; this.isInit = false;
    }
};

// --- VISUAL ENGINE ---
const VisualEngine = {
    canvas: null, ctx: null, animId: null, isRunning: false, powerMode: false,
    init() {
        this.canvas = document.getElementById('scopeCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize(); window.addEventListener('resize', () => this.resize());
    },
    resize() {
        if (this.canvas) {
            this.canvas.width = this.canvas.parentElement.clientWidth;
            this.canvas.height = this.canvas.parentElement.clientHeight;
        }
    },
    start() { if (!this.isRunning) { this.isRunning = true; this.loop(); } },
    stop() { this.isRunning = false; if (this.animId) cancelAnimationFrame(this.animId); },
    loop() {
        if (!this.isRunning) return;
        const w = this.canvas.width, h = this.canvas.height;
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        this.ctx.fillRect(0, 0, w, h);
        
        let data = AudioEngine.isInit ? AudioEngine.getDataArray() : new Uint8Array(128).map(() => Math.random() * 30);
        const barW = (w / data.length) * (this.powerMode ? 3 : 2.5);
        let x = 0;
        
        for (let i = 0; i < data.length; i++) {
            let barH = (data[i] / 255) * h;
            if (this.powerMode) barH *= 1.2; // Mode Puissance
            
            this.ctx.fillStyle = this.powerMode ? '#ff0055' : '#00ffff';
            this.ctx.shadowBlur = this.powerMode ? 20 : 10;
            this.ctx.shadowColor = this.ctx.fillStyle;
            this.ctx.fillRect(x, h - barH, barW, barH);
            this.ctx.shadowBlur = 0;
            x += barW + 1;
        }
        this.animId = requestAnimationFrame(() => this.loop());
    }
};

// --- FEATURE ENGINE (Gestion des boutons) ---
const FeatureEngine = {
    mute: false,
    detection: false,
    detectionInterval: null,

    toggleMute() {
        this.mute = !this.mute;
        const btn = document.getElementById('btnSound');
        if(this.mute) {
            btn.classList.add('active-state');
            BrainEngine.synthesis.cancel();
            App.log("Son coupé.", 'sys');
        } else {
            btn.classList.remove('active-state');
            App.log("Son réactivé.", 'sys');
        }
    },

    togglePower() {
        VisualEngine.powerMode = !VisualEngine.powerMode;
        const btn = document.getElementById('btnPower');
        btn.classList.toggle('active-state');
        App.log(VisualEngine.powerMode ? "Mode PUISSANCE activé." : "Mode Normal.", 'sys');
        BrainEngine.speak(VisualEngine.powerMode ? "Mode puissance activé." : "Mode puissance désactivé.");
    },

    toggleDetection() {
        this.detection = !this.detection;
        const btn = document.getElementById('btnDetect');
        btn.classList.toggle('active-state');
        
        if (this.detection) {
            App.log("Détection spectrale activée.", 'sys');
            BrainEngine.speak("Module de détection activé.");
            this.startDetectionLoop();
        } else {
            App.log("Détection désactivée.", 'sys');
            clearInterval(this.detectionInterval);
        }
    },

    startDetectionLoop() {
        if (this.detectionInterval) clearInterval(this.detectionInterval);
        this.detectionInterval = setInterval(() => {
            if (!this.detection || !App.isRunning) return;
            
            // Assurer que l'audio tourne pour la détection
            if (!AudioEngine.isInit) AudioEngine.init().then(()=>{});

            const vol = AudioEngine.getAverageVolume();
            // Sensibilité : Plus la valeur est haute, moins c'est sensible
            // Inversé pour le slider (100 slider = très sensible = seuil bas)
            const threshold = 110 - Config.data.sensitivity;

            if (vol > threshold) {
                const phrases = ["IMPULSION DÉTECTÉE", "PRÉSENCE CONFIRMÉE", "ANOMALIE SONORE", "SIGNAL REÇU"];
                const p = phrases[Math.floor(Math.random() * phrases.length)];
                App.log(p, 'det');
                // Ne pas parler à chaque fois pour éviter la boucle infinie avec le bruit blanc
                if (Math.random() > 0.7) { 
                   // Petit bip sonore au lieu de parler pour éviter de s'entendre
                }
            }
        }, 1000);
    },

    toggleWhiteNoise() {
        const isActive = document.getElementById('btnNoise').classList.toggle('active-state');
        AudioEngine.toggleWhiteNoise(isActive);
        App.log(isActive ? "Bruit Blanc activé." : "Bruit Blanc coupé.", 'sys');
        BrainEngine.speak(isActive ? "Bruit blanc activé." : "Bruit blanc coupé.");
    }
};

// --- BRAIN ENGINE (LOGIQUE DE RÉPONSE) ---
const BrainEngine = {
    recognition: null, synthesis: window.speechSynthesis, voice: null, isListening: false,

    init() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return false;
        this.recognition = new SR();
        this.recognition.continuous = true;
        this.recognition.interimResults = false;
        this.recognition.lang = 'fr-FR';

        this.recognition.onresult = (e) => {
            const text = e.results[e.results.length - 1][0].transcript.trim();
            this.process(text);
        };
        this.recognition.onend = () => {
            if (this.isListening && Config.data.isActive) {
                setTimeout(() => { if(this.isListening) try{this.recognition.start()}catch(e){} }, 800);
            }
        };
        this.recognition.onerror = (e) => {
            if (e.error === 'not-allowed') { App.log("Micro refusé", 'err'); App.stopSystem(); }
        };
        this.loadVoice();
        window.speechSynthesis.onvoiceschanged = () => this.loadVoice();
        return true;
    },
    loadVoice() {
        const voices = this.synthesis.getVoices();
        this.voice = voices.find(v => v.lang === 'fr-FR') || voices[0];
    },
    start() {
        if (!this.recognition) return;
        this.isListening = true;
        try { this.recognition.start(); App.updateSub("ÉCOUTE ACTIVE"); } catch(e) {}
    },
    stop() {
        this.isListening = false;
        if (this.recognition) try { this.recognition.stop(); } catch(e) {}
        App.updateSub("VEILLE");
    },
    speak(text) {
        if (FeatureEngine.mute) { App.log("[MUET] " + text, 'sys'); return; }
        this.synthesis.cancel();
        if (!text) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'fr-FR';
        u.pitch = Config.data.pitch;
        u.rate = Config.data.rate;
        if (this.voice) u.voice = this.voice;
        u.onstart = () => { App.updateMain("PARLE..."); };
        u.onend = () => { if(this.isListening) App.updateMain("ÉCOUTE..."); };
        this.synthesis.speak(u);
    },
    process(text) {
        App.updateMain(text.toUpperCase());
        const lower = text.toLowerCase();

        // 1. STOP
        if (lower === 'stop' || lower === 'arrête') { this.stop(); this.speak("Pause."); return; }
        if (lower.includes('écoute')) { if(!this.isListening){ this.start(); this.speak("J'écoute."); } return; }

        // 2. COMMANDES SPÉCIFIQUES
        if (lower.includes('bruit blanc')) { FeatureEngine.toggleWhiteNoise(); return; }
        if (lower.includes('détection')) { FeatureEngine.toggleDetection(); return; }
        if (lower.includes('puissance')) { FeatureEngine.togglePower(); return; }

        // 3. LOGIQUE DE RÉPONSE INTELLIGENTE (Au lieu de répéter)
        let response = null;
        
        if (lower.includes('qui es-tu')) response = "Je suis Supra Eternity, votre assistant système.";
        else if (lower.includes('bonjour') || lower.includes('salut')) response = "Bonjour. Comment puis-je vous aider ?";
        else if (lower.includes('ça va') || lower.includes('comment vas-tu')) response = "Système opérationnel. Et vous ?";
        else if (lower.includes('heure')) response = `Il est ${new Date().getHours()} heures ${new Date().getMinutes()}.`;
        else if (lower.includes('merci')) response = "Je vous en prie.";
        else if (lower.includes('test')) response = "Système en ligne. Micro actif.";
        else if (lower.includes('ok') || lower.includes('d\'accord')) response = "Commande acceptée.";

        // 4. CAS PAR DÉFAUT : Enregistrement / Réponse générique
        if (!response) {
            // Effet "Enregistrement automatique des mots"
            App.log("[REC] " + text, 'rec');
            // Réponse générique pour montrer qu'il a compris sans être un perroquet
            const generics = ["J'ai enregistré : " + text, "Message reçu.", "Bien noté.", "C'est noté."];
            response = generics[Math.floor(Math.random() * generics.length)];
        }

        this.speak(response);
    }
};

// --- APP CONTROLLER ---
const App = {
    isRunning: false,
    init() {
        Config.load();
        VisualEngine.init();
        BrainEngine.init();
        this.log("Supra Eternity Final prêt.", 'sys');
        if (Config.data.isActive) this.startVoiceOnlyMode(true);
    },
    log(msg, type='sys') {
        const t = document.getElementById('terminal');
        const d = document.createElement('div');
        d.className = 'log-line log-'+type;
        d.innerText = `[${new Date().toLocaleTimeString('fr-FR')}] ${msg}`;
        t.appendChild(d); t.scrollTop = t.scrollHeight;
    },
    updateMain(t) { document.getElementById('mainText').innerText = t; },
    updateSub(t) { document.getElementById('subText').innerText = t; },
    toggleSettings() {
        const m = document.getElementById('settingsModal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    },
    async startFullSystem() {
        this.stopSystem();
        this.updateMain("DÉMARRAGE COMPLET...");
        const ok = await AudioEngine.init();
        if (!ok) return;
        VisualEngine.start();
        BrainEngine.start();
        this.isRunning = true;
        Config.data.isActive = true; Config.save();
        this.log("Système Complet Actif", 'sys');
        BrainEngine.speak("Mode complet activé.");
    },
    async startVoiceOnlyMode(silent = false) {
        this.stopSystem();
        if(!silent) { this.updateMain("INITIALISATION..."); this.log("Activation Mode Voix...", 'sys'); }
        VisualEngine.start();
        BrainEngine.start();
        this.isRunning = true;
        Config.data.isActive = true; Config.save();
        if (!silent) BrainEngine.speak("Supra Eternity en ligne.");
        else BrainEngine.speak("De retour.", 'fr', () => BrainEngine.start());
    },
    stopSystem() {
        this.isRunning = false;
        AudioEngine.destroy();
        VisualEngine.stop();
        BrainEngine.stop();
        BrainEngine.synthesis.cancel();
        clearInterval(FeatureEngine.detectionInterval);
        Config.data.isActive = false; Config.save();
        this.updateMain("SYSTÈME ARRÊTÉ");
        this.updateSub("EN ATTENTE");
        const c = document.getElementById('scopeCanvas');
        c.getContext('2d').clearRect(0,0,c.width,c.height);
        // Reset Boutons
        document.getElementById('btnSound').classList.remove('active-state');
        document.getElementById('btnPower').classList.remove('active-state');
        document.getElementById('btnDetect').classList.remove('active-state');
        document.getElementById('btnNoise').classList.remove('active-state');
    }
};

window.onload = () => App.init();
</script>
</body>
</html>
