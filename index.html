<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY IA LAB OMNI-SENSOR</title>
<style>
:root {
  --primary: #ff0000;
  --secondary: #00ff00;
  --bg: #050000;
  --panel: #1a0000;
  --btn-bg: #330000;
  --btn-active: #ff0000;
  --text: #ffcccc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

/* DASHBOARD SENSORS */
#sensorDashboard {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 2px;
  background: #000;
  border-bottom: 2px solid var(--primary);
  padding: 2px;
  font-size: 0.6rem;
  flex-shrink: 0;
}
.sensor-box {
  background: #111;
  padding: 4px;
  text-align: center;
  border: 1px solid #333;
}
.sensor-val {
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--secondary);
}
.alert-sensor {
  background: #550000;
  border-color: red;
  animation: blink 0.2s infinite;
}

@keyframes blink { 50% { opacity: 0.5; } }

#header {
  padding: 5px; background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.75rem; flex-shrink: 0;
  color: var(--primary);
}

#vizContainer {
  flex: 1; position: relative; background: #000;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  overflow: hidden;
}

#iaBox {
  z-index: 10; text-align: center; width: 90%;
  pointer-events: none;
}
#iaLabel { color: var(--secondary); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px; }
#iaText {
  font-size: 2.5rem; font-weight: 900; color: #fff;
  background: rgba(0,0,0,0.9); padding: 10px;
  min-height: 3.5rem; border: 1px solid var(--primary);
  text-transform: uppercase;
  text-shadow: 0 0 10px var(--primary);
}

canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; opacity: 0.75; }
#cameraFeed { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 0; opacity: 0.25; display: none; }

#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  height: 35vh; overflow-y: auto; padding: 5px;
  display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px 2px; font-size: 0.6rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #fff;
  box-shadow: 0 0 15px var(--primary);
  border-color: #fff;
}

#startBtn {
  grid-column: span 4; font-size: 1.2rem; padding: 12px;
  background: #fff; color: #000; border: 3px solid var(--primary);
  font-weight: 900;
}

#barsArea { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.7rem; }
.bar-box { background: #220000; height: 8px; width: 100%; border: 1px solid #550000; margin-top:2px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.05s linear; background: var(--primary); }

#logZone {
  height: 40px; background: #000; border-top: 1px solid #333;
  padding: 2px 5px; font-size: 0.6rem; overflow-y: auto; color: #888;
  flex-shrink: 0;
}
.log-warn { color: yellow !important; }
.log-err { color: red !important; }
.log-suc { color: limegreen !important; }
</style>
</head>
<body>

<!-- DASHBOARD CAPTEURS RÉELS -->
<div id="sensorDashboard">
  <div class="sensor-box" id="boxMotion">MOTION<br><span class="sensor-val" id="valMotion">0.0</span> m/s²</div>
  <div class="sensor-box" id="boxMag">MAGNETIC<br><span class="sensor-val" id="valMag">0</span> °</div>
  <div class="sensor-box" id="boxLight">LIGHT<br><span class="sensor-val" id="valLight">0</span> Lux</div>
</div>

<div id="header">
  <div>MIC: <span id="micStatus">OFF</span></div>
  <div>BAT: <span id="batStatus">--%</span></div>
  <div>FREQ: <span id="freqStatus">NORMAL</span></div>
</div>

<div id="vizContainer">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="iaBox">
    <div id="iaLabel">DÉTECTION VOCALE RÉELLE</div>
    <div id="iaText">... INITIALISATION ...</div>
  </div>
</div>

<div id="controlsArea">
  <div id="barsArea">
    <div>INPUT <div class="bar-box"><div id="voiceBar" class="bar-fill"></div></div></div>
    <div>TRIGGER <div class="bar-box"><div id="threshBar" class="bar-fill" style="width:20%"></div></div></div>
  </div>

  <button id="startBtn" onclick="forceStart()">ACTIVER TOUS LES CAPTEURS</button>

  <div class="button-grid">
    <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE+</button>
    <button id="ghostBoxBtn" onclick="toggleOpt('ghostBox')">📻 GHOST BOX</button>
    <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
    <button id="evpBtn" onclick="toggleOpt('evp')">🔮 EVP LOW</button>
    <button id="radarBtn" onclick="toggleOpt('radar')">📡 RADAR HF</button>
    <button id="camBtn" onclick="toggleOpt('cam')">📷 CAM</button>
    <button id="flashBtn" onclick="toggleOpt('flash')">🔦 TORCHE</button>
    <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ STOP</button>
  </div>
</div>

<div id="logZone"></div>

<script>
// === APP STATE ===
let app = {
  running: false,
  simulation: false,
  ctx: null,
  source: null,
  analyser: null,
  mixer: null,
  monitorInputGain: null,
  monitorGain: null,
  monitorDelay: null,
  monitorFeedback: null,
  ghost: null,
  ghostGain: null,
  ghostSweepInterval: null,
  noiseNode: null,
  noiseGain: null,
  stream: null,
  vidStream: null,
  recorder: null,
  isRec: false,
  recognition: null,
  sampleRate: 44100,
  lastAlpha: 0,
  config: { monitor: false, ghostBox: false, autoRec: false, evp: false, radar: false, cam: false, flash: false },
  canvas: null,
  cCtx: null,
  width: 0,
  height: 0,
  dataArray: null,
  motionThreshold: 1.5
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'),
  mic: el('micStatus'),
  bat: el('batStatus'),
  freq: el('freqStatus'),
  voiceBar: el('voiceBar'),
  iaText: el('iaText'),
  canvas: el('canvas'),
  camera: el('cameraFeed'),
  valMotion: el('valMotion'),
  boxMotion: el('boxMotion'),
  valMag: el('valMag'),
  boxMag: el('boxMag'),
  valLight: el('valLight'),
  boxLight: el('boxLight')
};

function log(msg, type = '') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if (type) d.className = type;
  els.log.appendChild(d);
  els.log.scrollTop = els.log.scrollHeight;
}

// === AUDIO SETUP (CORRIGÉ + AMÉLIORÉ) ===
function setupAudioNodes(stream) {
  app.ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (app.ctx.state === 'suspended') app.ctx.resume();

  app.source = app.ctx.createMediaStreamSource(stream);
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.analyser.smoothingTimeConstant = 0.85;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);

  // Mixer principal (sortie haut-parleur)
  app.mixer = app.ctx.createGain();
  app.mixer.gain.value = 1;
  app.mixer.connect(app.ctx.destination);

  // Ghost Box (oscillateur + sweep)
  app.ghost = app.ctx.createOscillator();
  app.ghost.type = 'sawtooth';
  app.ghost.frequency.value = 250;
  app.ghostGain = app.ctx.createGain();
  app.ghostGain.gain.value = 0;
  app.ghost.connect(app.ghostGain);
  app.ghostGain.connect(app.mixer);
  app.ghost.start();

  // Bruit blanc (Ghost Box classique)
  const bufferSize = app.ctx.sampleRate * 2;
  const buffer = app.ctx.createBuffer(1, bufferSize, app.ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  app.noiseNode = app.ctx.createBufferSource();
  app.noiseNode.buffer = buffer;
  app.noiseNode.loop = true;
  app.noiseGain = app.ctx.createGain();
  app.noiseGain.gain.value = 0;
  app.noiseNode.connect(app.noiseGain);
  app.noiseGain.connect(app.mixer);
  app.noiseNode.start();

  // Écoute+ (echo avec feedback)
  app.monitorDelay = app.ctx.createDelay(1.0);
  app.monitorDelay.delayTime.value = 0.18;
  app.monitorFeedback = app.ctx.createGain();
  app.monitorFeedback.gain.value = 0;
  app.monitorGain = app.ctx.createGain();
  app.monitorGain.gain.value = 0;

  app.monitorInputGain = app.ctx.createGain();
  app.monitorInputGain.gain.value = 0;

  // Chaîne echo
  app.source.connect(app.monitorInputGain);
  app.monitorInputGain.connect(app.monitorDelay);
  app.monitorDelay.connect(app.monitorFeedback);
  app.monitorFeedback.connect(app.monitorDelay);
  app.monitorDelay.connect(app.monitorGain);
  app.monitorGain.connect(app.mixer);

  // Analyse uniquement (pas de mic dans les HP → pas de larsen !)
  app.source.connect(app.analyser);

  // Recorder (mic brut pour EVP)
  app.recorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
  app.recorder.ondataavailable = e => {
    if (e.data.size > 0) saveBlob(e.data);
  };
}

// Simulation audio (quand pas de micro)
function setupSimulation() {
  app.dataArray = new Uint8Array(1024);
  app.sampleRate = 44100;
  els.valMotion.textContent = "SIM";
  els.valMag.textContent = "SIM";
  els.valLight.textContent = "SIM";
}

// === LANCEMENT ===
async function forceStart() {
  if (app.running) return;

  const startBtn = el('startBtn');
  startBtn.textContent = "INIT CAPTEURS...";
  startBtn.style.background = "orange";
  log("Initialisation Omni-Sensor...", 'log-suc');

  // Toujours initialiser les capteurs indépendants
  initBattery();
  await initSensors();
  initVoice();

  try {
    // Audio réel
    app.stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      video: false
    });
    setupAudioNodes(app.stream);
    app.simulation = false;
    log("Micro + Audio : OK", 'log-suc');
  } catch (err) {
    console.error(err);
    log("Pas de micro → mode simulation", 'log-warn');
    setupSimulation();
    app.simulation = true;
  }

  app.running = true;
  startUI(app.simulation ? "MODE SIMULATION" : "SYSTEME ACTIF");
}

// === CAPTEURS (iOS PERMISSION + CORRIGÉ) ===
async function initSensors() {
  // Motion (Accelerometer)
  if (window.DeviceMotionEvent) {
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceMotionEvent.requestPermission();
        if (perm === 'granted') {
          window.addEventListener('devicemotion', handleMotion);
          log("Capteur mouvement : OK (permission iOS)");
        } else {
          log("Permission mouvement refusée", 'log-warn');
        }
      } catch (e) {}
    } else {
      window.addEventListener('devicemotion', handleMotion);
      log("Capteur mouvement : OK");
    }
  } else {
    els.valMotion.textContent = "N/A";
  }

  // Magnetic / Orientation
  if (window.DeviceOrientationEvent) {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') {
          window.addEventListener('deviceorientation', handleMagnetic);
          log("Capteur magnétique : OK (permission iOS)");
        } else {
          log("Permission orientation refusée", 'log-warn');
        }
      } catch (e) {}
    } else {
      window.addEventListener('deviceorientation', handleMagnetic);
      log("Capteur magnétique : OK");
    }
  } else {
    els.valMag.textContent = "N/A";
  }

  // Light (AmbientLightSensor - rare)
  if ('AmbientLightSensor' in window) {
    try {
      const sensor = new AmbientLightSensor();
      sensor.onreading = () => {
        const lux = Math.round(sensor.illuminance);
        els.valLight.textContent = lux;
        if (app.lightBaseline === 0) app.lightBaseline = lux;
        if (Math.abs(lux - app.lightBaseline) > 40 && lux < app.lightBaseline) {
          triggerSensorAlert('boxLight', "OMBRE DÉTECTÉE");
        }
      };
      sensor.start();
      log("Capteur lumière : OK");
    } catch (err) {
      els.valLight.textContent = "ERR";
    }
  } else {
    els.valLight.textContent = "N/A";
  }
}

function handleMotion(event) {
  if (app.simulation) return;
  const acc = event.accelerationIncludingGravity || event.acceleration;
  if (!acc) return;

  const total = Math.hypot(acc.x || 0, acc.y || 0, acc.z || 0);
  const relativeMotion = Math.abs(total - 9.8);
  els.valMotion.textContent = relativeMotion.toFixed(1);

  if (relativeMotion > app.motionThreshold) {
    triggerSensorAlert('boxMotion', "TREMBLEMENT DÉTECTÉ");
  }
}

function handleMagnetic(event) {
  if (app.simulation) return;
  const alpha = event.alpha || 0;
  els.valMag.textContent = Math.floor(alpha);

  if (Math.abs(alpha - app.lastAlpha) > 45) {
    triggerSensorAlert('boxMag', "PERTURBATION MAGNÉTIQUE");
  }
  app.lastAlpha = alpha;
}

// === BATTERIE ===
function initBattery() {
  if ('getBattery' in navigator) {
    navigator.getBattery().then(bat => {
      const update = () => {
        els.bat.textContent = Math.floor(bat.level * 100) + "%" + (bat.charging ? " ⚡" : "");
      };
      update();
      bat.addEventListener('levelchange', update);
      bat.addEventListener('chargingchange', update);
      log("Batterie : OK");
    });
  } else {
    els.bat.textContent = "N/A";
  }
}

// === VOIX (SpeechRecognition) ===
function initVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    els.iaText.textContent = "INDISPONIBLE";
    return;
  }
  app.recognition = new SpeechRec();
  app.recognition.continuous = true;
  app.recognition.interimResults = true;
  app.recognition.lang = 'fr-FR';

  app.recognition.onresult = (e) => {
    let txt = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      txt += e.results[i][0].transcript;
    }
    if (txt) {
      els.iaText.textContent = txt.toUpperCase();
      if (e.results[e.results.length - 1].isFinal) {
        log(`VOIX : "${txt}"`, 'log-suc');
      }
    }
  };
  app.recognition.onend = () => { if (app.running) app.recognition.start(); };
  try { app.recognition.start(); } catch (e) {}
}

// === ALERTES ===
function triggerSensorAlert(boxId, msg) {
  const box = el(boxId);
  if (!box.classList.contains('alert-sensor')) {
    box.classList.add('alert-sensor');
    log(msg, 'log-err');
    if (navigator.vibrate) navigator.vibrate([150, 50, 150]);
    setTimeout(() => box.classList.remove('alert-sensor'), 1800);
  }
}

// === UI START / STOP ===
function startUI(status) {
  const startBtn = el('startBtn');
  startBtn.textContent = "SYSTEME ACTIF";
  startBtn.style.background = "var(--primary)";
  startBtn.style.color = "#000";

  els.mic.textContent = "ON";
  els.mic.style.color = "#0f0";
  els.iaText.textContent = status;

  resize();
  drawLoop();
  startPulseTimer();
}

function stopSystem() {
  if (app.stream) app.stream.getTracks().forEach(t => t.stop());
  if (app.vidStream) app.vidStream.getTracks().forEach(t => t.stop());
  if (app.ctx) app.ctx.close();
  if (app.recognition) app.recognition.stop();
  if (app.pulseInterval) clearInterval(app.pulseInterval);
  if (app.ghostSweepInterval) clearInterval(app.ghostSweepInterval);

  window.removeEventListener('devicemotion', handleMotion);
  window.removeEventListener('deviceorientation', handleMagnetic);

  app.running = false;
  el('startBtn').textContent = "ACTIVER TOUS LES CAPTEURS";
  el('startBtn').style.background = "#fff";
  el('startBtn').style.color = "#000";
  els.mic.textContent = "OFF";
  els.mic.style.color = "";

  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
  Object.keys(app.config).forEach(k => app.config[k] = false);
}

// === OPTIONS (AMÉLIORÉ) ===
function toggleOpt(key) {
  if (!app.running) {
    log("Démarrez le système d'abord", 'log-warn');
    return;
  }
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if (btn) btn.classList.toggle('active');

  log(`${key.toUpperCase()}: ${app.config[key] ? 'ON' : 'OFF'}`);

  if (key === 'monitor') {
    const on = app.config.monitor;
    if (app.monitorInputGain) app.monitorInputGain.gain.value = on ? 0.75 : 0;
    if (app.monitorGain) app.monitorGain.gain.value = on ? 0.65 : 0;
    if (app.monitorFeedback) app.monitorFeedback.gain.value = on ? 0.32 : 0;
  }

  if (key === 'ghostBox') {
    const on = app.config.ghostBox;
    if (app.ghostGain) app.ghostGain.gain.value = on ? 0.13 : 0;
    if (app.noiseGain) app.noiseGain.gain.value = on ? 0.07 : 0;

    if (on && !app.ghostSweepInterval) {
      app.ghostSweepInterval = setInterval(sweepGhost, 65);
    } else if (!on && app.ghostSweepInterval) {
      clearInterval(app.ghostSweepInterval);
      app.ghostSweepInterval = null;
    }
  }

  if (key === 'cam') toggleCam();
  if (key === 'flash') toggleFlash();
}

function sweepGhost() {
  if (!app.ghost || !app.running || !app.config.ghostBox) return;
  const freq = 85 + Math.random() * 920;
  app.ghost.frequency.setValueAtTime(freq, app.ctx.currentTime);
}

// === CAM + TORCHE ===
async function toggleCam() {
  const on = app.config.cam;
  if (on) {
    try {
      app.vidStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      els.camera.srcObject = app.vidStream;
      els.camera.style.display = 'block';
      log("Caméra activée", 'log-suc');
    } catch (e) {
      log("Erreur caméra", 'log-err');
      app.config.cam = false;
      el('camBtn').classList.remove('active');
    }
  } else {
    if (app.vidStream) app.vidStream.getTracks().forEach(t => t.stop());
    app.vidStream = null;
    els.camera.style.display = 'none';
  }
}

async function toggleFlash() {
  if (!app.vidStream) return log("Caméra requise pour la torche", 'log-warn');
  try {
    const track = app.vidStream.getVideoTracks()[0];
    await track.applyConstraints({ advanced: [{ torch: app.config.flash }] });
  } catch (e) {
    log("Torche non supportée", 'log-err');
  }
}

// === RECORDER ===
function saveBlob(data) {
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url;
  a.download = `OMNI_EVP_${Date.now()}.webm`;
  a.click();
  URL.revokeObjectURL(url);
  log("Enregistrement EVP sauvegardé", 'log-suc');
}

// === VISUALISATION (CORRIGÉ) ===
function drawLoop() {
  if (!app.running) return;
  requestAnimationFrame(drawLoop);

  // Données audio
  if (app.simulation) {
    const t = Date.now() / 40;
    for (let i = 0; i < 1024; i++) {
      app.dataArray[i] = (Math.sin(i * 0.04 + t) + 1) * 55 + Math.random() * 35;
    }
  } else if (app.analyser) {
    app.analyser.getByteFrequencyData(app.dataArray);
  }

  // Calculs
  let sum = 0, lowSum = 0, highSum = 0;
  const nyquist = app.sampleRate / 2;
  const binSize = nyquist / app.dataArray.length;

  for (let i = 0; i < app.dataArray.length; i++) {
    const v = app.dataArray[i];
    sum += v;
    const f = i * binSize;
    if (f < 200) lowSum += v;
    if (f > 2000) highSum += v;
  }

  const avg = sum / app.dataArray.length;
  const avgHigh = highSum / Math.max(1, (nyquist - 2000) / binSize);

  els.voiceBar.style.width = Math.min(100, avg * 1.1) + '%';
  els.freq.textContent = avgHigh > 55 ? "HIGH HF" : "NORMAL";
  els.freq.style.color = avgHigh > 55 ? "red" : "var(--text)";

  // Auto REC
  if (app.config.autoRec && !app.simulation && avg > 48 && !app.isRec) {
    app.isRec = true;
    app.recorder.start();
    log("⚠️ ANOMALIE AUDIO – ENREGISTREMENT", 'log-err');
    setTimeout(() => {
      if (app.isRec && app.recorder.state === 'recording') {
        app.recorder.stop();
        app.isRec = false;
      }
    }, 4200);
  }

  // Dessin canvas
  const ctx = app.cCtx;
  const w = app.width;
  const h = app.height;
  ctx.fillStyle = 'rgba(5,0,0,0.25)';
  ctx.fillRect(0, 0, w, h);

  const barW = (w / app.dataArray.length) * 2.8;
  let x = 0;
  for (let i = 0; i < app.dataArray.length; i++) {
    const v = app.dataArray[i];
    const barH = (v / 255) * h * 0.95;
    let color = `rgb(${v}, 30, 30)`;

    if (app.config.evp) {
      const f = i * binSize;
      if (f < 220) color = `rgb(30, ${v}, ${v + 50})`; // cyan EVP
    }

    ctx.fillStyle = color;
    ctx.fillRect(x, h - barH, barW, barH);
    x += barW + 1;
  }

  // Radar HF
  if (app.config.radar) {
    const cx = w - 70, cy = 65, r = 48;
    ctx.strokeStyle = '#f00';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();

    if (avgHigh > 62) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      els.freq.style.color = "#ff0";
    } else {
      const ang = (Date.now() / 800) % (Math.PI * 2);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(ang);
      ctx.fillStyle = 'rgba(255,0,0,0.7)';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r, -0.15, 0.15);
      ctx.fill();
      ctx.restore();
    }
  }
}

// === UTILS ===
function startPulseTimer() {
  if (app.pulseInterval) clearInterval(app.pulseInterval);
  app.pulseInterval = setInterval(() => {
    const btn = el('startBtn');
    if (!btn) return;
    btn.style.opacity = (btn.style.opacity === '0.4') ? '1' : '0.4';
  }, 2800);
}

function resize() {
  app.width = els.canvas.clientWidth;
  app.height = els.canvas.clientHeight;
  app.canvas.width = app.width;
  app.canvas.height = app.height;
}

// === INIT ===
window.onload = () => {
  app.canvas = els.canvas;
  app.cCtx = app.canvas.getContext('2d', { alpha: true });
  resize();
  log("OMNI-SENSOR v2.1 PRÊT – Appuyez sur START", 'log-suc');
};
window.onresize = resize;
</script>
