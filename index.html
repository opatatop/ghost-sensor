<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY MOI FORCE START</title>
<style>
:root {
  --primary: #ffff00; /* Jaune pour bien voir */
  --bg: #000;
  --panel: #111;
  --btn-bg: #333;
  --btn-active: #ffff00;
  --text: #fff;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

#header {
  padding: 10px; background: var(--panel);
  border-bottom: 2px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.8rem;
}

#vizContainer {
  flex: 1; position: relative; background: #000;
  display: flex; justify-content: center; align-items: center;
  overflow: hidden;
}

#iaBox {
  z-index: 10; text-align: center;
}
#iaText {
  font-size: 2rem; font-weight: bold; color: #fff;
  text-shadow: 0 0 10px var(--primary);
  background: rgba(0,0,0,0.8); padding: 10px;
}

canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; }
#cameraFeed { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 0; opacity: 0.3; }

#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  height: 40vh; overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 10px;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px; font-size: 0.7rem;
  font-weight: bold; cursor: pointer; border-radius: 5px;
  text-transform: uppercase;
}
button.active {
  background: var(--btn-active); color: #000;
  box-shadow: 0 0 15px var(--primary);
}

#startBtn {
  grid-column: span 4; font-size: 1.5rem; padding: 20px;
  background: #fff; color: #000; border: 4px solid var(--primary);
  font-weight: 900;
}

/* BARS */
#barsArea { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.7rem; }
.bar-box { background: #333; height: 15px; width: 100%; border: 1px solid #555; margin-top:2px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.1s; background: var(--primary); }

#logZone {
  height: 80px; background: #000; border-top: 1px solid #333;
  padding: 5px; font-size: 0.7rem; overflow-y: auto; color: #888;
}
.log-suc { color: #0f0 !important; }
.log-err { color: #f00 !important; }
.log-warn { color: #ff0 !important; }

#loading {
  position: fixed; inset: 0; background: #000; z-index: 1000;
  display: flex; justify-content: center; align-items: center;
}
</style>
</head>
<body>

<div id="loading">CHARGEMENT...</div>

<div id="header">
  <div>MIC: <span id="micStatus" style="color:red">OFF</span></div>
  <div>IA: <span id="aiStatus">...</span></div>
</div>

<div id="vizContainer">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="iaBox">
    <div id="iaText">ATTENTE START...</div>
  </div>
</div>

<div id="controlsArea">
  <div id="barsArea">
    <div>INPUT <div class="bar-box"><div id="voiceBar" class="bar-fill"></div></div></div>
    <div>TRIGGER <div class="bar-box"><div id="threshBar" class="bar-fill" style="width:20%"></div></div></div>
  </div>

  <!-- LE BOUTON A UN ONCLICK DIRECT -->
  <button id="startBtn" onclick="forceStart()">START SYSTEM</button>

  <div class="button-grid">
    <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 MONITOR</button>
    <button id="invertBtn" onclick="toggleOpt('invert')">🔄 INVERSION</button>
    <button id="ghostBoxBtn" onclick="toggleOpt('ghostBox')">📻 GHOST BOX</button>
    <button id="voiceBtn" onclick="toggleOpt('voice')">🗣 IA VOICE</button>
    <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
    <button id="evpBtn" onclick="toggleOpt('evp')">🔮 EVP MODE</button>
    <button id="radarBtn" onclick="toggleOpt('radar')">📡 RADAR</button>
    <button id="camBtn" onclick="toggleOpt('cam')">📷 CAM</button>
    <button id="flashBtn" onclick="toggleOpt('flash')">🔦 TORCHE</button>
    <button id="stopBtn" style="border-color:red; color:red" onclick="forceStop()">⏹ STOP</button>
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// --- ETAT GLOBAL ---
let state = {
  running: false,
  ctx: null, source: null, gain: null, analyser: null, invert: null, ghost: null, ghostGain: null,
  stream: null, vidStream: null, recorder: null, isRec: false,
  recognition: null,
  config: { monitor: false, invert: false, ghostBox: false, voice: false, autoRec: false, evp: false, radar: false, cam: false, flash: false },
  canvas: null, cCtx: null, width: 0, height: 0
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), mic: el('micStatus'), ai: el('aiStatus'),
  voiceBar: el('voiceBar'), threshBar: el('threshBar'), iaText: el('iaText'),
  canvas: el('canvas'), camera: el('cameraFeed')
};

// --- FONCTIONS DE DEBUG ---

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
  console.log(msg);
}

// --- FORCE START (LE CŒUR DU PROBLÈME) ---
async function forceStart() {
  if(state.running) return;
  
  // 1. Feedback Visuel Immédiat
  alert("Bouton cliqué ! Lancement de l'initialisation audio...");
  el('startBtn').textContent = "INIT...";
  el('startBtn').style.background = "orange";
  log("Tentative de démarrage forcé...", 'log-warn');

  try {
    // 2. Réveil du Context Audio (Très important sur Android)
    if (!state.ctx) {
        state.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (state.ctx.state === 'suspended') {
        log("AudioContext suspendu. Réveil...", 'log-warn');
        await state.ctx.resume();
    }
    log(`AudioContext État: ${state.ctx.state}`, 'log-suc');

    // 3. Demande Micro
    log("Demande permission micro...", 'log-warn');
    const stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
        video: false 
    });
    state.stream = stream;
    log("Micro OK !", 'log-suc');

    // 4. Création Noeuds
    state.source = state.ctx.createMediaStreamSource(stream);
    state.invert = state.ctx.createGain();
    state.gain = state.ctx.createGain();
    state.analyser = state.ctx.createAnalyser();
    state.analyser.fftSize = 2048;
    state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
    
    // Ghost Box Setup
    state.ghost = state.ctx.createOscillator();
    state.ghost.type = 'sawtooth';
    state.ghostGain = state.ctx.createGain();
    state.ghostGain.gain.value = 0;
    state.ghost.connect(state.ghostGain);
    state.ghost.connect(state.gain); // Mix
    state.ghost.start();

    // Connexion: Source -> Invert -> Gain -> Analyser
    state.source.connect(state.invert);
    state.invert.connect(state.gain);
    state.gain.connect(state.analyser);

    // Recorder
    state.recorder = new MediaRecorder(stream);
    state.recorder.ondataavailable = e => {
        if(e.data.size > 0) {
            const url = URL.createObjectURL(new Blob([e.data], {type:'audio/webm'}));
            const a = document.createElement('a'); a.href=url; a.download=`evp.webm`; a.click();
            log("Enregistrement sauvé", 'log-suc');
        }
    };

    // UI Mise à jour
    state.running = true;
    el('startBtn').textContent = "SYSTEM RUNNING";
    el('startBtn').style.background = "#0f0";
    el('startBtn').style.color = "#000";
    els.mic.textContent = "ON"; els.mic.style.color = "#0f0";
    els.iaText.textContent = "ECOUTE...";

    log("SYSTÈME ACTIF", 'log-suc');
    
    // Loop
    resize();
    drawLoop();

  } catch (err) {
    console.error(err);
    log("ERREUR: " + err.message, 'log-err');
    el('startBtn').textContent = "ERREUR (VOIR LOG)";
    el('startBtn').style.background = "red";
    alert("ERREUR CRITIQUE: " + err.message);
  }
}

function forceStop() {
  if(!state.running) return;
  if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
  if(state.vidStream) state.vidStream.getTracks().forEach(t=>t.stop());
  if(state.ctx) state.ctx.close();
  
  state.running = false;
  el('startBtn').textContent = "START SYSTEM";
  el('startBtn').style.background = "#fff";
  el('startBtn').style.color = "#000";
  els.mic.textContent = "OFF"; els.mic.style.color = "red";
  els.iaText.textContent = "STOP";
  
  // Reset Buttons
  Object.keys(state.config).forEach(k => { state.config[k] = false; el(k+'Btn').classList.remove('active'); });
  log("Système arrêté.");
}

// --- GESTION OPTIONS UNIVERSELLE ---
function toggleOpt(key) {
  if(!state.running) {
      alert("VEUILLEZ CLIQUER SUR START SYSTEM D'ABORD !");
      return;
  }
  
  const btn = el(key + 'Btn');
  state.config[key] = !state.config[key];
  
  if(state.config[key]) btn.classList.add('active');
  else btn.classList.remove('active');
  
  log(`Option ${key}: ${state.config[key]?'ON':'OFF'}`);
  
  // Logique spécifique
  if(key === 'monitor') {
      if(state.config[key]) state.gain.connect(state.ctx.destination);
      else state.gain.disconnect(state.ctx.destination);
  }
  if(key === 'invert') state.invert.gain.value = state.config[key] ? -1 : 1;
  if(key === 'ghostBox') state.ghostGain.gain.value = state.config[key] ? 0.1 : 0;
  if(key === 'voice') toggleVoice();
  if(key === 'cam') toggleCam();
  if(key === 'flash') toggleFlash();
}

// --- LOGIQUE MODULES ---

function toggleVoice() {
  if(!state.recognition) return;
  if(state.config.voice) {
      state.recognition.start();
      log("IA VOICE ON");
  } else {
      state.recognition.stop();
      log("IA VOICE OFF");
  }
}

function initIA() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      state.recognition = new SpeechRec();
      state.recognition.continuous = true;
      state.recognition.interimResults = true;
      state.recognition.lang = 'fr-FR';
      state.recognition.onresult = (e) => {
          let txt = '';
          for(let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
          if(txt) {
              els.iaText.textContent = txt;
              if(e.results[e.results.length-1].isFinal) log(`IA: "${txt}"`, 'log-suc');
          }
      };
      state.recognition.onerror = (e) => { if(e.error!=='no-speech') log(`IA Err: ${e.error}`); };
      state.recognition.onend = () => { if(state.config.voice && state.running) try{state.recognition.start()}catch(e){} };
      
      els.ai.textContent = "READY";
  }
}

async function toggleCam() {
  if(!state.config.cam) {
      try {
          state.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          els.camera.srcObject = state.vidStream;
          els.camera.style.display = 'block';
      } catch(e) { log("Erreur Cam", 'log-err'); state.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(state.vidStream) state.vidStream.getTracks().forEach(t=>t.stop());
      state.vidStream = null;
      els.camera.style.display = 'none';
  }
}

async function toggleFlash() {
  if(!state.vidStream) return log("Caméra requise", 'log-warn');
  try {
      const track = state.vidStream.getVideoTracks()[0];
      await track.applyConstraints({advanced: [{torch: state.config.flash}]});
  } catch(e) { log("Erreur Torche", 'log-err'); }
}

// --- VISUALISATION & LOGIC ---

function drawLoop() {
  if(!state.running) return;
  requestAnimationFrame(drawLoop);
  
  state.analyser.getByteFrequencyData(state.dataArray);
  
  // Auto Rec
  let sum = 0;
  for(let i=0; i<state.dataArray.length; i++) sum += state.dataArray[i];
  const avg = sum / state.dataArray.length;
  
  els.voiceBar.style.width = Math.min(100, avg) + '%';
  
  if(state.config.autoRec && avg > 20 && !state.isRec) {
      state.isRec = true; state.recorder.start(); log("⚠️ REC AUTO", 'log-warn');
      setTimeout(() => { if(state.isRec) { state.recorder.stop(); state.isRec=false; }}, 4000);
  }
  
  // Draw
  const ctx = state.cCtx, w=state.width, h=state.height;
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h);
  
  const barW = (w / state.dataArray.length) * 2.5;
  let x = 0;
  for(let i=0; i<state.dataArray.length; i++) {
      const v = state.dataArray[i];
      const barH = (v/255)*h;
      ctx.fillStyle = state.config.evp ? `hsl(${280-v},100%,50%)` : `hsl(${120-v},100%,50%)`;
      ctx.fillRect(x, state.config.evp?h-barH:h/2-barH/2, barW, barH);
      x += barW+1;
  }
  
  // Ghost Box Sweep Logic (Audio Freq)
  if(state.config.ghostBox) {
      const time = state.ctx.currentTime;
      const freq = 100 + (Math.sin(time*2)+1)*1500;
      state.ghost.frequency.setTargetAtTime(freq, time, 0.1);
  }

  // Radar
  if(state.config.radar) {
      const cx = w-60, cy = 60, r=50;
      ctx.strokeStyle = '#ff0'; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(Date.now()/200);
      ctx.fillStyle = 'rgba(255,255,0,0.5)';
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r,-0.2,0.2); ctx.fill(); ctx.restore();
  }
}

function resize() {
  state.width = els.canvas.clientWidth;
  state.height = els.canvas.clientHeight;
  state.canvas.width = state.width;
  state.canvas.height = state.height;
  state.cCtx = state.canvas.getContext('2d');
}

// --- INIT ---
window.onload = () => {
  el('loading').style.display = 'none';
  state.canvas = els.canvas;
  state.cCtx = state.canvas.getContext('2d');
  resize();
  initIA();
  log("Pret. Appuyez sur START.", 'log-suc');
};
window.onresize = resize;

</script>
</body>
</html>
