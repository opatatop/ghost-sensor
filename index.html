<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB OMNI-SENSOR</title>
<style>
:root {
  --primary: #ff0000;
  --secondary: #00ff00;
  --bg: #050000;
  --panel: #1a0000;
  --btn-bg: #330000;
  --btn-active: #ff0000;
  --text: #ffcccc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

/* DASHBOARD SENSORS */
#sensorDashboard {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 2px;
  background: #000;
  border-bottom: 2px solid var(--primary);
  padding: 2px;
  font-size: 0.6rem;
  flex-shrink: 0;
}
.sensor-box {
  background: #111;
  padding: 4px;
  text-align: center;
  border: 1px solid #333;
}
.sensor-val {
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--secondary);
}
.alert-sensor {
  background: #550000;
  border-color: red;
  animation: blink 0.2s infinite;
}

@keyframes blink { 50% { opacity: 0.5; } }

#header {
  padding: 5px; background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.75rem; flex-shrink: 0;
  color: var(--primary);
}

#vizContainer {
  flex: 1; position: relative; background: #000;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  overflow: hidden;
}

#iaBox {
  z-index: 10; text-align: center; width: 90%;
  pointer-events: none;
}
#iaLabel { color: var(--secondary); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px; }
#iaText {
  font-size: 2.5rem; font-weight: 900; color: #fff;
  background: rgba(0,0,0,0.9); padding: 10px;
  min-height: 3.5rem; border: 1px solid var(--primary);
  text-transform: uppercase;
}

canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; opacity: 0.7; }
#cameraFeed { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 0; opacity: 0.2; display: none; }

#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  height: 35vh; overflow-y: auto; padding: 5px;
  display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px 2px; font-size: 0.6rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #fff;
  box-shadow: 0 0 10px var(--primary);
  border-color: #fff;
}

#startBtn {
  grid-column: span 4; font-size: 1.2rem; padding: 12px;
  background: #fff; color: #000; border: 3px solid var(--primary);
  font-weight: 900;
}

#barsArea { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.7rem; }
.bar-box { background: #220000; height: 8px; width: 100%; border: 1px solid #550000; margin-top:2px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.05s; background: var(--primary); }

#logZone {
  height: 40px; background: #000; border-top: 1px solid #333;
  padding: 2px 5px; font-size: 0.6rem; overflow-y: auto; color: #888;
  flex-shrink: 0;
}
.log-warn { color: yellow !important; }
.log-err { color: red !important; }
</style>
</head>
<body>

<!-- DASHBOARD CAPTEURS RÉELS -->
<div id="sensorDashboard">
  <div class="sensor-box" id="boxMotion">MOTION<br><span class="sensor-val" id="valMotion">0.0</span> m/s²</div>
  <div class="sensor-box" id="boxMag">MAGNETIC<br><span class="sensor-val" id="valMag">0</span> µT</div>
  <div class="sensor-box" id="boxLight">LIGHT<br><span class="sensor-val" id="valLight">0</span> Lux</div>
</div>

<div id="header">
  <div>MIC: <span id="micStatus">OFF</span></div>
  <div>BAT: <span id="batStatus">--%</span></div>
  <div>FREQ: <span id="freqStatus">0</span> Hz</div>
</div>

<div id="vizContainer">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="iaBox">
    <div id="iaLabel">DÉTECTION VOCALE RÉELLE</div>
    <div id="iaText">... INITIALISATION ...</div>
  </div>
</div>

<div id="controlsArea">
  <div id="barsArea">
    <div>INPUT <div class="bar-box"><div id="voiceBar" class="bar-fill"></div></div></div>
    <div>TRIGGER <div class="bar-box"><div id="threshBar" class="bar-fill" style="width:20%"></div></div></div>
  </div>

  <button id="startBtn" onclick="forceStart()">ACTIVER TOUS LES CAPTEURS</button>

  <div class="button-grid">
    <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE+</button>
    <button id="ghostBoxBtn" onclick="toggleOpt('ghostBox')">📻 GHOST BOX</button>
    <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
    <button id="evpBtn" onclick="toggleOpt('evp')">🔮 EVP LOW</button>
    <button id="radarBtn" onclick="toggleOpt('radar')">📡 RADAR HF</button>
    <button id="camBtn" onclick="toggleOpt('cam')">📷 CAM</button>
    <button id="flashBtn" onclick="toggleOpt('flash')">🔦 TORCHE</button>
    <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ STOP</button>
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
let app = {
  running: false,
  simulation: false,
  ctx: null, source: null, gain: null, analyser: null,
  monitorGain: null, monitorDelay: null,
  ghost: null, ghostGain: null, noiseNode: null, noiseGain: null,
  stream: null, vidStream: null, recorder: null, isRec: false,
  recognition: null,
  config: { monitor: false, ghostBox: false, autoRec: false, evp: false, radar: false, cam: false, flash: false },
  canvas: null, cCtx: null, width: 0, height: 0,
  // Sensors
  motionThreshold: 1.5, // Seuil mouvement
  magBaseline: 0,
  lightBaseline: 0,
  pulseInterval: null
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), mic: el('micStatus'), bat: el('batStatus'), freq: el('freqStatus'),
  voiceBar: el('voiceBar'), iaText: el('iaText'),
  canvas: el('canvas'), camera: el('cameraFeed'),
  // Sensors
  valMotion: el('valMotion'), boxMotion: el('boxMotion'),
  valMag: el('valMag'), boxMag: el('boxMag'),
  valLight: el('valLight'), boxLight: el('boxLight')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

// --- START & PERMISSIONS ---

async function forceStart() {
  if(app.running) return;
  el('startBtn').textContent = "INIT CAPTEURS...";
  el('startBtn').style.background = "orange";
  log("Initialisation Omni-Sensor...", 'log-suc');

  try {
    // 1. Audio
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();
    app.stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
        video: false 
    });
    setupAudioNodes(app.stream);

    // 2. Battery
    initBattery();

    // 3. Sensors (Motion, Orientation, Light)
    initSensors();

    // 4. IA
    initVoice();

    app.running = true;
    app.simulation = false;
    startUI("CAPTEURS ACTIFS");

  } catch (err) {
    console.error(err);
    log("Erreur init: " + err.message, 'log-err');
    // Fallback si capteurs bloqués
    setupSimulation();
    app.running = true;
    app.simulation = true;
    startUI("MODE LIMITÉ (SIM)");
  }
}

// --- AUDIO NODES (Écoute améliorée incluse) ---
function setupAudioNodes(stream) {
  app.source = app.ctx.createMediaStreamSource(stream);
  app.gain = app.ctx.createGain();
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.analyser.smoothingTimeConstant = 0.8; // Lissage pour lecture fréquence
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);
  
  // Monitor + Echo
  app.monitorGain = app.ctx.createGain();
  app.monitorDelay = app.ctx.createDelay(1.0);
  app.monitorDelay.delayTime.value = 0.2;
  app.monitorFeedback = app.ctx.createGain();
  app.monitorFeedback.gain.value = 0.4;
  
  // Ghost Box
  app.ghost = app.ctx.createOscillator();
  app.ghost.type = 'sawtooth';
  app.ghostGain = app.ctx.createGain();
  const bufferSize = app.ctx.sampleRate * 2;
  const buffer = app.ctx.createBuffer(1, bufferSize, app.ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  app.noiseNode = app.ctx.createBufferSource();
  app.noiseNode.buffer = buffer;
  app.noiseNode.loop = true;
  app.noiseGain = app.ctx.createGain();
  
  app.ghost.connect(app.ghostGain);
  app.ghostGain.connect(app.gain);
  app.noiseNode.connect(app.noiseGain);
  app.noiseGain.connect(app.gain);
  app.ghost.start();
  app.noiseNode.start();

  // Route
  app.source.connect(app.gain);
  app.gain.connect(app.analyser);

  // Recorder
  app.recorder = new MediaRecorder(stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

function setupSimulation() {
  app.dataArray = new Uint8Array(1024);
  els.valMotion.textContent = "SIM";
  els.valMag.textContent = "SIM";
  els.valLight.textContent = "SIM";
}

function startUI(mode) {
  el('startBtn').textContent = "SYSTEME ACTIF";
  el('startBtn').classList.add('running');
  el('startBtn').style.background = "var(--primary)";
  els.mic.textContent = "ON"; els.mic.style.color = "#0f0";
  els.iaText.textContent = "SURVEILLANCE...";
  
  resize();
  drawLoop();
  startPulseTimer();
}

function stopSystem() {
  if(app.stream) app.stream.getTracks().forEach(t=>t.stop());
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  if(app.ctx) app.ctx.close();
  if(app.recognition) app.recognition.stop();
  if(app.pulseInterval) clearInterval(app.pulseInterval);
  
  // Stop Sensors
  window.removeEventListener('devicemotion', handleMotion);
  window.removeEventListener('deviceorientation', handleMagnetic);
  
  app.running = false;
  el('startBtn').textContent = "ACTIVER TOUS LES CAPTEURS";
  el('startBtn').classList.remove('running');
  el('startBtn').style.background = "#fff";
  els.mic.textContent = "OFF";
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
  Object.keys(app.config).forEach(k => app.config[k] = false);
}

// --- REAL SENSORS LOGIC ---

function initSensors() {
  // 1. Motion (Accelerometer)
  if (window.DeviceMotionEvent) {
      window.addEventListener('devicemotion', handleMotion);
      log("Capteur Mouvement: OK");
  } else {
      els.valMotion.textContent = "N/A";
  }

  // 2. Magnetic (Compass) - Approx via absolute orientation
  if (window.DeviceOrientationEvent && window.DeviceOrientationEvent.requestPermission) {
      // iOS 13+ needs permission request
      // For this single file, we try standard listener first
  }
  
  if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', handleMagnetic);
      log("Capteur Magnétique: OK");
  } else {
      els.valMag.textContent = "N/A";
  }

  // 3. Light (Generic Sensor API)
  if ('AmbientLightSensor' in window) {
      try {
          const sensor = new AmbientLightSensor();
          sensor.onreading = () => {
              const lux = Math.round(sensor.illuminance);
              els.valLight.textContent = lux;
              // Détection Ombre (changement > 50 lux)
              if (app.lightBaseline === 0) app.lightBaseline = lux;
              if (Math.abs(lux - app.lightBaseline) > 50 && lux < app.lightBaseline) {
                  triggerSensorAlert('boxLight', "OMBRE DÉTECTÉE");
              }
          };
          sensor.start();
          log("Capteur Lumière: OK");
      } catch (err) {
          els.valLight.textContent = "ERR";
      }
  } else {
      els.valLight.textContent = "N/A";
  }
}

function handleMotion(event) {
  if(app.simulation) return;
  const acc = event.accelerationIncludingGravity || event.acceleration;
  if(!acc) return;
  
  const x = acc.x || 0;
  const y = acc.y || 0;
  const z = acc.z || 0;
  const totalMotion = Math.abs(x) + Math.abs(y) + Math.abs(z);
  
  // Normalisation approx pour posé sur table (~9.8 sur Z)
  const relativeMotion = Math.abs(totalMotion - 9.8);
  
  els.valMotion.textContent = relativeMotion.toFixed(1);
  
  if (relativeMotion > app.motionThreshold) {
      triggerSensorAlert('boxMotion', "TREMBLEMENT DÉTECTÉ");
  }
}

function handleMagnetic(event) {
  if(app.simulation || !event.absolute) return; // Besoin de données absolues (Nord)
  
  // Alpha = Boussole (0-360)
  const alpha = event.alpha || 0;
  const beta = event.beta || 0;
  const gamma = event.gamma || 0;
  
  // Calcul variation simple pour "perturbation"
  // En réalité, on utiliserait le champ magnétique total si dispo, ici on simule une anomalie si ça tourne vite
  // NOTE: Le champ magnétique réel (x,y,z) n'est pas toujours dispo dans 'deviceorientation' standard.
  // On utilise l'alpha pour la stabilité.
  
  els.valMag.textContent = Math.floor(alpha) + "°";
  
  // Détection "Spin" (tourbillon) = Anomalie ?
  if (Math.abs(event.alpha - (app.lastAlpha || 0)) > 50) {
      triggerSensorAlert('boxMag', "PERTURBATION MAGNÉTIQUE");
  }
  app.lastAlpha = alpha;
}

function initBattery() {
  if ('getBattery' in navigator) {
      navigator.getBattery().then(battery => {
          updateBattery();
          battery.addEventListener('levelchange', updateBattery);
          battery.addEventListener('chargingchange', updateBattery);
          log("Batterie: OK");
      });
  } else {
      els.bat.textContent = "N/A";
  }
}

function updateBattery() {
  if(navigator.getBattery) {
      navigator.getBattery().then(b => {
          els.bat.textContent = Math.floor(b.level * 100) + "%" + (b.charging ? " ⚡" : "");
      });
  }
}

function triggerSensorAlert(boxId, msg) {
  const box = el(boxId);
  if(!box.classList.contains('alert-sensor')) {
      box.classList.add('alert-sensor');
      log(msg, 'log-err');
      // Haptic Feedback
      if(navigator.vibrate) navigator.vibrate(200);
      setTimeout(() => box.classList.remove('alert-sensor'), 2000);
  }
}

// --- IA VOICE (RÉELLE UNIQUEMENT) ---
function initVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true;
      app.recognition.lang = 'fr-FR';
      
      app.recognition.onresult = (e) => {
          let txt = '';
          for(let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
          if(txt) {
              els.iaText.textContent = txt;
              if(e.results[e.results.length-1].isFinal) log(`VOIX DÉTECTÉE: "${txt}"`, 'log-suc');
          }
      };
      app.recognition.onerror = (e) => {};
      app.recognition.onend = () => { if(app.running) try{app.recognition.start()}catch(e){} };
      try{ app.recognition.start(); } catch(e){}
  } else {
      els.iaText.textContent = "INDISPONIBLE";
  }
}

// --- OPTIONS ---
function toggleOpt(key) {
  if(!app.running) { log("Capteurs requis", 'log-warn'); return; }
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');
  
  log(`${key}: ${app.config[key]?'ON':'OFF'}`);
  
  if(key === 'monitor' && !app.simulation) {
      if(app.config[key]) {
          app.analyser.connect(app.monitorDelay);
          app.monitorDelay.connect(app.monitorFeedback);
          app.monitorFeedback.connect(app.monitorDelay);
          app.monitorDelay.connect(app.monitorGain);
          app.monitorGain.connect(app.ctx.destination);
      } else {
          app.analyser.disconnect(app.monitorDelay);
          app.monitorGain.disconnect(app.ctx.destination);
      }
  }
  if(key === 'ghostBox' && !app.simulation) {
      app.ghostGain.gain.value = app.config[key] ? 0.1 : 0;
      app.noiseGain.gain.value = app.config[key] ? 0.05 : 0;
  }
  if(key === 'cam') toggleCam();
  if(key === 'flash') toggleFlash();
}

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          els.camera.srcObject = app.vidStream;
          els.camera.style.display = 'block';
      } catch(e) { log("Erreur Cam", 'log-err'); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null; els.camera.style.display = 'none';
  }
}

async function toggleFlash() {
  if(!app.vidStream) return log("Caméra requise", 'log-warn');
  try {
      const track = app.vidStream.getVideoTracks()[0];
      await track.applyConstraints({advanced: [{torch: app.config.flash}]});
  } catch(e) { log("Erreur Torche", 'log-err'); }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`OMNI_${Date.now()}.webm`; a.click();
  log("Enregistrement sauvé", 'log-suc');
}

// --- VISUAL LOOP ---

function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  if(app.simulation) {
      const t = Date.now()/50;
      for(let i=0; i<1024; i++) app.dataArray[i] = (Math.sin(i*0.05+t)+1)*50 + Math.random()*20;
  } else {
      app.analyser.getByteFrequencyData(app.dataArray);
  }

  // Calculs
  let sum = 0;
  let lowFreqSum = 0; // 0-200Hz (Graves/Rumbles)
  let highFreqSum = 0; // 2000Hz+ (Aigus/Cris)
  
  const nyquist = app.ctx.sampleRate / 2;
  const binSize = nyquist / app.dataArray.length;

  for(let i=0; i<app.dataArray.length; i++) {
      const v = app.dataArray[i];
      sum += v;
      const freq = i * binSize;
      if(freq < 200) lowFreqSum += v;
      if(freq > 2000) highFreqSum += v;
  }
  
  const avg = sum / app.dataArray.length;
  const avgLow = lowFreqSum / (200 / binSize);
  const avgHigh = highFreqSum / ((nyquist - 2000) / binSize);

  els.voiceBar.style.width = Math.min(100, avg) + '%';
  els.freq.textContent = avgHigh > 50 ? "HIGH HF" : "NORMAL";

  // Auto Rec
  if(app.config.autoRec && !app.simulation && avg > 50 && !app.isRec) {
      app.isRec = true; app.recorder.start(); log("⚠️ ANOMALIE AUDIO", 'log-err');
      setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 4000);
  }

  // Dessin
  const ctx = app.cCtx, w=app.width, h=app.height;
  ctx.fillStyle = 'rgba(5, 0, 0, 0.2)';
  ctx.fillRect(0,0,w,h);
  
  const barW = (w / app.dataArray.length) * 2.5;
  let x = 0;
  for(let i=0; i<app.dataArray.length; i++) {
      const v = app.dataArray[i];
      const barH = (v/255)*h;
      
      // Mode EVP Low = On met en rouge les fréquences graves
      let color = `rgb(${v}, 0, 0)`;
      if(app.config.evp) {
          const freq = i * binSize;
          if(freq < 200) color = `rgb(0, ${v}, ${v})`; // Cyan pour les rumbles
      }
      
      ctx.fillStyle = color;
      ctx.fillRect(x, h-barH, barW, barH);
      x += barW+1;
  }

  // Radar HF (High Freq Detection) - RÉEL
  if(app.config.radar) {
      // On dessine le radar
      const cx = w-60, cy = 60, r=50;
      ctx.strokeStyle = '#f00'; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
      
      // Affiche un blip SEULEMENT si haute fréquence réelle détectée
      if(avgHigh > 60) {
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill(); // Full circle alert
          els.freq.style.color = "red";
      } else {
          els.freq.style.color = "var(--text)";
          // Scanner normal
          const ang = (Date.now()/1000) % (Math.PI*2);
          ctx.save(); ctx.translate(cx,cy); ctx.rotate(ang);
          ctx.fillStyle = 'rgba(255,0,0,0.5)';
          ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r,-0.1,0.1); ctx.fill(); ctx.restore();
      }
  }
}

// --- UTILS ---

function startPulseTimer() {
  if(app.pulseInterval) clearInterval(app.pulseInterval);
  app.pulseInterval = setInterval(() => {
      if(!app.running) return;
      // Pulse visuel sur le bouton
      el('startBtn').style.opacity = (el('startBtn').style.opacity === '0.5') ? '1' : '0.5';
  }, 3000);
}

window.onload = () => {
  app.canvas = els.canvas;
  app.cCtx = app.canvas.getContext('2d');
  resize();
  log("OMNI-SENSOR PRET. Appuyez sur START.");
};
window.onresize = resize;
function resize() {
  app.width = els.canvas.clientWidth;
  app.height = els.canvas.clientHeight;
  app.canvas.width = app.width;
  app.canvas.height = app.height;
}
</script>
</body>
</html>
