<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY K0M4R LAB - QUANTUM FLUX</title>
<style>
:root {
  --primary: #00f3ff; /* Cyan Quantique */
  --secondary: #bc13fe; /* Violet Flux */
  --bg: #020205; /* Void Black */
  --panel: #0a0a12;
  --btn-bg: #141420;
  --btn-active: #00f3ff;
  --text: #e0f0ff;
}

body {
  margin: 0; padding: 0;
  font-family: 'Consolas', 'Monaco', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

/* BACKGROUND GRID */
.grid-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -2;
}

/* HUD LAYOUT */
#hud {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100%;
}

#topBar {
  background: rgba(10, 10, 18, 0.9);
  border-bottom: 1px solid var(--primary);
  padding: 5px 10px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.75rem;
  color: var(--primary);
  backdrop-filter: blur(5px);
  z-index: 10;
}
.data-readout {
  display: flex; gap: 15px;
}
.data-item span { color: var(--secondary); font-weight: bold; }

#mainStage {
  position: relative;
  flex: 1;
  overflow: hidden;
  display: flex; justify-content: center; align-items: center;
}

#iaBox {
  position: absolute; top: 10%; left: 0; right: 0;
  text-align: center;
  z-index: 5;
  pointer-events: none;
}
#iaLabel { color: var(--secondary); font-size: 0.7rem; letter-spacing: 2px; background: rgba(0,0,0,0.7); display: inline-block; padding: 2px 10px; border-radius: 10px; }
#iaText {
  font-size: 1.8rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 10px var(--primary);
  margin-top: 5px;
}

canvas { width: 100%; height: 100%; display: block; }

/* CONTROLS AREA */
#controlDeck {
  background: rgba(10, 10, 18, 0.95);
  border-top: 2px solid var(--primary);
  height: 48vh;
  overflow-y: auto;
  display: flex; flex-direction: column;
  gap: 5px;
  padding: 5px;
  backdrop-filter: blur(10px);
  z-index: 10;
}

.section-title {
  color: var(--secondary); font-size: 0.65rem; font-weight: bold; 
  border-bottom: 1px solid #333; margin: 5px 0; padding-bottom: 2px; 
  text-transform: uppercase;
}

/* SLIDERS (EQ) */
.eq-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 5px;
  background: rgba(0,0,0,0.3); padding: 5px; border-radius: 4px; border: 1px solid #333;
}
.slider-group { text-align: center; }
.slider-group label { display: block; font-size: 0.6rem; margin-bottom: 2px; color: #aaa; }
input[type="range"] { width: 100%; accent-color: var(--primary); }

/* BUTTONS */
.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}

button {
  background: var(--btn-bg); border: 1px solid #333;
  color: var(--primary); padding: 8px 1px; font-size: 0.6rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #000;
  box-shadow: 0 0 10px var(--primary);
  border-color: #fff;
}

#startBtn {
  grid-column: span 4; font-size: 1rem; padding: 10px;
  background: #000; color: var(--primary); border: 1px solid var(--primary);
  font-weight: 900; letter-spacing: 1px;
}
#startBtn.running {
  background: var(--primary); color: #000;
  box-shadow: 0 0 20px var(--primary);
}

/* BARS */
#meterBridge {
  display: flex; gap: 2px; height: 6px; margin-bottom: 5px;
}
.meter-bar { flex: 1; background: #222; position: relative; overflow: hidden; }
.meter-fill { height: 100%; width: 0%; transition: width 0.05s; }
#tMeter .meter-fill { background: #ff0055; } /* Tachyons (Transients) */
#vMeter .meter-fill { background: var(--primary); } /* Volume */

/* LOGS */
#logZone {
  height: 35px; background: #000; border-top: 1px solid #333;
  padding: 2px 5px; font-size: 0.55rem; overflow-y: auto; color: #888;
  font-family: monospace;
}
.log-warn { color: var(--secondary) !important; }
</style>
</head>
<body>

<div class="grid-bg"></div>

<div id="hud">
  <!-- TOP BAR -->
  <div id="topBar">
    <div>ETERNITY LAB <span style="color:var(--secondary)">QUANTUM FLUX</span></div>
    <div class="data-readout">
      <div class="data-item">HZ: <span id="hzReadout">0</span></div>
      <div class="data-item">dB: <span id="dbReadout">-inf</span></div>
      <div class="data-item">TACHYON: <span id="tachyonStatus">0</span></div>
    </div>
  </div>

  <!-- MAIN VIZ -->
  <div id="mainStage">
    <canvas id="canvas"></canvas>
    <div id="iaBox">
      <div id="iaLabel">ANALYSE SPECTRALE AVANCÉE</div>
      <div id="iaText">... SYSTÈME EN ATTENTE ...</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div id="controlDeck">
    
    <!-- METERS -->
    <div id="meterBridge">
      <div id="tMeter" class="meter-bar" title="Détecteur de Transients (Pics rapides)"><div class="meter-fill" id="tachyonBar"></div></div>
      <div id="vMeter" class="meter-bar" title="Volume Global"><div class="meter-fill" id="volBar"></div></div>
    </div>

    <button id="startBtn" onclick="startSystem()">INITIALISER FLUX QUANTIQUE</button>

    <!-- EQUALISEUR PARAMÉTRIQUE -->
    <div class="section-title">Traitement du Signal (EQ)</div>
    <div class="eq-grid">
      <div class="slider-group">
        <label>BASSES (Rumbles)</label>
        <input type="range" id="eqLow" min="-20" max="20" value="0" step="1">
      </div>
      <div class="slider-group">
        <label>VOIX (Mids)</label>
        <input type="range" id="eqMid" min="-20" max="20" value="5" step="1">
      </div>
      <div class="slider-group">
        <label>AIGUS (Cris)</label>
        <input type="range" id="eqHigh" min="-20" max="20" value="0" step="1">
      </div>
    </div>

    <!-- MASTER -->
    <div class="section-title">Contrôle Maître</div>
    <div class="slider-group" style="display:flex; justify-content:space-between; align-items:center; padding:0 10px;">
      <label style="margin:0">GAIN D'ANALYSE (IA)</label>
      <input type="range" id="analysisGain" min="1" max="10" value="5" style="width:50%">
    </div>
    <div class="slider-group" style="display:flex; justify-content:space-between; align-items:center; padding:0 10px;">
      <label style="margin:0">VOLUME ÉCOUTE</label>
      <input type="range" id="monitorGain" min="0" max="1" value="0" step="0.01" style="width:50%">
    </div>

    <!-- MODES -->
    <div class="section-title">Visualisation & Synthèse</div>
    <div class="button-grid">
      <button id="vizSpec" onclick="setViz('spectrum')">SPECTRE</button>
      <button id="vizLissa" onclick="setViz('lissajous')">INTERFÉRENCE</button>
      <button id="vizPart" onclick="setViz('particles')">FLUX</button>
      <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 MONITOR</button>
      
      <button id="ghostBtn" onclick="toggleOpt('ghostBox')">📻 RÉCEPTEUR</button>
      <button id="invBtn" onclick="toggleOpt('invert')">⚛ INVERSION</button>
      <button id="voiceBtn" onclick="toggleOpt('voice')">🗣 IA TRADUCTION</button>
      <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
      
      <button id="camBtn" onclick="toggleOpt('cam')">📷 CAMÉRA</button>
      <button id="clearBtn" onclick="clearLog()">🗑 PURGE LOGS</button>
      <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ ARRÊTER</button>
    </div>
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// --- CORE ENGINE ---
let app = {
  running: false,
  ctx: null,
  source: null,
  // EQ NODES (Bass / Mid / Treble)
  lowShelf: null, peaking: null, highShelf: null,
  // System Nodes
  analysisGain: null, monitorGain: null, analyser: null,
  // Synth
  carrier: null, modulator: null, modGain: null, synthGain: null,
  // Data
  stream: null, vidStream: null, recorder: null, isRec: false,
  recognition: null,
  keepAlive: null,
  // State
  config: {
    monitor: false, invert: false, ghostBox: false, voice: false, autoRec: false, cam: false,
    vizMode: 'spectrum'
  },
  // Viz Data
  canvas: null, cCtx: null, width: 0, height: 0,
  particles: [],
  tachyonLevel: 0, // Niveau de transients
  wakeLock: null
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), hz: el('hzReadout'), db: el('dbReadout'), tach: el('tachyonStatus'),
  volBar: el('volBar'), tachBar: el('tachyonBar'), iaText: el('iaText'),
  canvas: el('canvas'),
  // Sliders
  sLow: el('eqLow'), sMid: el('eqMid'), sHigh: el('eqHigh'),
  sAna: el('analysisGain'), sMon: el('monitorGain')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

// --- STARTUP ---

async function startSystem() {
  if(app.running) return;
  
  el('startBtn').textContent = "CALIBRATION FLUX...";
  el('startBtn').style.background = "var(--secondary)";
  
  try {
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if(app.ctx.state === 'suspended') await app.ctx.resume();

    // Demande Micro
    app.stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false 
    });

    buildAudioGraph(app.stream);
    initViz();

    try { app.wakeLock = await navigator.wakeLock.request('screen'); log("Wake Lock: OK"); } catch(e){}
    startKeepAlive();
    startVoice();

    app.running = true;
    el('startBtn').textContent = "FLUX QUANTIQUE ACTIF";
    el('startBtn').classList.add('running');
    
    renderLoop();
    log("Système quantique initialisé. EQ actif.", 'log-suc');

  } catch (e) {
    log("Erreur Init: " + e.message, 'log-warn');
    el('startBtn').textContent = "ERREUR";
    el('startBtn').style.background = "red";
  }
}

// --- AUDIO GRAPH (EQ + SYNTH) ---

function buildAudioGraph(stream) {
  app.source = app.ctx.createMediaStreamSource(stream);

  // 1. ÉGALISEUR PARAMÉTRIQUE (3 Bandes)
  // Low Shelf (Basses) - Fréquence de coupure 200Hz
  app.lowShelf = app.ctx.createBiquadFilter();
  app.lowShelf.type = 'lowshelf';
  app.lowShelf.frequency.value = 200;
  
  // Peaking (Médiums) - Centre 1000Hz
  app.peaking = app.ctx.createBiquadFilter();
  app.peaking.type = 'peaking';
  app.peaking.frequency.value = 1000;
  app.peaking.Q.value = 1;

  // High Shelf (Aigus) - Fréquence de coupure 3000Hz
  app.highShelf = app.ctx.createBiquadFilter();
  app.highShelf.type = 'highshelf';
  app.highShelf.frequency.value = 3000;

  // 2. GAINS
  app.analysisGain = app.ctx.createGain();
  app.analysisGain.gain.value = parseFloat(els.sAna.value);

  app.monitorGain = app.ctx.createGain();
  app.monitorGain.gain.value = 0; // Sécurité

  // 3. ANALYSER
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.analyser.smoothingTimeConstant = 0.5;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);
  app.timeDataArray = new Uint8Array(app.analyser.fftSize); // Pour Lissajous

  // 4. GHOST BOX (FM Synthesis)
  app.carrier = app.ctx.createOscillator();
  app.carrier.type = 'sine';
  app.carrier.frequency.value = 440;
  
  app.modulator = app.ctx.createOscillator();
  app.modulator.type = 'sawtooth';
  app.modulator.frequency.value = 5; // Vitesse de modulation lente (Drone)
  
  app.modGain = app.ctx.createGain();
  app.modGain.gain.value = 1000; // Indice modulation (étendue sonore)
  
  app.synthGain = app.ctx.createGain();
  app.synthGain.gain.value = 0;

  // CONNECTIONS
  // Source -> EQ (Low -> Mid -> High) -> Split
  app.source.connect(app.lowShelf);
  app.lowShelf.connect(app.peaking);
  app.peaking.connect(app.highShelf);

  // Vers Analyse (IA)
  app.highShelf.connect(app.analysisGain);
  app.analysisGain.connect(app.analyser);

  // Vers Monitor (Utilisateur)
  app.highShelf.connect(app.monitorGain);
  app.monitorGain.connect(app.ctx.destination);

  // Synth Connect
  app.modulator.connect(app.modGain);
  app.modGain.connect(app.carrier.frequency);
  app.carrier.connect(app.synthGain);
  app.synthGain.connect(app.monitorGain); // Mix synth avec micro

  // Start Oscillators
  app.carrier.start();
  app.modulator.start();

  // Recorder (Sur le signal égalisé)
  app.recorder = new MediaRecorder(stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

// --- REAL-TIME PARAMS ---

function updateAudioParams() {
  if(!app.running) return;
  // Update EQ Gains
  app.lowShelf.gain.value = parseFloat(els.sLow.value);
  app.peaking.gain.value = parseFloat(els.sMid.value);
  app.highShelf.gain.value = parseFloat(els.sHigh.value);
  
  // Update Master Gains
  app.analysisGain.gain.value = parseFloat(els.sAna.value);
  app.monitorGain.gain.value = app.config.monitor ? parseFloat(els.sMon.value) : 0;
}

// Event Listeners Sliders
[els.sLow, els.sMid, els.sHigh, els.sAna, els.sMon].forEach(s => s.addEventListener('input', updateAudioParams));


// --- VISUALISATION AVANCÉE ---

function initViz() {
  app.canvas = els.canvas;
  app.cCtx = app.canvas.getContext('2d');
  resize();
  
  // Init Particles
  for(let i=0; i<100; i++) {
    app.particles.push({
      x: Math.random() * app.width,
      y: Math.random() * app.height,
      vx: (Math.random()-0.5)*2,
      vy: (Math.random()-0.5)*2,
      size: Math.random()*2 + 1
    });
  }
}

function renderLoop() {
  if(!app.running) return;
  requestAnimationFrame(renderLoop);

  updateAudioParams(); // Apply slider changes in loop

  // Get Data
  app.analyser.getByteFrequencyData(app.dataArray);
  app.analyser.getByteTimeDomainData(app.timeDataArray); // Waveform

  // 1. CALCULS PHYSIQUES
  let sum = 0;
  let transientSum = 0;
  let peakFreq = 0;
  let maxVal = 0;

  for(let i=0; i<app.dataArray.length; i++) {
    const v = app.dataArray[i];
    sum += v;
    if(v > maxVal) { maxVal = v; peakFreq = i; }
    
    // Calcul Tachyon (Transients) : Différence entre échantillon actuel et précédent (simulé ici par dérivée locale)
    // Si la pente est très forte, c'est un transient
    if(i > 0) {
      const diff = Math.abs(v - app.dataArray[i-1]);
      if(diff > 50) transientSum += diff;
    }
  }

  const avg = sum / app.dataArray.length;
  const db = 20 * Math.log10(avg / 255);
  const hz = Math.round(peakFreq * (app.ctx.sampleRate / 2) / app.dataArray.length);

  // Update UI Numerique
  els.volBar.style.width = Math.min(100, avg) + '%';
  els.tachyonLevel = Math.min(100, transientSum / 10); // Normaliser
  els.tachBar.style.width = els.tachyonLevel + '%';
  
  els.hz.textContent = hz;
  els.db.textContent = db.toFixed(1) + " dB";
  els.tach.textContent = els.tachyonLevel > 80 ? "DETECTÉ" : "STABLE";
  if(els.tachyonLevel > 80) els.tach.style.color = "red"; else els.tach.style.color = "var(--secondary)";

  // Auto Rec Logic
  if(app.config.autoRec && avg > 60 && !app.isRec) {
    app.isRec = true; app.recorder.start(); log("⚠ TRANSIENT CAPTÉ -> REC", 'log-warn');
    setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 3000);
  }

  // 2. DESSIN
  const ctx = app.cCtx, w = app.width, h = app.height;
  
  // Fade Effect (Trainée)
  ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
  ctx.fillRect(0,0,w,h);

  if(app.config.vizMode === 'spectrum') {
    drawSpectrum(ctx, w, h);
  } else if (app.config.vizMode === 'lissajous') {
    drawLissajous(ctx, w, h);
  } else if (app.config.vizMode === 'particles') {
    drawParticles(ctx, w, h, avg);
  }
}

// --- VIZ MODES ---

function drawSpectrum(ctx, w, h) {
  const barW = (w / app.dataArray.length) * 2.5;
  let x = 0;
  for(let i=0; i<app.dataArray.length; i++) {
    const v = app.dataArray[i];
    const barH = (v/255)*h;
    
    // Couleur basée sur l'EQ (Rouge pour bas, Vert pour mid, Bleu pour haut)
    const freq = i * (app.ctx.sampleRate/2) / app.dataArray.length;
    let r=0, g=0, b=0;
    if(freq < 200) r = v; // Basses
    else if(freq < 2000) g = v; // Mids
    else b = v; // Highs

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(x, h - barH, barW, barH);
    x += barW+1;
  }
}

function drawLissajous(ctx, w, h) {
  // Dessine une courbe basée sur Time Domain Data
  // Pour simuler une vraie interférence, on utilise y = sin(t) et x = sin(t + phase)
  // Ici, on utilise les données audio pour x et un déphasage temporel pour y
  
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#00f3ff';
  ctx.beginPath();
  
  const bufferLength = app.analyser.frequencyBinCount;
  const sliceWidth = w * 1.0 / bufferLength;
  let x = 0;

  for(let i = 0; i < bufferLength; i++) {
    const v = app.timeDataArray[i] / 128.0; // 0..2
    const y = (v * h/2); // Amplitude Y

    // X est décalé pour créer la forme
    // On centre l'oscillation
    const xOffset = (v - 1) * (w/2); 
    
    if(i === 0) ctx.moveTo(x + xOffset, y);
    else ctx.lineTo(x + xOffset, y);

    x += sliceWidth;
  }
  ctx.stroke();
  
  // Ajout d'un cercle de référence
  ctx.strokeStyle = 'rgba(188, 19, 254, 0.5)';
  ctx.beginPath(); ctx.arc(w/2, h/2, 100, 0, Math.PI*2); ctx.stroke();
}

function drawParticles(ctx, w, h, energy) {
  const speedMult = (energy / 255) * 5 + 0.5;
  
  app.particles.forEach(p => {
    p.x += p.vx * speedMult;
    p.y += p.vy * speedMult;
    
    // Rebond bords
    if(p.x < 0 || p.x > w) p.vx *= -1;
    if(p.y < 0 || p.y > h) p.vy *= -1;
    
    // Dessin
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (energy/50 + 0.5), 0, Math.PI*2);
    ctx.fillStyle = `rgba(0, 243, 255, ${energy/255})`;
    ctx.fill();
    
    // Connexions proches (Effet réseau neural)
    app.particles.forEach(p2 => {
      const dx = p.x - p2.x;
      const dy = p.y - p2.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 50) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(188, 19, 254, ${1 - dist/50})`;
        ctx.stroke();
      }
    });
  });
}

// --- LOGIC & TOOLS ---

function setViz(mode) {
  app.config.vizMode = mode;
  document.querySelectorAll('.button-grid button').forEach(b => b.classList.remove('active'));
  // Simple highlight logic
  if(mode==='spectrum') el('vizSpec').classList.add('active');
  if(mode==='lissajous') el('vizLissa').classList.add('active');
  if(mode==='particles') el('vizPart').classList.add('active');
  log("Visualisation: " + mode.toUpperCase());
}

function toggleOpt(key) {
  if(!app.running && key !== 'cam') return;
  
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');

  if(key === 'monitor') {
    // Le slider gère le volume, on active juste le flag
    if(app.config.monitor) {
      app.monitorGain.gain.value = parseFloat(els.sMon.value);
      log("Monitor Actif");
    } else {
      app.monitorGain.gain.value = 0;
      log("Monitor Inactif");
    }
  }
  if(key === 'invert') {
    app.analysisGain.gain.value = app.config.invert ? -parseFloat(els.sAna.value) : parseFloat(els.sAna.value);
  }
  if(key === 'ghostBox') {
    app.synthGain.gain.value = app.config.ghostBox ? 0.15 : 0;
  }
  if(key === 'voice') {
    if(app.config.voice) startVoice(); else app.recognition.stop();
  }
  if(key === 'cam') toggleCam();
}

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          const vid = document.createElement('video');
          vid.srcObject = app.vidStream; vid.autoplay = true; vid.muted = true; vid.playsInline = true;
          vid.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.2; z-index:-1; mix-blend-mode:screen;";
          app.canvas.parentNode.insertBefore(vid, app.canvas);
      } catch(e) { log("Erreur Cam", 'log-warn'); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null; document.querySelector('video')?.remove();
  }
}

function startKeepAlive() {
  app.keepAlive = app.ctx.createOscillator();
  const g = app.ctx.createGain();
  g.gain.value = 0;
  app.keepAlive.connect(g);
  g.connect(app.ctx.destination);
  app.keepAlive.start();
}

function stopSystem() {
  if(app.wakeLock) app.wakeLock.release();
  if(app.stream) app.stream.getTracks().forEach(t=>t.stop());
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  if(app.recognition) app.recognition.stop();
  if(app.ctx) app.ctx.close();
  
  app.running = false;
  
  el('startBtn').textContent = "INITIALISER FLUX QUANTIQUE";
  el('startBtn').classList.remove('running');
  els.iaText.textContent = "SYSTÈME ARRÊTÉ";
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
}

function startVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true;
      app.recognition.lang = 'fr-FR';
      app.recognition.onresult = (e) => {
          let txt = '';
          for(let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
          if(txt) {
              els.iaText.textContent = `SÉQUENCE: "${txt}"`;
              if(e.results[e.results.length-1].isFinal) log(`IA: "${txt}"`, 'log-suc');
          }
      };
      app.recognition.onerror = () => {};
      app.recognition.onend = () => { if(app.running && app.config.voice) try{app.recognition.start()}catch(e){} };
      try{ app.recognition.start(); } catch(e){}
  }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`FLUX_${Date.now()}.webm`; a.click();
  log("Données sauvées", 'log-suc');
}

function clearLog() { els.log.innerHTML = ''; }

window.onresize = resize;
function resize() {
    if(app.canvas) {
        app.width = app.canvas.clientWidth;
        app.height = app.canvas.clientHeight;
        app.canvas.width = app.width;
        app.canvas.height = app.height;
    }
}

window.onload = () => {
    initViz();
    log("QUANTUM FLUX PRÊT. EQ ACTIF.");
};

</script>
</body>
</html>
