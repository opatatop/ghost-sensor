<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB BOOST</title>
<style>
:root {
  --primary: #00ffcc; /* Cyan pour l'amplification */
  --bg: #000505;
  --panel: #001111;
  --btn-bg: #003333;
  --btn-active: #00ffcc;
  --text: #ccffff;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

#header {
  padding: 10px; background: var(--panel);
  border-bottom: 2px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.8rem; flex-shrink: 0;
  color: var(--primary);
}

#vizContainer {
  flex: 1; position: relative; background: #000;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  overflow: hidden;
}

#iaBox {
  z-index: 10; text-align: center; width: 90%;
  pointer-events: none;
}
#iaLabel { color: var(--primary); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px; }
#iaText {
  font-size: 2.2rem; font-weight: 900; color: #fff;
  background: rgba(0,0,0,0.9); padding: 10px;
  min-height: 3.5rem; border: 2px solid var(--primary);
  text-transform: uppercase;
  text-shadow: 0 0 10px var(--primary);
}

canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; opacity: 0.6; }

#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  height: 38vh; overflow-y: auto; padding: 5px;
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px 2px; font-size: 0.65rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #000;
  box-shadow: 0 0 15px var(--primary);
  border-color: #fff;
}

#startBtn {
  grid-column: span 4; font-size: 1.3rem; padding: 15px;
  background: #fff; color: #000; border: 3px solid var(--primary);
  font-weight: 900;
}
#startBtn.locked {
  background: var(--primary); color: #000;
}

#barsArea { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.7rem; }
.bar-box { background: #002222; height: 10px; width: 100%; border: 1px solid #005555; margin-top:2px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.05s; background: var(--primary); }

#logZone {
  height: 50px; background: #000; border-top: 1px solid #333;
  padding: 2px 5px; font-size: 0.6rem; overflow-y: auto; color: #888;
  flex-shrink: 0;
}
.log-suc { color: var(--primary) !important; }
.log-warn { color: yellow !important; }
</style>
</head>
<body>

<div id="header">
  <div>MIC: <span id="micStatus">UNLOCKED</span></div>
  <div>GAIN: <span id="gainStatus">BOOST</span></div>
  <div>AI: <span id="aiStatus">LISTENING</span></div>
</div>

<div id="vizContainer">
  <canvas id="canvas"></canvas>
  <div id="iaBox">
    <div id="iaLabel">AMPLIFICATION & TRADUCTION</div>
    <div id="iaText">... EN ATTENTE MICRO ...</div>
  </div>
</div>

<div id="controlsArea">
  <div id="barsArea">
    <div>INPUT AMPLIFIÉ <div class="bar-box"><div id="voiceBar" class="bar-fill"></div></div></div>
    <div>SEUIL VOCAL <div class="bar-box"><div id="threshBar" class="bar-fill" style="width:10%"></div></div></div>
  </div>

  <button id="startBtn" onclick="startSystem()">ACTIVER & BOOSTER</button>

  <div class="button-grid">
    <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE</button>
    <button id="filterBtn" onclick="toggleOpt('filter')">🔇 COUPER BASSES</button>
    <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
    <button id="voiceBtn" onclick="toggleOpt('voice')">🗣 IA CONTINUE</button>
    <button id="radarBtn" onclick="toggleOpt('radar')">📡 FRÉQUENCE</button>
    <button id="camBtn" onclick="toggleOpt('cam')">📷 CAM</button>
    <button id="clearBtn" onclick="clearLog()">🗑 CLEAR</button>
    <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ STOP</button>
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
let app = {
  running: false,
  ctx: null, 
  source: null, 
  // Noeuds Audio
  filter: null,    // Filtre Passe-Haut (enlève le ronronnement)
  amp: null,       // Amplificateur (boost les murmures)
  analyser: null,
  monitorGain: null,
  stream: null, 
  vidStream: null, 
  recorder: null, 
  isRec: false,
  recognition: null,
  config: { monitor: false, filter: true, autoRec: false, voice: true, radar: false, cam: false },
  canvas: null, cCtx: null, width: 0, height: 0,
  wakeLock: null
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), mic: el('micStatus'), gain: el('gainStatus'), ai: el('aiStatus'),
  voiceBar: el('voiceBar'), iaText: el('iaText'),
  canvas: el('canvas')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

// --- START SYSTEM (LOCK MICRO) ---

async function startSystem() {
  if(app.running) return;
  
  el('startBtn').textContent = "VERROUILLAGE MICRO...";
  el('startBtn').style.background = "orange";
  log("Ouverture du flux audio...", 'log-suc');

  try {
    // 1. Contexte Audio
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();

    // 2. Flux Micro (Une seule fois !)
    app.stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { 
            echoCancellation: false, 
            noiseSuppression: false, // Important : on veut TOUT le son
            autoGainControl: false   // Important : on gère le gain nous-même
        }, 
        video: false 
    });

    // 3. Chaîne Audio Optimisée pour EVP
    setupAudioNodes(app.stream);

    // 4. Wake Lock (Garde le téléphone allumé, évite la coupure micro)
    try {
        app.wakeLock = await navigator.wakeLock.request('screen');
        log("Écran verrouillé allumé (Sécurisé)", 'log-suc');
    } catch(e) { log("Wake Lock impossible", 'log-warn'); }

    // 5. IA Voice
    startVoice();

    app.running = true;
    el('startBtn').textContent = "SYSTÈME ACTIF (LOCKED)";
    el('startBtn').classList.add('locked');
    el('startBtn').style.background = "var(--primary)";
    els.mic.textContent = "LOCKED ON";
    els.mic.style.color = "#0f0";
    
    resize();
    drawLoop();
    log("Micro Amplifié Actif. IA à l'écoute.", 'log-suc');

  } catch (err) {
    console.error(err);
    log("Erreur: " + err.message, 'log-warn');
    el('startBtn').textContent = "ERREUR";
    el('startBtn').style.background = "red";
  }
}

function setupAudioNodes(stream) {
  app.source = app.ctx.createMediaStreamSource(stream);
  
  // A. FILTRE PASSE-HAUT (High Pass Filter)
  // Coupe les fréquences < 300Hz (bruit de fond, ronronnement).
  // Ne garde que la voix et les aigus.
  app.filter = app.ctx.createBiquadFilter();
  app.filter.type = 'highpass';
  app.filter.frequency.value = 300; 
  app.filter.Q.value = 1; // Résonance légère pour booster la voix

  // B. AMPLIFICATEUR (Gain)
  // Booste le volume des sons faibles (murmures) pour qu'ils soient audibles
  // et surtout pour qu'ils atteignent le seuil de l'IA.
  app.amp = app.ctx.createGain();
  app.amp.gain.value = 5.0; // Gain x5 (Puissant !)

  // C. ANALYSER
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.analyser.smoothingTimeConstant = 0.5;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);

  // D. MONITOR (Pour l'entendre)
  app.monitorGain = app.ctx.createGain();
  app.monitorGain.gain.value = 0; // Off par défaut pour éviter l' Larsen

  // ROUTAGE:
  // Micro -> Filtre (Nettoyage) -> Ampli (Boost) -> Analyser -> (Monitor -> H.P.)
  app.source.connect(app.filter);
  app.filter.connect(app.amp);
  app.amp.connect(app.analyser);
  
  // Monitoring (si activé)
  app.amp.connect(app.monitorGain);
  app.monitorGain.connect(app.ctx.destination);

  // RECORDER (Pour sauvegarder le son BRUT, non amplifié, pour qualité)
  app.recorder = new MediaRecorder(stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

function stopSystem() {
  // Libération Wake Lock
  if(app.wakeLock) { app.wakeLock.release(); app.wakeLock = null; }
  
  // Arrêt Flux (Une seule fois)
  if(app.stream) app.stream.getTracks().forEach(t=>t.stop());
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  
  // Arrêt IA
  if(app.recognition) app.recognition.stop();
  
  // Arrêt Contexte
  if(app.ctx) app.ctx.close();
  
  app.running = false;
  
  // Reset UI
  el('startBtn').textContent = "ACTIVER & BOOSTER";
  el('startBtn').classList.remove('locked');
  el('startBtn').style.background = "#fff";
  els.mic.textContent = "UNLOCKED";
  els.mic.style.color = "var(--primary)";
  els.iaText.textContent = "ARRÊTÉ";
  
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
  Object.keys(app.config).forEach(k => app.config[k] = false);
  
  log("Système arrêté. Micro libéré.");
}

// --- IA VOICE (Traduction Mots Exacts) ---

function startVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true; // Ne s'arrête jamais
      app.recognition.interimResults = true; // Affiche les mots en cours de formation
      app.recognition.lang = 'fr-FR';
      
      app.recognition.onresult = (e) => {
          let txt = '';
          for(let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
          if(txt) {
              els.iaText.textContent = txt;
              els.iaText.style.color = "#fff";
              if(e.results[e.results.length-1].isFinal) {
                  log(`MOT EXACT: "${txt}"`, 'log-suc');
              }
          }
      };
      app.recognition.onerror = (e) => { 
          // Si 'no-speech', on ignore pour ne pas spammer les logs
      };
      app.recognition.onend = () => { 
          // REDÉMARRAGE AUTO IMPÉRATIF pour écoute continue
          if(app.running && app.config.voice) {
              try { app.recognition.start(); } catch(e){}
          }
      };
      
      try {
          app.recognition.start();
          els.ai.textContent = "ACTIVE";
          els.ai.style.color = "#0f0";
      } catch(e) {
          els.ai.textContent = "ERR";
      }
  } else {
      els.ai.textContent = "N/A";
      log("IA non dispo", 'log-warn');
  }
}

// --- OPTIONS ---

function toggleOpt(key) {
  if(!app.running) { log("Démarrez d'abord", 'log-warn'); return; }
  
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');
  
  if(key === 'monitor') {
      // Monitor : On baisse le gain pour ne pas s'assourdir avec le Boost x5
      app.monitorGain.gain.value = app.config[key] ? 0.2 : 0; 
      log(app.config[key] ? "Écoute Amplifiée ON (Attention volume)" : "Écute OFF");
  }
  if(key === 'filter') {
      // Activation/Désactivation du filtre Passe-Haut
      app.filter.frequency.value = app.config[key] ? 300 : 0; // 0 = Flat (Tout entendre)
      log(app.config[key] ? "Filtre Vocal ON (300Hz+)" : "Filtre OFF (Full Range)");
  }
  if(key === 'voice') {
      if(app.config.voice) startVoice();
      else app.recognition.stop();
  }
  if(key === 'cam') toggleCam();
}

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          const vid = document.createElement('video');
          vid.srcObject = app.vidStream;
          vid.autoplay = true; vid.muted = true; vid.playsInline = true;
          vid.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.3; z-index:0;";
          els.canvas.parentNode.insertBefore(vid, els.canvas);
          log("Caméra ON");
      } catch(e) { log("Erreur Cam", 'log-warn'); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null;
      const vid = document.querySelector('video');
      if(vid) vid.remove();
      log("Caméra OFF");
  }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`EVP_Boost_${Date.now()}.webm`; a.click();
  log("Enregistrement sauvé", 'log-suc');
}

function clearLog() { els.log.innerHTML = ''; }

// --- LOOP & DRAW ---

function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  // Récupère les données AMPLIFIÉES
  app.analyser.getByteFrequencyData(app.dataArray);
  
  // Calcul volume
  let sum = 0;
  for(let i=0; i<app.dataArray.length; i++) sum += app.dataArray[i];
  const avg = sum / app.dataArray.length;
  
  els.voiceBar.style.width = Math.min(100, avg) + '%';

  // Auto Rec (si le son boosté dépasse le seuil)
  if(app.config.autoRec && avg > 60 && !app.isRec) {
      app.isRec = true; app.recorder.start(); log("⚠️ MURMURE DÉTECTÉ -> REC", 'log-warn');
      setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 5000);
  }

  // Dessin
  const ctx = app.cCtx, w=app.width, h=app.height;
  ctx.fillStyle = 'rgba(0, 5, 5, 0.2)'; // Fond sombre
  ctx.fillRect(0,0,w,h);
  
  const barW = (w / app.dataArray.length) * 2.5;
  let x = 0;
  for(let i=0; i<app.dataArray.length; i++) {
      const v = app.dataArray[i];
      const barH = (v/255)*h;
      
      // Couleur Cyan "Boost"
      ctx.fillStyle = `rgb(0, 255, ${v})`;
      
      ctx.fillRect(x, h - barH, barW, barH);
      x += barW+1;
  }
}

// --- INIT ---
window.onload = () => {
  app.canvas = els.canvas;
  app.cCtx = app.canvas.getContext('2d');
  resize();
  log("ETERNITY LAB BOOST PRET.");
  log("Le micro restera ouvert pour capter les sons faibles.", 'log-suc');
};
window.onresize = resize;
function resize() {
  app.width = els.canvas.clientWidth;
  app.height = els.canvas.clientHeight;
  app.canvas.width = app.width;
  app.canvas.height = app.height;
}
</script>
</body>
</html>
