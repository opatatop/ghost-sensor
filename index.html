<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="Performance"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA // OPTIMIZED</title>
    <style>
        /* CSS OPTIMISÉ POUR PERFORMANCE MOBILE */
        :root {
            --c-bg: #050505;
            --c-panel: #0f0f0f;
            --c-text: #e0e0e0;
            --c-accent: #00ffcc;
            --c-border: #333;
            --font-ui: 'Segoe UI', sans-serif;
            --font-mono: monospace;
        }
        * { box-sizing: border-box; user-select: none; -webkit-touch-callout-color: transparent; outline: none; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--c-bg); color: var(--c-text); font-family: var(--c-font-ui); overflow: hidden; }

        #app-root {
            display: grid;
            grid-template-rows: 60px 1fr 40vh;
            grid-template-columns: 1fr;
            height: 100vh;
        }

        /* LAYOUT DES COMPOSANTS */
        .header {
            background: var(--c-panel);
            border-bottom: 1px solid var(--c-border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            height: 60px;
            flex-shrink: 0;
            z-index: 10;
            background-attachment: fixed; /* Le header reste fixe */
            width: 100%;
            top: 0; left: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding: 10px;
            flex: 1; // Remplit l'espace restant au header
            padding-top: 60px; /* Espace pour le header fixe */
            position: relative;
        }

        .title { font-size: 1.2rem; font-weight: bold; color: var(--c-accent); margin: 0; text-transform: uppercase; }
        
        .status-led {
            width: 10px; height: 10px; border-radius: 50%; background: #333;
            box-shadow: 0 0 5px #333;
        }
        .status-led.on { background: var(--c-accent); box-shadow: 0 0 10px var(--c-accent); }
        .status-led.err { background: var(--c-alert); box-shadow: 0 0 10px var(--c-alert); animation: blink 0.2s infinite; }

        /* --- ZONE SENSOR / SCOPE --- */
        .scope-container {
            flex: 1;
            background: #000;
            position: relative;
            min-height: 300px;
            border-top: 1px solid var(--c-border);
            display: flex;
            flex-direction: column;
        }

        canvas { width: 100%; height: 100%; display: block; }

        .ai-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; text-align: center; pointer-events: none; z-index: 5;
        }
        .ai-text {
            font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--c-accent); text-transform: uppercase;
            margin-bottom: 5px;
            white-space: nowrap; overflow: hidden;
        }
        .ai-sub {
            font-size: 0.8rem; background: var(--c-accent); color: #000;
            padding: 2px 8px; border-radius: 2px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        /* --- CONTROLS --- */
        .controls {
            background: var(--c-panel);
            padding: 10px;
            padding-bottom: 30px; /* Espace pour le scroll */
            border-top: 1px solid var(--c-border);
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button {
            background: #0d1117;
            border: 1px solid #333;
            color: var(--c-text);
            padding: 15px;
            font-family: inherit;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        button:active { background: #333; }
        button.active { background: var(--c-accent); color: #000; }
        
        .btn-large {
            background: #2ea043;
            color: #fff;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            width: 100%;
        }

        .btn-stop {
            background: #f85149;
            color: #fff;
            border: none;
            display: none;
            font-weight: bold;
        }

        /* Terminal */
        .terminal {
            background: #000;
            color: #ccc;
            font-family: monospace;
            font-size: 0.7rem;
            padding: 10px;
            height: 80px;
            overflow-y: auto;
            border: 1px solid #333;
        }
        .log-item { margin-bottom: 4px; border-left: 2px solid #444; padding-left: 5px; }
        .log-sys { color: #888; }
        .log-ai { color: var(--c-accent); background: #001a000; font-weight: bold; }
        .log-err { color: var(--c-alert); font-weight: bold; }

    </style>
</head>
<body>

    <!-- FIXE -->
    <header>
        <div class="header">
            <div class="title">OMEGA // OPTIMIZED</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="color: #888; font-size: 0.8rem;">STATUS:</span>
                <div id="sys-led" class="status-led"></div>
                <div id="sys-text" style="font-weight: bold; color: var(--c-text-main);">OFFLINE</div>
            </div>
    </header>

    <div class="container">
        
        <!-- ZONE DE VISUALISATION -->
        <div class="scope-container">
            <canvas id="scope-canvas"></canvas>
            <div class="ai-layer">
                <div id="display-text" class="ai-text">INITIALISATION...</div>
                <div class="ai-sub">EN ATTENTE</div>
            </div>
        </div>

        <!-- BOUTONS -->
        <div class="controls">
            <button id="btn-start" class="btn-large" onclick="startSystem()">DÉMARRER ANALYSE</button>
            <button id="btn-stop" class="btn-stop" onclick="stopSystem()">ARRÊTER</button>

            <div class="btn-grid">
                <button id="mod-mic" class="active" onclick="toggleMod('mic')">Microphone</button>
                <button id="mod-echo" class="active" onclick="toggleMod('echo')">Écho Vocal</button>
                <button id="mod-trans" class="active" onclick="toggleMod('trans')">Traduction</button>
            </div>

            <div class="terminal" id="terminal">
                <div class="log-item log-sys">> > Système prêt.</div>
            </div>

        </div>

    <script>
        /* --- CONFIGURATION --- */
        const CONST = {
            WORDS: ["Ondulation", "Anomalie", "Interférence", "Signal", "Spectre", "Résonance", "Fréquence", "Amplitude", "Modulation", "Bruit blanc", "Harmonique", "Déphasage", "Écho", "Réverbération", "Distorsion", "Impulsion", "Chaos", "Entropie", "Flux", "Potentiel", "Champ", "Vecteur", "Tenseur", "Onde P", "Onde S", "Longitudinale", "Transversale", "Polarisation"],
            FFT: 1024 // Réduit pour éviter la charge
        };

        /* --- CLASSES -- */
        class Logger {
            constructor(id) { this.el = document.getElementById(id); }
            log(msg, type='sys') {
                const d = document.createElement('div');
                d.className = `log-item log-${type}`;
                const t = new Date().toLocaleTimeString('fr-FR', {hour12:false});
                d.innerHTML = `[${t}] ${msg}`;
                this.el.prepend(d); // Nouvelle log en haut
                // Garder seulement les 50 derniers logs
                if (this.el.children.length > 50) this.el.removeChild(this.el.lastChild);
            }
        }

        class AudioCore {
            constructor() {
                this.ctx = null; this.src = null; this.analyser = null;
                this.dataFreq = null; this.dataTime = null;
            }
            async init() {
                try {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AC();
                    if (this.ctx.state === 'suspended') await this.ctx.resume();
                    // AutoGain activé
                    const s = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true } });
                    this.src = this.ctx.createMediaStreamSource(s);
                    this.analyser = this.ctx.createAnalyser();
                    this.analyser.fftSize = CONST.FFT;
                    this.analyser.smoothingTimeConstant = 0.85;
                    this.src.connect(this.analyser);
                    
                    const len = this.analyser.frequencyBinCount;
                    this.dataFreq = new Uint8Array(len);
                    this.dataTime = new Uint8Array(len);
                    return true;
                } catch (e) {
                    console.error(e);
                    logger.log("Erreur Micro: " + e.message);
                    alert("Impossible d'accéder au micro. Vérifiez les permissions.");
                    throw e;
                }
            }
            process() {
                if (!this.analyser) return { avgEnergy: 0, peakFreq: 0, peakAmp: 0 };
                this.analyser.getByteFrequencyData(this.dataFreq);
                this.analyser.getByteTimeDomainData(this.dataTime);
                let sum = 0, maxAmp = 0, maxIndex = 0;
                for (let i = 0; i < this.dataFreq.length; i++) {
                    const v = this.dataFreq[i]; sum += v;
                    if (v > maxAmp) { maxAmp = v; maxIndex = i; }
                }
                const nyquist = this.ctx.sampleRate / 2;
                const peakFreq = maxIndex * (nyquist / this.dataFreq.length);
                return { avgEnergy: sum / this.dataFreq.length, peakFreq: Math.round(peakFreq), peakAmp: maxAmp };
            }
            stop() { if (this.ctx) this.ctx.close(); }
        }

        class Visualizer {
            constructor(id) {
                this.c = document.getElementById(id);
                this.ctx = this.c.getContext('2d');
                this.particles = [];
                for(let i=0; i<40; i++) this.particles.push({ x: Math.random(), y: Math.random(), z: Math.random() * 2, vx: (Math.random()-0.5)*0.002, vy: (Math.random()-0.5)*0.002 });
            }
            draw(freq, time, avg) {
                if(this.c.width !== this.c.clientWidth || this.c.height !== this.c.clientHeight) {
                    this.c.width = this.c.clientWidth; this.c.height = this.c.clientHeight;
                }
                const ctx = this.ctx, w = this.c.width, h = this.c.height;
                
                // Effacement partiel (Effet trainée)
                ctx.fillStyle = 'rgba(0,0,0, 0.2)';
                ctx.fillRect(0, 0, w, h);

                // Oscilloscope (Ligne Cyan)
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#00ccff';
                ctx.beginPath();
                const slice = w / time.length; let x = 0;
                for (let i = 0; i < time.length; i++) {
                    const v = time[i] / 128.0;
                    const y = v * h / 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    x += slice;
                }
                ctx.stroke();

                // Spectre (Barres)
                const barWidth = (w / freq.length) * 3.0;
                let bx = 0;
                for (let i = 0; i < freq.length; i+=4) { // On saute pour perf
                    const val = freq[i];
                    const barH = (val / 255) * (h / 2.5);
                    ctx.fillStyle = val > 200 ? '#ff3333' : '#00ccff';
                    ctx.fillRect(bx, h - barH, barWidth, barH);
                    bx += barWidth + 2;
                }
                
                // Particules
                ctx.fillStyle = `rgba(0, 204, 255, ${Math.min(0.6, avg / 50)})`;
                this.particles.forEach(p => {
                    p.x += p.vx * (1 + avg/30); p.y += p.vy * (1 + avg/30);
                    if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0; if (p.y < 0) p.y = 1; if (p.y > 1) p.y = 0;
                    const scale = 300 / (300 + p.z * 100);
                    const px = (p.x - 0.5) * w * scale;
                    const py = (p.y - 0.5) * h * scale;
                    const size = p.z * 4 * scale;
                    ctx.beginPath();
                    ctx.arc(w/2 + px, h/2 + py, Math.max(1, size), 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        class AIAgent {
            constructor(cfg, log) {
                this.cfg = cfg; this.log = log;
                this.rec = null; this.synth = window.speechSynthesis;
                this.lastSpk = 0; this.lastInt = "";
                this.active = false;
            }
            
            connect() {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!SR) { return false; }
                this.rec = new SR();
                this.rec.continuous = true;
                this.rec.interimResults = true; // CLÉ POUR RÉACTIVITÉ IMMÉDIATE
                this.rec.lang = 'fr-FR';
                this.rec.onresult = (e) => {
                    let fin = "", interim = "";
                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        const txt = e.results[i][0].transcript;
                        if (e.results[i].isFinal) fin += txt;
                        else interim += txt;
                    }
                    const txtDisplay = fin || interim;
                    if(txtDisplay) {
                        document.getElementById('display-text').innerText = txtDisplay;
                        document.getElementById('sub-text').innerText = "ANALYSE EN COURS...";
                    }
                    if (fin) {
                        this.speak(fin, true);
                        this.lastInt = "";
                    } 
                    else if (interim && interim.length > 2 && interim !== this.lastInt) {
                        // LOGIQUE SANS FILTRE : Répète tout immédiatement pour l'utilisateur
                        this.speak(interim, true);
                        this.lastInt = interim;
                    }
                };
                this.rec.onend = () => {
                    if (this.active) {
                        // Retry automatique en cas de plantage
                        setTimeout(() => { try { this.rec.start(); } catch(e) {} }, 500); 
                    }
                };
                try { this.rec.start(); this.active = true; return true; } catch(e) { this.log("Erreur IA: " + e.message, "err"); return false; }
            }
            
            speak(txt, human) {
                if (!txt) return;
                this.synth.cancel();
                this.lastSpk = Date.now();
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = 'fr-FR';
                u.volume = this.cfg.volume;
                u.rate = this.cfg.rate;
                u.pitch = human ? (0.9 + Math.random()*0.2) : 0.8;
                u.onstart = () => { document.getElementById('sub-text').innerText = "RÉPÉTITION CONFIRMÉE"; };
                this.synth.speak(u);
                this.log(`Tx: "${txt}" , "ai");
            }
            disconnect() { if (this.rec) this.rec.stop(); this.synth.cancel(); this.active = false; }
        }

        /* --- LOGIQUE PRINCIPALE --- */
        const logger = new Logger('terminal');

        /* --- SYSTÈME OMEGA --- */
        const OMEGA = {
            running: false,
            audio: null,
            visual: null,
            ai: null,
            mods: { mic: true, echo: true, trans: true, rec: false },
            cfg: { volume: 1.0, rate: 1.4, pitch: 0.9, thresh: 0 },
            sensors: { lastAlpha: 0 },
            
            async boot() {
                this.updateUI(true);
                try {
                    this.audio = new AudioCore();
                    await this.audio.init();
                    this.logger.log("Audio: ONLINE (Auto-Gain High)", "sys");
                    
                    this.visual = new Visualizer('scope-canvas');
                    this.logger.log("Visual: ONLINE", "sys");
                    
                    this.ai = new AIAgent(this.cfg, this.logger);
                    this.ai.connect();
                    this.logger.log("IA Agent: ONLINE (Hyper-Repeat)", "sys");
                    
                    this.initSensors();
                    
                    this.running = true;
                    this.loop();
                    
                    this.logger.log("SYSTÈME FONCTIONNEL", "ai");
                } catch (e) {
                    this.logger.log("ERREUR: " + e.message, "err");
                    alert("ERREUR: " + e.message);
                    this.updateUI(false);
                }
            },

            terminate() {
                this.running = false;
                if(this.audio) this.audio.stop();
                if(this.ai) this.ai.disconnect();
                location.reload();
            },

            loop() {
                if (!this.running) return;
                requestAnimationFrame(() => this.loop());
                
                // Traitement Audio
                const metrics = this.audio.process();
                
                // Mise à jour Scope
                this.visual.draw(this.audio.dataFreq, this.audio.dataTime, metrics.avgEnergy);
                
                // UI Meters
                const pct = Math.min(100, (metrics.avgEnergy / 40) * 100);
                const bar = document.getElementById('vu-fill');
                if(bar) {
                    bar.style.width = pct + "%";
                    if(pct > 80) bar.style.background = "#f85149"; else bar.style.background = "linear-gradient(90deg, #58a6ff, #fff)";
                }
                document.getElementById('val-peak').innerText = metrics. 0;

                // Traduction Bruit (Très sensible)
                if (this.mods.trans) {
                    const now = 0;
                    if (metrics.avgEnergy > 5 && (now - this.ai.lastSpk > 1000)) {
                        if (Math.random() > 0.85) {
                            const w = CONST.WORDS[Math.floor(Math.random() * CONST.WORDS.length)];
                            this.ai.speak(w, false);
                            this.logger.log(`Traduit: "${w}"`, "warn");
                        }
                    }
                }
            },

            initSensors() {
                // Mouv
                if(window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', (e) => {
                        const a = e.accelerationIncludingGravity;
                        if(a) {
                            document.getElementById('val-acc-x').innerText = (a.x || 0).toFixed(1);
                            document.getElementById('val-acc-y').innerText = (a.y || 0).toFixed(1);
                            document.getElementById('val-acc-z').innerText = (a.z || 0).toFixed(1);
                            
                            if(Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z) > 25) this.triggerSensor("CHOC");
                        }
                    });
                }
                // Orientation
                if(window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientation', (e) {
                        if (e.alpha) {
                            document.getElementById('val-mag-a').innerText = Math.floor(e.alpha);
                            if (Math.abs(e.alpha - this.sensors.lastAlpha) > 10) this.triggerSensor("FLUX");
                            this.sensors.lastAlpha = e.alpha;
                        }
                    });
                }
            },

            triggerSensor(msg) {
                this.logger.log(`DETECTION: ${msg}`, "warn");
                if (this.mods.trans) this.ai.speak(msg, false);
                const f = document.getElementById('display-text');
                f.style.color = "#f85149";
                setTimeout(() => { f.style.color = "#fff"; }, 100);
            },

            toggleMod(mod) {
                this.mods[mod] = !this.mods[mod];
                const map = { 'microphone': 'btn-mic', 'ttsEngine': 'btn-echo', 'ghostMode': 'btn-trans' };
                const btn = document.getElementById(map[mod]);
                if(this.mods[mod]) btn.classList.add('active');
                else btn.classList.remove('active');
                
                const modeText = this.mods.echo ? "ACTIVE" : "OFF";
                document.getElementById('sub-text').innerText = "MODE: " + modeText;
            },

            updateUI(active) {
                const startBtn = document.getElementById('btn-start');
                const stopBtn = document.getElementById('btn-stop');
                const mods = document.getElementById('mods');
                const settings = document.getElementById('settings');
                
                if (active) {
                    startBtn.style.display = 'none';
                    stopBtn.style.display = 'block';
                    document.getElementById('sys-status').innerText = "ONLINE";
                    document.getElementById('sys-status').classList.add('on');
                    mods.style.opacity = '1';
                    settings.style.opacity = '1';
                    settings.style.pointerEvents = 'auto';
                } else {
                    startBtn.style.display = 'block';
                    stopBtn.style.display = 'none';
                    document.getElementById('sys-status').innerText = "OFFLINE";
                    document.getElementById('sys-status').classList.remove('on');
                    mods.style.opacity = '0.5';
                    settings.style.pointerEvents = 'none';
                }
            },

            updateConfig(key, val) {
                this.ai.cfg[key] = parseFloat(val);
                if (key === 'volume') this.ai.volume = parseFloat(val);
                if (key === 'pitch') this.ai.pitch = parseFloat(val);
                if (key === 'rate') this.ai.rate = parseFloat(val);
                
                // Mise à jour curseur
                const map = {
                    'volume': 'out-vol',
                    'pitch': 'out-pitch',
                    'rate': 'rate'
                };
                if (map[key]) document.getElementById(map[key]).innerText = val;
            }
        };

        /* --- CONSTANTES --- */
        const CONST = {
            WORDS: [
                "Ondulation", "Anomalie", "Interférence", "Signal", "Spectre", "Résonance", "Fréquence", "Amplitude", "Modulation", "Bruit blanc", "Harmonique", 
                "Déphasage", "Écho", "Réverbération", "Distorsion", "Impulsion", "Transitoire", "Stationnaire", 
                "Aleatoire", "Chaos", "Entropie", "Flux", "Potentiel", "Champ", "Vecteur", "Tenseur", "Onde P", 
                "Onde S", "Longitudinale", "Transversale", "Polarisation", "Processeur", "Matrice", "Binaire", 
                "Hexadécimal", "Protocole", "Décalage", "Code", "Système"
            ],
            FFT_SIZE: 1024 // Réduit pour optimiser la charge CPU du Realme
        };

        /* --- INITIALISATION ---
        const LOG = new Logger('terminal'); // Utilisation de la classe Logger externe
        LOG.log("> SYSTÈME OMEGA // VERSION OPTIMISÉE");
        LOG.log("> Prêt pour l'analyse.");
        LOG.log("> Veuillez cliquer sur DÉMARRER pour lancer.");
        
        // --- GESTION DOM ---
        window.addEventListener('load', () => {
            // Configuration des boutons
            document.getElementById('btn-start').onclick = () => OMEGA.init();
            document.getElementById('btn-stop').onclick = () => OMEGA.halt();
            
            document.getElementById('btn-mic').onclick = () => OMEGA.toggleMod('microphone');
            document.getElementById('btn-echo').onclick = OMEGA.toggleMod('ttsEngine'); // Le module Echo est "ttsEngine" dans le code
            document.getElementById('btn-trans').onclick = OMEGA.toggleMod('ghostMode'); // Le module Traduction est "ghostMode"
            document.getElementById('btn-rec').onclick = OMEGA.toggleMod('recorder');
            
            document.getElementById('slider-vol').oninput = (e) => OMEGA.cfg.volume = parseFloat(e.target.value);
            document.getElementById('disp-vol').innerText = OMEGA.cfg.volume;
        });

        /* --- CLASSES SYSTEME (AUDIO / IA / VISUEL) --- */
        class AudioEngine {
            constructor() {
                this.ctx = null; this.src = null; this.analyser = null;
                this.dataFreq = null; this.dataTime = null;
            }
            async init() {
                const AC = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AC();
                if (this.ctx.state === 'suspended') await this.ctx.resume();
                
                // Configuration Aggressive pour capter la voix
                const s = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: true // <--- IMPORTANT POUR LA DÉTECTION
                    },
                    video: false
                });
                this.src = this.ctx.createMediaStreamSource(s);
                this.analyser = this.ctx.createAnalyser();
                this.analyser.fftSize = 1024; // Optimisé pour performance Realme
                this.analyser.smoothingTimeConstant = 0.85;
                this.src.connect(this.analyser);

                const len = this.analyser.frequencyBinCount;
                this.dataFreq = new Uint8Array(len);
                this.dataTime = new Uint8Array(len);
                LOG.log("Audio Initialisé (Auto-Gain High)", "sys");
                return true;
            }
            process() {
                if(!this.analyser) return { avg: 0, peakFreq: 0, peakAmp: 0 };
                this.analyser.getByteFrequencyData(this.dataFreq);
                this.analyser.getByteTimeDomainData(this.dataTime);
                let sum = 0, maxAmp = 0, maxIndex = 0;
                for(let i=0; i<this.dataFreq.length; i++) {
                    const v = this.dataFreq[i]; sum += v;
                    if(v > maxAmp) { maxAmp = v; maxIndex = i; }
                }
                const nyquist = this.ctx.sampleRate / 2;
                const peakFreq = maxIndex * (nyquist / this.dataFreq.length);
                return { avg: sum / this.dataFreq.length, peakFreq: Math.round(peakFreq), peakAmp: maxAmp };
            }
            stop() { if (this.ctx) this.ctx.close(); }
        }

        class Visualizer {
            constructor(id) {
                this.c = document.getElementById(id);
                this.ctx = this.c.getContext('2d');
                this.particles = [];
                for(let i=0; i<40; i++) this.particles.push({
                    x: Math.random(), y: Math.random(), z: Math.random() * 2,
                    vx: (Math.random()-0.5)*0.002, vy: (Math.random()-0.5)*0.002
                });
            }
            draw(freq, time, avg) {
                // Responsive
                if(this.c.width !== this.c.clientWidth || this.c.height !== this.c.clientHeight) {
                    this.c.width = this.c.clientWidth;
                    this.c.height = this.c.height;
                }
                const ctx = this.ctx, w = this.c.width, h = this.c.height;
                // Fade effect
                ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // 0.2 opacité pour la trainée
                ctx.fillRect(0,0,w,h,h);

                // Oscilloscope
                ctx.lineWidth = 2; ctx.strokeStyle = '#00ccff'; ctx.beginPath();
                const slice = w / time.length; let x = 0;
                for(let i=0; i<time.length; i++) {
                    const v = time[i]/128.0;
                    const y = v*h/2;
                    if(i===0) ctx.moveTo(x,y);
                    else ctx.lineTo(x,y);
                    x+=slice;
                }
                ctx.stroke();

                // Spectre
                const bw = (w/freq.length)*3; let bx = 0;
                for(let i=0; i<freq.length; i+=2) {
                    const val = freq[i];
                    const bh = (val/255)*(h/2);
                    const col = val>200?'#ff3333':(val>100? '#00ccff': '#003344');
                    ctx.fillRect(bx, h-bh, bw, bh);
                    bx += bw + 1;
                }
                
                // Particules
                ctx.fillStyle = `rgba(0, 204, 255, ${Math.min(0.6, avg/40)})`;
                this.particles.forEach(p => {
                    p.x += p.vx * (1 + avg/50);
                    p.y += p.vy * (1 + avg/50);
                    if(p.x<0) p.x=1; if(p.x>1) p.x=0; if(p.y<0) p.y=1; if(p.y>1) p.y=0;
                    const sc = 200/(200 + p.z*50);
                    const px = (p.x-0.5)*w*sc;
                    const py = (p.y-0.5)*h*sc;
                    const sz = p.z*3*sc;
                    ctx.beginPath(); ctx.arc(w/2+px, h/2+py, Math.max(1, sz), 0, Math.PI*2);
                    ctx.fill();
                    // Lignes de connexion
                    if(Math.random()>0.95) {
                        ctx.beginPath(); ctx.moveTo(w/2, h/2); ctx.lineTo(w/2+px, h/2+py); 
                        ctx.strokeStyle = `rgba(88, 166,255, ${0.15)`;
                        ctx.stroke();
                    }
                });
            }
        }

        class AIAgent {
            constructor(cfg, log) {
                this.cfg = cfg; this.log = log;
                this.rec = null; this.synth = window.speechSynthesis;
                this.lastSpeakTime = 0; this.lastInt = ""; this.active = false;
            }
            connect() {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!SR) return false;
                this.rec = new SR();
                this.rec.continuous = true;
                this.rec.interimResults = true; // TRÈS IMPORTANT
                this.rec.lang = 'fr-FR';

                this.rec.onresult = (e) => {
                    let f="", i="";
                    for(let j=e.resultIndex; j<e.results.length; ++j) {
                        const t = e.results[j][0].transcript;
                        if(e.results[j].isFinal) f+=t;
                        else i+=t;
                    }
                    const txt = f||i;
                    if(txt) {
                        document.getElementById('display-text').innerText = txt;
                        document.getElementById('sub-text').innerText = "ACQUISITION...";
                        // LOGIQUE HYPER-RÉACTIF (NO FILTER)
                        if(f) { this.speak(f, true); this.lastInt=""; }
                        // LOGIQUE PAROLE (SANS FILTRE DE FILTRE POUR ÉVITER LE BÉGAYEMENT)
                        else if(i.length > 2 && i !== this.lastInt) {
                            this.speak(i, true);
                            this.lastInt = i;
                        }
                    }
                };
                this.rec.onend = () => { if(this.active) { try { this.rec.start(); } catch(e) {} }; };
                try { this.rec.start(); this.active = true; return true; } 
                catch(e) { LOG.log("Erreur IA: " + e.message, "err"); return false; }
            }
            speak(txt, human) {
                if(!txt) return;
                this.synth.cancel();
                this.lastSpk = Date.now();
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = 'fr-FR';
                u.volume = this.cfg.volume;
                u.rate = this.cfg.rate;
                u.pitch = (human ? 0.9 : 0.8);
                u.onstart = () => { document.getElementById('sub-text').innerText = "REÇOPIE PAROLE"; document.getElementById('sub-text').style.color = "var(--c-accent)";
            };
            disconnect() { if(this.rec) this.rec.stop(); this.synth.cancel(); this.active = false; }
        }

        /* --- CONSTANTES GLOBALES --- */
        const CONST = {
            WORDS: [
                "Ondulation", "Anomalie", "Interférence", "Signal", "Spectre", "Résonance", "Fréquence", 
                "Amplitude", "Modulation", "Bruit blanc", "Harmonique", "Déphasage", 
                "Écho", "Réverbération", "Distorsion", "Impulsion", "Transitoire", "Stationnaire", 
                "Aleatoire", "Chaos", "Entropie", "Flux", "Potentiel", "Champ", "Vecteur", 
                "Tenseur", "Onde P", "Onde S", "Longitudinale", "Transversale", "Polarisation",
                "Processeur", "Matrice", "Binaire", "Hexadécimal", "Protocole", "Décalage"
            ],
            FFT_SIZE: 1024 // Optimisé pour la fluidité
        };

        /* --- LOGGER --- */
        class Logger {
            constructor(id) { this.el = document.getElementById(id); }
            log(msg, type='sys') {
                if(!this.el) return;
                const d = document.createElement('div');
                d.className = `log-entry log-${type}`;
                const t = new Date().toLocaleTimeString('fr-FR', {hour12:false});
                d.innerHTML = `<span style="color:#888">[${t}]</span> ${msg}`;
                this.el.appendChild(d);
                this.el.scrollTop = this.el.scrollHeight;
            }
        }
        const LOG = new Logger('terminal');

        /* --- SYSTÈME OMEGA --- */
        const OMEGA = {
            running: false,
            audio: null,
            visual: null,
            ai: null,
            config: { volume: 1.0, rate: 1.4, pitch: 0.9, thresh: 0 },
            mods: { mic: true, echo: true, ghost: true },
            sensors: { lastAlpha: 0 },
            
            async boot() {
                this.updateUI(true);
                try {
                    // Audio
                    this.audio = new AudioEngine();
                    await this.audio.init();
                    LOG.log("Audio: ONLINE (Auto-Gain High)", "sys");
                    
                    // Visuals
                    this.visual = new Visualizer('main-canvas');
                    this.visual.draw(this.audio.dataFreq, this.audio.dataTime, 0); // Init avec données vides
                    LOG.log("Visual: ONLINE", "sys");
                    
                    // IA
                    this.ai = new AIAgent(this.config, LOG);
                    const aiOk = this.ai.connect();
                    if(!aiOk) {
                        LOG.log("IA Indisponible", "warn");
                        // On continue quand même pour le visuel seul
                        this.running = true;
                        this.loop();
                        LOG.log("Mode Audio Seul (Visuel Uniquement)", "sys");
                    } else {
                        this.running = true;
                        this.loop();
                        LOG.log("Système Complet: Microphone + IA Active", "ai");
                    }
                    
                    // Sensors
                    this.initSensors();
                    
                } catch(e) {
                    LOG.log("ERREUR CRITIQUE: " + e.message, "err");
                    alert("ERREURR: " + e.message);
                    this.updateUI(false);
                }
            },
            
            halt() {
                this.running = false;
                if(this.audio) this.audio.stop();
                if(this.ai) this.ai.disconnect();
                location.reload();
            },

            loop() {
                if(!this.running) return;
                requestAnimationFrame(() => this.loop());
                
                // Analyse Audio
                const metrics = this.audio.process();
                
                // Mà à jour scope
                this.visual.draw(this.audio.dataFreq, this.audio.dataTime, metrics.avgEnergy);

                // UI Mètres
                const pct = Math.min(100, (metrics.avgEnergy / 40) * 100);
                const bar = document.getElementById('vu-meter');
                if(bar) {
                    bar.style.width = pct + "%";
                    bar.style.background = pct > 90 ? "#f85149" : "linear-gradient(90deg, #58a6ff, #fff)";
                }
                
                // Traduction (Si actif)
                if(this.mods.ghost) {
                    const now = Date.now();
                    // Si énergie > 0 et silence IA > 500ms
                    if (metrics.avgEnergy > (this.config.thresh + 5) && (now - this.ai.lastSpeakTime > 500)) {
                        if(Math.random() > 0.8) {
                            const word = CONST.WORDS[Math.floor(Math.random() * CONST.WORDS.length)];
                            this.ai.speak(word, false);
                            LOG.log(`TRADUCTION: ${word}`, "warn");
                        }
                    }
                }

                // Rendu visuel (Optimisation Réactivité)
                if (this.visual) {
                    requestAnimationFrame(() => this.visual.draw(this.audio.dataFreq, this.audio.dataTime, metrics.avgEnergy));
                }

                // Flash Alerte
                if (metrics.peakAmp > 200 && Math.random() > 0.95) {
                    const f = document.getElementById('display-text');
                    f.style.color = "#f85149";
                    setTimeout(() => f.style.color = "#fff", 100);
                }
            },

            // Capteurs
            initSensors() {
                if(window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', (e) => {
                        const a = e.accelerationIncludingGravity;
                        if(a) {
                            document.getElementById('val-acc-x').innerText = (a.x||0).toFixed(2);
                            document.getElementById('val-acc-y').innerText = (a.y||0).toFixed(2);
                            document.getElementById('val-acc-z').innerText = (a.z||0).toFixed(2);
                            if(Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z) > 25) this.triggerSensor("CHOC ACCÉLÉRATION");
                        }
                    });
                }
                if(window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientation', (e) => {
                        if(e.alpha) {
                            document.getElementById('val-mag-a').innerText = Math.floor(e.alpha);
                            if(Math.abs(e.alpha - OMEGA.sensors.lastAlpha) > 10) {
                                this.triggerSensor("FLUX MAGNÉTIQUE");
                            document.getElementById('val-mag-a').classList.add('blink'); document.getElementById('val-mag-a').style.color = "red";
                            setTimeout(() => { 
                                document.getElementById('val-mag-a').classList.remove('blink'); 
                                document.getElementById('val-mag-a').style.color = "var(--c-panel)";
                            }, 1000);
                            OMEGA.sensors.lastAlpha = e.alpha;
                        } else {
                            document.getElementById('val-mag-a').classList.remove('blink');
                            document.getElementById('val-mag-a').style.color = "var(--c-panel)";
                        }
                    });
                }
            },

            triggerSensor(msg) {
                LOG.log(`CAPTEUR: ${msg}`, "warn");
                const f = document.getElementById('display-text');
                f.style.color = "#f85149";
                setTimeout(() => { f.style.color = "#fff"; }, 100);
                if (OMEGA.mods.ghost) {
                    OMEGA.ai.speak(msg, false);
                }
            },

            toggleMod(mod) {
                OMEGA.mods[mod] = !OMEGA.mods[mod];
                const idMap = { 'microphone': 'btn-mic', 'ttsEngine': 'btn-echo', 'ghostMode': 'btn-trans' };
                const btn = document.getElementById(idMap[mod]);
                if (OMEGA.mods[mod]) btn.classList.add('active');
                else btn.classList.remove('active');
                
                OMEGA.updateUI();
            },

            updateUI() {
                const btnStart = document.getElementById('btn-start');
                const btnStop = document.getElementById('btn-stop');
                const mods = document.getElementById('mods');
                const sets = document.getElementById('settings');
                
                btnStart.style.display = OMEGA.running ? 'none' : 'block';
                btnStop.style.display = OMEGA.running ? 'block' : 'none';
                
                document.getElementById('sys-status').classList.add('active');
                document.getElementById('sys-status').innerText = "ONLINE";
                
                mods.style.opacity = OMEGA.running ? '1' : '0.5';
                sets.style.opacity = OMEGA.running ? '1' : '0.5';
                sets.style.pointerEvents = OMEGA.running ? 'auto' : 'none';
            },

            updateConfig(key, val) {
                const numVal = parseFloat(val);
                OMEGA.config[key] = numVal;
                
                // Mise à jour curseurs
                const map = {
                    'volume': 'slider-vol', 'pitch': 'slider-pitch', 'rate': 'slider-rate'
                };
                if(map[key]) document.getElementById(map[key]).value = numVal;
                if(key === 'volume') OMEGA.config.volume = numVal;
            },

            // Alias pour les boutons
            toggleMic() { this.toggleMod('microphone'); },
            toggleEcho() { this.toggleMod('ttsEngine') },
            toggleGhost() { this.toggleMod('ghostMode') },
            toggleRec() { this.toggleMod('recorder') }
        };

        // Initialisation
        window.onload = () => {
            LOG.log("SYSTEM CHARGÉ...");
            OMEGA.config = { volume: 1.0, rate: 1.4, pitch: 0.9, thresh: 0 };
            OMEGA.updateUI();
        };

        // Démarrage bouton
        document.getElementById('btn-start').onclick = OMEGA.boot();
        document.getElementById('btn-stop').onclick = OMEGA.halt();

    </script>
</body>
</html>
