<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETERNITY MODE v7</title>
    <meta name="theme-color" #000000">
    <style>
        :root {
            --primary: #00ffcc;       /* Cyan Éternel */
            --secondary: #d4af37;     /* Or Antique */
            --danger: #ff0055;        /* Rouge Néant */
            --bg: #030508;            /* Noir Profond */
            --glass: rgba(0, 20, 30, 0.6);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', monospace; /* Police classique et éternelle */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Couches d'Effets Cosmiques */
        #cosmic-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0ibm9uZSIvPjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=');
            opacity: 0.3; pointer-events: none; z-index: 2;
        }

        #vignette-eternal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 120%);
            pointer-events: none; z-index: 3;
        }

        /* Caméra */
        #camera-feed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; opacity: 0.3; 
            filter: contrast(1.5) brightness(0.6) grayscale(100%) sepia(30%) hue-rotate(170deg);
        }

        #ui {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            pointer-events: none;
        }

        /* En-tête */
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9), transparent);
            padding: 10px;
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid var(--secondary);
            text-shadow: 0 0 10px var(--secondary);
        }
        .eternal-title { font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; margin: 0; color: var(--secondary); }
        .sub-eternal { font-size: 0.6rem; color: var(--primary); letter-spacing: 2px; }

        /* Panneaux de données */
        .data-panel {
            pointer-events: auto;
            background: var(--glass);
            margin: 5px 10px;
            border: 1px solid var(--primary);
            padding: 10px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            position: relative;
            overflow: hidden;
        }
        /* Effet de lueur qui traverse le panneau */
        .data-panel::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }

        .row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.8rem; align-items: center; }
        
        /* Barre de Probabilité "Cœur Battant" */
        .prob-container {
            width: 100%; height: 18px; background: #111; border: 1px solid #333; margin-top: 8px;
            position: relative; overflow: hidden;
        }
        .prob-fill {
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, var(--secondary), var(--danger));
            transition: width 0.5s ease-out; 
            box-shadow: 0 0 15px var(--secondary);
        }
        .prob-fill.pulsating { animation: eternal-pulse 1s infinite alternate; }
        @keyframes eternal-pulse { from { opacity: 0.6; box-shadow: 0 0 5px var(--danger); } to { opacity: 1; box-shadow: 0 0 20px var(--danger); } }

        /* Spectre Symétrique */
        #spectrum-canvas {
            width: 100%; height: 140px; background: #000;
            border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary);
            position: relative;
        }
        #canvas-error {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--danger); font-weight: bold; text-align: center; display: none;
            background: rgba(0,0,0,0.8); padding: 5px; border: 1px solid var(--danger);
        }

        /* Zone Décodeur */
        #ai-zone {
            flex: 1; margin: 10px;
            border: 1px solid var(--secondary); background: rgba(0,0,0,0.85);
            padding: 10px; padding-bottom: 110px;
            overflow-y: auto; font-size: 0.9rem;
            pointer-events: auto;
            text-shadow: 0 0 3px var(--primary); position: relative;
        }
        
        .msg-final { color: var(--secondary); border-bottom: 1px dashed #444; margin: 6px 0; padding: 4px; background: rgba(212, 175, 55, 0.1); }
        .msg-interim { color: var(--primary); font-style: italic; opacity: 0.8; }
        .msg-system { color: #555; font-size: 0.7rem; border-left: 2px solid #333; padding-left: 5px; margin-bottom: 4px; }

        /* Contrôles */
        .controls {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 10px 10px 35px 10px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            background: linear-gradient(0deg, rgba(0,0,0,1), rgba(0,0,0,0.8));
            pointer-events: auto; z-index: 100;
        }
        button {
            background: rgba(0, 20, 20, 0.8); border: 1px solid var(--secondary); color: var(--secondary);
            padding: 16px 2px; font-family: inherit; font-weight: bold; cursor: pointer;
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        button::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        button:active::before { left: 100%; transition: 0s; }
        
        button:active { transform: scale(0.96); }
        button.active { background: var(--secondary); color: #000; box-shadow: 0 0 20px var(--secondary); border-color: #fff; }
        button.btn-sweep { border-color: var(--danger); color: var(--danger); }
        button.btn-sweep.active { background: var(--danger); color: #fff; box-shadow: 0 0 20px var(--danger); }

        input[type=range] { width: 100%; accent-color: var(--secondary); height: 4px; }

        #alert-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid var(--secondary); color: var(--secondary);
            padding: 25px; text-align: center; display: none; z-index: 200; max-width: 85%;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
        }
        @keyframes blink { 50% { opacity: 0; } }
        .live-dot { color: var(--danger); animation: blink 1.5s infinite; margin-right: 5px; font-weight: bold; }

    </style>
</head>
<body>

    <div id="cosmic-noise"></div>
    <div id="vignette-eternal"></div>
    <video id="camera-feed" autoplay playsinline muted></video>

    <div id="alert-box">
        <h3 style="margin-top:0; color:var(--secondary)">SYSTÈME ÉTERNEL</h3>
        <p id="alert-msg">...</p>
        <button onclick="this.parentElement.style.display='none'" style="margin-top:15px; width:100px;">ACK</button>
    </div>

    <div id="ui">
        <header>
            <div>
                <h1 class="eternal-title">ETERNITY v7</h1>
                <div class="sub-eternal">CONSCIENCE PARANORMALE INFINIE</div>
            </div>
            <div style="text-align: right;">
                <div id="clock" style="font-size:1.2rem; color:var(--secondary)">00:00</div>
                <div style="font-size:0.6rem; color:var(--primary)">∞ ONLINE ∞</div>
            </div>
        </header>

        <div class="data-panel">
            <div class="row">
                <span style="color:var(--secondary)">PROBABILITÉ PRESENCE</span>
                <span id="prob-val" style="font-weight:bold; color:var(--secondary)">0.0%</span>
            </div>
            <div class="prob-container">
                <div id="prob-fill" class="prob-fill"></div>
            </div>
            <div class="row" style="margin-top:10px; font-size:0.7rem; color:#666; font-family: monospace;">
                <span>[AUDIO: <span id="vol-disp">--</span>]</span>
                <span>[EMF: <span id="emf-disp">--</span>]</span>
                <span>[MOT: <span id="mot-disp">--</span>]</span>
            </div>
        </div>

        <div id="spectrum-canvas">
            <canvas id="viz-canvas" style="width:100%; height:100%;"></canvas>
            <div id="canvas-error">AUDIO DÉCONNECTÉ</div>
        </div>

        <div id="ai-zone">
            <div style="position:sticky; top:0; background:#000; padding-bottom:5px; border-bottom:1px solid var(--secondary); margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                <span style="color:var(--primary)">> DÉCODEUR NEURAL</span>
                <span id="ai-status" style="color:var(--danger); font-size:0.7rem; font-weight:bold;">OFFLINE</span>
            </div>
            <div id="log-container"></div>
        </div>

        <div class="controls">
            <button id="btn-audio" onclick="toggleAudio()">SCOPE</button>
            <button id="btn-ai" onclick="toggleAI()" style="border-color:var(--primary)">IA VOCALE</button>
            <button id="btn-sweep" class="btn-sweep" onclick="toggleSweep()">SWEEP</button>
            <button id="btn-sens" onclick="toggleSensors()">SENSORS</button>
        </div>
    </div>

    <script>
        let audioCtx, micSource, analyser, gainNode;
        let sweepNodes = [];
        let recognition;
        let isAudio = false, isAI = false, isSweep = false, isSensors = false;
        
        let emfVal = 0, motionVal = 0, audioLevel = 0;
        let lastAlpha = null, instability = 0, emfBase = 0;

        // --- 1. AUDIO (Symétrie & Robustesse) ---
        async function toggleAudio() {
            const btn = document.getElementById('btn-audio');
            
            if (isAudio) {
                if(audioCtx) audioCtx.close();
                isAudio = false; btn.classList.remove('active');
                document.getElementById('canvas-error').style.display = 'block';
            } else {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                    });
                    
                    micSource = audioCtx.createMediaStreamSource(stream);
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 256; 
                    analyser.smoothingTimeConstant = 0.85;
                    
                    gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.0; 
                    
                    micSource.connect(analyser);
                    analyser.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    isAudio = true; btn.classList.add('active');
                    document.getElementById('canvas-error').style.display = 'none';
                    drawSymmetricSpectrum();
                    log("Spectre Audio Connecté.", "system");
                } catch (e) {
                    console.error(e);
                    isAudio = false; btn.classList.remove('active');
                    document.getElementById('canvas-error').style.display = 'block';
                    showAlert("ERREUR AUDIO: " + e.message);
                }
            }
        }

        // Dessin Symétrique (Effet Miroir Éternel)
        function drawSymmetricSpectrum() {
            if(!isAudio) return;
            requestAnimationFrame(drawSymmetricSpectrum);

            const cvs = document.getElementById('viz-canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.clientWidth;
            cvs.height = cvs.clientHeight;
            const w = cvs.width, h = cvs.height;
            const cx = w / 2;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            ctx.clearRect(0, 0, w, h);

            const barWidth = (cx / bufferLength) * 2.5;
            let totalVol = 0;

            for(let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * (h/2);
                totalVol += dataArray[i];

                // Couleur Or vers Cyan
                const hue = 40 + (i/bufferLength) * 160; 
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;

                // Côté Gauche
                ctx.fillRect(cx - (i * barWidth), (h/2) - barHeight, barWidth - 1, barHeight * 2);
                // Côté Droit (Miroir)
                ctx.fillRect(cx + (i * barWidth), (h/2) - barHeight, barWidth - 1, barHeight * 2);
            }

            audioLevel = totalVol / bufferLength;
            document.getElementById('vol-disp').innerText = Math.round(audioLevel);
            updateProbability();
        }

        // --- 2. SWEEP (Générateur) ---
        function toggleSweep() {
            const btn = document.getElementById('btn-sweep');
            if (isSweep) {
                stopSweep(); isSweep = false; btn.classList.remove('active');
            } else {
                if(!audioCtx) toggleAudio();
                if(!isAudio) return;
                startSweep(); isSweep = true; btn.classList.add('active');
                log("Générateur Éthérique Activé.", "system");
            }
        }

        function startSweep() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass'; filter.Q.value = 20; // Plus étroit

            const lfo = audioCtx.createOscillator();
            lfo.frequency.value = 0.1; // Plus lent, plus mystérieux
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 3000; 

            lfo.connect(lfoGain); lfoGain.connect(filter.frequency);
            filter.frequency.value = 1000;

            const vol = audioCtx.createGain();
            vol.gain.value = 0.7; 

            noise.connect(filter); filter.connect(vol); vol.connect(audioCtx.destination);
            noise.start(); lfo.start();
            sweepNodes = [noise, lfo];
        }
        function stopSweep() { sweepNodes.forEach(n => { try{n.stop()}catch(e){} }); sweepNodes = []; }

        // --- 3. CAPTEURS ---
        function toggleSensors() {
            const btn = document.getElementById('btn-sens');
            if (isSensors) {
                window.removeEventListener('deviceorientationabsolute', handleOrientation);
                window.removeEventListener('devicemotion', handleMotion);
                isSensors = false; btn.classList.remove('active');
            } else {
                isSensors = true; btn.classList.add('active');
                window.addEventListener('deviceorientationabsolute', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                log("Réseau Neuronal Capteur Connecté.", "system");
            }
        }

        function handleOrientation(e) {
            const alpha = e.alpha;
            if (lastAlpha !== null && alpha !== null) {
                let diff = Math.abs(alpha - lastAlpha);
                if (diff > 180) diff = 360 - diff;
                instability = (instability * 0.9) + (diff * 0.1);
            }
            lastAlpha = alpha;
            emfVal = Math.max(0, (instability - emfBase) * 2);
            document.getElementById('emf-disp').innerText = emfVal.toFixed(1);
        }

        function handleMotion(e) {
            const acc = e.accelerationIncludingGravity;
            if(!acc) return;
            motionVal = Math.abs(acc.x||0) + Math.abs(acc.y||0) + Math.abs(acc.z||0);
            document.getElementById('mot-disp').innerText = (motionVal/10).toFixed(1);
        }

        // --- 4. IA VOCALE (BOUCLE ÉTERNELLE - FIX OFFLINE) ---
        function toggleAI() {
            const btn = document.getElementById('btn-ai');
            const statusEl = document.getElementById('ai-status');

            if (isAI) {
                // Arrêt Manuel
                isAI = false; 
                btn.classList.remove('active');
                statusEl.innerText = "OFFLINE";
                statusEl.style.color = "var(--danger)";
                if(recognition) recognition.stop();
            } else {
                // Démarrage
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    showAlert("IA Non Supportée"); return;
                }
                
                isAI = true; 
                btn.classList.add('active');
                statusEl.innerHTML = '<span class="live-dot">●</span>INITIALISATION...';
                statusEl.style.color = "var(--primary)";

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'fr-FR';

                recognition.onstart = () => {
                    statusEl.innerHTML = '<span class="live-dot">●</span>ÉCOUTE ACTIVE';
                };

                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    let finalTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                            if(finalTranscript.trim().length > 0) {
                                eternalLog(finalTranscript, "msg-final");
                            }
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }
                    if (interimTranscript) {
                        statusEl.innerHTML = `<span class="live-dot">●</span>DÉCODAGE: ${interimTranscript}`;
                    } else {
                        statusEl.innerHTML = '<span class="live-dot">●</span>ÉCOUTE ACTIVE';
                    }
                };

                recognition.onerror = (e) => {
                    console.error("IA Error:", e.error);
                    // Si erreur "not-allowed" ou "no-speech", on ne coupe pas tout, on log juste
                    if(e.error === 'not-allowed') {
                        showAlert("Micro bloqué pour l'IA");
                        toggleAI(); // Forcer l'arrêt propre
                    }
                };

                // LE FIX ÉTERNEL : Redémarrage automatique si l'IA coupe (Silence/Network)
                recognition.onend = () => {
                    if (isAI) {
                        statusEl.innerText = "RECONNECTION...";
                        statusEl.style.color = "var(--secondary)";
                        setTimeout(() => {
                            if (isAI) recognition.start();
                        }, 1000); // Pause de 1s avant de redémarrer pour éviter boucle infinie crash
                    } else {
                        statusEl.innerText = "OFFLINE";
                    }
                };

                recognition.start();
                log("Conscience IA Activée.", "system");
            }
        }

        // Effet de texte "Ancien/Futuriste"
        function eternalLog(text, className) {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = className;
            
            // Glitch subtil
            const chars = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ";
            let iterations = 0;
            
            const interval = setInterval(() => {
                div.innerText = text.split("")
                    .map((letter, index) => {
                        if(index < iterations) return text[index];
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");
                
                if(iterations >= text.length) clearInterval(interval);
                iterations += 0.5; // Vitesse de décodage
            }, 40);

            const time = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `<span style="opacity:0.5; font-size:0.8em">[${time}]</span> ${div.innerHTML}`;
            
            container.prepend(div);
            if(container.children.length > 25) container.lastChild.remove();
        }

        function log(msg, type) {
            const div = document.createElement('div');
            div.className = type || "msg-system";
            const time = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `<span style="opacity:0.5">[${time}]</span> ${msg}`;
            document.getElementById('log-container').prepend(div);
        }

        // Algorithme Probabilité
        function updateProbability() {
            let rawProb = (audioLevel * 0.6) + (emfVal * 3) + (motionVal * 0.2);
            if (rawProb > 100) rawProb = 100;
            if (rawProb < 0) rawProb = 0;

            const displayVal = document.getElementById('prob-val');
            const fill = document.getElementById('prob-fill');
            
            displayVal.innerText = rawProb.toFixed(1) + "%";
            fill.style.width = rawProb + "%";

            if (rawProb > 75) {
                displayVal.style.color = "var(--danger)";
                displayVal.style.textShadow = "0 0 15px var(--danger)";
                fill.classList.add('pulsating'); // Battement de cœur
            } else {
                displayVal.style.color = "var(--secondary)";
                displayVal.style.textShadow = "none";
                fill.classList.remove('pulsating');
            }
        }

        function showAlert(msg) { document.getElementById('alert-msg').innerText = msg; document.getElementById('alert-box').style.display = 'block'; }
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
