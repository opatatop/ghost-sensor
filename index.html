<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY MOBILE LAB</title>
<style>
:root {
  --primary: #00ffd0;
  --bg: #000814;
  --panel: rgba(0, 0, 0, 0.9);
  --button: #001f30;
  --voice: #ffaa00;
  --evp: #aa00ff;
  --error: #ff0000;
  --success: #55ff55;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  touch-action: manipulation;
}

#header {
  padding: 15px;
  text-align: center;
  background: var(--panel);
  border-bottom: 2px solid var(--primary);
}

#controls {
  padding: 15px;
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

#visualization {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #000;
}

#logZone {
  height: 150px;
  overflow-y: auto;
  padding: 10px;
  background: rgba(0, 0, 0, 0.6);
  border-top: 1px solid var(--primary);
  font-size: 0.9em;
}

button {
  background: var(--button);
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 12px;
  margin: 5px 0;
  border-radius: 5px;
  font-weight: bold;
  touch-action: manipulation;
  width: 100%;
  cursor: pointer;
}

button:active {
  background: rgba(0, 31, 48, 0.8);
}

button:disabled {
  background: #333;
  color: #666;
  cursor: not-allowed;
}

#voiceBar {
  height: 12px;
  width: 0%;
  background: var(--voice);
  margin: 5px 0;
  transition: width 0.1s;
}

.status {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 0.9em;
}

.error {
  color: var(--error);
}

.success {
  color: var(--success);
}

.loading {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

#waterfallCanvas {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100px;
}

#radarCanvas {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 150px;
  height: 150px;
}

@media (max-width: 768px) {
  button {
    padding: 10px;
  }
}
</style>
</head>
<body>
<div class="loading" id="loadingScreen">
  <h2>ETERNITY LAB</h2>
  <div class="progress">Chargement des modules...</div>
  <div id="initLog"></div>
</div>

<div id="header">
  <h3>ETERNITY MOBILE LAB</h3>
</div>

<div id="controls">
  <div class="status">
    <span>MIC: <span id="micStatus">OFF</span></span>
    <span>IA: <span id="aiStatus">OFF</span></span>
  </div>

  <div>
    <div>VOICE LEVEL:</div>
    <div id="voiceBar"></div>
  </div>

  <button id="startBtn">START</button>
  <button id="fftBtn" disabled>FFT 1024</button>
  <button id="recBtn" disabled>AUTO REC</button>
  <button id="evpBtn" disabled>EVP MODE</button>
  <button id="radarBtn" disabled>RADAR</button>
  <button id="wavBtn" disabled>WAV REC</button>
</div>

<div id="visualization"></div>
<div id="logZone"></div>

<!-- Chargement des bibliothèques -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// Configuration initiale
const config = {
  fftSize: 1024,
  autoRec: false,
  evpMode: false,
  radar: false,
  spectro3D: false,
  aiEnabled: false,
  evpThreshold: 0.5
};

// État de l'application
const state = {
  audioContext: null,
  analyser: null,
  dataArray: null,
  stream: null,
  recorder: null,
  isRecording: false,
  cubes: [],
  scene: null,
  camera: null,
  renderer: null,
  model: null,
  initialized: false,
  librariesLoaded: {
    three: false,
    tfjs: false
  }
};

// Éléments DOM
const elements = {
  micStatus: document.getElementById('micStatus'),
  aiStatus: document.getElementById('aiStatus'),
  voiceBar: document.getElementById('voiceBar'),
  logZone: document.getElementById('logZone'),
  initLog: document.getElementById('initLog'),
  startBtn: document.getElementById('startBtn'),
  fftBtn: document.getElementById('fftBtn'),
  recBtn: document.getElementById('recBtn'),
  evpBtn: document.getElementById('evpBtn'),
  radarBtn: document.getElementById('radarBtn'),
  wavBtn: document.getElementById('wavBtn'),
  loadingScreen: document.getElementById('loadingScreen'),
  visualization: document.getElementById('visualization') // Ajouté manquant
};

// Journalisation
function log(msg, type = 'info') {
  const div = document.createElement("div");
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  if (type === 'error') div.style.color = "var(--error)";
  if (type === 'success') div.style.color = "var(--success)";
  elements.logZone.appendChild(div);
  elements.logZone.scrollTop = elements.logZone.scrollHeight;
  console.log(msg);
}

// Initialisation complète (Déclenchée par le clic START)
async function initApplication() {
  try {
    log("Demande d'accès microphone...");
    elements.initLog.textContent = "Initialisation Audio...";

    // Vérifier les API nécessaires
    if (!checkAudioSupport()) {
      throw new Error("API audio non supportées");
    }

    // Initialiser l'audio
    await initAudio();

    elements.initLog.textContent = "Initialisation Visualisation...";
    // Initialiser la visualisation
    initVisualization();

    // Charger le modèle IA si disponible
    if (state.librariesLoaded.tfjs) {
      elements.initLog.textContent = "Chargement IA...";
      await loadModel();
    } else {
      log("TensorFlow.js non disponible - mode IA désactivé", "error");
    }

    // Configurer les boutons
    setupButtons();

    // Cacher l'écran de chargement
    elements.loadingScreen.style.display = 'none';
    log("Initialisation terminée", "success");

  } catch (error) {
    log(`Erreur d'initialisation: ${error.message}`, "error");
    console.error(error);
    // IMPORTANT : Cacher l'écran de chargement en cas d'erreur pour voir le log
    elements.loadingScreen.style.display = 'none';
    elements.startBtn.disabled = false;
  }
}

// Vérification des API
function checkAudioSupport() {
  if (!window.AudioContext && !window.webkitAudioContext) {
    log("Web Audio API non supporté", "error");
    return false;
  }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    log("getUserMedia non supporté", "error");
    return false;
  }

  return true;
}

// Initialisation audio
async function initAudio() {
  try {
    // Demander l'accès au microphone
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false
    });

    // Sauvegarder le stream pour pouvoir l'arrêter plus tard
    state.stream = stream;

    // Créer le contexte audio
    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = state.audioContext.createMediaStreamSource(stream);

    // Configurer l'analyser
    state.analyser = state.audioContext.createAnalyser();
    state.analyser.fftSize = config.fftSize;
    state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
    source.connect(state.analyser);

    // Configurer l'enregistrement
    state.recorder = new MediaRecorder(stream);
    state.recorder.ondataavailable = handleRecordingData;
    state.recorder.onstop = handleRecordingStop;

    // Mettre à jour l'interface
    elements.micStatus.textContent = "ON";
    elements.startBtn.textContent = "STOP";
    elements.fftBtn.disabled = false;
    elements.recBtn.disabled = false;
    elements.evpBtn.disabled = false;
    elements.radarBtn.disabled = false;
    elements.wavBtn.disabled = false;

    // Démarrer la boucle de visualisation
    updateVisual();

    log("Audio initialisé avec succès", "success");
    state.initialized = true;

  } catch (error) {
    log(`Erreur audio: ${error.message}`, "error");
    throw error;
  }
}

// Gestion de l'enregistrement
function handleRecordingData(event) {
  log("Données d'enregistrement reçues");
  const blob = new Blob([event.data], { type: "audio/webm" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `recording_${Date.now()}.webm`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  log("Fichier enregistré");
}

function handleRecordingStop() {
  state.isRecording = false;
  log("Enregistrement terminé");
}

// Initialisation visualisation
function initVisualization() {
  log("Initialisation de la visualisation...");

  // Créer le canvas waterfall
  createWaterfall();

  // Créer le canvas radar
  createRadar();

  // Initialiser Three.js si disponible
  if (state.librariesLoaded.three) {
    init3D();
  } else {
    log("Three.js non disponible - visualisation 3D désactivée", "error");
  }
}

// Créer le waterfall
function createWaterfall() {
  // Supprimer l'ancien si existe (pour éviter les doublons lors des recharges)
  const old = document.getElementById('waterfallCanvas');
  if (old) old.remove();

  const canvas = document.createElement('canvas');
  canvas.id = 'waterfallCanvas';
  canvas.width = elements.visualization.clientWidth;
  canvas.height = 100;
  elements.visualization.appendChild(canvas);
  state.waterfallCtx = canvas.getContext('2d');
}

// Créer le radar
function createRadar() {
  const old = document.getElementById('radarCanvas');
  if (old) old.remove();

  const canvas = document.createElement('canvas');
  canvas.id = 'radarCanvas';
  canvas.width = 150;
  canvas.height = 150;
  elements.visualization.appendChild(canvas);
  state.radarCtx = canvas.getContext('2d');
}

// Initialisation 3D
function init3D() {
  if (!state.librariesLoaded.three) return;

  try {
    // Nettoyer la scène précédente si elle existe
    if (state.renderer) {
      elements.visualization.removeChild(state.renderer.domElement);
      state.cubes = [];
    }

    // Créer la scène
    state.scene = new THREE.Scene();
    state.camera = new THREE.PerspectiveCamera(
      75,
      elements.visualization.clientWidth / elements.visualization.clientHeight,
      0.1,
      1000
    );
    state.camera.position.z = 500;

    // Créer le renderer
    state.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    state.renderer.setSize(
      elements.visualization.clientWidth,
      elements.visualization.clientHeight
    );
    elements.visualization.insertBefore(
      state.renderer.domElement,
      elements.visualization.firstChild
    );

    log("Visualisation 3D initialisée", "success");

  } catch (error) {
    log(`Erreur 3D: ${error.message}`, "error");
  }
}

// Chargement du modèle IA
async function loadModel() {
  try {
    log("Chargement du modèle IA...");
    state.model = await tf.loadLayersModel(
      'https://storage.googleapis.com/tfjs-models/tfjs/mobilenet_v1_0.25_224/model.json'
    );
    config.aiEnabled = true;
    elements.aiStatus.textContent = "READY";
    log("Modèle IA chargé avec succès", "success");

  } catch (error) {
    log(`Erreur chargement IA: ${error.message}`, "error");
    config.aiEnabled = false;
  }
}

// Mise à jour visuelle
function updateVisual() {
  if (!state.initialized) return;

  // Mettre à jour les données audio
  state.analyser.getByteFrequencyData(state.dataArray);

  // Niveau sonore
  const sum = state.dataArray.reduce((acc, val) => acc + val, 0);
  const avg = Math.min(100, sum / state.dataArray.length);
  elements.voiceBar.style.width = `${avg}%`;

  // Waterfall
  updateWaterfall();

  // Radar
  if (config.radar) updateRadar();

  // Spectro 3D
  if (config.spectro3D && state.renderer) update3DSpectro();

  // Détection vocale
  if (config.autoRec && avg > 30 && !state.isRecording) {
    startRecording(3000);
  }

  requestAnimationFrame(updateVisual);
}

// Mise à jour waterfall
function updateWaterfall() {
  if (!state.waterfallCtx) return;

  const w = state.waterfallCtx.canvas.width;
  const h = state.waterfallCtx.canvas.height;

  // Déplacer l'image vers le bas
  const img = state.waterfallCtx.getImageData(0, 0, w, h);
  state.waterfallCtx.putImageData(img, 0, 1);

  // Dessiner les nouvelles données
  for (let i = 0; i < state.dataArray.length; i++) {
    const v = state.dataArray[i];
    state.waterfallCtx.fillStyle = `hsl(${200 - v}, 100%, 50%)`;
    state.waterfallCtx.fillRect(i * (w / state.dataArray.length), 0, 2, 1);
  }
}

// Mise à jour radar
function updateRadar() {
  if (!state.radarCtx) return;

  state.radarCtx.clearRect(0, 0, 150, 150);

  // Dessiner le cercle
  state.radarCtx.strokeStyle = "var(--primary)";
  state.radarCtx.beginPath();
  state.radarCtx.arc(75, 75, 60, 0, Math.PI * 2);
  state.radarCtx.stroke();

  // Calculer l'énergie
  const energy = state.dataArray.reduce((acc, val) => acc + val, 0);
  const angle = Math.random() * Math.PI * 2;
  const r = (energy / 1500) * 50;
  const x = 75 + Math.cos(angle) * r;
  const y = 75 + Math.sin(angle) * r;

  // Dessiner le point
  state.radarCtx.fillStyle = "var(--primary)";
  state.radarCtx.fillRect(x, y, 4, 4);
}

// Mise à jour spectro 3D
function update3DSpectro() {
  if (!state.scene || !state.dataArray) return;

  // Limiter le nombre de cubes
  if (state.cubes.length > 5000) {
    const old = state.cubes.shift();
    state.scene.remove(old);
  }

  // Créer de nouveaux cubes
  for (let i = 0; i < state.dataArray.length; i += 5) {
    const v = state.dataArray[i] / 255;
    const color = config.evpMode
      ? new THREE.Color(`hsl(${300 - state.dataArray[i]}, 100%, 50%)`)
      : new THREE.Color(`hsl(${200 - state.dataArray[i]}, 100%, 50%)`);

    const geometry = new THREE.BoxGeometry(5, 5, v * 200);
    const material = new THREE.MeshBasicMaterial({ color });
    const cube = new THREE.Mesh(geometry, material);

    cube.position.x = i - 128;
    cube.position.y = -100;
    cube.position.z = v * 100;
    state.scene.add(cube);
    state.cubes.push(cube);
  }

  // Rendu
  if (state.renderer && state.camera) {
    state.renderer.render(state.scene, state.camera);
  }
}

// Enregistrement
function startRecording(duration) {
  if (!state.recorder || state.isRecording) return;

  state.isRecording = true;
  state.recorder.start();
  log(`Enregistrement démarré (${duration/1000}s)`);

  setTimeout(() => {
    if (state.isRecording) {
      state.recorder.stop();
    }
  }, duration);
}

// Configuration des boutons
function setupButtons() {
  // Assurez-vous que les événements ne sont pas dupliqués
  elements.startBtn.onclick = toggleApp;
  elements.fftBtn.onclick = toggleFFT;
  elements.recBtn.onclick = toggleAutoRec;
  elements.evpBtn.onclick = toggleEVP;
  elements.radarBtn.onclick = toggleRadar;
  elements.wavBtn.onclick = toggleWavRec;
}

function toggleApp() {
  if (state.initialized) {
    // Arrêter l'application
    if (state.audioContext) state.audioContext.close();
    if (state.stream) state.stream.getTracks().forEach(track => track.stop());

    // Nettoyage DOM
    if (state.renderer && state.renderer.domElement) {
      elements.visualization.removeChild(state.renderer.domElement);
      state.renderer = null;
    }
    const wf = document.getElementById('waterfallCanvas');
    if (wf) wf.remove();
    const rd = document.getElementById('radarCanvas');
    if (rd) rd.remove();

    // Réinitialiser
    state.initialized = false;
    elements.micStatus.textContent = "OFF";
    elements.aiStatus.textContent = "OFF";
    elements.startBtn.textContent = "START";
    elements.fftBtn.disabled = true;
    elements.recBtn.disabled = true;
    elements.evpBtn.disabled = true;
    elements.radarBtn.disabled = true;
    elements.wavBtn.disabled = true;
    log("Application arrêtée");

  } else {
    // Démarrer l'application
    initApplication();
  }
}

function toggleFFT() {
  config.fftSize = config.fftSize === 1024 ? 2048 : 1024;
  if (state.analyser) {
    state.analyser.fftSize = config.fftSize;
    state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
  }
  elements.fftBtn.textContent = `FFT ${config.fftSize}`;
  log(`Taille FFT: ${config.fftSize}`);
}

function toggleAutoRec() {
  config.autoRec = !config.autoRec;
  elements.recBtn.style.backgroundColor = config.autoRec ? "var(--primary)" : "";
  log(`Auto Rec: ${config.autoRec ? "ON" : "OFF"}`);
}

function toggleEVP() {
  config.evpMode = !config.evpMode;
  config.spectro3D = config.evpMode; // Activer 3D en mode EVP
  elements.evpBtn.style.backgroundColor = config.evpMode ? "var(--evp)" : "";
  log(`Mode EVP: ${config.evpMode ? "ON" : "OFF"}`);
}

function toggleRadar() {
  config.radar = !config.radar;
  elements.radarBtn.style.backgroundColor = config.radar ? "var(--primary)" : "";
  log(`Radar: ${config.radar ? "ON" : "OFF"}`);
}

function toggleWavRec() {
  // Fonctionnalité WAV à implémenter
  log("Enregistrement WAV: À implémenter");
}

// Redimensionnement
window.addEventListener('resize', () => {
  if (state.renderer) {
    state.renderer.setSize(
      elements.visualization.clientWidth,
      elements.visualization.clientHeight
    );
    state.camera.aspect = elements.visualization.clientWidth / elements.visualization.clientHeight;
    state.camera.updateProjectionMatrix();
  }

  if (state.waterfallCtx) {
    state.waterfallCtx.canvas.width = elements.visualization.clientWidth;
  }
});

// Gestionnaire au chargement de la page pour vérifier les libs
window.addEventListener('load', () => {
  log("Application chargée. En attente de démarrage.");
  
  // Vérification des bibliothèques externes
  state.librariesLoaded.three = typeof THREE !== 'undefined';
  state.librariesLoaded.tfjs = typeof tf !== 'undefined';

  if (state.librariesLoaded.three) {
    log("Three.js détecté", "success");
  } else {
    log("Three.js non détecté", "error");
  }

  if (state.librariesLoaded.tfjs) {
    log("TensorFlow.js détecté", "success");
  } else {
    log("TensorFlow.js non détecté", "error");
  }

  // Cacher l'écran de chargement initial
  elements.loadingScreen.style.display = 'none';
});

</script>
</body>
</html>
