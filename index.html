<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUISSANCE ZEUS - ARCHITECTURE OVERKILL</title>
    <style>
        /* ==========================================================================
           CSS OVERKILL - FEUILLE DE STYLE INTÉGRALE ET DÉTAILLÉE
           ========================================================================== */
        
        :root {
            /* --- Palette Thème ZEUS (Par Défaut) --- */
            --c-primary: #00ccff;
            --c-primary-dim: rgba(0, 204, 255, 0.2);
            --c-secondary: #ffd700;
            --c-secondary-dim: rgba(255, 215, 0, 0.2);
            --c-bg: #050510;
            --c-panel: #0a0a20;
            --c-text: #e0e0ff;
            --c-grid: #1a2a3a;
            --c-alert: #ff3333;
            --c-success: #00ff00;
            
            /* --- Dimensions & Espacements --- */
            --header-h: 60px;
            --sensor-h: 80px;
            --scope-min-h: 300px;
            --border-radius: 4px;
            
            /* --- Ombres & Effets --- */
            --shadow-neon: 0 0 10px var(--c-primary);
            --shadow-gold: 0 0 10px var(--c-secondary);
            --font-tech: 'Courier New', Courier, monospace;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--c-bg); color: var(--c-text); font-family: var(--font-tech); overflow: hidden; }
        
        /* --- LAYOUT PRINCIPAL --- */
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* --- HEADER --- */
        header {
            height: var(--header-h);
            background: #000;
            border-bottom: 2px solid var(--c-secondary);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 100;
        }
        h1 { margin: 0; font-size: 1.2rem; color: var(--c-primary); text-shadow: var(--shadow-neon); text-transform: uppercase; letter-spacing: 2px; }
        .status-pill { padding: 5px 10px; border: 1px solid var(--c-secondary); color: var(--c-secondary); font-weight: bold; font-size: 0.8rem; border-radius: 20px; text-transform: uppercase; }
        .status-pill.active { background: var(--c-secondary); color: #000; box-shadow: var(--shadow-gold); animation: pulse-gold 2s infinite; }

        /* --- SECTION VU-MÈTRE (DEBUG) --- */
        #debug-section { background: #000; padding: 5px 15px; border-bottom: 1px solid #333; height: 40px; display: flex; align-items: center; }
        .label-small { font-size: 0.6rem; color: #666; text-transform: uppercase; width: 150px; }
        .vu-meter-container { flex: 1; height: 6px; background: #111; border: 1px solid #333; border-radius: 3px; overflow: hidden; position: relative; }
        .vu-meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--c-primary), #fff); transition: width 0.05s linear; }

        /* --- GRILLE CAPTEURS --- */
        #sensor-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 6 colonnes pour tout voir */
            height: var(--sensor-h);
            background: #000; border-bottom: 1px solid var(--c-primary);
        }
        .sensor-cell { border-right: 1px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--c-panel); position: relative; }
        .sensor-cell:last-child { border-right: none; }
        .sensor-label { font-size: 0.5rem; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .sensor-value { font-size: 1rem; font-weight: bold; color: var(--c-primary); }
        .sensor-alert { background: #330000 !important; animation: blink-red 0.2s infinite; }
        .sensor-alert .sensor-value { color: var(--c-alert); }

        /* --- ZONE SCOPE (CANVAS) --- */
        #scope-container {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            border-bottom: 2px solid var(--c-primary);
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Overlays Visuels */
        .grid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--c-grid) 1px, transparent 1px), linear-gradient(90deg, var(--c-grid) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; opacity: 0.3;
        }
        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 10; }
        
        /* IA Overlay Text */
        #ai-overlay {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; text-align: center; pointer-events: none; z-index: 20;
        }
        #ai-main-text {
            font-size: 2.5rem; font-weight: 900; color: #fff;
            background: rgba(0,0,0,0.9); border: 2px solid var(--c-secondary);
            padding: 15px; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            min-height: 3rem; margin-bottom: 10px;
            text-shadow: 0 0 5px var(--c-primary); letter-spacing: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #ai-sub-text {
            font-size: 0.8rem; background: #000; color: var(--c-primary);
            padding: 4px 12px; border: 1px solid var(--c-primary); border-radius: 4px; display: inline-block;
        }

        /* --- CONTROLES (SCROLLABLE) --- */
        #controls-panel {
            height: 40vh;
            background: var(--c-panel);
            overflow-y: auto;
            padding: 15px;
            border-top: 1px solid #333;
        }

        .group-box {
            background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: var(--border-radius);
            padding: 12px; margin-bottom: 15px;
        }
        .group-header {
            color: var(--c-secondary); font-size: 0.7rem; text-transform: uppercase;
            border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px;
            display: flex; justify-content: space-between;
        }

        /* Grilles Boutons */
        .btn-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }

        button {
            background: #111; border: 1px solid var(--c-primary); color: var(--c-primary);
            padding: 12px; font-family: inherit; font-weight: bold; text-transform: uppercase;
            font-size: 0.7rem; cursor: pointer; border-radius: 2px; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        button.active { background: var(--c-primary); color: #000; box-shadow: var(--shadow-neon); border-color: #fff; }
        button.btn-danger { border-color: var(--c-alert); color: var(--c-alert); }
        button.btn-danger.active { background: var(--c-alert); color: #fff; }
        button.btn-large { width: 100%; font-size: 1.1rem; padding: 15px; background: #fff; color: #000; border: 2px solid var(--c-secondary); font-weight: 900; }
        
        /* Sliders */
        .control-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.75rem; }
        .control-row label { flex: 1; color: #aaa; text-transform: uppercase; }
        input[type="range"] { flex: 2; accent-color: var(--c-secondary); }
        .val-display { width: 35px; text-align: right; color: var(--c-secondary); font-family: monospace; }

        /* Terminal / Logs */
        #terminal {
            height: 120px; background: #000; border: 1px solid #333; padding: 8px;
            font-size: 0.65rem; overflow-y: auto; font-family: monospace; margin-top: 10px;
            box-shadow: inset 0 0 10px #000; color: #888;
        }
        .log-line { margin-bottom: 3px; padding-left: 5px; border-left: 2px solid #333; }
        .log-sys { border-color: #666; color: #aaa; }
        .log-ai { border-color: var(--c-primary); color: #fff; background: #002220; }
        .log-err { border-color: var(--c-alert); color: var(--c-alert); font-weight: bold; }
        .log-ok { border-color: var(--c-success); color: var(--c-success); }

        /* Wizard Modal */
        #wizard-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .wizard-box {
            background: var(--c-panel); border: 2px solid var(--c-primary);
            padding: 30px; max-width: 400px; width: 90%; text-align: center; border-radius: 8px;
        }
        .progress-bar { width: 100%; height: 10px; background: #333; margin: 20px 0; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--c-primary); width: 0%; transition: width 0.1s linear; }

        /* Animations */
        @keyframes pulse-gold { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes blink-red { 50% { opacity: 0.5; background-color: #500; } }
        @keyframes flash { 0% { opacity: 0.8; } 100% { opacity: 0; } }
        .anim-flash { animation: flash 0.3s ease-out; }

    </style>
</head>
<body>

    <div id="app-container">
        
        <!-- HEADER -->
        <header>
            <h1>PuiSSancE <span style="color:var(--c-secondary)">MAXIMUM</span></h1>
            <div id="sys-status" class="status-pill">OFFLINE</div>
        </header>

        <!-- VU MÈTRE -->
        <div id="debug-section">
            <span class="label-small">Audio Input Level</span>
            <div class="vu-meter-container">
                <div id="vu-bar" class="vu-meter-fill"></div>
            </div>
        </div>

        <!-- CAPTEURS (6x) -->
        <div id="sensor-grid">
            <div class="sensor-cell"><span class="sensor-label">ACC X</span><span class="sensor-value" id="v-acc-x">0.00</span></div>
            <div class="sensor-cell"><span class="sensor-label">ACC Y</span><span class="sensor-value" id="v-acc-y">0.00</span></div>
            <div class="sensor-cell"><span class="sensor-label">ACC Z</span><span class="sensor-value" id="v-acc-z">0.00</span></div>
            <div class="sensor-cell"><span class="sensor-label">MAG X</span><span class="sensor-value" id="v-mag-x">0</span></div>
            <div class="sensor-cell"><span class="sensor-label">MAG Y</span><span class="sensor-value" id="v-mag-y">0</span></div>
            <div class="sensor-cell" id="cell-emp"><span class="sensor-label">EMP</span><span class="sensor-value" id="v-emp">OK</span></div>
        </div>

        <!-- SCOPE / CANVAS -->
        <div id="scope-container">
            <div class="grid-bg"></div>
            <div id="flash-overlay"></div>
            <canvas id="main-canvas"></canvas>
            
            <div id="ai-overlay">
                <div id="ai-main-text">INITIALISATION...</div>
                <div id="ai-sub-text">SYSTEM STANDBY</div>
            </div>
        </div>

        <!-- CONTROLES -->
        <div id="controls-panel">
            
            <!-- Power -->
            <div class="group-box">
                <div class="group-header">Système d'Alimentation</div>
                <button id="btn-start" class="btn-large" onclick="APP.start()">⚡ DÉMARRER PUISSANCE</button>
                <button id="btn-stop" class="btn-large btn-danger" onclick="APP.stop()" style="display:none;">⏹ ARRÊTER SYSTÈME</button>
            </div>

            <!-- Modules -->
            <div class="group-box" id="grp-modules" style="opacity:0.5; pointer-events:none;">
                <div class="group-header">Modules Actifs</div>
                <div class="btn-grid-2">
                    <button id="mod-mic" class="active" onclick="APP.toggleModule('microphone')">🎧 MICRO</button>
                    <button id="mod-noise" onclick="APP.toggleModule('noiseGenerator')">⚡ BRUIT BLANC</button>
                    <button id="mod-loop" class="active" onclick="APP.toggleModule('ttsEngine')">🔊 LOOP ÉCHO</button>
                    <button id="mod-ghost" class="active" onclick="APP.toggleModule('ghostMode')">👻 TRAD. BRUIT</button>
                    <button id="mod-rec" onclick="APP.toggleModule('recorder')">⏺ ENREGISTREUR</button>
                    <button id="mod-files" onclick="UI.toggleFileManager()">📂 GESTION FICHIERS</button>
                </div>
            </div>

            <!-- Settings -->
            <div class="group-box" id="grp-settings" style="opacity:0.5; pointer-events:none;">
                <div class="group-header">Paramètres Avancés</div>
                
                <div class="control-row">
                    <label>Seuil Énergie</label>
                    <input type="range" min="0" max="100" value="10" oninput="APP.updateConfig('energyThreshold', this.value)">
                    <span class="val-display" id="disp-thresh">10</span>
                </div>
                <div class="control-row">
                    <label>Volume Voix</label>
                    <input type="range" min="0" max="1" step="0.1" value="1.0" oninput="APP.updateConfig('voiceVolume', this.value)">
                    <span class="val-display" id="disp-vol">1.0</span>
                </div>
                <div class="control-row">
                    <label>Grave/Aigu</label>
                    <input type="range" min="0.1" max="2" step="0.1" value="0.6" oninput="APP.updateConfig('voicePitch', this.value)">
                    <span class="val-display" id="disp-pitch">0.6</span>
                </div>
                <div class="control-row">
                    <label>Taille FFT</label>
                    <select style="flex:2; background:#000; color:#fff; border:1px solid #444;" onchange="APP.updateConfig('fftSize', parseInt(this.value))">
                        <option value="1024">1024</option>
                        <option value="2048" selected>2048</option>
                        <option value="4096">4096</option>
                        <option value="8192">8192</option>
                    </select>
                </div>
            </div>

            <!-- Terminal -->
            <div id="terminal"></div>
        </div>
    </div>

    <!-- WIZARD CALIBRATION -->
    <div id="wizard-modal">
        <div class="wizard-box">
            <h2 style="color:var(--c-primary)">CALIBRATION DU SYSTÈME</h2>
            <p id="wiz-text">Veuillez faire silence...</p>
            <div class="progress-bar"><div id="wiz-bar" class="progress-fill"></div></div>
            <button id="wiz-btn" style="display:none;" onclick="APP.finishCalibration()">COMMENCER</button>
        </div>
    </div>

    <!-- JAVASCRIPT OVERKILL -->
    <script>
        /**
         * ==========================================================================
         * PUISSANCE ZEUS - MOTEUR JAVASCRIPT OVERKILL
         * Version : 5.0 Enterprise
         * Architecture : Modulaire (POO)
         * ==========================================================================
         */

        // --- 1. CONSTANTES & DICTIONNAIRES ---
        const CONST = {
            THEMES: {
                'zeus': { p: '#00ccff', s: '#ffd700' },
                'hades': { p: '#aa00ff', s: '#ff0000' },
                'ares': { p: '#ff3300', s: '#ffff00' }
            },
            WORDS: [
                "alpha", "thêta", "delta", "omega", "spectre", "éther", "vide", "présence",
                "bruit sourd", "onde magnétique", "impulsion", "statique", "grondement", "souffle",
                "vibration", "champ", "résonance", "larsen", "décharge", "magma", "éther",
                "obscurité", "lumière", "tempête", "passage", "esprit", "énergie", "fréquence"
            ],
            GLITCH: ['#', '%', '$', '*', '§', '@', '!'],
            CALIBRATION_TIME: 5000 // 5 secondes
        };

        // --- 2. GESTIONNAIRE DE LOGS (LOGGER) ---
        class Logger {
            constructor(id) { this.el = document.getElementById(id); }
            log(msg, type = 'sys') {
                if (!this.el) return;
                const d = document.createElement('div');
                d.className = `log-line log-${type}`;
                d.innerText = `[${new Date().toLocaleTimeString('fr-FR')}] > ${msg}`;
                this.el.appendChild(d);
                this.el.scrollTop = this.el.scrollHeight;
            }
        }

        // --- 3. MOTEUR AUDIO (AUDIOENGINE) ---
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.micSrc = null;
                this.analyser = null;
                this.gain = null;
                this.noiseSrc = null;
                this.noiseGain = null;
                this.dataFreq = null;
                this.dataTime = null;
                this.isInit = false;
            }

            async init(config) {
                try {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AC();
                    if (this.ctx.state === 'suspended') await this.ctx.resume();

                    // Microphone
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                    });
                    this.micSrc = this.ctx.createMediaStreamSource(stream);
                    this.analyser = this.ctx.createAnalyser();
                    this.analyser.fftSize = config.fftSize;
                    this.analyser.smoothingTimeConstant = 0.8;
                    this.micSrc.connect(this.analyser);

                    // Buffers
                    const len = this.analyser.frequencyBinCount;
                    this.dataFreq = new Uint8Array(len);
                    this.dataTime = new Uint8Array(len);

                    // Bruit Blanc
                    const bufSize = this.ctx.sampleRate * 2;
                    const buffer = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
                    
                    this.noiseSrc = this.ctx.createBufferSource();
                    this.noiseSrc.buffer = buffer;
                    this.noiseSrc.loop = true;
                    this.noiseGain = this.ctx.createGain();
                    this.noiseGain.gain.value = 0;
                    
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'bandpass'; filter.frequency.value = 1000;
                    
                    this.noiseSrc.connect(filter);
                    filter.connect(this.noiseGain);
                    this.noiseGain.connect(this.ctx.destination);
                    this.noiseSrc.start();

                    this.isInit = true;
                    return true;
                } catch (e) {
                    console.error(e);
                    throw new Error("Audio Init Failed: " + e.message);
                }
            }

            update() {
                if (!this.isInit) return 0;
                this.analyser.getByteFrequencyData(this.dataFreq);
                this.analyser.getByteTimeDomainData(this.dataTime);
                
                let sum = 0;
                for(let i=0; i<this.dataFreq.length; i++) sum += this.dataFreq[i];
                return sum / this.dataFreq.length;
            }

            setNoiseVolume(vol) {
                if(this.noiseGain) this.noiseGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.1);
            }

            stop() {
                if(this.ctx) this.ctx.close();
                if(this.noiseSrc) this.noiseSrc.stop();
            }
        }

        // --- 4. MOTEUR VISUEL (VISUALENGINE) ---
        class VisualEngine {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.width = 0;
                this.height = 0;
                this.particles = [];
                this.initParticles(50);
            }

            resize() {
                this.width = this.canvas.clientWidth;
                this.height = this.canvas.clientHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
            }

            initParticles(count) {
                for(let i=0; i<count; i++) {
                    this.particles.push({
                        x: Math.random(), y: Math.random(), z: Math.random(),
                        vx: (Math.random()-0.5)*0.002, vy: (Math.random()-0.5)*0.002
                    });
                }
            }

            draw(freqData, timeData, avgEnergy) {
                this.resize();
                const ctx = this.ctx;
                const w = this.width;
                const h = this.height;

                // Fade
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(0,0,w,h);

                // 1. Oscilloscope
                ctx.lineWidth = 2; ctx.strokeStyle = '#00ccff';
                ctx.beginPath();
                const slice = w / timeData.length;
                let x = 0;
                for(let i=0; i<timeData.length; i++) {
                    const v = timeData[i]/128.0;
                    const y = v * h/2;
                    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    x+=slice;
                }
                ctx.stroke();

                // 2. Spectrum
                const barW = (w / freqData.length) * 2.5;
                let bx = 0;
                for(let i=0; i<freqData.length; i++) {
                    const barH = (freqData[i]/255) * (h/2.5);
                    ctx.fillStyle = freqData[i] > 220 ? '#ff3333' : '#ffd700';
                    ctx.fillRect(bx, h - barH, barW, barH);
                    bx += barW + 1;
                }

                // 3. Particles (Pseudo-3D)
                ctx.fillStyle = 'rgba(0, 204, 255, 0.5)';
                this.particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    // Wrap
                    if(p.x<0) p.x=1; if(p.x>1) p.x=0;
                    if(p.y<0) p.y=1; if(p.y>1) p.y=0;
                    
                    // React to energy
                    const size = (p.z * 3) + (avgEnergy / 50);
                    
                    // Project 3D
                    const px = (p.x - 0.5) * w; 
                    const py = (p.y - 0.5) * h;
                    
                    ctx.beginPath();
                    ctx.arc(w/2 + px, h/2 + py, Math.max(1, size), 0, Math.PI*2);
                    ctx.fill();
                });
            }
        }

        // --- 5. MOTEUR IA (AIENGINE) ---
        class AIEngine {
            constructor() {
                this.rec = null;
                this.synth = window.speechSynthesis;
                this.lastSpeak = 0;
                this.restartCount = 0;
            }

            start(onResult, onEnd) {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRec) return false;

                this.rec = new SpeechRec();
                this.rec.continuous = true;
                this.rec.interimResults = true;
                this.rec.lang = 'fr-FR';

                this.rec.onresult = (e) => {
                    let final = "";
                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    }
                    if (final) onResult(final);
                };

                this.rec.onend = () => {
                    this.restartCount++;
                    onEnd(this.restartCount);
                    try { this.rec.start(); } catch(e) {}
                };

                this.rec.start();
                return true;
            }

            speak(text, isHuman, config) {
                this.synth.cancel();
                this.lastSpeak = Date.now();
                
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'fr-FR';
                u.volume = config.voiceVolume;
                u.pitch = isHuman ? (0.5 + Math.random()*0.5) : config.voicePitch;
                u.rate = isHuman ? 1.1 : 0.9;
                this.synth.speak(u);
            }

            stop() {
                if(this.rec) this.rec.stop();
                this.synth.cancel();
            }
        }

        // --- 6. APPLICATION PRINCIPALE (CONTROLLER) ---
        const APP = {
            state: {
                running: false,
                modules: { mic: true, noise: false, loop: true, ghost: true, rec: false },
                config: { energyThreshold: 10, voiceVolume: 1.0, voicePitch: 0.6, fftSize: 2048 },
                noiseFloor: 10,
                sensors: { lastA: 0 }
            },
            audio: new AudioEngine(),
            visual: new VisualEngine('main-canvas'),
            ai: new AIEngine(),
            logger: new Logger('terminal'),
            recorders: { media: null, isRec: false, stream: null },

            // --- DÉMARRAGE ---
            async start() {
                try {
                    // UI Updates
                    document.getElementById('btn-start').style.display = 'none';
                    document.getElementById('btn-stop').style.display = 'block';
                    document.getElementById('sys-status').classList.add('active');
                    document.getElementById('sys-status').innerText = "CALIBRATION...";
                    
                    // Calibration
                    await this.runCalibration();

                    // Audio Init
                    await this.audio.init(this.state.config);
                    this.logger.log("Audio Engine Initialisé", "ok");
                    this.state.running = true;

                    // Modules UI
                    document.getElementById('grp-modules').style.opacity = "1";
                    document.getElementById('grp-modules').style.pointerEvents = "auto";
                    document.getElementById('grp-settings').style.opacity = "1";
                    document.getElementById('grp-settings').style.pointerEvents = "auto";

                    // AI Start
                    this.ai.start(
                        (txt) => this.handleVoice(txt), // onResult
                        (cnt) => this.logger.log(`IA Restart #${cnt}`, "sys") // onEnd
                    );

                    // Sensors
                    this.initSensors();

                    // Loop
                    this.loop();

                    this.logger.log("SYSTÈME 100% OPÉRATIONNEL", "ok");
                    document.getElementById('sys-status').innerText = "ONLINE";

                } catch (e) {
                    this.logger.log("CRASH: " + e.message, "err");
                    alert("Erreur: " + e.message);
                    this.stop();
                }
            },

            stop() {
                this.state.running = false;
                this.audio.stop();
                this.ai.stop();
                if(this.recorders.stream) this.recorders.stream.getTracks().forEach(t=>t.stop());
                location.reload();
            },

            // --- CALIBRATION ---
            async runCalibration() {
                return new Promise(resolve => {
                    const modal = document.getElementById('wizard-modal');
                    const bar = document.getElementById('wiz-bar');
                    const btn = document.getElementById('wiz-btn');
                    
                    modal.style.display = 'flex';
                    
                    // Fake calibration progress
                    let width = 0;
                    const interval = setInterval(() => {
                        width += 2;
                        bar.style.width = width + "%";
                        if(width >= 100) {
                            clearInterval(interval);
                            document.getElementById('wiz-text').innerText = "CALIBRATION TERMINÉE";
                            btn.style.display = 'inline-block';
                            btn.onclick = () => {
                                modal.style.display = 'none';
                                resolve();
                            };
                        }
                    }, 50); // 2.5s sec visuel
                });
            },

            // --- BOUCLE PRINCIPALE ---
            loop() {
                if (!this.state.running) return;
                requestAnimationFrame(() => this.loop());

                // 1. Audio Data
                const avg = this.audio.update();
                
                // 2. Visuals
                this.visual.draw(this.audio.dataFreq, this.audio.dataTime, avg);

                // 3. Vu Meter
                const vu = document.getElementById('vu-bar');
                let pct = Math.min(100, (avg / 40) * 100);
                vu.style.width = pct + "%";
                if(pct > 90) vu.style.background = "red"; else vu.style.background = "linear-gradient(90deg, var(--c-primary), #fff)";

                // 4. Logic (Ghost / EMP)
                if (this.state.modules.ghost) {
                    const now = Date.now();
                    // Si énergie > seuil (dynamique) et silence depuis 2s
                    if (avg > (this.state.noiseFloor + 5) && (now - this.ai.lastSpeak > 2000)) {
                        if(Math.random() > 0.90) {
                            const word = CONST.WORDS[Math.floor(Math.random() * CONST.WORDS.length)];
                            this.logger.log(`Énergie -> ${word}`, "ai");
                            this.ai.speak(word, false, this.state.config);
                            this.updateAI(word, "TRADUCTION SIGNAL");
                        }
                    }
                }

                // 5. Flash Effect
                if(avg > 230 && Math.random() > 0.98) this.triggerFlash();
            },

            // --- LOGIQUE METIER ---
            handleVoice(text) {
                if (!this.state.modules.loop) return;
                this.logger.log(`Voix: ${text}`, "ai");
                this.ai.speak(text, true, this.state.config);
                
                // Glitch text
                let display = text.split('').map(c => Math.random()<0.2 ? CONST.GLITCH[Math.floor(Math.random()*CONST.GLITCH.length)] : c).join('');
                this.updateAI(display, "RÉPÉTION AUDIO");
            },

            updateAI(main, sub) {
                document.getElementById('ai-main-text').innerText = main;
                document.getElementById('ai-sub-text').innerText = sub;
            },

            triggerFlash() {
                const f = document.getElementById('flash-overlay');
                f.classList.remove('anim-flash');
                void f.offsetWidth;
                f.classList.add('anim-flash');
                // Son tonnerre
                if(this.audio.ctx) {
                    const osc = this.audio.ctx.createOscillator();
                    const g = this.audio.ctx.createGain();
                    osc.frequency.setValueAtTime(40, this.audio.ctx.currentTime);
                    g.gain.setValueAtTime(0.5, this.audio.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, this.audio.ctx.currentTime + 0.3);
                    osc.connect(g); g.connect(this.audio.ctx.destination);
                    osc.start(); osc.stop(this.audio.ctx.currentTime + 0.3);
                }
            },

            // --- CAPTEURS ---
            initSensors() {
                if(window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', e => {
                        const a = e.accelerationIncludingGravity;
                        if(a) {
                            document.getElementById('v-acc-x').innerText = (a.x||0).toFixed(2);
                            document.getElementById('v-acc-y').innerText = (a.y||0).toFixed(2);
                            document.getElementById('v-acc-z').innerText = (a.z||0).toFixed(2);
                            if(Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z) > 25) this.triggerEMP();
                        }
                    });
                }
                if(window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientation', e => {
                        if(e.alpha) {
                            document.getElementById('v-mag-x').innerText = Math.floor(e.alpha);
                            document.getElementById('v-mag-y').innerText = Math.floor(e.beta);
                            if(Math.abs(e.alpha - this.state.sensors.lastA) > 15) this.triggerEMP();
                            this.state.sensors.lastA = e.alpha;
                        }
                    });
                }
            },

            triggerEMP() {
                const c = document.getElementById('cell-emp');
                c.classList.add('sensor-alert');
                document.getElementById('v-emp').innerText = "DETECT";
                this.logger.log("EMP DETECTED", "err");
                if(this.state.modules.ghost) {
                    this.ai.speak("IMPULSION", false, this.state.config);
                    this.triggerFlash();
                }
                setTimeout(() => {
                    c.classList.remove('sensor-alert');
                    document.getElementById('v-emp').innerText = "OK";
                }, 1000);
            },

            // --- UTILS UI ---
            toggleModule(key) {
                this.state.modules[key] = !this.state.modules[key];
                // Mapping IDs
                const map = {
                    'microphone': 'mod-mic', 'noiseGenerator': 'mod-noise', 
                    'ttsEngine': 'mod-loop', 'ghostMode': 'mod-ghost', 'recorder': 'mod-rec'
                };
                const btn = document.getElementById(map[key]);
                if(this.state.modules[key]) btn.classList.add('active'); else btn.classList.remove('active');
                
                this.logger.log(`Module ${key}: ${this.state.modules[key]}`, "sys");

                if(key === 'noiseGenerator') {
                    this.audio.setNoiseVolume(this.state.modules[key] ? 0.5 : 0);
                }
                if(key === 'recorder') {
                    // Logic enregistreur basique
                    if(this.state.modules[key]) {
                        this.logger.log("Enregistrement démarré (Simulation)", "sys");
                        document.getElementById('v-acc-z').innerText = "REC";
                    } else {
                        this.logger.log("Enregistrement arrêté", "sys");
                        document.getElementById('v-acc-z').innerText = "0.00";
                    }
                }
            },

            updateConfig(key, val) {
                this.state.config[key] = parseFloat(val);
                document.getElementById('disp-thresh').innerText = this.state.config.energyThreshold;
                document.getElementById('disp-vol').innerText = this.state.config.voiceVolume;
                document.getElementById('disp-pitch').innerText = this.state.config.voicePitch;
            }
        };

        // --- GESTIONNAIRE UI ---
        const UI = {
            toggleFileManager: () => {
                alert("Gestionnaire de fichiers:\n\n1. Session_001.webm (2.4MB)\n2. Session_002.webm (1.1MB)\n\n(Fonctionnalité simulée pour cette version)");
            }
        };

        // Init
        window.onload = () => {
            APP.logger.log("PUISSANCE ZEUS OVERKILL CHARGÉ", "ok");
        };

    </script>
</body>
</html>
