<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETERNITY v33 OMEGA ULTIMATE LAB – PART 1</title>
<style>
body{
  margin:0;
  font-family:'Courier New', monospace;
  background:#000814;
  color:#00ffd0;
  overflow:hidden;
}
#panel{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.85);
  border:2px solid #00ffd0;
  padding:12px;
  z-index:20;
  width:320px;
}
button{
  background:#001f30;
  border:1px solid #00ffd0;
  color:#00ffd0;
  padding:6px 10px;
  margin:4px;
  cursor:pointer;
  font-weight:bold;
}
#voiceBar{
  height:12px;
  width:0%;
  background:#ffaa00;
  margin-top:4px;
}
#logZone{
  position:absolute;
  bottom:10px;
  left:10px;
  width:400px;
  max-height:300px;
  overflow-y:auto;
  font-size:0.8rem;
  background:rgba(0,0,0,0.6);
  padding:6px;
  border:1px solid #00ffd0;
}
</style>
</head>
<body>
<div id="panel">
<h3>ETERNITY v33 OMEGA ULTIMATE LAB – PART 1</h3>
MIC : <span id="mic">OFF</span><br>
IA CLASS : <span id="ai">---</span><br>
<div>VOICE<div id="voiceBar"></div></div>
<button id="fftLarge">FFT 4096</button>
<button id="fftMedium">FFT 2048</button>
<button id="fftSmall">FFT 1024</button>
<button id="autoRec">AUTO REC</button>
<button id="evp">EVP MODE</button>
</div>
<div id="logZone"></div>
<script>
// ======================= VARIABLES GLOBALES =======================
let audioCtx, analyser, dataArray, fftSize = 2048;
let mediaRecorder, chunks = [];
let autoRec = false, evpMode = false;

// ======================= LOG =======================
function log(msg, color="#00ff88"){
  const div = document.createElement("div");
  div.style.color = color;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  div.textContent = `[${time}] ${msg}`;
  document.getElementById("logZone").prepend(div);
  if(document.getElementById("logZone").children.length>200) document.getElementById("logZone").lastChild.remove();
}

// ======================= INITIALISATION AUDIO =======================
async function initAudio(){
  audioCtx = new AudioContext();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = saveRecording;

  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = fftSize;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  source.connect(analyser);

  document.getElementById("mic").textContent = "ACTIVE";
  log("Audio actif et analysable");
}

// ======================= ENREGISTREMENT =======================
function record(){
  if(mediaRecorder.state==="inactive"){
    chunks=[];
    mediaRecorder.start();
    log("Enregistrement automatique démarré");
    setTimeout(()=>mediaRecorder.stop(), 3000);
  }
}
function saveRecording(){
  let blob = new Blob(chunks, {type:"audio/webm"});
  let url = URL.createObjectURL(blob);
  let a = document.createElement("a");
  a.href = url;
  a.download = "event_audio.webm";
  a.click();
  log("Enregistrement sauvegardé");
}

// ======================= LOOP AUDIO =======================
function loop(){
  requestAnimationFrame(loop);
  analyser.getByteFrequencyData(dataArray);
  // Calcul voix / énergie
  let sum=0;
  for(let i=0;i<dataArray.length;i++) sum+=dataArray[i];
  let voiceEnergy = Math.min(100, sum/dataArray.length);
  document.getElementById("voiceBar").style.width = voiceEnergy + "%";

  // Auto record si activé
  if(autoRec && voiceEnergy>30) record();
}
loop();

// ======================= BOUTONS =======================
document.getElementById("fftLarge").onclick=()=>{
  fftSize=4096; analyser.fftSize=fftSize; dataArray=new Uint8Array(analyser.frequencyBinCount); log("FFT 4096 activée");
};
document.getElementById("fftMedium").onclick=()=>{
  fftSize=2048; analyser.fftSize=fftSize; dataArray=new Uint8Array(analyser.frequencyBinCount); log("FFT 2048 activée");
};
document.getElementById("fftSmall").onclick=()=>{
  fftSize=1024; analyser.fftSize=fftSize; dataArray=new Uint8Array(analyser.frequencyBinCount); log("FFT 1024 activée");
};
document.getElementById("autoRec").onclick=()=>{
  autoRec=!autoRec;
  log("Auto Recording "+(autoRec?"ON":"OFF"));
};
document.getElementById("evp").onclick=()=>{
  evpMode=!evpMode;
  log("EVP Mode "+(evpMode?"ON":"OFF"), "#aa00ff");
};

// ======================= START =======================
initAudio();
log("PARTIE 1 : UI et audio setup prêts");
</script>
</body>
</html>

<!-- PARTIE 2 : Spectrogramme 3D GPU + Radar + Waterfall -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
// ======================= VARIABLES 3D =======================
let scene, camera, renderer;
let cubes = [];
let spectro3DOn = true, radarOn = true;

// ======================= INIT 3D =======================
function init3D(){
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
    camera.position.z = 200;
    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
}

// ======================= WATERFALL =======================
let waterfall = document.createElement('canvas');
waterfall.id = 'waterfallCanvas';
waterfall.style.position = 'absolute';
waterfall.style.bottom = '0';
waterfall.style.left = '0';
waterfall.width = window.innerWidth;
waterfall.height = 300;
document.body.appendChild(waterfall);
let wfCtx = waterfall.getContext('2d');

function drawWaterfall(){
    let w = waterfall.width;
    let h = waterfall.height;
    let img = wfCtx.getImageData(0,0,w,h);
    wfCtx.putImageData(img,0,1);
    for(let i=0;i<dataArray.length;i++){
        let v = dataArray[i];
        wfCtx.fillStyle = `hsl(${200-v},100%,50%)`;
        wfCtx.fillRect(i*(w/dataArray.length),0,2,1);
    }
}

// ======================= RADAR =======================
let radar = document.createElement('canvas');
radar.id = 'radarCanvas';
radar.width = 180;
radar.height = 180;
radar.style.position = 'absolute';
radar.style.top = '10px';
radar.style.right = '10px';
document.body.appendChild(radar);
let radarCtx = radar.getContext('2d');

function drawRadar(){
    if(!radarOn) return;
    radarCtx.clearRect(0,0,radar.width,radar.height);
    radarCtx.strokeStyle = "#00ffd0";
    radarCtx.beginPath();
    radarCtx.arc(90,90,80,0,Math.PI*2);
    radarCtx.stroke();
    let energy = 0;
    for(let i=0;i<dataArray.length;i++) energy+=dataArray[i];
    let angle = Math.random()*Math.PI*2;
    let r = energy/1500;
    let x = 90 + Math.cos(angle)*r;
    let y = 90 + Math.sin(angle)*r;
    radarCtx.fillStyle = "#00ff88";
    radarCtx.fillRect(x,y,4,4);
}

// ======================= DRAW SPECTRO 3D =======================
function draw3DSpectro(){
    if(!spectro3DOn) return;
    for(let i=0;i<dataArray.length;i+=2){
        let v = dataArray[i]/255;
        let geometry = new THREE.BoxGeometry(2,2,v*60);
        let color = evpMode?`hsl(${300-dataArray[i]},100%,50%)`:`hsl(${200-dataArray[i]},100%,50%)`;
        let material = new THREE.MeshBasicMaterial({color:new THREE.Color(color)});
        let cube = new THREE.Mesh(geometry,material);
        cube.position.x = i-256;
        cube.position.y = -60;
        cube.position.z = v*30;
        scene.add(cube);
        cubes.push(cube);
    }
    // Supprime anciens cubes pour ne pas saturer
    if(cubes.length>10000){ let old=cubes.shift(); scene.remove(old); }
}

// ======================= LOOP 3D =======================
function loop3D(){
    requestAnimationFrame(loop3D);
    analyser.getByteFrequencyData(dataArray);
    draw3DSpectro();
    drawRadar();
    drawWaterfall();
    renderer.render(scene,camera);
}

// ======================= BOUTONS PARTIE 2 =======================
let btnSpectro3D = document.createElement('button');
btnSpectro3D.textContent = 'Spectro 3D ON/OFF';
btnSpectro3D.style.position = 'absolute';
btnSpectro3D.style.top = '200px';
btnSpectro3D.style.left = '10px';
btnSpectro3D.onclick = ()=>{ spectro3DOn = !spectro3DOn; log("Spectro 3D "+(spectro3DOn?"ON":"OFF")); };
document.body.appendChild(btnSpectro3D);

let btnRadar = document.createElement('button');
btnRadar.textContent = 'Radar ON/OFF';
btnRadar.style.position = 'absolute';
btnRadar.style.top = '230px';
btnRadar.style.left = '10px';
btnRadar.onclick = ()=>{ radarOn = !radarOn; log("Radar "+(radarOn?"ON":"OFF")); };
document.body.appendChild(btnRadar);

// ======================= START PARTIE 2 =======================
init3D();
loop3D();
log("PARTIE 2 : Spectrogram 3D, Radar et Waterfall prêts");
</script>

<!-- PARTIE 3 : IA TensorFlow, classification 521 sons, EVP avancé, Auto Recording -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.9.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/yamnet@0.1.0/dist/yamnet.min.js"></script>
<script>
// ======================= VARIABLES IA =======================
let model, predictions = [];
let evpThreshold = 0.5; // seuil détection EVP
let aiOn = true;

// ======================= CHARGEMENT MODELE =======================
async function loadModel(){
    log("Chargement du modèle TensorFlow YAMNet...");
    model = await yamnet.load();
    log("Modèle chargé ✅");
}
loadModel();

// ======================= ANALYSE AUDIO =======================
async function analyseAudio(){
    if(!model) return;
    analyser.getByteTimeDomainData(dataArray);
    // Normalisation [-1,1]
    let floatData = Float32Array.from(dataArray, v => (v-128)/128);
    const inputTensor = tf.tensor(floatData).reshape([floatData.length,1]);
    const scores = await model.predict(inputTensor);
    const topScores = Array.from(scores.dataSync()).map((s,i)=>({score:s,index:i}));
    topScores.sort((a,b)=>b.score-a.score);
    const top5 = topScores.slice(0,5);
    predictions = top5.map(p=>`${model.classes[p.index]} (${(p.score*100).toFixed(1)}%)`);
    document.getElementById("ai").textContent = predictions[0];
    // EVP detection simple
    if(evpMode && top5[0].score<evpThreshold){
        log(`EVP détecté : signal faible et mystérieux`, "#aa00ff");
        if(autoRec) record();
    }
}

// ======================= AUTO IA LOOP ======================
async function iaLoop(){
    requestAnimationFrame(iaLoop);
    if(aiOn) await analyseAudio();
}
iaLoop();

// ======================= BOUTONS IA =======================
let btnIA = document.createElement('button');
btnIA.textContent = 'IA ON/OFF';
btnIA.style.position='absolute';
btnIA.style.top='260px';
btnIA.style.left='10px';
btnIA.onclick = ()=>{ aiOn=!aiOn; log("IA "+(aiOn?"ON":"OFF"),"#00ff88"); };
document.body.appendChild(btnIA);

let btnEVPThreshold = document.createElement('button');
btnEVPThreshold.textContent='EVP Seuil+';
btnEVPThreshold.style.position='absolute';
btnEVPThreshold.style.top='290px';
btnEVPThreshold.style.left='10px';
btnEVPThreshold.onclick = ()=>{ evpThreshold=Math.min(1,evpThreshold+0.05); log(`Seuil EVP = ${evpThreshold.toFixed(2)}`, "#aa00ff"); };
document.body.appendChild(btnEVPThreshold);

let btnEVPThresholdDec = document.createElement('button');
btnEVPThresholdDec.textContent='EVP Seuil-';
btnEVPThresholdDec.style.position='absolute';
btnEVPThresholdDec.style.top='320px';
btnEVPThresholdDec.style.left='10px';
btnEVPThresholdDec.onclick = ()=>{ evpThreshold=Math.max(0,evpThreshold-0.05); log(`Seuil EVP = ${evpThreshold.toFixed(2)}`, "#aa00ff"); };
document.body.appendChild(btnEVPThresholdDec);

log("PARTIE 3 : IA TensorFlow + EVP + Auto Recording avancé prêts");
</script>


<!-- PARTIE 4 : Enregistreur WAV, journal scientifique, export automatique -->
<script>
// ======================= ENREGISTREUR WAV =======================
let recBuffers = [], isRecordingWAV = false;

function startWAVRecording(){
    if(isRecordingWAV) return;
    isRecordingWAV = true;
    recBuffers = [];
    log("Enregistrement WAV démarré", "#ffaa00");
}

function stopWAVRecording(){
    if(!isRecordingWAV) return;
    isRecordingWAV = false;
    // Convertir Float32Array en WAV
    let bufferLength = recBuffers.reduce((sum,b)=>sum+b.length,0);
    let interleaved = new Float32Array(bufferLength);
    let offset = 0;
    for(let i=0;i<recBuffers.length;i++){
        interleaved.set(recBuffers[i], offset);
        offset += recBuffers[i].length;
    }

    let wavBlob = encodeWAV(interleaved, audioCtx.sampleRate);
    let url = URL.createObjectURL(wavBlob);
    let a = document.createElement('a');
    a.href = url;
    a.download = `ETERNITY_EVENT_${Date.now()}.wav`;
    a.click();
    log("WAV sauvegardé automatiquement", "#ffaa00");
}

function encodeWAV(samples, sampleRate){
    let buffer = new ArrayBuffer(44 + samples.length*2);
    let view = new DataView(buffer);
    function writeString(view, offset, string){
        for(let i=0;i<string.length;i++) view.setUint8(offset+i,string.charCodeAt(i));
    }
    let offset=0;
    writeString(view, offset, 'RIFF'); offset+=4;
    view.setUint32(offset, 36 + samples.length*2, true); offset+=4;
    writeString(view, offset, 'WAVE'); offset+=4;
    writeString(view, offset, 'fmt '); offset+=4;
    view.setUint32(offset,16,true); offset+=4;
    view.setUint16(offset,1,true); offset+=2;
    view.setUint16(offset,1,true); offset+=2;
    view.setUint32(offset, sampleRate,true); offset+=4;
    view.setUint32(offset, sampleRate*2,true); offset+=4;
    view.setUint16(offset,2,true); offset+=2;
    view.setUint16(offset,16,true); offset+=2;
    writeString(view, offset, 'data'); offset+=4;
    view.setUint32(offset, samples.length*2,true); offset+=4;
    // PCM
    let pos=44;
    for(let i=0;i<samples.length;i++){
        let s=Math.max(-1,Math.min(1,samples[i]));
        view.setInt16(pos, s<0?s*0x8000:s*0x7FFF,true);
        pos+=2;
    }
    return new Blob([view], {type:"audio/wav"});
}

// ======================= ENREGISTREMENT EN TEMPS REEL =======================
function captureWAV(){
    if(!isRecordingWAV) return;
    let floatData = new Float32Array(dataArray.length);
    for(let i=0;i<dataArray.length;i++) floatData[i] = (dataArray[i]-128)/128;
    recBuffers.push(floatData);
}

// ======================= LOOP D'ENREGISTREMENT =======================
function wavLoop(){
    requestAnimationFrame(wavLoop);
    captureWAV();
}
wavLoop();

// ======================= EXPORT JOURNAL SCIENTIFIQUE =======================
let exportBtn = document.createElement('button');
exportBtn.textContent='EXPORT JOURNAL';
exportBtn.style.position='absolute';
exportBtn.style.top='350px';
exportBtn.style.left='10px';
exportBtn.onclick = ()=>{
    let blob = new Blob([document.getElementById("logZone").innerText], {type:"text/plain"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = `ETERNITY_JOURNAL_${Date.now()}.txt`;
    a.click();
    log("Journal scientifique exporté", "#ffaa00");
};
document.body.appendChild(exportBtn);

// ======================= BOUTON ENREGISTREMENT WAV =======================
let wavBtn = document.createElement('button');
wavBtn.textContent='WAV ON/OFF';
wavBtn.style.position='absolute';
wavBtn.style.top='380px';
wavBtn.style.left='10px';
wavBtn.onclick = ()=>{
    if(isRecordingWAV){ stopWAVRecording(); }
    else{ startWAVRecording(); }
};
document.body.appendChild(wavBtn);

// ======================= JOURNAL AUTO =======================
setInterval(()=>{
    if(evpMode && voiceEnergy>25) log(`EVP EVENT DETECTED – Energy=${voiceEnergy.toFixed(2)}`, "#aa00ff");
    if(autoRec && voiceEnergy>30) record();
}, 3000);

log("PARTIE 4 : Enregistreur WAV, journal scientifique et export prêts");
</script>
