<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB ULTRA</title>
<style>
:root {
  --primary: #00ffd0;
  --secondary: #0088aa;
  --bg: #000814;
  --panel: rgba(0, 15, 25, 0.95);
  --btn-bg: #001f30;
  --btn-active: #00ffd0;
  --btn-active-text: #000;
  --text: #e0e0e0;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden; /* Empêche le scroll global, on scroll les zones internes */
}

/* HEADER COMPACT */
#header {
  padding: 8px;
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.8rem;
  flex-shrink: 0;
}
#header span { margin: 0 5px; }

/* ZONE VISUALISATION (Prend l'espace restant) */
#vizContainer {
  flex: 1;
  position: relative;
  background: #000;
  overflow: hidden;
}
#cameraFeed {
  position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; display: none;
}

/* ZONE CONTROLES (Déroulable) */
#controlsArea {
  background: var(--panel);
  border-top: 2px solid var(--primary);
  max-height: 45vh; /* Limite la hauteur pour laisser voir la suite */
  overflow-y: auto; /* Scroll actif ici */
  padding: 10px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* GRILLE BOUTONS (3 colonnes pour Note 60) */
.button-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

button {
  background: var(--btn-bg);
  border: 1px solid var(--secondary);
  color: var(--primary);
  padding: 8px 2px;
  font-size: 0.7rem;
  font-weight: bold;
  cursor: pointer;
  border-radius: 4px;
  text-align: center;
}

button:disabled { opacity: 0.3; }
button.active {
  background: var(--btn-active);
  color: var(--btn-active-text);
  box-shadow: 0 0 8px var(--primary);
}
button.danger {
  border-color: red; color: red;
}
button.danger.active {
  background: red; color: white;
}

/* PARAMÈTRES SLIDERS */
.sliders {
  background: rgba(0,0,0,0.5);
  padding: 8px;
  border-radius: 4px;
  font-size: 0.75rem;
}
.slider-row {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;
}
input[type="range"] { width: 50%; accent-color: var(--primary); }

/* BARS DE NIVEAU */
#barsArea {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  margin-bottom: 5px;
  font-size: 0.7rem;
}
.bar-box { background: #111; height: 8px; width: 100%; border: 1px solid #333; margin-top:2px; position: relative;}
.bar-fill { height: 100%; width: 0%; transition: width 0.1s; }

/* LOGS */
#logZone {
  height: 100px;
  background: #000;
  border-top: 1px solid var(--primary);
  padding: 5px;
  font-size: 0.65rem;
  overflow-y: auto;
  color: #aaa;
  font-family: monospace;
}
.log-warn { color: yellow !important; }
.log-err { color: red !important; }
.log-suc { color: #0f0 !important; }

/* CANVAS */
canvas { position: absolute; }
#waterfallCanvas { bottom: 0; left: 0; height: 60px; width: 100%; opacity: 0.8; z-index: 2; }
#radarCanvas { top: 10px; right: 10px; width: 80px; height: 80px; z-index: 3; }

/* LOADING */
#loading {
  position: fixed; inset: 0; background: #000; z-index: 999;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
</style>
</head>
<body>

<div id="loading">
  <h2 style="color:var(--primary)">ETERNITY LAB ULTRA</h2>
  <div id="loadMsg">Initialisation...</div>
</div>

<!-- HEADER -->
<div id="header">
  <div>MIC: <span id="micStatus" style="color:red">OFF</span></div>
  <div>IA: <span id="aiStatus" style="color:orange">CHECK</span></div>
  <div>BAT: <span id="wakeStatus">OFF</span></div>
</div>

<!-- VISUALISATION -->
<div id="vizContainer">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="radarCanvas"></canvas>
  <canvas id="waterfallCanvas"></canvas>
</div>

<!-- CONTROLES (Scrollable) -->
<div id="controlsArea">
  
  <!-- Barres de niveau -->
  <div id="barsArea">
    <div>
      <div>INPUT</div>
      <div class="bar-box"><div id="voiceBar" class="bar-fill" style="background:var(--voice)"></div></div>
    </div>
    <div>
      <div>TRIGGER</div>
      <div class="bar-box"><div id="threshBar" class="bar-fill" style="background:var(--primary); width:30%"></div></div>
    </div>
  </div>

  <!-- BOUTON PRINCIPAL -->
  <button id="startBtn" style="font-size:1rem; padding:15px; background:var(--success); color:black; border:none;">START SYSTEM</button>

  <!-- GRILLE DE COMMANDES -->
  <div class="button-grid">
    <!-- AUDIO -->
    <button id="monitorBtn" disabled>🎧 MONITOR</button>
    <button id="filterBtn" disabled>🔇 FILTRE HP</button>
    <button id="recBtn" disabled>⏺ AUTO REC</button>
    
    <!-- VISUALS -->
    <button id="fftBtn" disabled>FFT 1024</button>
    <button id="evpBtn" disabled>🔮 EVP MODE</button>
    <button id="radarBtn" disabled>📡 RADAR</button>
    
    <!-- TOOLS -->
    <button id="camBtn" disabled>📷 CAM</button>
    <button id="flashBtn" disabled>🔦 TORCHE</button>
    <button id="wakeBtn">📱 SCREEN ON</button>
    <button id="themeBtn">🎨 THEME</button>
    <button id="clearBtn">🗑 CLEAR LOG</button>
  </div>

  <!-- SLIDERS -->
  <div class="sliders">
    <div class="slider-row">
      <span>Gain Mic</span>
      <input type="range" id="gainRange" min="0" max="3" step="0.1" value="1">
    </div>
    <div class="slider-row">
      <span>Seuil (Trigger)</span>
      <input type="range" id="threshRange" min="0" max="100" value="30">
    </div>
    <div class="slider-row">
      <span>Vitesse Radar</span>
      <input type="range" id="radarRange" min="1" max="20" value="5">
    </div>
  </div>
</div>

<!-- LOGS -->
<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// --- CONFIGURATION ---
const config = {
  fftSize: 1024,
  gain: 1,
  threshold: 30,
  monitor: false,
  filter: false,
  filterFreq: 300, // Coupe les basses < 300Hz
  radarSpeed: 0.05,
  evp: false,
  radar: false,
  autoRec: false,
  theme: 0
};

const themes = [
  { p: '#00ffd0', s: '#0088aa', v: '#ffaa00' }, // Cyan
  { p: '#00ff00', s: '#008800', v: '#ffff00' }, // Matrix
  { p: '#ff0055', s: '#880022', v: '#00ffff' }, // Red Alert
  { p: '#ffffff', s: '#888888', v: '#ff0000' }  // B&W
];

// --- STATE ---
const state = {
  ctx: null, analyser: null, gainNode: null, filterNode: null, source: null,
  micStream: null, vidStream: null, recorder: null, isRec: false,
  running: false, radarAngle: 0,
  dataArray: null, bufferLength: 0,
  wakeLock: null
};

// --- DOM ELEMENTS ---
const el = (id) => document.getElementById(id);
const els = {
  load: el('loading'), loadMsg: el('loadMsg'),
  log: el('logZone'), mic: el('micStatus'), ai: el('aiStatus'), wake: el('wakeStatus'),
  start: el('startBtn'), monitor: el('monitorBtn'), filter: el('filterBtn'),
  rec: el('recBtn'), fft: el('fftBtn'), evp: el('evpBtn'), radar: el('radarBtn'),
  cam: el('camBtn'), flash: el('flashBtn'), wake: el('wakeBtn'), theme: el('themeBtn'), clear: el('clearBtn'),
  voice: el('voiceBar'), thresh: el('threshBar'),
  viz: el('vizContainer'), video: el('cameraFeed'),
  sGain: el('gainRange'), sThresh: el('threshRange'), sRadar: el('radarRange')
};

// --- LOG SYSTEM ---
function log(msg, type='info') {
  const div = document.createElement('div');
  div.textContent = `> ${msg}`;
  if(type==='err') div.className='log-err';
  if(type==='warn') div.className='log-warn';
  if(type==='suc') div.className='log-suc';
  els.log.appendChild(div);
  els.log.scrollTop = els.log.scrollHeight;
}

// --- INIT SYSTEM ---
window.onload = async () => {
  // Check IA
  if (typeof tf !== 'undefined') {
    els.ai.textContent = "READY (LOCAL)";
    els.ai.style.color = "var(--success)";
    // Wake up TF backend
    tf.tidy(() => { const t = tf.tensor1d([1,2]); t.mul(2); });
    log("TensorFlow.js initialisé (Mode Local)", "suc");
  } else {
    els.ai.textContent = "MISSING";
    els.ai.style.color = "red";
    log("TensorFlow.js introuvable", "err");
  }
  
  els.load.style.display = 'none';
  log("Système prêt. START pour commencer.");
};

// --- AUDIO ENGINE ---
async function startSystem() {
  els.load.style.display = 'flex';
  els.loadMsg.textContent = "Accès Micro...";
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    state.micStream = stream;
    
    state.ctx = new (window.AudioContext || window.webkitAudioContext)();
    state.analyser = state.ctx.createAnalyser();
    state.analyser.fftSize = config.fftSize;
    state.bufferLength = state.analyser.frequencyBinCount;
    state.dataArray = new Uint8Array(state.bufferLength);
    
    state.gainNode = state.ctx.createGain();
    state.gainNode.gain.value = config.gain;
    
    state.filterNode = state.ctx.createBiquadFilter();
    state.filterNode.type = 'highpass';
    state.filterNode.frequency.value = config.filterFreq;
    state.filterNode.Q.value = 1;

    // Graph: Source -> Filter -> Gain -> Analyser -> (Destination)
    state.source = state.ctx.createMediaStreamSource(stream);
    state.source.connect(state.filterNode);
    state.filterNode.connect(state.gainNode);
    state.gainNode.connect(state.analyser);
    
    // Monitor init
    if(config.monitor) state.analyser.connect(state.ctx.destination);

    // Recorder
    state.recorder = new MediaRecorder(stream);
    state.recorder.ondataavailable = e => {
      if(e.data.size > 0) saveBlob(e.data);
    };
    state.recorder.onstop = () => { state.isRec = false; els.rec.classList.remove('active'); };

    // UI Update
    state.running = true;
    els.mic.textContent = "ON"; els.mic.style.color = "#0f0";
    els.start.textContent = "STOP SYSTEM";
    els.start.style.background = "red";
    enableButtons(true);
    
    initVisuals();
    loop();
    log("Système Actif. Micro connecté.", "suc");

  } catch (e) {
    log("Erreur Micro: " + e.message, "err");
  } finally {
    els.load.style.display = 'none';
  }
}

function stopSystem() {
  if(state.micStream) state.micStream.getTracks().forEach(t=>t.stop());
  if(state.vidStream) stopCam();
  if(state.ctx) state.ctx.close();
  
  state.running = false;
  els.mic.textContent = "OFF"; els.mic.style.color = "red";
  els.start.textContent = "START SYSTEM";
  els.start.style.background = "var(--success)";
  enableButtons(false);
  
  // Clear canvas
  els.viz.innerHTML = ''; 
  els.viz.appendChild(els.video); // Remettre video
  log("Système arrêté.");
}

// --- FEATURE: MONITOR (ÉCOUTE) ---
function toggleMonitor() {
  config.monitor = !config.monitor;
  if(config.monitor) {
    state.analyser.connect(state.ctx.destination);
    els.monitor.classList.add('active');
    els.monitor.classList.add('danger');
    log("MONITOR ON - Attention au feedback (Larsen) !", "warn");
  } else {
    state.analyser.disconnect(state.ctx.destination);
    els.monitor.classList.remove('active');
    els.monitor.classList.remove('danger');
    log("MONITOR OFF");
  }
}

// --- FEATURE: FILTER (Anti-Bruit) ---
function toggleFilter() {
  config.filter = !config.filter;
  if(config.filter) {
    state.filterNode.frequency.value = config.filterFreq; // 300Hz cutoff
    els.filter.classList.add('active');
    log(`Filtre Passe-Haut ON (> ${config.filterFreq}Hz)`);
  } else {
    state.filterNode.frequency.value = 0; // Flat
    els.filter.classList.remove('active');
    log("Filtre OFF");
  }
}

// --- FEATURE: WAKE LOCK (Screen On) ---
async function toggleWake() {
  if (!state.wakeLock) {
    try {
      state.wakeLock = await navigator.wakeLock.request('screen');
      els.wake.classList.add('active');
      els.wake.textContent = "📱 LOCKED";
      els.wakeStatus.textContent = "ON";
      log("Écran verrouillé allumé.", "suc");
    } catch (err) { log("Wake Lock error: " + err, "err"); }
  } else {
    state.wakeLock.release();
    state.wakeLock = null;
    els.wake.classList.remove('active');
    els.wake.textContent = "📱 SCREEN ON";
    els.wakeStatus.textContent = "OFF";
    log("Wake Lock libéré.");
  }
}

// --- RECORDING ---
function checkAutoRec(avg) {
  if(config.autoRec && avg > config.threshold && !state.isRec) {
    startRec();
  }
}

function startRec() {
  state.isRec = true;
  state.recorder.start();
  els.rec.classList.add('active');
  log("🔴 ENREGISTREMENT DÉCLENCHÉ (Anomalie)", "warn");
  setTimeout(() => {
    if(state.isRec) state.recorder.stop();
  }, 5000);
}

function saveBlob(blobData) {
  const blob = new Blob([blobData], { type: 'audio/webm' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `EVP_${Date.now()}.webm`;
  a.click(); log("Enregistrement sauvegardé.", "suc");
}

// --- VISUALIZATION LOOP ---
function initVisuals() {
  // Waterfall
  const c1 = document.createElement('canvas');
  c1.id='waterfallCanvas'; c1.width=els.viz.clientWidth; c1.height=60;
  els.viz.appendChild(c1);
  state.wfCtx = c1.getContext('2d');
  
  // Radar
  const c2 = document.createElement('canvas');
  c2.id='radarCanvas'; c2.width=100; c2.height=100;
  els.viz.appendChild(c2);
  state.rdCtx = c2.getContext('2d');
}

function loop() {
  if(!state.running) return;
  requestAnimationFrame(loop);
  
  state.analyser.getByteFrequencyData(state.dataArray);
  
  // Calculs
  let sum = 0;
  for(let i=0; i<state.bufferLength; i++) sum += state.dataArray[i];
  const avg = sum / state.bufferLength;
  
  // UI Bars
  els.voice.style.width = Math.min(100, avg) + '%';
  els.thresh.style.width = config.threshold + '%';
  
  // Logic
  checkAutoRec(avg);
  
  // Draw
  drawWaterfall();
  if(config.radar) drawRadar(avg);
}

function drawWaterfall() {
  const ctx = state.wfCtx, w=ctx.canvas.width, h=ctx.canvas.height;
  const img = ctx.getImageData(0,0,w,h-1);
  ctx.putImageData(img,0,1);
  
  const hue = config.evp ? 280 : 180;
  for(let i=0; i<state.bufferLength; i+=2) {
    const v = state.dataArray[i];
    ctx.fillStyle = `hsl(${hue - v}, 100%, 50%)`;
    ctx.fillRect(i*(w/state.bufferLength), 0, 2, 1);
  }
}

function drawRadar(intensity) {
  const ctx = state.rdCtx, cx=50, cy=50;
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,100,100);
  
  // Grid
  ctx.strokeStyle = 'rgba(0,255,208,0.3)'; ctx.beginPath(); ctx.arc(cx,cy,40,0,7); ctx.stroke();
  
  // Scan
  state.radarAngle += config.radarSpeed;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(state.radarAngle);
  ctx.fillStyle = 'rgba(0,255,208,0.5)';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,45,-0.2,0.2); ctx.fill();
  ctx.restore();
  
  // Blips
  if(intensity > config.threshold && Math.random()>0.8) {
    const r = Math.random()*35; const a = Math.random()*6.28;
    ctx.fillStyle='red'; ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r, cy+Math.sin(a)*r, 2,0,7); ctx.fill();
  }
}

// --- CAMERA ---
async function toggleCam() {
  if(!state.vidStream) {
    try {
      state.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      els.video.srcObject = state.vidStream;
      els.video.style.display = 'block';
      els.cam.classList.add('active');
      log("Caméra active.");
    } catch(e) { log("Erreur caméra", "err"); }
  } else {
    stopCam();
  }
}
function stopCam() {
  if(state.vidStream) state.vidStream.getTracks().forEach(t=>t.stop());
  state.vidStream = null; els.video.style.display = 'none'; els.cam.classList.remove('active');
}

// --- UTILS ---
function enableButtons(en) {
  const btns = [els.monitor, els.filter, els.rec, els.fft, els.evp, els.radar, els.cam, els.flash];
  btns.forEach(b => b.disabled = !en);
}
function toggleTheme() {
  config.theme = (config.theme + 1) % themes.length;
  const t = themes[config.theme];
  document.documentElement.style.setProperty('--primary', t.p);
  document.documentElement.style.setProperty('--secondary', t.s);
  document.documentElement.style.setProperty('--voice', t.v);
  log("Thème changé.");
}

// --- EVENTS ---
els.start.onclick = () => state.running ? stopSystem() : startSystem();
els.monitor.onclick = toggleMonitor;
els.filter.onclick = toggleFilter;
els.rec.onclick = () => { config.autoRec = !config.autoRec; els.rec.classList.toggle('active'); log(`Auto Rec: ${config.autoRec}`); };
els.fft.onclick = () => { config.fftSize = config.fftSize===1024?2048:1024; state.analyser.fftSize=config.fftSize; state.dataArray = new Uint8Array(state.analyser.frequencyBinCount); els.fft.textContent=`FFT ${config.fftSize}`; };
els.evp.onclick = () => { config.evp = !config.evp; els.evp.classList.toggle('active'); log(`Mode EVP: ${config.evp}`); };
els.radar.onclick = () => { config.radar = !config.radar; els.radar.classList.toggle('active'); };
els.cam.onclick = toggleCam;
els.flash.onclick = async () => {
  if(!state.vidStream) return log("Caméra requise", "warn");
  try {
    const track = state.vidStream.getVideoTracks()[0];
    const caps = track.getCapabilities();
    if(!caps.torch) return log("Pas de torche", "err");
    await track.applyConstraints({advanced: [{torch: !els.flash.classList.contains('active')}]});
    els.flash.classList.toggle('active');
  } catch(e){ log("Erreur torche", "err"); }
};
els.wake.onclick = toggleWake;
els.theme.onclick = toggleTheme;
els.clear.onclick = () => { els.log.innerHTML = ''; };

// Sliders
els.sGain.oninput = (e) => { config.gain = parseFloat(e.target.value); if(state.gainNode) state.gainNode.gain.value = config.gain; };
els.sThresh.oninput = (e) => { config.threshold = parseInt(e.target.value); els.thresh.style.width = config.threshold + '%'; };
els.sRadar.oninput = (e) => { config.radarSpeed = parseInt(e.target.value)/100; };

// Resize
window.onresize = () => {
  if(state.wfCtx) { state.wfCtx.canvas.width = els.viz.clientWidth; }
};

</script>
</body>
</html>
