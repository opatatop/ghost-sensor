<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXCELLENCE - FIX REALME</title>
    <style>
        :root {
            /* Thème par défaut (Or Excellence) - Sera écrasé par JS */
            --primary: #FFD700;
            --secondary: #B8860B;
            --bg: #050505;
            --panel: #0f0f0f;
            --text: #ffffff;
            --accent: #fff;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* HEADER */
        header {
            background: linear-gradient(180deg, #1a1a1a, #000);
            border-bottom: 3px solid var(--primary);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100;
        }
        h1 { 
            margin: 0; font-size: 1.2rem; color: var(--primary); 
            text-shadow: 0 0 10px var(--primary); letter-spacing: 1px; text-transform: uppercase; font-weight: 900;
        }
        .header-controls { display: flex; gap: 10px; }
        .icon-btn {
            background: none; border: 1px solid var(--primary); color: var(--primary);
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        /* MAIN & VISUALIZER */
        main { flex: 1; position: relative; display: flex; flex-direction: column; background: radial-gradient(circle, #111, #000); }
        #visualizer { flex: 1; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        
        #displayOverlay {
            position: absolute; bottom: 15%; left: 5%; width: 90%;
            text-align: center; pointer-events: none; z-index: 10;
        }
        #mainText {
            font-size: 2rem; font-weight: 900; color: #fff;
            background: rgba(0,0,0,0.85); padding: 15px;
            text-transform: uppercase; border: 2px solid var(--primary);
            margin-bottom: 10px; min-height: 3.5rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); letter-spacing: 1px;
        }
        #subText { font-size: 0.8rem; color: var(--secondary); letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }

        /* CONTROLS */
        #controls {
            background: var(--panel); padding: 15px;
            display: grid; gap: 10px; border-top: 1px solid #333;
        }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button {
            background: #222; border: 1px solid var(--primary); color: var(--primary);
            padding: 15px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; font-family: inherit; border-radius: 4px;
        }
        button:active { transform: scale(0.97); }
        button.primary-btn { 
            background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); border: none; font-weight: 900;
        }
        button.danger { border-color: #ff4444; color: #ff4444; }
        button.danger:active { background: #ff4444; color: #fff; }
        button.active { background: var(--secondary); color: #000; }

        /* TERMINAL */
        #terminal {
            height: 90px; background: #000; border-top: 1px solid #333;
            padding: 8px; font-size: 0.65rem; overflow-y: auto; 
            color: #888; font-family: 'Courier New', monospace;
        }
        .log-line { margin-bottom: 3px; border-left: 2px solid #555; padding-left: 6px; }
        .log-sys { color: #888; }
        .log-cmd { color: var(--primary); border-color: var(--primary); font-weight: bold; }
        .log-err { color: #ff4444; border-color: #ff4444; }

        /* MODAL SETTINGS */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200;
            display: none; flex-direction: column; padding: 20px; overflow-y: auto;
        }
        .modal-content {
            max-width: 500px; margin: 0 auto; width: 100%; background: #111;
            border: 2px solid var(--primary); padding: 20px; border-radius: 8px;
        }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        label { color: var(--text); font-size: 0.9rem; }
        input[type=range] { width: 50%; accent-color: var(--primary); }
        .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .theme-btn { height: 40px; border-radius: 5px; border: 2px solid #fff; cursor: pointer; }
        .close-btn { float: right; color: #ff4444; cursor: pointer; font-size: 1.5rem; }

    </style>
</head>
<body>

<header>
    <h1>Excellence <span style="font-size:0.5em; color:var(--text)">FIX v2</span></h1>
    <div class="header-controls">
        <div id="status" style="font-size:0.7rem; font-weight:bold; padding:5px; border:1px solid var(--secondary); color:var(--secondary); border-radius:4px;">OFFLINE</div>
        <button class="icon-btn" onclick="App.toggleSettings()">⚙</button>
    </div>
</header>

<main>
    <div id="visualizer">
        <canvas id="scopeCanvas"></canvas>
        <div id="displayOverlay">
            <div id="mainText">INITIALISATION</div>
            <div id="subText">CHARGEMENT</div>
        </div>
    </div>
</main>

<div id="controls">
    <button id="mainBtn" class="primary-btn" onclick="App.toggleExcellence()">⚡ ACTIVER EXCELLENCE</button>
    <div class="row-2">
        <button onclick="App.say('Test audio')">🔊 TEST</button>
        <button class="danger" onclick="App.stopSystem()">⏹ ARRÊTER</button>
    </div>
</div>

<div id="terminal">
    <div class="log-line log-sys">> Excellence Fix v2 chargé.</div>
    <div class="log-line log-sys">> Prêt à corriger le conflit audio.</div>
</div>

<!-- MODAL RÉGLAGES -->
<div id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="App.toggleSettings()">×</span>
        <h2 style="color:var(--primary); margin-top:0;">PARAMÈTRES</h2>
        
        <h3 style="color:#aaa; font-size:0.8rem;">SYNTHÈSE VOCALE</h3>
        <div class="setting-row">
            <label>Hauteur</label>
            <input type="range" id="pitch" min="0.1" max="2" step="0.1" value="0.5" oninput="Config.update('pitch', this.value)">
        </div>
        <div class="setting-row">
            <label>Vitesse</label>
            <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1.0" oninput="Config.update('rate', this.value)">
        </div>
        <div class="setting-row">
            <label>Volume</label>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1" oninput="Config.update('volume', this.value)">
        </div>

        <h3 style="color:#aaa; font-size:0.8rem; margin-top:20px;">THÈME VISUEL</h3>
        <div class="theme-grid">
            <div class="theme-btn" style="background:#FFD700" onclick="Config.setTheme('gold')"></div>
            <div class="theme-btn" style="background:#00ffcc" onclick="Config.setTheme('cyber')"></div>
            <div class="theme-btn" style="background:#ff3333" onclick="Config.setTheme('red')"></div>
            <div class="theme-btn" style="background:#00ff00" onclick="Config.setTheme('matrix')"></div>
        </div>

        <button style="width:100%; margin-top:20px; padding:15px;" onclick="App.toggleSettings()">FERMER</button>
    </div>
</div>

<script>
/**
 * =========================================================================
 * EXCELLENCE - FIX REALME (SÉQUENCAGE AUDIO STRICT)
 * =========================================================================
 */

// --- MODULE 1 : CONFIGURATION ---
const Config = {
    data: { pitch: 0.5, rate: 1.0, volume: 1.0, theme: 'gold', isActive: false },
    themes: {
        'gold': { primary: '#FFD700', secondary: '#B8860B' },
        'cyber': { primary: '#00ffcc', secondary: '#0088aa' },
        'red': { primary: '#ff3333', secondary: '#aa0000' },
        'matrix': { primary: '#00ff00', secondary: '#008800' }
    },
    load() {
        const saved = localStorage.getItem('excellence_config');
        if (saved) this.data = { ...this.data, ...JSON.parse(saved) };
        this.applyTheme();
        this.updateUI();
    },
    save() { localStorage.setItem('excellence_config', JSON.stringify(this.data)); },
    update(key, value) { this.data[key] = parseFloat(value); this.save(); },
    setTheme(name) { this.data.theme = name; this.applyTheme(); this.save(); },
    applyTheme() {
        const t = this.themes[this.data.theme] || this.themes['gold'];
        document.documentElement.style.setProperty('--primary', t.primary);
        document.documentElement.style.setProperty('--secondary', t.secondary);
    },
    updateUI() {
        document.getElementById('pitch').value = this.data.pitch;
        document.getElementById('rate').value = this.data.rate;
        document.getElementById('volume').value = this.data.volume;
    }
};

// --- MODULE 2 : MOTEUR AUDIO (Optimisé pour éviter les conflits) ---
const AudioEngine = {
    ctx: null, stream: null, analyser: null, isInit: false,
    
    async init() {
        // Destruction propre avant init
        if (this.isInit) this.destroy();

        try {
            const AC = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AC();
            
            // CRUCIAL : Réveil immédiat du contexte
            if (this.ctx.state === 'suspended') await this.ctx.resume();
            
            // Demande du flux audio
            this.stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });

            this.analyser = this.ctx.createAnalyser();
            this.analyser.fftSize = 256;
            
            // Connexion source -> analyseur (PAS vers destination pour éviter feedback)
            const source = this.ctx.createMediaStreamSource(this.stream);
            source.connect(this.analyser);
            
            this.isInit = true;
            return true;
        } catch (e) { 
            App.log("Erreur Audio: " + e.message, 'err'); 
            return false; 
        }
    },
    
    getDataArray() {
        if (!this.analyser) return new Uint8Array(0);
        const arr = new Uint8Array(this.analyser.frequencyBinCount);
        this.analyser.getByteFrequencyData(arr);
        return arr;
    },
    
    speak(text, onEnd) {
        window.speechSynthesis.cancel();
        if (!text) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'fr-FR';
        u.pitch = Config.data.pitch;
        u.rate = Config.data.rate;
        u.volume = Config.data.volume;
        
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.lang === 'fr-FR') || voices[0];
        if(voice) u.voice = voice;
        
        u.onend = () => { if (onEnd) onEnd(); };
        window.speechSynthesis.speak(u);
    },
    
    destroy() {
        if (this.stream) this.stream.getTracks().forEach(t => t.stop());
        if (this.ctx) this.ctx.close();
        this.isInit = false;
        this.stream = null;
        this.ctx = null;
        this.analyser = null;
    }
};

// --- MODULE 3 : MOTEUR VISUEL ---
const VisualEngine = {
    canvas: null, ctx: null, isRunning: false, animId: null,
    init() {
        this.canvas = document.getElementById('scopeCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
    },
    resize() {
        if (this.canvas) {
            this.canvas.width = this.canvas.parentElement.clientWidth;
            this.canvas.height = this.canvas.parentElement.clientHeight;
        }
    },
    start() { if (!this.isRunning) { this.isRunning = true; this.loop(); } },
    stop() { this.isRunning = false; if (this.animId) cancelAnimationFrame(this.animId); },
    loop() {
        if (!this.isRunning) return;
        const w = this.canvas.width, h = this.canvas.height;
        this.ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
        this.ctx.fillRect(0,0,w,h);

        let data = AudioEngine.isInit ? AudioEngine.getDataArray() : new Uint8Array(128).map(()=>Math.random()*10);
        const barW = (w/data.length)*2.5;
        let x = 0;
        const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();

        for(let i=0; i<data.length; i++) {
            const barH = (data[i]/255)*h;
            this.ctx.fillStyle = primaryColor;
            this.ctx.shadowBlur = 15; 
            this.ctx.shadowColor = primaryColor;
            this.ctx.fillRect(x, h-barH, barW, barH);
            this.ctx.shadowBlur = 0;
            x+=barW+1;
        }
        this.animId = requestAnimationFrame(()=>this.loop());
    }
};

// --- MODULE 4 : CONTRÔLE SYSTÈME ---
const ControlEngine = {
    execute(text) {
        const lower = text.toLowerCase();
        let type = null; 
        let target = "";
        let msg = "";

        if (lower.includes('réglage') || lower.includes('paramètre')) {
            type = 'intent'; target = "intent://#Intent;action=android.settings.SETTINGS;end"; msg = "Ouverture paramètres.";
        }
        else if (lower.includes('mise à jour') || lower.includes('maj')) {
            type = 'intent'; target = "intent://#Intent;action=android.settings.DEVICE_INFO_SETTINGS;end"; msg = "Ouverture mises à jour.";
        }
        else if (lower.includes('wi-fi') || lower.includes('wifi')) {
            type = 'intent'; target = "intent://#Intent;action=android.settings.WIFI_SETTINGS;end"; msg = "Ouverture Wi-Fi.";
        }
        else if (lower.includes('caméra') || lower.includes('photo')) {
            type = 'intent'; target = "intent://#Intent;action=android.media.action.IMAGE_CAPTURE;end"; msg = "Ouverture caméra.";
        }
        else if (lower.includes('youtube')) {
            type = 'window'; target = "https://www.youtube.com"; msg = "Lancement YouTube.";
        }
        else if (lower.includes('google')) {
            type = 'window'; target = "https://www.google.com"; msg = "Ouverture Google.";
        }

        if (target) {
            App.log("SYSTÈME: " + target, 'cmd');
            AudioEngine.speak(msg, () => {
                setTimeout(() => {
                    if (type === 'intent') {
                        Config.data.isActive = true; Config.save();
                        window.location.href = target;
                    } else {
                        window.open(target, '_blank');
                        AudioEngine.speak("Fait. J'écoute.", () => BrainEngine.start());
                    }
                }, 1000);
            });
            return true;
        }
        return false;
    }
};

// --- MODULE 5 : CERVEAU IA ---
const BrainEngine = {
    recognition: null, isListening: false,

    init() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { App.log("Navigateur incompatible", 'err'); return false; }
        
        this.recognition = new SR();
        this.recognition.continuous = true;
        this.recognition.interimResults = false;
        this.recognition.lang = 'fr-FR';

        this.recognition.onresult = (e) => {
            const text = e.results[e.results.length-1][0].transcript.trim();
            this.process(text);
        };

        this.recognition.onend = () => {
            if (this.isListening && Config.data.isActive) {
                setTimeout(() => { 
                    if (this.isListening) {
                        try { this.recognition.start(); } catch(err) { App.log("Redémarrage micro...", 'sys'); }
                    } 
                }, 1000);
            }
        };
        
        this.recognition.onerror = (e) => {
             if (e.error === 'not-allowed') { App.log("Micro refusé", 'err'); App.stopSystem(); }
             else { App.log("Erreur micro: " + e.error, 'err'); }
        };

        return true;
    },

    start() {
        if (!this.recognition) return;
        this.isListening = true;
        try { 
            this.recognition.start(); 
            App.updateSub("EXCELLENCE ÉCOUTE");
        } catch(e) { 
            App.log("Déjà en cours ou erreur", 'err'); 
        }
    },

    stop() {
        this.isListening = false;
        if (this.recognition) try { this.recognition.stop(); } catch(e){}
        App.updateSub("VEILLE");
    },

    async searchWeb(query) {
        this.stop();
        AudioEngine.speak("Recherche.", async () => {
            try {
                const url = `https://fr.wikipedia.org/w/api.php?origin=*&action=query&format=json&prop=extracts&exintro&explaintext&redirects=1&titles=${encodeURIComponent(query)}`;
                const res = await fetch(url);
                const data = await res.json();
                const pageId = Object.keys(data.query.pages)[0];
                if (pageId !== "-1") {
                    let txt = data.query.pages[pageId].extract;
                    let s = txt.split('.').filter(s => s.trim().length > 20);
                    let sum = s.slice(0, 2).join('. ') + ".";
                    AudioEngine.speak("Trouvé : " + sum, () => this.start());
                } else { throw new Error(); }
            } catch (e) {
                AudioEngine.speak("Non trouvé.", () => this.start());
            }
        });
    },

    process(text) {
        App.updateMain(text.toUpperCase());
        const lower = text.toLowerCase();

        if (ControlEngine.execute(text)) return;
        if (lower === 'stop' || lower === 'arrête') { this.stop(); AudioEngine.speak("Pause."); return; }
        if (lower.includes('écoute')) { if (!this.isListening) { this.start(); AudioEngine.speak("À vous."); } return; }

        if (lower.includes('cherche') || lower.includes('c\'est quoi')) {
            let q = text.replace(/cherche|c'est quoi|qui est|dis moi sur/gi, '').trim();
            if (q.length > 2) { this.searchWeb(q); return; }
        }

        let rep = null;
        if (lower.includes('qui es-tu')) rep = "Je suis Excellence, votre assistant.";
        else if (lower.includes('heure')) rep = `Il est ${new Date().getHours()} heures ${new Date().getMinutes()}.`;

        if (rep) { AudioEngine.speak(rep, () => this.start()); } 
        else if (this.isListening) { AudioEngine.speak(text, () => this.start()); }
    }
};

// --- APPLICATION PRINCIPALE ---
const App = {
    init() {
        Config.load();
        VisualEngine.init();
        BrainEngine.init();
        
        if (Config.data.isActive) {
            this.log("Rétablissement session...", 'cmd');
            this.start(true);
        }
    },

    toggleSettings() {
        const m = document.getElementById('modal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    },

    toggleExcellence() {
        if (Config.data.isActive) this.stopSystem();
        else this.start();
    },

    start(silent = false) {
        // 1. Nettoyage forcé pour éviter conflits
        BrainEngine.stop();
        AudioEngine.destroy();

        this.log("Initialisation Audio...", 'sys');
        this.updateMain("DÉMARRAGE...");
        
        // 2. Démarrage Audio (Visuel)
        AudioEngine.init().then(ok => {
            if(!ok) {
                App.log("Échec Audio", 'err');
                return;
            }
            
            VisualEngine.start();
            
            // 3. Délai CRITIQUE pour Realme/Android avant de lancer la voix
            setTimeout(() => {
                BrainEngine.start();
                Config.data.isActive = true;
                Config.save();
                this.updateStatus(true);
                
                if (!silent) {
                    AudioEngine.speak("Excellence est en ligne.", () => BrainEngine.start());
                } else {
                    AudioEngine.speak("De retour.", () => BrainEngine.start());
                }
            }, 800); // 800ms de délai pour laisser le micro se calmer
        });
    },

    stopSystem() {
        Config.data.isActive = false;
        Config.save();
        AudioEngine.destroy();
        VisualEngine.stop();
        BrainEngine.stop();
        window.speechSynthesis.cancel();
        this.updateStatus(false);
        this.updateMain("DÉSACTIVÉ");
        this.updateSub("SYSTÈME OFF");
    },
    
    say(txt) { AudioEngine.speak(txt); },

    updateMain(t) { document.getElementById('mainText').innerText = t; },
    updateSub(t) { document.getElementById('subText').innerText = t; },
    updateStatus(active) {
        const s = document.getElementById('status');
        const btn = document.getElementById('mainBtn');
        if (active) {
            s.classList.add('active'); s.innerText="EN LIGNE";
            btn.innerText="⚡ EXCELLENCE ACTIF";
        } else {
            s.classList.remove('active'); s.innerText="OFFLINE";
            btn.innerText="⚡ ACTIVER EXCELLENCE";
        }
    },
    log(msg, type='sys') {
        const t = document.getElementById('terminal');
        const d = document.createElement('div');
        d.className = 'log-line log-'+type;
        d.innerText = `[${new Date().toLocaleTimeString('fr-FR')}] ${msg}`;
        t.appendChild(d); t.scrollTop = t.scrollHeight;
    }
};

window.onload = () => App.init();
</script>
</body>
</html>
