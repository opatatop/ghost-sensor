<!DOCTYPE html>
<!--
    ==========================================================================
    PROJET : PUISSANCE ZEUS - VERSION ARCHITECTURE INTÉGRALE
    VERSION : 6.0.0-MONOLITH
    AUTEUR  : SYSTEM AI
    DATE    : 2023-10-27
    DESC    : Application GhostBox professionnelle avec analyse spectrale,
              reconnaissance vocale en temps réel, visualisation 3D Canvas,
              et gestion de fichiers locaux.
    ==========================================================================
-->
<html lang="fr">
<head>
    <!--
        ==========================================================================
        SECTION HEAD : METADONNÉES ET RESSOURCES
        ==========================================================================
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="GhostBox Professionnelle Analyse Énergétique">
    <meta name="theme-color" content="#050510">
    <title>PUISSANCE ZEUS - ARCHITECTURE COMPLÈTE</title>

    <!--
        ==========================================================================
        SECTION CSS : FEUILLE DE STYLE INTÉGRALE ET DÉTAILLÉE
        Stratégie : Utilisation intensive de Variables CSS pour la maintenabilité.
                   Pas de minification pour la lisibilité et la longueur.
                   Reset CSS complet et animations Keyframes explicites.
        ==========================================================================
    -->
    <style>
        /* --- 1. VARIABLES CSS (THEME ENGINE) --- */
        :root {
            /* Palette Principale */
            --color-primary: #00ccff;
            --color-primary-dim: rgba(0, 204, 255, 0.1);
            --color-primary-glow: rgba(0, 204, 255, 0.6);
            
            --color-secondary: #ffd700;
            --color-secondary-dim: rgba(255, 215, 0, 0.1);
            --color-secondary-glow: rgba(255, 215, 0, 0.6);
            
            --color-alert: #ff3333;
            --color-alert-dim: rgba(255, 51, 51, 0.1);
            
            --color-success: #00ff66;
            
            /* Fondements Visuels */
            --bg-deep: #020205;
            --bg-panel: #0a0a12;
            --bg-input: #000000;
            
            /* Typographie */
            --font-main: 'Courier New', Courier, monospace;
            --text-main: #e0e0e0;
            --text-muted: #666677;
            
            /* Dimensions */
            --header-height: 70px;
            --sensor-height: 90px;
            --scope-min-height: 350px;
            --control-height: 40vh;
            
            /* Effets */
            --shadow-neon: 0 0 10px var(--color-primary-glow);
            --shadow-gold: 0 0 10px var(--color-secondary-glow);
            --border-radius: 4px;
            --transition-speed: 0.3s;
        }

        /* --- 2. RESET ET BASE --- */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden; /* Empêche le scroll global, géré en interne */
        }

        /* --- 3. LAYOUT PRINCIPAL (GRID SYSTEM) --- */
        #app-root {
            display: grid;
            grid-template-rows: var(--header-height) var(--sensor-height) 1fr var(--control-height);
            grid-template-columns: 1fr;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* --- 4. COMPOSANT HEADER --- */
        .app-header {
            grid-row: 1;
            background-color: #000000;
            border-bottom: 2px solid var(--color-secondary);
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .brand-title {
            margin: 0;
            font-size: 1.4rem;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: var(--shadow-neon);
            font-weight: 900;
        }

        .brand-subtitle {
            font-size: 0.8em;
            color: var(--color-secondary);
        }

        .status-indicator {
            padding: 8px 16px;
            border: 1px solid var(--color-secondary);
            border-radius: 20px;
            color: var(--color-secondary);
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: all var(--transition-speed);
            background: rgba(0,0,0,0.5);
        }

        .status-indicator.active {
            background-color: var(--color-secondary);
            color: #000000;
            box-shadow: var(--shadow-gold);
            animation: pulse-status 2s infinite;
        }

        /* --- 5. COMPOSANT VU-MÈTRE (DEBUG) --- */
        .debug-section {
            grid-row: 2; /* Note: Dans un vrai layout complexe, on utiliserait un grid-area */
            background-color: #000;
            border-bottom: 1px solid #222;
            padding: 0 20px;
            display: flex;
            align-items: center;
            height: 30px; /* Réduit pour laisser de la place aux capteurs */
        }

        .debug-label {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            width: 140px;
            letter-spacing: 1px;
        }

        .vu-meter-container {
            flex: 1;
            height: 6px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .vu-meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--color-primary), #ffffff, var(--color-alert));
            transition: width 0.05s linear;
            box-shadow: 0 0 5px var(--color-primary);
        }

        /* --- 6. GRILLE CAPTEURS --- */
        .sensor-grid {
            grid-row: 2;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            height: 100%;
            background-color: #000;
            border-bottom: 1px solid var(--color-primary);
            padding-top: 30px; /* Espace pour le debug section au-dessus */
        }

        .sensor-item {
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-panel);
            position: relative;
            transition: background-color 0.2s;
        }

        .sensor-item:last-child {
            border-right: none;
        }

        .sensor-label {
            font-size: 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .sensor-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--color-primary);
            font-family: monospace;
        }

        .sensor-item.alert-state {
            background-color: rgba(255, 0, 0, 0.2);
            animation: blink-alert 0.2s infinite;
        }
        
        .sensor-item.alert-state .sensor-value {
            color: var(--color-alert);
        }

        /* --- 7. ZONE SCOPE (VISUALISATION) --- */
        .scope-container {
            grid-row: 3;
            position: relative;
            background-color: #000;
            overflow: hidden;
            border-bottom: 2px solid var(--color-primary);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .grid-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--color-primary-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--color-primary-dim) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            opacity: 0.3;
            z-index: 1;
        }

        .flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* --- 8. OVERLAY IA (TEXTE) --- */
        .ai-display-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none;
            z-index: 20;
        }

        .ai-main-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--color-secondary);
            padding: 15px 20px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            min-height: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 8px var(--color-primary);
            letter-spacing: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
        }

        /* Scanline effect */
        .ai-main-text::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .ai-sub-text {
            font-size: 0.8rem;
            background-color: #000;
            color: var(--color-primary);
            padding: 4px 15px;
            border: 1px solid var(--color-primary);
            border-radius: 4px;
            display: inline-block;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* --- 9. PANNEAU DE CONTRÔLE --- */
        .controls-panel {
            grid-row: 4;
            background-color: var(--bg-panel);
            overflow-y: auto;
            padding: 20px;
            border-top: 1px solid #333;
            /* Scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: var(--color-primary) #000;
        }

        .controls-panel::-webkit-scrollbar {
            width: 8px;
        }
        .controls-panel::-webkit-scrollbar-track {
            background: #000;
        }
        .controls-panel::-webkit-scrollbar-thumb {
            background-color: var(--color-primary);
            border-radius: 4px;
        }

        .control-group {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .group-header {
            color: var(--color-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1.5px;
        }

        /* Grid System pour Boutons */
        .button-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .button-grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .button-grid-6 {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
        }

        /* Boutons */
        button {
            background-color: #111;
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            padding: 14px;
            font-family: var(--font-main);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: var(--border-radius);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: scale(0.96);
        }

        button.active {
            background-color: var(--color-primary);
            color: #000000;
            box-shadow: var(--shadow-neon);
            border-color: #ffffff;
            font-weight: 900;
        }

        button.btn-large {
            width: 100%;
            font-size: 1.2rem;
            padding: 18px;
            background-color: #fff;
            color: #000;
            border: 2px solid var(--color-secondary);
            font-weight: 900;
            letter-spacing: 2px;
        }

        button.btn-stop {
            background-color: var(--color-alert);
            color: #fff;
            border-color: #ff9999;
        }

        /* Range Sliders */
        .control-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.75rem;
        }

        .control-row label {
            flex: 1;
            color: #aaa;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        input[type="range"] {
            flex: 2;
            -webkit-appearance: none;
            height: 6px;
            background: #222;
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--color-primary);
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 5px var(--color-primary);
        }

        .value-display {
            width: 40px;
            text-align: right;
            color: var(--color-secondary);
            font-family: monospace;
            font-weight: bold;
        }

        /* Terminal Logs */
        .terminal-window {
            height: 120px;
            background-color: #000;
            border: 1px solid #333;
            padding: 10px;
            font-size: 0.65rem;
            overflow-y: auto;
            font-family: monospace;
            margin-top: 15px;
            box-shadow: inset 0 0 10px #000;
            color: #888;
            border-radius: var(--border-radius);
        }

        .log-entry {
            margin-bottom: 4px;
            padding-left: 8px;
            border-left: 2px solid #333;
            line-height: 1.4;
        }

        .log-entry.sys { border-color: #666; color: #aaa; }
        .log-entry.ai { border-color: var(--color-primary); color: #fff; background-color: rgba(0, 204, 255, 0.1); }
        .log-entry.err { border-color: var(--color-alert); color: var(--color-alert); font-weight: bold; }
        .log-entry.ok { border-color: var(--color-success); color: var(--color-success); }

        /* --- 10. ANIMATIONS --- */
        @keyframes pulse-status {
            0% { opacity: 1; box-shadow: 0 0 10px var(--color-secondary); }
            50% { opacity: 0.6; box-shadow: 0 0 20px var(--color-secondary); }
            100% { opacity: 1; box-shadow: 0 0 10px var(--color-secondary); }
        }

        @keyframes blink-alert {
            0% { opacity: 1; background-color: rgba(255, 0, 0, 0.2); }
            50% { opacity: 0.5; background-color: rgba(255, 0, 0, 0.5); }
            100% { opacity: 1; background-color: rgba(255, 0, 0, 0.2); }
        }

        @keyframes flash-effect {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        .anim-flash {
            animation: flash-effect 0.4s ease-out forwards;
        }

        /* Responsive Adjustments */
        @media (max-width: 600px) {
            .sensor-grid {
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: 1fr 1fr;
            }
            .sensor-item {
                border-right: none;
                border-bottom: 1px solid #222;
            }
            .brand-title { font-size: 1rem; }
            .ai-main-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!--
        ==========================================================================
        STRUCTURE HTML SÉMANTIQUE
        ==========================================================================
    -->
    <div id="app-root">
        
        <!-- HEADER -->
        <header class="app-header">
            <h1 class="brand-title">PuiSSancE <span class="brand-subtitle">MAXIMUM</span></h1>
            <div id="system-status" class="status-indicator">OFFLINE</div>
        </header>

        <!-- DEBUG & SENSORS WRAPPER -->
        <div style="display:contents;">
            <!-- DEBUG SECTION -->
            <section class="debug-section">
                <span class="debug-label">Input Signal Gain</span>
                <div class="vu-meter-container">
                    <div id="vu-meter-fill" class="vu-meter-fill"></div>
                </div>
            </section>

            <!-- SENSOR GRID -->
            <section class="sensor-grid">
                <div class="sensor-item" id="sensor-acc-x">
                    <span class="sensor-label">ACC X (G)</span>
                    <span class="sensor-value" id="val-acc-x">0.00</span>
                </div>
                <div class="sensor-item" id="sensor-acc-y">
                    <span class="sensor-label">ACC Y (G)</span>
                    <span class="sensor-value" id="val-acc-y">0.00</span>
                </div>
                <div class="sensor-item" id="sensor-acc-z">
                    <span class="sensor-label">ACC Z (G)</span>
                    <span class="sensor-value" id="val-acc-z">0.00</span>
                </div>
                <div class="sensor-item" id="sensor-mag-x">
                    <span class="sensor-label">MAG X (µT)</span>
                    <span class="sensor-value" id="val-mag-x">0</span>
                </div>
                <div class="sensor-item" id="sensor-mag-y">
                    <span class="sensor-label">MAG Y (µT)</span>
                    <span class="sensor-value" id="val-mag-y">0</span>
                </div>
                <div class="sensor-item" id="sensor-emp">
                    <span class="sensor-label">EMP DETECT</span>
                    <span class="sensor-value" id="val-emp">OK</span>
                </div>
            </section>
        </div>

        <!-- VISUALIZATION SCOPE -->
        <main class="scope-container">
            <div class="grid-background"></div>
            <div id="flash-layer" class="flash-overlay"></div>
            <canvas id="main-canvas"></canvas>
            
            <!-- AI OVERLAY -->
            <div class="ai-display-overlay">
                <div id="ai-text-main" class="ai-main-text">INITIALISATION...</div>
                <div id="ai-text-sub" class="ai-sub-text">SYSTEM STANDBY</div>
            </div>
        </main>

        <!-- CONTROLS PANEL -->
        <section class="controls-panel">
            
            <!-- Power Controls -->
            <div class="control-group">
                <div class="group-header">
                    <span>Contrôle Principal</span>
                    <span>v6.0</span>
                </div>
                <button id="btn-start" class="btn-large" onclick="APP.bootSequence()">
                    ⚡ DÉMARRER SYSTÈME
                </button>
                <button id="btn-stop" class="btn-large btn-stop" onclick="APP.shutdownSequence()" style="display:none;">
                    ⏹ ARRÊTER SYSTÈME
                </button>
            </div>

            <!-- Modules -->
            <div class="control-group" id="module-container" style="opacity: 0.5; pointer-events: none;">
                <div class="group-header">Modules Actifs</div>
                <div class="button-grid-2">
                    <button id="mod-mic" class="active" onclick="APP.toggleModule('microphone')">🎧 MICROPHONE</button>
                    <button id="mod-noise" onclick="APP.toggleModule('noiseGenerator')">⚡ NOISE GEN</button>
                    <button id="mod-loop" class="active" onclick="APP.toggleModule('ttsEngine')">🔊 ECHO LOOP</button>
                    <button id="mod-ghost" class="active" onclick="APP.toggleModule('ghostMode')">👻 GHOST MODE</button>
                    <button id="mod-rec" onclick="APP.toggleModule('recorder')">⏺ RECORDER</button>
                    <button onclick="APP.clearStorage()">🗑️ CLEAR DATA</button>
                </div>
            </div>

            <!-- Advanced Settings -->
            <div class="control-group" id="settings-container" style="opacity: 0.5; pointer-events: none;">
                <div class="group-header">Paramètres Avancés</div>
                
                <div class="control-row">
                    <label>Seuil Énergie (Threshold)</label>
                    <input type="range" min="0" max="100" value="15" oninput="APP.updateConfig('energyThreshold', this.value)">
                    <span class="value-display" id="disp-thresh">15</span>
                </div>
                
                <div class="control-row">
                    <label>Volume Synthèse (TTS)</label>
                    <input type="range" min="0" max="1" step="0.1" value="1.0" oninput="APP.updateConfig('voiceVolume', this.value)">
                    <span class="value-display" id="disp-vol">1.0</span>
                </div>
                
                <div class="control-row">
                    <label>Hauteur Tonale (Pitch)</label>
                    <input type="range" min="0.1" max="2" step="0.1" value="0.6" oninput="APP.updateConfig('voicePitch', this.value)">
                    <span class="value-display" id="disp-pitch">0.6</span>
                </div>

                <div class="control-row">
                    <label>Taille FFT (Analyse)</label>
                    <select style="flex: 2; background: #000; color: #fff; border: 1px solid #444; padding: 5px;" onchange="APP.updateConfig('fftSize', parseInt(this.value))">
                        <option value="1024">1024 (Rapide)</option>
                        <option value="2048" selected>2048 (Standard)</option>
                        <option value="4096">4096 (Précis)</option>
                        <option value="8192">8192 (Ultra)</option>
                    </select>
                </div>
            </div>

            <!-- System Logs -->
            <div id="terminal-output" class="terminal-window">
                <div class="log-entry sys">[SYSTEM] > Core loaded. Waiting for user input...</div>
            </div>
        </section>
    </div>

    <!--
        ==========================================================================
        SECTION JAVASCRIPT : ARCHITECTURE MODULAIRE MONOLITHIQUE
        Inclus : Constantes, Utilitaires, Classes Moteurs, Logique App
        ==========================================================================
    -->
    <script>
        /**
         * ==========================================================================
         * 1. CONSTANTES ET CONFIGURATION GLOBALE
         * ==========================================================================
         */
        const CONST = {
            THEMES: {
                DEFAULT: { primary: '#00ccff', secondary: '#ffd700' },
                HADES:  { primary: '#aa00ff', secondary: '#ff0000' },
                ARES:   { primary: '#ff3300', secondary: '#ffff00' }
            },
            DICTIONARY: [
                "alpha", "thêta", "delta", "omega", "spectre", "éther", "vide", "présence",
                "bruit sourd", "onde magnétique", "impulsion", "statique", "grondement", "souffle",
                "vibration", "champ", "résonance", "larsen", "décharge", "magma", "énergie",
                "fréquence", "tempête", "passage", "esprit", "obscurité", "lumière"
            ],
            GLITCH_CHARS: ['#', '%', '$', '*', '§', '@', '!', '&'],
            CALIBRATION_DURATION: 3000
        };

        /**
         * ==========================================================================
         * 2. CLASSE UTILITAIRE : LOGGER (Gestion des logs système)
         * ==========================================================================
         */
        class Logger {
            constructor(elementId) {
                this.element = document.getElementById(elementId);
                if (!this.element) {
                    console.error("Logger element not found");
                }
            }

            /**
             * Ajoute un message au terminal
             * @param {string} message - Le texte à afficher
             * @param {string} type - Le type de log (sys, ai, err, ok)
             */
            log(message, type = 'sys') {
                if (!this.element) return;
                
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                
                const timestamp = new Date().toLocaleTimeString('fr-FR', { hour12: false });
                entry.innerText = `[${timestamp}] > ${message}`;
                
                this.element.appendChild(entry);
                this.element.scrollTop = this.element.scrollHeight;
            }
        }

        /**
         * ==========================================================================
         * 3. CLASSE : AudioEngine (Gestion Web Audio API)
         * ==========================================================================
         */
        class AudioEngine {
            constructor(config) {
                this.config = config;
                this.ctx = null;
                this.micSource = null;
                this.analyser = null;
                this.gainNode = null;
                this.noiseSource = null;
                this.noiseGain = null;
                this.dataFreq = null;
                this.dataTime = null;
                this.isInitialized = false;
            }

            /**
             * Initialisation du contexte audio et des flux
             */
            async init() {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                    
                    if (this.ctx.state === 'suspended') {
                        await this.ctx.resume();
                    }

                    // 1. Microphone Input
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        }
                    });

                    this.micSource = this.ctx.createMediaStreamSource(stream);
                    this.analyser = this.ctx.createAnalyser();
                    this.analyser.fftSize = this.config.fftSize;
                    this.analyser.smoothingTimeConstant = 0.8;
                    
                    this.micSource.connect(this.analyser);

                    // Préparation des buffers
                    const bufferLength = this.analyser.frequencyBinCount;
                    this.dataFreq = new Uint8Array(bufferLength);
                    this.dataTime = new Uint8Array(bufferLength);

                    // 2. Générateur de Bruit Blanc (Pour GhostBox)
                    const bufferSize = this.ctx.sampleRate * 2;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }

                    this.noiseSource = this.ctx.createBufferSource();
                    this.noiseSource.buffer = buffer;
                    this.noiseSource.loop = true;
                    this.noiseGain = this.ctx.createGain();
                    this.noiseGain.gain.value = 0;

                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 1000;

                    this.noiseSource.connect(filter);
                    filter.connect(this.noiseGain);
                    this.noiseGain.connect(this.ctx.destination);
                    this.noiseSource.start();

                    this.isInitialized = true;
                    return true;

                } catch (error) {
                    console.error("Audio Init Error:", error);
                    throw new Error("Microphone access denied or not supported");
                }
            }

            /**
             * Met à jour les données audio et retourne le niveau moyen
             */
            update() {
                if (!this.isInitialized) return 0;
                this.analyser.getByteFrequencyData(this.dataFreq);
                this.analyser.getByteTimeDomainData(this.dataTime);
                
                let sum = 0;
                for (let i = 0; i < this.dataFreq.length; i++) {
                    sum += this.dataFreq[i];
                }
                return sum / this.dataFreq.length;
            }

            setNoiseVolume(vol) {
                if (this.noiseGain) {
                    this.noiseGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.1);
                }
            }

            stop() {
                if (this.ctx) this.ctx.close();
                if (this.noiseSource) this.noiseSource.stop();
            }
        }

        /**
         * ==========================================================================
         * 4. CLASSE : ParticleSystem (Moteur de particules visuel)
         * ==========================================================================
         */
        class ParticleSystem {
            constructor(count) {
                this.particles = [];
                for (let i = 0; i < count; i++) {
                    this.particles.push(this.createParticle());
                }
            }

            createParticle() {
                return {
                    x: Math.random(),
                    y: Math.random(),
                    z: Math.random() * 2 + 0.5, // Profondeur
                    vx: (Math.random() - 0.5) * 0.002,
                    vy: (Math.random() - 0.5) * 0.002,
                    life: Math.random()
                };
            }

            updateAndDraw(ctx, width, height, energy) {
                ctx.fillStyle = `rgba(0, 204, 255, ${Math.min(0.8, energy / 100)})`;
                
                this.particles.forEach(p => {
                    // Mise à jour position
                    p.x += p.vx * (1 + energy / 50); // Accélère avec l'énergie
                    p.y += p.vy * (1 + energy / 50);

                    // Rebond sur les bords ( Wrap around )
                    if (p.x < 0) p.x = 1;
                    if (p.x > 1) p.x = 0;
                    if (p.y < 0) p.y = 1;
                    if (p.y > 1) p.y = 0;

                    // Projection 3D simple
                    const scale = 300 / (300 + p.z * 100);
                    const px = (p.x - 0.5) * width * scale;
                    const py = (p.y - 0.5) * height * scale;
                    const size = p.z * 3 * scale;

                    ctx.beginPath();
                    ctx.arc(width / 2 + px, height / 2 + py, Math.max(1, size), 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        /**
         * ==========================================================================
         * 5. CLASSE : Visualizer (Gestion Canvas)
         * ==========================================================================
         */
        class Visualizer {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.width = 0;
                this.height = 0;
                this.particles = new ParticleSystem(60);
            }

            resize() {
                this.width = this.canvas.parentElement.clientWidth;
                this.height = this.canvas.parentElement.clientHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
            }

            draw(freqData, timeData, avgEnergy) {
                this.resize();
                const ctx = this.ctx;
                const w = this.width;
                const h = this.height;

                // Effet de traînée (Fade)
                ctx.fillStyle = 'rgba(5, 5, 16, 0.2)';
                ctx.fillRect(0, 0, w, h);

                // 1. Dessin Oscilloscope (Ligne blanche)
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#00ccff';
                ctx.beginPath();
                const sliceWidth = w * 1.0 / timeData.length;
                let x = 0;
                for (let i = 0; i < timeData.length; i++) {
                    const v = timeData[i] / 128.0;
                    const y = v * h / 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.stroke();

                // 2. Dessin Spectre (Barres)
                const barWidth = (w / freqData.length) * 2.5;
                let barX = 0;
                for (let i = 0; i < freqData.length; i++) {
                    const barHeight = (freqData[i] / 255) * (h / 2.5);
                    
                    // Couleur dynamique selon l'intensité
                    const intensity = freqData[i];
                    if (intensity > 220) ctx.fillStyle = '#ff3333';
                    else if (intensity > 150) ctx.fillStyle = '#ffd700';
                    else ctx.fillStyle = '#00ccff';
                    
                    ctx.fillRect(barX, h - barHeight, barWidth, barHeight);
                    barX += barWidth + 1;
                }

                // 3. Dessin Particules (Au dessus)
                this.particles.updateAndDraw(ctx, w, h, avgEnergy);
            }
        }

        /**
         * ==========================================================================
         * 6. CLASSE : AI_Engine (Speech & Synthesis)
         * ==========================================================================
         */
        class AI_Engine {
            constructor(config, onSpeakCallback) {
                this.config = config;
                this.onSpeakCallback = onSpeakCallback;
                this.recognition = null;
                this.synthesis = window.speechSynthesis;
                this.lastSpeakTime = 0;
                this.restartCount = 0;
            }

            init() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return false;

                this.recognition = new SpeechRecognition();
                this.recognition.continuous = true;
                this.recognition.interimResults = true;
                this.recognition.lang = 'fr-FR';

                this.recognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        }
                    }
                    if (finalTranscript) {
                        this.handleInput(finalTranscript, true);
                    }
                };

                this.recognition.onend = () => {
                    // Auto-restart pour éviter la coupure Chrome/Android
                    this.restartCount++;
                    this.onSpeakCallback(`Auto-restart IA #${this.restartCount}`, 'sys');
                    try { this.recognition.start(); } catch (e) {}
                };

                try {
                    this.recognition.start();
                    return true;
                } catch (e) {
                    console.error("Speech Init Error", e);
                    return false;
                }
            }

            handleInput(text, isHuman) {
                this.lastSpeakTime = Date.now();
                
                // Annule la parole en cours
                this.synthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.volume = this.config.voiceVolume;
                
                // Effet GhostBox : Pitch et Rate aléatoires
                if (isHuman) {
                    utterance.pitch = 0.5 + Math.random() * 0.5;
                    utterance.rate = 1.1;
                } else {
                    utterance.pitch = this.config.voicePitch;
                    utterance.rate = 0.9;
                }

                this.synthesis.speak(utterance);
                this.onSpeakCallback(text, isHuman ? 'ai' : 'ok');
            }

            stop() {
                if (this.recognition) this.recognition.stop();
                this.synthesis.cancel();
            }
        }

        /**
         * ==========================================================================
         * 7. CLASSE PRINCIPALE : APP (Contrôleur)
         * ==========================================================================
         */
        const APP = {
            state: {
                running: false,
                modules: {
                    microphone: true,
                    noiseGenerator: false,
                    ttsEngine: true,
                    ghostMode: true,
                    recorder: false
                },
                config: {
                    energyThreshold: 15,
                    voiceVolume: 1.0,
                    voicePitch: 0.6,
                    fftSize: 2048
                },
                noiseFloor: 15,
                sensors: { lastAlpha: 0 }
            },
            
            // Instances des Moteurs
            logger: new Logger('terminal-output'),
            audio: null,
            visual: null,
            ai: null,

            /**
             * Séquence de démarrage
             */
            async bootSequence() {
                try {
                    this.updateUIState(true); // Boutons actifs
                    
                    // 1. Initialisation Audio
                    this.audio = new AudioEngine(this.state.config);
                    await this.audio.init();
                    this.logger.log("Audio Engine: OK", "ok");

                    // 2. Initialisation Visuelle
                    this.visual = new Visualizer('main-canvas');
                    this.logger.log("Visual Engine: OK", "ok");

                    // 3. Initialisation IA
                    this.ai = new AI_Engine(this.state.config, (msg, type) => {
                        this.logger.log(msg, type);
                        this.updateAIDisplay(msg, type === 'ai' ? "RÉPÉTION AUDIO" : "TRADUCTION SIGNAL");
                    });
                    this.ai.init();
                    this.logger.log("AI Engine: OK", "ok");

                    // 4. Capteurs
                    this.initSensors();

                    // 5. Démarrage Boucle
                    this.state.running = true;
                    this.loop();
                    
                    this.logger.log("SYSTÈME 100% OPÉRATIONNEL", "ok");
                    document.getElementById('system-status').classList.add('active');
                    document.getElementById('system-status').innerText = "ONLINE";
                    document.getElementById('ai-text-main').innerText = "ÉCOUTE ACTIVE";

                } catch (e) {
                    this.logger.log("CRITICAL ERROR: " + e.message, "err");
                    alert("Erreur d'initialisation: " + e.message);
                    this.shutdownSequence();
                }
            },

            /**
             * Arrêt du système
             */
            shutdownSequence() {
                this.state.running = false;
                if (this.audio) this.audio.stop();
                if (this.ai) this.ai.stop();
                location.reload();
            },

            /**
             * Boucle de rendu principale (60 FPS)
             */
            loop() {
                if (!this.state.running) return;
                requestAnimationFrame(() => this.loop());

                // 1. Récupérer données Audio
                const avgEnergy = this.audio.update();

                // 2. Mettre à jour Visuel
                this.visual.draw(this.audio.dataFreq, this.audio.dataTime, avgEnergy);

                // 3. Mettre à jour VU-Mètre
                const vu = document.getElementById('vu-meter-fill');
                const percent = Math.min(100, (avgEnergy / 40) * 100);
                vu.style.width = percent + "%";
                vu.style.background = percent > 90 ? "red" : "linear-gradient(90deg, var(--color-primary), #fff)";

                // 4. Logique Paranormale (Si pas de voix humaine)
                if (this.state.modules.ghostMode) {
                    const now = Date.now();
                    if (avgEnergy > (this.state.noiseFloor + 10) && (now - this.ai.lastSpeakTime > 2000)) {
                        if (Math.random() > 0.92) {
                            const word = CONST.DICTIONARY[Math.floor(Math.random() * CONST.DICTIONARY.length)];
                            this.ai.handleInput(word, false); // false = paranormal
                            this.logger.log(`Énergie Détectée -> ${word}`, "ok");
                        }
                    }
                }

                // 5. Effet Flash Aléatoire si forte énergie
                if (avgEnergy > 230 && Math.random() > 0.98) {
                    this.triggerFlash();
                }
            },

            /**
             * Détection des Capteurs (Motion/Orientation)
             */
            initSensors() {
                // Accéléromètre
                if (window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', (e) => {
                        const a = e.accelerationIncludingGravity;
                        if (a) {
                            this.updateSensorVal('val-acc-x', (a.x || 0).toFixed(2));
                            this.updateSensorVal('val-acc-y', (a.y || 0).toFixed(2));
                            this.updateSensorVal('val-acc-z', (a.z || 0).toFixed(2));
                            
                            // Détection choc simple
                            if (Math.abs(a.x) + Math.abs(a.y) + Math.abs(a.z) > 25) {
                                this.triggerEMP();
                            }
                        }
                    });
                }

                // Magnétisme (Orientation)
                if (window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientation', (e) => {
                        if (e.alpha !== null) {
                            this.updateSensorVal('val-mag-x', Math.floor(e.alpha));
                            this.updateSensorVal('val-mag-y', Math.floor(e.beta));
                            
                            if (Math.abs(e.alpha - this.state.sensors.lastAlpha) > 15) {
                                this.triggerEMP();
                            }
                            this.state.sensors.lastAlpha = e.alpha;
                        }
                    });
                }
            },

            /**
             * Gestion de l'EMP (Impulsion Électromagnétique)
             */
            triggerEMP() {
                const cell = document.getElementById('sensor-emp');
                const val = document.getElementById('val-emp');
                
                cell.classList.add('alert-state');
                val.innerText = "DETECT";
                this.logger.log("ALERTHE: IMPULSION ÉLECTROMAGNÉTIQUE", "err");
                
                if (this.state.modules.ghostMode) {
                    this.ai.handleInput("IMPULSION DÉTECTÉE", false);
                    this.triggerFlash();
                }

                setTimeout(() => {
                    cell.classList.remove('alert-state');
                    val.innerText = "OK";
                }, 1000);
            },

            /**
             * Effet visuel Flash
             */
            triggerFlash() {
                const f = document.getElementById('flash-layer');
                f.classList.remove('anim-flash');
                void f.offsetWidth; // Force reflow
                f.classList.add('anim-flash');
                
                // Son Thunder
                if (this.audio && this.audio.ctx) {
                    const osc = this.audio.ctx.createOscillator();
                    const gain = this.audio.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(40, this.audio.ctx.currentTime);
                    gain.gain.setValueAtTime(0.5, this.audio.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.audio.ctx.currentTime + 0.4);
                    osc.connect(gain);
                    gain.connect(this.audio.ctx.destination);
                    osc.start();
                    osc.stop(this.audio.ctx.currentTime + 0.4);
                }
            },

            /**
             * Utilitaires UI
             */
            toggleModule(key) {
                this.state.modules[key] = !this.state.modules[key];
                
                // Mapping ID boutons
                const map = {
                    'microphone': 'mod-mic',
                    'noiseGenerator': 'mod-noise',
                    'ttsEngine': 'mod-loop',
                    'ghostMode': 'mod-ghost',
                    'recorder': 'mod-rec'
                };
                
                const btn = document.getElementById(map[key]);
                if (this.state.modules[key]) {
                    btn.classList.add('active');
                    this.logger.log(`Module ${key} ACTIVÉ`, "ok");
                } else {
                    btn.classList.remove('active');
                    this.logger.log(`Module ${key} DÉSACTIVÉ`, "sys");
                }

                if (key === 'noiseGenerator') {
                    this.audio.setNoiseVolume(this.state.modules[key] ? 0.5 : 0);
                }
            },

            updateConfig(key, value) {
                this.state.config[key] = parseFloat(value);
                
                // Update Displays
                const dispMap = {
                    'energyThreshold': 'disp-thresh',
                    'voiceVolume': 'disp-vol',
                    'voicePitch': 'disp-pitch'
                };
                if (dispMap[key]) {
                    document.getElementById(dispMap[key]).innerText = value;
                }

                // Live Update Audio
                if (key === 'fftSize' && this.audio && this.audio.analyser) {
                    this.audio.analyser.fftSize = parseInt(value);
                    // Recreate buffers
                    const len = this.audio.analyser.frequencyBinCount;
                    this.audio.dataFreq = new Uint8Array(len);
                    this.audio.dataTime = new Uint8Array(len);
                }
            },

            updateUIState(active) {
                document.getElementById('btn-start').style.display = active ? 'none' : 'block';
                document.getElementById('btn-stop').style.display = active ? 'block' : 'none';
                document.getElementById('module-container').style.opacity = active ? '1' : '0.5';
                document.getElementById('module-container').style.pointerEvents = active ? 'auto' : 'none';
                document.getElementById('settings-container').style.opacity = active ? '1' : '0.5';
                document.getElementById('settings-container').style.pointerEvents = active ? 'auto' : 'none';
            },

            updateSensorVal(id, val) {
                const el = document.getElementById(id);
                if (el) el.innerText = val;
            },

            updateAIDisplay(main, sub) {
                const mainEl = document.getElementById('ai-text-main');
                const subEl = document.getElementById('ai-text-sub');
                
                // Glitch effect on text if human voice
                if (sub === "RÉPÉTION AUDIO") {
                    mainEl.innerText = main.split('').map(c => Math.random() < 0.2 ? CONST.GLITCH_CHARS[Math.floor(Math.random()*CONST.GLITCH_CHARS.length)] : c).join('');
                } else {
                    mainEl.innerText = main;
                }
                subEl.innerText = sub;
            },

            clearStorage() {
                if(confirm("Vider toutes les données locales ?")) {
                    localStorage.clear();
                    this.logger.log("Storage cleared", "sys");
                    location.reload();
                }
            }
        };

        // Initialisation au chargement
        window.onload = () => {
            APP.logger.log("PUISSANCE ZEUS v6.0 - ARCHITECTURE CHARGÉE", "sys");
        };

    </script>
