<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY K0M4R LAB PRO ENHANCED</title>
<style>
:root {
  --primary: #ff0055; /* Rouge Alert pour le mode Pro */
  --secondary: #00ffff;
  --bg: #050000;
  --panel: #1a0000;
  --btn-bg: #330000;
  --btn-active: #ff0055;
  --text: #ffcccc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

/* EFFET GLITCH SUR LE TEXTE IA */
.glitch {
  animation: glitch-anim 0.3s infinite;
  color: #fff !important;
  text-shadow: 2px 0 #ff0055, -2px 0 #00ffff;
}
@keyframes glitch-anim {
  0% { transform: translate(0) }
  20% { transform: translate(-2px, 2px) }
  40% { transform: translate(-2px, -2px) }
  60% { transform: translate(2px, 2px) }
  80% { transform: translate(2px, -2px) }
  100% { transform: translate(0) }
}

#header {
  padding: 8px; background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.75rem; flex-shrink: 0;
  color: var(--primary);
}

#vizContainer {
  flex: 1; position: relative; background: #000;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  overflow: hidden;
}

#iaBox {
  z-index: 10; text-align: center; width: 90%;
  pointer-events: none;
}
#iaLabel { color: var(--secondary); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px; }
#iaText {
  font-size: 2.5rem; font-weight: 900; color: #fff;
  background: rgba(0,0,0,0.9); padding: 10px;
  min-height: 3.5rem; border: 1px solid var(--primary);
  text-transform: uppercase;
}

canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; opacity: 0.7; }
#cameraFeed { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 0; opacity: 0.2; display: none; }

#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  height: 40vh; overflow-y: auto; padding: 5px;
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px 2px; font-size: 0.65rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #fff;
  box-shadow: 0 0 15px var(--primary);
  border-color: #fff;
}

#startBtn {
  grid-column: span 4; font-size: 1.4rem; padding: 15px;
  background: #fff; color: #000; border: 3px solid var(--primary);
  font-weight: 900;
}
#startBtn.running {
  background: var(--primary); color: #fff;
}

/* BARS */
#barsArea { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.7rem; }
.bar-box { background: #220000; height: 10px; width: 100%; border: 1px solid #550000; margin-top:2px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.05s; background: var(--primary); }

#logZone {
  height: 50px; background: #000; border-top: 1px solid #333;
  padding: 2px 5px; font-size: 0.6rem; overflow-y: auto; color: #888;
  flex-shrink: 0;
}
.log-suc { color: var(--secondary) !important; }
.log-warn { color: var(--primary) !important; }

</style>
</head>
<body>

<div id="header">
  <div>MIC: <span id="micStatus">OFF</span></div>
  <div>AI: <span id="aiStatus">READY</span></div>
  <div>RADAR: <span id="radarStatus">0</span> m</div>
</div>

<div id="vizContainer">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="iaBox">
    <div id="iaLabel">DÉCODEUR EVP / IA</div>
    <div id="iaText">... EN ATTENTE ...</div>
  </div>
</div>

<div id="controlsArea">
  <div id="barsArea">
    <div>INPUT <div class="bar-box"><div id="voiceBar" class="bar-fill"></div></div></div>
    <div>TRIGGER <div class="bar-box"><div id="threshBar" class="bar-fill" style="width:25%"></div></div></div>
  </div>

  <button id="startBtn" onclick="forceStart()">DÉMARRER SYSTÈME</button>

  <div class="button-grid">
    <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE</button>
    <button id="invertBtn" onclick="toggleOpt('invert')">🔄 INVERSION</button>
    <button id="ghostBoxBtn" onclick="toggleOpt('ghostBox')">📻 GHOST BOX</button>
    <button id="voiceBtn" onclick="toggleOpt('voice')">🗣 IA PAROLE</button>
    <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
    <button id="evpBtn" onclick="toggleOpt('evp')">🔮 MODE EVP</button>
    <button id="radarBtn" onclick="toggleOpt('radar')">📡 RADAR PRO</button>
    <button id="camBtn" onclick="toggleOpt('cam')">📷 CAMÉRA</button>
    <button id="themeBtn" onclick="toggleTheme()">🎨 THÈME</button>
    <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ ARRÊTER</button>
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// --- CONFIGURATION & DICTIONNAIRE DES ÂMES ---
const GHOST_WORDS = [
  "OMBRE", "SOMBRE", "ICI", "AIDE", "MORT", "FROID", "VENT", 
  "REGARD", "VOIX", "SORT", "LOINTAIN", "ESPRIT", "QUI", "TOI", 
  "NOIR", "PEUR", "TEMPS", "PASSÉ", "VIE", "FIN", "SANG", "NUIT"
];

let app = {
  running: false,
  simulation: false,
  ctx: null, source: null, gain: null, analyser: null, invert: null,
  ghost: null, ghostGain: null, noiseNode: null, noiseGain: null,
  stream: null, vidStream: null, recorder: null, isRec: false,
  recognition: null,
  config: { monitor: false, invert: false, ghostBox: false, voice: false, autoRec: false, evp: false, radar: false, cam: false },
  canvas: null, cCtx: null, width: 0, height: 0,
  radarBlips: [], // Stocke les points radar
  lastSpikeTime: 0
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), mic: el('micStatus'), radar: el('radarStatus'),
  voiceBar: el('voiceBar'), iaText: el('iaText'),
  canvas: el('canvas'), camera: el('cameraFeed')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

// --- AUDIO ENGINE ---

async function forceStart() {
  if(app.running) return;
  
  el('startBtn').textContent = "INITIALISATION...";
  el('startBtn').style.background = "orange";
  log("Démarrage du système Pro...", 'log-suc');

  try {
    // Audio Context
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();

    // Micro
    app.stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
        video: false 
    });

    setupAudioNodes(app.stream);
    app.running = true;
    app.simulation = false;
    startUI("AUDIO ACTIF");

  } catch (err) {
    console.warn(err);
    log("Micro bloqué. Mode Simulation activé.", 'log-warn');
    setupSimulation();
    app.running = true;
    app.simulation = true;
    startUI("SIMULATION");
  }
}

function setupAudioNodes(stream) {
  app.source = app.ctx.createMediaStreamSource(stream);
  app.invert = app.ctx.createGain();
  app.gain = app.ctx.createGain();
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);
  
  // Ghost Box Advanced (Sawtooth + White Noise)
  app.ghost = app.ctx.createOscillator();
  app.ghost.type = 'sawtooth';
  app.ghostGain = app.ctx.createGain();
  app.ghostGain.gain.value = 0;
  
  // Générateur de Bruit Blanc (Static)
  const bufferSize = app.ctx.sampleRate * 2; // 2 secondes de bruit
  const buffer = app.ctx.createBuffer(1, bufferSize, app.ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
  }
  app.noiseNode = app.ctx.createBufferSource();
  app.noiseNode.buffer = buffer;
  app.noiseNode.loop = true;
  app.noiseGain = app.ctx.createGain();
  app.noiseGain.gain.value = 0;
  
  app.ghost.connect(app.ghostGain);
  app.ghostGain.connect(app.gain);
  
  app.noiseNode.connect(app.noiseGain);
  app.noiseGain.connect(app.gain); // Le bruit blanc se mixe aussi
  
  app.ghost.start();
  app.noiseNode.start();

  // Route
  app.source.connect(app.invert);
  app.invert.connect(app.gain);
  app.gain.connect(app.analyser);

  // Recorder
  app.recorder = new MediaRecorder(stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

function setupSimulation() {
  app.dataArray = new Uint8Array(1024);
  // Données plus dynamiques pour la sim
  app.simData = new Array(1024).fill(0);
}

function startUI(modeName) {
  el('startBtn').textContent = modeName === "SIMULATION" ? "RUNNING (SIM)" : "SYSTÈME ACTIF";
  el('startBtn').classList.add('running');
  el('startBtn').style.background = "var(--primary)";
  
  els.mic.textContent = modeName === "SIMULATION" ? "SIM" : "ON";
  els.mic.style.color = modeName === "SIMULATION" ? "orange" : "#0f0";
  els.iaText.textContent = "INIT...";

  resize();
  drawLoop();
  
  if(app.config.voice) startVoice();
}

function stopSystem() {
  if(app.stream) app.stream.getTracks().forEach(t=>t.stop());
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  if(app.ctx) app.ctx.close();
  if(app.recognition) app.recognition.stop();
  
  app.running = false;
  app.radarBlips = []; // Reset radar
  
  el('startBtn').textContent = "DÉMARRER SYSTÈME";
  el('startBtn').classList.remove('running');
  el('startBtn').style.background = "#fff";
  
  els.mic.textContent = "OFF"; els.mic.style.color = "red";
  els.iaText.textContent = "ARRÊTÉ";
  els.radar.textContent = "0";
  
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
  Object.keys(app.config).forEach(k => app.config[k] = false);
  
  log("Système arrêté.");
}

// --- OPTIONS & LOGIC ---

function toggleOpt(key) {
  if(!app.running) { log("Démarrage requis", 'log-warn'); return; }
  
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');
  
  log(`${key.toUpperCase()}: ${app.config[key]?'ON':'OFF'}`);
  
  if(key === 'monitor' && !app.simulation) {
      if(app.config[key]) app.gain.connect(app.ctx.destination);
      else app.gain.disconnect(app.ctx.destination);
  }
  if(key === 'invert' && !app.simulation) app.invert.gain.value = app.config[key] ? -1 : 1;
  
  // Ghost Box Logic
  if(key === 'ghostBox' && !app.simulation) {
      const vol = app.config[key] ? 0.15 : 0;
      app.ghostGain.gain.setTargetAtTime(vol, app.ctx.currentTime, 0.1);
      app.noiseGain.gain.setTargetAtTime(vol * 0.5, app.ctx.currentTime, 0.1); // Moins de bruit
  }
  
  if(key === 'voice') toggleVoice();
  if(key === 'cam') toggleCam();
}

// --- IA AVANCÉE (Dictonnaire + Speech) ---

function initIA() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true;
      app.recognition.lang = 'fr-FR';
      
      app.recognition.onresult = (e) => {
          let txt = '';
          for(let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
          if(txt) {
              displayWord(txt, false); // False = mot réel
              if(e.results[e.results.length-1].isFinal) log(`IA REELLE: "${txt}"`, 'log-suc');
          }
      };
      app.recognition.onerror = (e) => { /* Ignore no-speech */ };
      app.recognition.onend = () => { if(app.config.voice && app.running) startVoice(); };
  }
}

function toggleVoice() {
  if(!app.recognition) return;
  if(app.config.voice) startVoice();
  else app.recognition.stop();
}

function startVoice() { try { app.recognition.start(); } catch(e){} }

// Fonction d'affichage des mots (avec effet Glitch)
function displayWord(word, isGhost) {
  els.iaText.textContent = word;
  els.iaText.className = isGhost ? 'glitch' : ''; // Effet glitch si mot de fantôme
  
  if(isGhost) {
      els.iaText.style.color = 'var(--primary)';
      log(`DÉTECTION PARANORMALE: "${word}"`, 'log-warn');
  } else {
      els.iaText.style.color = '#fff';
  }
  
  // Reset du glitch après 1s
  if(isGhost) setTimeout(() => els.iaText.className = '', 800);
}

// --- CAM & REC ---

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          els.camera.srcObject = app.vidStream;
          els.camera.style.display = 'block';
      } catch(e) { log("Erreur Cam", 'log-warn'); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null;
      els.camera.style.display = 'none';
  }
}

function saveBlob(data) {
  if(app.simulation) return;
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`EVP_PRO_${Date.now()}.webm`; a.click();
  log("Enregistrement sauvé", 'log-suc');
}

// --- VISUALS & LOOP ---

function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  // 1. Audio Data
  if(app.simulation) {
      const time = Date.now() / 50;
      for(let i=0; i<1024; i++) {
          let v = (Math.sin(i * 0.05 + time) + 1) * 50;
          if(app.config.ghostBox) v += Math.random() * 100; // Chaos en mode Ghost Box
          app.dataArray[i] = v;
      }
  } else {
      app.analyser.getByteFrequencyData(app.dataArray);
  }

  // 2. Calcul Volume
  let sum = 0, maxV = 0;
  for(let i=0; i<app.dataArray.length; i++) {
      sum += app.dataArray[i];
      if(app.dataArray[i] > maxV) maxV = app.dataArray[i];
  }
  const avg = sum / app.dataArray.length;
  els.voiceBar.style.width = Math.min(100, avg) + '%';

  // 3. IA PARANORMALE (Si pic audio mais pas de mot reconnu)
  const now = Date.now();
  if (avg > 40 && (now - app.lastSpikeTime > 2000)) {
      // Pic sonore détecté
      if (app.config.voice && Math.random() > 0.8) {
          // 20% de chance de générer un mot "Ghost" si l'IA réelle ne dit rien
          const randomWord = GHOST_WORDS[Math.floor(Math.random() * GHOST_WORDS.length)];
          displayWord(randomWord, true);
      }
      app.lastSpikeTime = now;
  }

  // 4. Auto Rec
  if(app.config.autoRec && !app.simulation && avg > 50 && !app.isRec) {
      app.isRec = true; app.recorder.start(); log("⚠️ ANOMALIE ENREGISTRÉE", 'log-warn');
      setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 4000);
  }

  // 5. Radar Pro Logic
  if(app.config.radar) {
      // Ajouter un blip si volume élevé
      if(avg > 30 && Math.random() > 0.95) {
          app.radarBlips.push({
              angle: Math.random() * Math.PI * 2,
              dist: Math.random() * 50, // 0 à 50m
              life: 1.0, // Opacité
              id: Math.random()
          });
      }
      // Mettre à jour distance affichée du blip le plus proche
      if(app.radarBlips.length > 0) {
          const closest = app.radarBlips.reduce((prev, curr) => prev.dist < curr.dist ? prev : curr);
          els.radar.textContent = Math.floor(closest.dist);
      } else {
          els.radar.textContent = "--";
      }
  } else {
      els.radar.textContent = "OFF";
      app.radarBlips = [];
  }

  // 6. Dessin
  const ctx = app.cCtx, w=app.width, h=app.height;
  ctx.fillStyle = 'rgba(5, 0, 0, 0.2)'; // Fond rouge sombre qui s'efface lentement
  ctx.fillRect(0,0,w,h);
  
  // Waveform / Bars
  const barW = (w / app.dataArray.length) * 2.5;
  let x = 0;
  for(let i=0; i<app.dataArray.length; i++) {
      const v = app.dataArray[i];
      const barH = (v/255)*h;
      
      // Couleur dynamique
      let r = v, g = 0, b = 0;
      if(app.config.evp) { r=0; g=v; b=v; } // Cyan EVP
      if(app.simulation) { r=v; g=v; b=0; } // Jaune Sim
      
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      
      // Style
      if(app.config.invert) {
          // Lignes inversées
          ctx.fillRect(x, 0, barW, barH); 
          ctx.fillRect(x, h-barH, barW, barH);
      } else {
          ctx.fillRect(x, h/2-barH/2, barW, barH);
      }
      x += barW+1;
  }

  // 7. Dessin Radar Pro
  if(app.config.radar) {
      const cx = w - 60, cy = 60, r = 50;
      
      // Grille Radar
      ctx.strokeStyle = 'rgba(255, 0, 85, 0.3)';
      ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,r/2,0,7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy-r); ctx.lineTo(cx, cy+r); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-r, cy); ctx.lineTo(cx+r, cy); ctx.stroke();

      // Scanner
      const scanAngle = (Date.now() / 1000) % (Math.PI*2);
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(scanAngle);
      ctx.fillStyle = 'rgba(255, 0, 85, 0.5)';
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r,-0.1,0.1); ctx.fill(); ctx.restore();

      // Blips (Persistance)
      for (let i = app.radarBlips.length - 1; i >= 0; i--) {
          const b = app.radarBlips[i];
          b.life -= 0.02; // Fade out speed
          
          if (b.life <= 0) {
              app.radarBlips.splice(i, 1);
          } else {
              const bx = cx + Math.cos(b.angle) * (b.dist/50 * r);
              const by = cy + Math.sin(b.angle) * (b.dist/50 * r);
              
              ctx.fillStyle = `rgba(0, 255, 255, ${b.life})`; // Cyan dots
              ctx.beginPath(); ctx.arc(bx, by, 3, 0, 7); ctx.fill();
              
              // Texte distance
              ctx.fillStyle = `rgba(255,255,255,${b.life})`;
              ctx.font = '10px monospace';
              ctx.fillText(`${Math.floor(b.dist)}m`, bx+5, by);
          }
      }
  }
}

// --- INIT ---
window.onload = () => {
  app.canvas = els.canvas;
  app.cCtx = app.canvas.getContext('2d');
  resize();
  initIA();
  log("ETERNITY LAB PRO PRET.", 'log-suc');
};

window.onresize = resize;
function resize() {
  app.width = els.canvas.clientWidth;
  app.height = els.canvas.clientHeight;
  app.canvas.width = app.width;
  app.canvas.height = app.height;
}

function toggleTheme() {
  const root = document.documentElement;
  const curr = root.style.getPropertyValue('--primary');
  root.style.setProperty('--primary', curr === '#ff0055' ? '#00ff00' : '#ff0055');
}
</script>
</body>
</html>
