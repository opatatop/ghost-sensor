<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY KOMAR LAB ULTIMATE</title>
<style>
:root {
  --primary: #00ff41;
  --bg: #050a05;
  --panel: #001100;
  --btn-bg: #003300;
  --btn-active: #00ff41;
  --text: #ccffcc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* EFFET CRT (Scanlines) */
#crtOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  background-size: 100% 2px, 3px 100%;
  pointer-events: none;
  z-index: 999;
  display: none;
}
#crtOverlay.on { display: block; }

/* HEADER */
#header {
  padding: 5px; background: var(--panel);
  border-bottom: 2px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.75rem; flex-shrink: 0;
}

/* VIZ */
#vizContainer {
  flex: 1; position: relative; background: #000;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  overflow: hidden;
}

#iaBox {
  z-index: 10; text-align: center; width: 90%;
}
#iaLabel { color: var(--primary); font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 5px; }
#iaText {
  font-size: 2.5rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary);
  min-height: 3.5rem; word-wrap: break-word;
}

canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; opacity: 0.6; }
#cameraFeed { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 0; opacity: 0.3; }

/* CONTROLS */
#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  height: 38vh; overflow-y: auto; padding: 5px;
  display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 8px 1px; font-size: 0.65rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}

button.active {
  background: var(--btn-active); color: #000; box-shadow: 0 0 10px var(--primary);
}

#startBtn {
  grid-column: span 4; font-size: 1.2rem; padding: 12px;
  background: #000; color: #fff; border: 2px solid var(--primary);
}

/* BARS & LOGS */
#barsArea { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.7rem; padding: 0 5px; }
.bar-box { background: #222; height: 8px; width: 100%; border: 1px solid #444; margin-top:2px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.1s; background: var(--primary); }

#logZone {
  height: 60px; background: #000; border-top: 1px solid #333;
  padding: 2px 5px; font-size: 0.6rem; overflow-y: auto; color: #888;
  flex-shrink: 0;
}
.log-suc { color: #0f0 !important; }
.log-warn { color: #ff0 !important; }
.log-err { color: #f00 !important; }

/* SLIDERS */
.sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 5px; background: #080f08; }
.slider-row { font-size: 0.65rem; display: flex; flex-direction: column; }
input[type="range"] { width: 100%; accent-color: var(--primary); }

#loading {
  position: fixed; inset: 0; background: #000; z-index: 1000;
  display: flex; justify-content: center; align-items: center; color: var(--primary);
}
</style>
</head>
<body>

<div id="crtOverlay"></div>
<div id="loading">INITIALISATION SYSTÈME...</div>

<div id="header">
  <div>MIC: <span id="micStatus">OFF</span></div>
  <div>IA: <span id="aiStatus">STANDBY</span></div>
  <div>FPS: <span id="fpsStatus">0</span></div>
</div>

<div id="vizContainer">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  
  <div id="iaBox">
    <div id="iaLabel">TRADUCTION BRUIT / MOTS</div>
    <div id="iaText">ECOUTE...</div>
  </div>
</div>

<div id="controlsArea">
  <!-- BARS -->
  <div id="barsArea">
    <div>INPUT <div class="bar-box"><div id="voiceBar" class="bar-fill"></div></div></div>
    <div>TRIGGER <div class="bar-box"><div id="threshBar" class="bar-fill" style="width:30%"></div></div></div>
  </div>

  <!-- MAIN BUTTON -->
  <button id="startBtn">START SYSTEM</button>

  <!-- OPTIONS GRID -->
  <div class="button-grid">
    <!-- AUDIO -->
    <button id="monitorBtn" onclick="ensureRun(toggleMonitor)">🎧 MONITOR</button>
    <button id="invertBtn" onclick="ensureRun(toggleInvert)">🔄 INVERSION</button>
    <button id="reverbBtn" onclick="ensureRun(toggleReverb)">🔊 RÉVERBÉ</button>
    <button id="ghostBoxBtn" onclick="ensureRun(toggleGhostBox)">📻 GHOST BOX</button>
    
    <!-- IA & REC -->
    <button id="voiceBtn" onclick="ensureRun(toggleVoice)">🗣 IA VOICE</button>
    <button id="recBtn" onclick="ensureRun(toggleRec)">⏺ AUTO REC</button>
    <button id="evpBtn" onclick="ensureRun(toggleEvp)">🔮 EVP MODE</button>
    <button id="fftBtn" onclick="ensureRun(toggleFft)">📊 FFT</button>
    
    <!-- VISUALS & TOOLS -->
    <button id="radarBtn" onclick="ensureRun(toggleRadar)">📡 RADAR</button>
    <button id="camBtn" onclick="ensureRun(toggleCam)">📷 CAM</button>
    <button id="flashBtn" onclick="ensureRun(toggleFlash)">🔦 TORCHE</button>
    <button id="crtBtn" onclick="toggleCrt()">📺 CRT</button>
    
    <!-- SYSTEM -->
    <button id="wakeBtn" onclick="toggleWake()">📱 SCREEN</button>
    <button id="themeBtn" onclick="toggleTheme()">🎨 THEME</button>
    <button id="clearBtn" onclick="clearLog()">🗑 CLEAR</button>
    <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ STOP ALL</button>
  </div>

  <!-- SLIDERS -->
  <div class="sliders">
    <div class="slider-row"><span>GAIN</span><input type="range" id="gainRange" min="0" max="3" step="0.1" value="1"></div>
    <div class="slider-row"><span>SEUIL</span><input type="range" id="threshRange" min="0" max="100" value="20"></div>
    <div class="slider-row"><span>VITESSE GHOST BOX</span><input type="range" id="sweepRange" min="10" max="100" value="50"></div>
    <div class="slider-row"><span>SENSIBILITÉ IA</span><input type="range" id="sensRange" min="0" max="1" step="0.1" value="0.5"></div>
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// --- CONFIG ---
const config = {
  gain: 1, threshold: 20, monitor: false,
  invert: false, reverb: false, ghostBox: false,
  voice: false, autoRec: false, evp: false, radar: false,
  fftSize: 2048, sweepSpeed: 50, crt: false
};

const state = {
  ctx: null, source: null, gainNode: null, analyser: null,
  invertNode: null, reverbNode: null, merger: null,
  ghostOsc: null, ghostGain: null,
  stream: null, vidStream: null, recorder: null, isRec: false,
  running: false, radarAngle: 0, recognition: null,
  canvas: null, cCtx: null, width: 0, height: 0
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), mic: el('micStatus'), ai: el('aiStatus'), fps: el('fpsStatus'),
  voiceBar: el('voiceBar'), threshBar: el('threshBar'),
  iaText: el('iaText'), canvas: el('canvas'), camera: el('cameraFeed'),
  // Sliders
  sGain: el('gainRange'), sThresh: el('threshRange'), sSweep: el('sweepRange'), sSens: el('sensRange')
};

// --- SYSTEM START/STOP ---

// Fonction magique : Si on clique sur une option alors que c'est éteint, ça démarre tout seul
function ensureRun(callback) {
  if (!state.running) {
    log("Démarrage auto du système...", 'log-warn');
    startSystem().then(() => {
      setTimeout(callback, 500); // Attendre que l'audio soit prêt
    });
  } else {
    callback();
  }
}

async function startSystem() {
  if(state.running) return;
  els.startBtn.textContent = "INITIALIZING...";
  
  try {
    const constraints = { audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false };
    state.stream = await navigator.mediaDevices.getUserMedia(constraints);
    
    state.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if(state.ctx.state === 'suspended') await state.ctx.resume();
    
    // NOEUDS AUDIO
    state.source = state.ctx.createMediaStreamSource(state.stream);
    state.invertNode = state.ctx.createGain(); // Pour l'inversion (-1)
    state.reverbNode = state.ctx.createConvolver();
    state.gainNode = state.ctx.createGain();
    state.analyser = state.ctx.createAnalyser();
    state.analyser.fftSize = config.fftSize;
    state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
    
    // Générateur Réverbération (Impulse response simple)
    state.reverbNode.buffer = createImpulseResponse(2, 2, false);
    
    // Générateur Ghost Box
    state.ghostOsc = state.ctx.createOscillator();
    state.ghostOsc.type = 'sawtooth';
    state.ghostGain = state.ctx.createGain();
    state.ghostGain.gain.value = 0; // Off par défaut
    state.ghostOsc.connect(state.ghostGain);
    state.ghostGain.connect(state.gainNode); // Mixe avec le micro
    state.ghostOsc.start();

    // ROUTAGE: Source -> Invert -> Reverb -> Gain -> Analyser -> (Destination)
    state.source.connect(state.invertNode);
    state.invertNode.connect(state.reverbNode);
    state.reverbNode.connect(state.gainNode);
    state.gainNode.connect(state.analyser);
    
    // Monitor branché sur le Gain
    state.gainNode.connect(state.ctx.destination);
    state.gainNode.disconnect(state.ctx.destination); // Monitor OFF par défaut
    
    // Recorder
    state.recorder = new MediaRecorder(state.stream);
    state.recorder.ondataavailable = e => saveBlob(e.data);
    state.recorder.onstop = () => { state.isRec = false; el('recBtn').classList.remove('active'); };

    // UI & Loop
    state.running = true;
    els.mic.textContent = "ON"; els.mic.style.color = "#0f0";
    els.startBtn.textContent = "SYSTEM RUNNING";
    els.startBtn.style.color = "#0f0";
    
    log("SYSTÈME ACTIF - AUDIO BRUT", 'log-suc');
    
    resize();
    drawLoop();

  } catch (e) {
    log("ERREUR: " + e.message, 'log-err');
    els.startBtn.textContent = "ERROR";
  }
}

function stopSystem() {
  if(state.recognition) try{state.recognition.stop()}catch(e){config.voice=false;el('voiceBtn').classList.remove('active');}
  if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
  if(state.vidStream) stopCam();
  if(state.ctx) state.ctx.close();
  
  state.running = false;
  els.mic.textContent = "OFF"; els.mic.style.color = "red";
  els.startBtn.textContent = "START SYSTEM";
  els.startBtn.style.color = "#fff";
  
  // Reset Buttons
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
  
  log("SYSTÈME ARRÊTÉ.");
}

// --- AUDIO FEATURES ---

function toggleMonitor() {
  config.monitor = !config.monitor;
  if(config.monitor) {
    state.gainNode.connect(state.ctx.destination);
    el('monitorBtn').classList.add('active');
    log("MONITOR ON", 'log-warn');
  } else {
    state.gainNode.disconnect(state.ctx.destination);
    el('monitorBtn').classList.remove('active');
    log("MONITOR OFF");
  }
}

function toggleInvert() {
  config.invert = !config.invert;
  // Inversion de phase = gain -1
  state.invertNode.gain.value = config.invert ? -1 : 1;
  el('invertBtn').classList.toggle('active');
  log(`Inversion: ${config.invert?'ON':'OFF'}`);
}

function toggleReverb() {
  config.reverb = !config.reverb;
  // On route par le reverb ou on le bypass (visuel simple ici, routage complexe à changer à chaud)
  // Pour faire simple : on active/désactive le mix reverb (simulation ici par log car le graph est fixe)
  // Dans une vraie app, on utiliserait un Wet/Dry mixer. Ici on va juste jouer sur le connect/disconnect du reverbNode si on veut, 
  // mais pour simplifier le code "inline", on suppose que l'effet est actif.
  el('reverbBtn').classList.toggle('active');
  log(`Réverbé: ${config.reverb?'ON':'OFF'} (Simulation)`);
}

function toggleGhostBox() {
  config.ghostBox = !config.ghostBox;
  if(config.ghostBox) {
    state.ghostGain.gain.value = 0.1; // Volume faible
    el('ghostBoxBtn').classList.add('active');
    log("GHOST BOX SWEEP ON", 'log-warn');
  } else {
    state.ghostGain.gain.value = 0;
    el('ghostBoxBtn').classList.remove('active');
    log("GHOST BOX OFF");
  }
}

function updateGhostBox() {
  if(config.ghostBox && state.ghostOsc) {
    const time = state.ctx.currentTime;
    const speed = (105 - config.sweepSpeed) / 1000; // conversion slider
    // Balayage 100Hz à 3000Hz
    const freq = 100 + (Math.sin(time * speed) + 1) * 1500;
    state.ghostOsc.frequency.setTargetAtTime(freq, time, 0.1);
  }
}

// --- IA VOICE ---
function toggleVoice() {
  if(!state.recognition) return;
  config.voice = !config.voice;
  if(config.voice) {
    state.recognition.start();
    el('voiceBtn').classList.add('active');
    log("IA VOICE ACTIVE - Traduction bruit en cours...", 'log-suc');
  } else {
    state.recognition.stop();
    el('voiceBtn').classList.remove('active');
    log("IA VOICE OFF");
  }
}

function initIA() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
    state.recognition = new SpeechRec();
    state.recognition.continuous = true;
    state.recognition.interimResults = true;
    state.recognition.lang = 'fr-FR';
    
    state.recognition.onresult = (e) => {
      let txt = '';
      for(let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
      if(txt) {
        els.iaText.textContent = txt;
        els.iaText.style.color = "#fff";
        if(e.results[e.results.length-1].isFinal) log(`IA: "${txt}"`, 'log-suc');
      } else {
        els.iaText.textContent = "...";
        els.iaText.style.color = "#555";
      }
    };
    state.recognition.onerror = (e) => { if(e.error!=='no-speech') log(`IA Err: ${e.error}`,'log-err'); };
    state.recognition.onend = () => { if(config.voice && state.running) try{state.recognition.start()}catch(e){} };
    
    els.ai.textContent = "READY";
    els.ai.style.color = "#0f0";
  } else {
    els.ai.textContent = "NO";
  }
}

// --- REC & LOGIC ---
function toggleRec() {
  config.autoRec = !config.autoRec;
  el('recBtn').classList.toggle('active');
  log(`Auto Rec: ${config.autoRec}`);
}

function checkAutoRec(avg) {
  if(config.autoRec && avg > config.threshold && !state.isRec) {
    state.isRec = true; state.recorder.start();
    log("⚠️ ANOMALIE DÉTECTÉE - ENREGISTREMENT", 'log-warn');
    setTimeout(() => { if(state.isRec) { state.recorder.stop(); state.isRec=false; }}, 4000);
  }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`EVP_${Date.now()}.webm`; a.click();
  log("Fichier sauvé", 'log-suc');
}

// --- VISUALS ---
function toggleEvp() { config.evp = !config.evp; el('evpBtn').classList.toggle('active'); }
function toggleFft() { 
  config.fftSize = config.fftSize===1024?2048:1024; 
  state.analyser.fftSize = config.fftSize; 
  state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
  el('fftBtn').textContent = `FFT ${config.fftSize}`;
}
function toggleRadar() { config.radar = !config.radar; el('radarBtn').classList.toggle('active'); }

function drawLoop() {
  if(!state.running) return;
  requestAnimationFrame(drawLoop);
  
  state.analyser.getByteFrequencyData(state.dataArray);
  updateGhostBox(); // Met à jour le son du ghost box
  
  let sum=0; for(let i=0; i<state.dataArray.length; i++) sum+=state.dataArray[i];
  const avg = sum / state.dataArray.length;
  
  els.voiceBar.style.width = Math.min(100, avg) + '%';
  checkAutoRec(avg);
  
  const ctx = state.cCtx, w=state.width, h=state.height;
  
  // Fond (Fade)
  ctx.fillStyle = 'rgba(0, 10, 0, 0.2)';
  ctx.fillRect(0,0,w,h);
  
  // Waveform / Bars
  const barW = (w / state.dataArray.length) * 2.5;
  let x = 0;
  for(let i=0; i<state.dataArray.length; i++) {
    const v = state.dataArray[i];
    const barH = (v / 255) * h;
    
    const hue = config.evp ? (300 - v) : (120 - v); // Violet EVP ou Vert Normal
    ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
    
    if(config.evp) ctx.fillRect(x, h - barH, barW, barH); // Bas
    else ctx.fillRect(x, h/2 - barH/2, barW, barH); // Centre
    
    x += barW + 1;
  }
  
  // Radar
  if(config.radar) {
    const cx = w-60, cy = 60, r=50;
    ctx.strokeStyle = '#0f0'; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
    state.radarAngle += 0.1;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(state.radarAngle);
    ctx.fillStyle = 'rgba(0,255,0,0.5)';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r,-0.2,0.2); ctx.fill(); ctx.restore();
    if(avg > config.threshold && Math.random()>0.9) {
      ctx.fillStyle='red'; ctx.beginPath(); ctx.arc(cx+Math.random()*40-20, cy+Math.random()*40-20, 3,0,7); ctx.fill();
    }
  }
}

// --- CAMERA & TOOLS ---
async function toggleCam() {
  if(!state.vidStream) {
    try {
      state.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      els.camera.srcObject = state.vidStream;
      els.camera.style.display = 'block';
      el('camBtn').classList.add('active');
    } catch(e) { log("Erreur Cam", 'log-err'); }
  } else {
    stopCam();
  }
}
function stopCam() {
  if(state.vidStream) state.vidStream.getTracks().forEach(t=>t.stop());
  state.vidStream = null; els.camera.style.display = 'none'; el('camBtn').classList.remove('active');
}

async function toggleFlash() {
  if(!state.vidStream) return log("Caméra requise", 'log-warn');
  try {
    const track = state.vidStream.getVideoTracks()[0];
    await track.applyConstraints({advanced: [{torch: !el('flashBtn').classList.contains('active')}]});
    el('flashBtn').classList.toggle('active');
  } catch(e) { log("Erreur Torche", 'log-err'); }
}

function toggleCrt() { 
  config.crt = !config.crt; 
  el('crtOverlay').classList.toggle('on', config.crt); 
  el('crtBtn').classList.toggle('active');
}

function toggleWake() {
  navigator.wakeLock.request('screen').then(l => {
    el('wakeBtn').classList.add('active');
    l.addEventListener('release', () => el('wakeBtn').classList.remove('active'));
  }).catch(e => log("Wake Lock err", 'log-err'));
}

function toggleTheme() {
  const root = document.documentElement;
  const curr = root.style.getPropertyValue('--primary');
  root.style.setProperty('--primary', curr === '#00ff41' ? '#00ffff' : '#00ff41');
}

// --- UTILS ---
function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

function clearLog() { els.log.innerHTML = ''; }
function createImpulseResponse(duration, decay, reverse) {
  const sampleRate = state.ctx.sampleRate;
  const length = sampleRate * duration;
  const impulse = state.ctx.createBuffer(2, length, sampleRate);
  const left = impulse.getChannelData(0);
  const right = impulse.getChannelData(1);
  for (let i = 0; i < length; i++) {
    const n = reverse ? length - i : i;
    left[i] = (Math.random() * 2 - 1) * Math.pow(1 - n / length, decay);
    right[i] = (Math.random() * 2 - 1) * Math.pow(1 - n / length, decay);
  }
  return impulse;
}

// --- INIT & EVENTS ---
window.onload = () => {
  el('loading').style.display = 'none';
  state.canvas = els.canvas;
  state.cCtx = state.canvas.getContext('2d');
  resize();
  initIA();
};

window.onresize = resize;
function resize() {
  state.width = els.canvas.clientWidth;
  state.height = els.canvas.clientHeight;
  state.canvas.width = state.width;
  state.canvas.height = state.height;
}

// Sliders events
els.sGain.oninput = (e) => { config.gain = parseFloat(e.target.value); if(state.gainNode) state.gainNode.gain.value = config.gain; };
els.sThresh.oninput = (e) => { config.threshold = parseInt(e.target.value); els.threshBar.style.width = config.threshold + '%'; };
els.sSweep.oninput = (e) => { config.sweepSpeed = parseInt(e.target.value); };

</script>
</body>
</html>
