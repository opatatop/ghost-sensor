<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY MOBILE LAB PRO</title>
<style>
:root {
  --primary: #00ffd0;
  --bg: #000814;
  --panel: rgba(0, 10, 20, 0.95);
  --button: #001f30;
  --voice: #ffaa00;
  --evp: #aa00ff;
  --error: #ff0000;
  --success: #55ff55;
  --glass: rgba(0, 255, 208, 0.1);
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  touch-action: manipulation;
}

/* HEADER */
#header {
  padding: 10px;
  text-align: center;
  background: var(--panel);
  border-bottom: 2px solid var(--primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#header h3 { margin: 0; font-size: 1.2rem; }

/* CONTROLS AREA */
#controls {
  padding: 10px;
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  max-height: 40vh;
  overflow-y: auto;
}

/* SETTINGS PANEL (Collapsible) */
#settingsPanel {
  grid-column: span 2;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--primary);
  padding: 10px;
  display: none; /* Caché par défaut */
}
#settingsPanel.open { display: block; }

.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.8rem;
}

input[type="range"] {
  width: 50%;
  accent-color: var(--primary);
}

/* VISUALIZATION */
#visualization {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #000;
}

/* Video Background for Camera Mode */
#cameraFeed {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.3;
  display: none;
  z-index: 0;
}

/* LOGS */
#logZone {
  height: 120px;
  overflow-y: auto;
  padding: 8px;
  background: rgba(0, 0, 0, 0.8);
  border-top: 1px solid var(--primary);
  font-size: 0.75rem;
  z-index: 10;
}

/* BUTTONS */
button {
  background: var(--button);
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 10px;
  margin: 0;
  border-radius: 4px;
  font-weight: bold;
  font-size: 0.8rem;
  cursor: pointer;
  text-transform: uppercase;
}

button:active { background: var(--primary); color: #000; }
button:disabled { background: #222; color: #555; border-color: #444; }
button.active-mode { background: var(--primary); color: #000; box-shadow: 0 0 10px var(--primary); }

/* STATUS BARS */
.status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  margin-bottom: 10px;
  font-size: 0.8rem;
}
.bar-container {
  background: #222;
  height: 10px;
  width: 100%;
  margin-top: 2px;
  border: 1px solid #444;
}
.bar-fill { height: 100%; width: 0%; transition: width 0.1s; }
#voiceBar { background: var(--voice); }
#thresholdBar { background: var(--evp); }

/* LOAD SCREEN */
.loading {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  display: flex; justify-content: center; align-items: center; flex-direction: column;
  z-index: 1000;
}

/* Canvas elements */
#waterfallCanvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; z-index: 1; }
#radarCanvas { position: absolute; top: 10px; right: 10px; width: 100px; height: 100px; z-index: 2; opacity: 0.8; }
</style>
</head>
<body>

<div class="loading" id="loadingScreen">
  <h2>ETERNITY LAB PRO</h2>
  <div class="progress">Chargement des systèmes...</div>
</div>

<div id="header">
  <h3>ETERNITY LAB</h3>
  <div style="font-size:0.8rem">
    <span>MIC: <span id="micStatus" style="color:var(--error)">OFF</span></span> | 
    <span>IA: <span id="aiStatus">OFF</span></span>
  </div>
</div>

<div id="controls">
  <!-- BOUTON START / STOP -->
  <button id="startBtn" style="grid-column: span 2; font-size: 1.2rem; background: var(--success); color: #000; border: none;">START SYSTEM</button>

  <!-- MODES -->
  <button id="fftBtn" disabled>FFT 1024</button>
  <button id="evpBtn" disabled>EVP MODE</button>
  <button id="radarBtn" disabled>RADAR</button>
  <button id="recBtn" disabled>AUTO REC</button>
  <button id="camBtn" disabled>CAMERA</button>
  <button id="flashBtn" disabled>LAMPE</button>
  <button id="settingsBtn" style="grid-column: span 2; background: #333;">⚙️ PARAMÈTRES</button>
  <button id="wavBtn" disabled>SAVE WAV</button>

  <!-- PANNEAU PARAMÈTRES CACHÉ -->
  <div id="settingsPanel">
    <div class="setting-row">
      <span>GAIN (Volume Mic)</span>
      <input type="range" id="gainSlider" min="0" max="5" step="0.1" value="1">
    </div>
    <div class="setting-row">
      <span>SEUIL EVP (Trigger)</span>
      <input type="range" id="thresholdSlider" min="0" max="100" step="1" value="30">
    </div>
    <div class="setting-row">
      <span>VITESSE RADAR</span>
      <input type="range" id="radarSpeedSlider" min="1" max="10" step="1" value="5">
    </div>
  </div>
</div>

<div id="visualization">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="radarCanvas"></canvas>
  <canvas id="waterfallCanvas"></canvas>
</div>

<div class="status-grid">
  <div>
    <div>VOICE INPUT</div>
    <div class="bar-container"><div id="voiceBar" class="bar-fill"></div></div>
  </div>
  <div>
    <div>TRIGGER LEVEL</div>
    <div class="bar-container"><div id="thresholdBar" class="bar-fill" style="width: 30%"></div></div>
  </div>
</div>

<div id="logZone"></div>

<!-- BIBLIOTHEQUES -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// --- CONFIGURATION & STATE ---
const config = {
  fftSize: 1024,
  autoRec: false,
  evpMode: false,
  radar: false,
  camera: false,
  gain: 1.0,
  threshold: 30,
  radarSpeed: 0.05
};

const state = {
  audioContext: null,
  analyser: null,
  gainNode: null,
  dataArray: null,
  stream: null,
  videoStream: null,
  recorder: null,
  isRecording: false,
  initialized: false,
  librariesLoaded: { three: false, tfjs: false },
  radarAngle: 0
};

const elements = {
  loadingScreen: document.getElementById('loadingScreen'),
  micStatus: document.getElementById('micStatus'),
  aiStatus: document.getElementById('aiStatus'),
  voiceBar: document.getElementById('voiceBar'),
  thresholdBar: document.getElementById('thresholdBar'),
  logZone: document.getElementById('logZone'),
  visualization: document.getElementById('visualization'),
  cameraFeed: document.getElementById('cameraFeed'),
  // Buttons
  startBtn: document.getElementById('startBtn'),
  fftBtn: document.getElementById('fftBtn'),
  recBtn: document.getElementById('recBtn'),
  evpBtn: document.getElementById('evpBtn'),
  radarBtn: document.getElementById('radarBtn'),
  camBtn: document.getElementById('camBtn'),
  flashBtn: document.getElementById('flashBtn'),
  wavBtn: document.getElementById('wavBtn'),
  settingsBtn: document.getElementById('settingsBtn'),
  settingsPanel: document.getElementById('settingsPanel'),
  // Sliders
  gainSlider: document.getElementById('gainSlider'),
  thresholdSlider: document.getElementById('thresholdSlider'),
  radarSpeedSlider: document.getElementById('radarSpeedSlider')
};

// --- LOGS ---
function log(msg, type = 'info') {
  const div = document.createElement("div");
  div.textContent = `> ${msg}`;
  if (type === 'error') div.style.color = "var(--error)";
  if (type === 'success') div.style.color = "var(--success)";
  if (type === 'warn') div.style.color = "var(--voice)";
  elements.logZone.appendChild(div);
  elements.logZone.scrollTop = elements.logZone.scrollHeight;
}

// --- AUDIO SYSTEM ---
async function startApplication() {
  elements.loadingScreen.style.display = 'flex';
  try {
    // 1. AUDIO
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    state.stream = stream;
    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    const source = state.audioContext.createMediaStreamSource(stream);
    
    // GAIN NODE (Volume Control)
    state.gainNode = state.audioContext.createGain();
    state.gainNode.gain.value = config.gain;
    
    // ANALYSER
    state.analyser = state.audioContext.createAnalyser();
    state.analyser.fftSize = config.fftSize;
    state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
    
    // Connect: Source -> Gain -> Analyser
    source.connect(state.gainNode);
    state.gainNode.connect(state.analyser);
    // Note: On ne connecte PAS à destination pour éviter le feedback (larsen)

    // RECORDER
    state.recorder = new MediaRecorder(stream);
    state.recorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
            const blob = new Blob([e.data], { type: "audio/webm" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `EVP_Capture_${Date.now()}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            log("Fichier EVP sauvé", "success");
        }
    };

    // UI UPDATE
    elements.micStatus.textContent = "ON";
    elements.micStatus.style.color = "var(--success)";
    elements.startBtn.textContent = "STOP SYSTEM";
    elements.startBtn.style.background = "var(--error)";
    
    enableControls(true);
    initVisuals();
    
    state.initialized = true;
    updateLoop();
    log("Système actif. Micro OK.", "success");

  } catch (error) {
    log(`Erreur Start: ${error.message}`, "error");
  } finally {
    elements.loadingScreen.style.display = 'none';
  }
}

function stopApplication() {
  if (state.stream) state.stream.getTracks().forEach(t => t.stop());
  if (state.videoStream) stopCamera();
  if (state.audioContext) state.audioContext.close();
  
  elements.visualization.innerHTML = ''; // Clear canvases
  elements.visualization.appendChild(elements.cameraFeed); // Put video back
  
  state.initialized = false;
  enableControls(false);
  
  elements.micStatus.textContent = "OFF";
  elements.micStatus.style.color = "var(--error)";
  elements.startBtn.textContent = "START SYSTEM";
  elements.startBtn.style.background = "var(--success)";
  log("Système arrêté.");
}

// --- CAMERA & TOOLS ---
async function toggleCamera() {
  if (!state.camera) {
    try {
      log("Activation caméra...");
      const vStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment' }, 
          audio: false 
      });
      state.videoStream = vStream;
      elements.cameraFeed.srcObject = vStream;
      elements.cameraFeed.style.display = 'block';
      state.camera = true;
      elements.camBtn.classList.add('active-mode');
    } catch(e) { log("Caméra refusée/erreur", "error"); }
  } else {
    stopCamera();
  }
}

function stopCamera() {
  if (state.videoStream) {
    state.videoStream.getTracks().forEach(t => t.stop());
    state.videoStream = null;
  }
  elements.cameraFeed.style.display = 'none';
  state.camera = false;
  elements.camBtn.classList.remove('active-mode');
}

async function toggleFlashlight() {
  if (!state.videoStream) {
    log("Activez la caméra d'abord", "warn");
    return;
  }
  try {
    const track = state.videoStream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();
    if (!capabilities.torch) {
      log("Lampe non supportée par cet appareil", "error");
      return;
    }
    await track.applyConstraints({
      advanced: [{ torch: !elements.flashBtn.classList.contains('active-mode') }]
    });
    elements.flashBtn.classList.toggle('active-mode');
  } catch(e) { log("Erreur lampe", "error"); }
}

// --- VISUALIZATION ENGINE ---
function initVisuals() {
  // Waterfall
  const canvas = document.createElement('canvas');
  canvas.id = 'waterfallCanvas';
  canvas.width = elements.visualization.clientWidth;
  canvas.height = 80;
  elements.visualization.appendChild(canvas);
  state.wfCtx = canvas.getContext('2d');

  // Radar
  const rCanvas = document.createElement('canvas');
  rCanvas.id = 'radarCanvas';
  rCanvas.width = 150; rCanvas.height = 150;
  elements.visualization.appendChild(rCanvas);
  state.radarCtx = rCanvas.getContext('2d');
}

function updateLoop() {
  if (!state.initialized) return;
  requestAnimationFrame(updateLoop);

  state.analyser.getByteFrequencyData(state.dataArray);

  // Calcul Volume
  const sum = state.dataArray.reduce((a,b)=>a+b,0);
  const avg = sum / state.dataArray.length;
  
  // UI Bars
  elements.voiceBar.style.width = Math.min(100, avg) + '%';
  elements.thresholdBar.style.width = config.threshold + '%';

  // AUTO REC Logic
  if (config.autoRec && avg > config.threshold && !state.isRecording) {
    startRecording();
  }

  // Visuals
  drawWaterfall();
  if (config.radar) drawRadar(avg);
}

function startRecording() {
  state.isRecording = true;
  state.recorder.start();
  log(">>> ANOMALIE DÉTECTÉE - ENREGISTREMENT <<<", "warn");
  elements.recBtn.classList.add('active-mode');
  
  setTimeout(() => {
    if (state.isRecording) {
      state.recorder.stop();
      state.isRecording = false;
      elements.recBtn.classList.remove('active-mode');
    }
  }, 5000); // 5 sec d'enregistrement
}

function drawWaterfall() {
  const w = state.wfCtx.canvas.width;
  const h = state.wfCtx.canvas.height;
  
  // Scroll down
  const img = state.wfCtx.getImageData(0, 0, w, h-1);
  state.wfCtx.putImageData(img, 0, 1);
  
  // Draw new line
  for(let i=0; i<state.dataArray.length; i+=2) {
    const v = state.dataArray[i];
    const hue = config.evpMode ? 280 : 180; // Violet si EVP, Cyan sinon
    state.wfCtx.fillStyle = `hsl(${hue - v}, 100%, 50%)`;
    state.wfCtx.fillRect(i * (w/state.dataArray.length), 0, 2, 1);
  }
}

function drawRadar(intensity) {
  const ctx = state.radarCtx;
  const cx = 75, cy = 75;
  
  ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Fade effect
  ctx.fillRect(0, 0, 150, 150);

  // Grid
  ctx.strokeStyle = '#004455';
  ctx.beginPath(); ctx.arc(cx, cy, 70, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, 35, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(150,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,150); ctx.stroke();

  // Scanner
  state.radarAngle += config.radarSpeed;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(state.radarAngle);
  
  const grad = ctx.createLinearGradient(0, 0, 75, 0);
  grad.addColorStop(0, 'rgba(0, 255, 208, 0)');
  grad.addColorStop(1, 'rgba(0, 255, 208, 0.8)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0, 70, -0.2, 0.2); ctx.lineTo(0,0); ctx.fill();
  ctx.restore();

  // Blips (Simulated based on audio intensity)
  if (intensity > config.threshold && Math.random() > 0.9) {
      const r = Math.random() * 60 + 5;
      const a = Math.random() * Math.PI * 2;
      const bx = cx + Math.cos(a) * r;
      const by = cy + Math.sin(a) * r;
      ctx.fillStyle = '#ff0000';
      ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI*2); ctx.fill();
  }
}

// --- UI HELPERS ---
function enableControls(enabled) {
  const btns = [elements.fftBtn, elements.recBtn, elements.evpBtn, elements.radarBtn, elements.camBtn, elements.flashBtn, elements.wavBtn];
  btns.forEach(b => b.disabled = !enabled);
}

// --- EVENT LISTENERS ---

// Toggle Buttons
elements.startBtn.onclick = () => state.initialized ? stopApplication() : startApplication();

elements.fftBtn.onclick = function() {
  config.fftSize = config.fftSize === 1024 ? 2048 : 1024;
  if(state.analyser) state.analyser.fftSize = config.fftSize;
  if(state.analyser) state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
  this.textContent = `FFT ${config.fftSize}`;
  this.classList.toggle('active-mode');
  log(`FFT: ${config.fftSize}`);
};

elements.evpBtn.onclick = function() {
  config.evpMode = !config.evpMode;
  this.classList.toggle('active-mode');
  log(`Mode EVP: ${config.evpMode ? 'ON' : 'OFF'}`);
};

elements.radarBtn.onclick = function() {
  config.radar = !config.radar;
  this.classList.toggle('active-mode');
  // Show/Hide canvas
  const c = document.getElementById('radarCanvas');
  if(c) c.style.display = config.radar ? 'block' : 'none';
  log(`Radar: ${config.radar ? 'ON' : 'OFF'}`);
};

elements.recBtn.onclick = function() {
  config.autoRec = !config.autoRec;
  this.classList.toggle('active-mode');
  log(`Auto-Rec: ${config.autoRec ? 'ON' : 'OFF'} (Seuil: ${config.threshold})`);
};

elements.camBtn.onclick = toggleCamera;
elements.flashBtn.onclick = toggleFlashlight;
elements.wavBtn.onclick = () => log("Export WAV complet non implémenté", "warn");

// Settings Panel
elements.settingsBtn.onclick = () => {
  elements.settingsPanel.classList.toggle('open');
  elements.settingsBtn.textContent = elements.settingsPanel.classList.contains('open') ? "FERMER PARAMÈTRES" : "⚙️ PARAMÈTRES";
};

// Sliders
elements.gainSlider.oninput = function() {
  config.gain = parseFloat(this.value);
  if(state.gainNode) state.gainNode.gain.value = config.gain;
};

elements.thresholdSlider.oninput = function() {
  config.threshold = parseInt(this.value);
  elements.thresholdBar.style.width = config.threshold + '%';
};

elements.radarSpeedSlider.oninput = function() {
  config.radarSpeed = parseInt(this.value) / 100;
};

// --- INIT ---
window.onload = () => {
  state.librariesLoaded.three = typeof THREE !== 'undefined';
  state.librariesLoaded.tfjs = typeof tf !== 'undefined';
  
  if (state.librariesLoaded.tfjs) {
      elements.aiStatus.textContent = "READY";
      elements.aiStatus.style.color = "var(--success)";
      log("IA Module: CHARGÉ", "success");
      // On lance un calcul bidon pour "réveiller" TensorFlow et le GPU
      tf.tidy(() => { const x = tf.tensor1d([1,2,3]); x.mul(2); });
  } else {
      elements.aiStatus.textContent = "ERR";
      elements.aiStatus.style.color = "var(--error)";
      log("IA Module: ABSENT", "error");
  }

  elements.loadingScreen.style.display = 'none';
  log("ETERNITY LAB PRÊT. Appuyez sur START.");
  
  // Resize listener
  window.addEventListener('resize', () => {
    const w = elements.visualization.clientWidth;
    if(state.wfCtx) state.wfCtx.canvas.width = w;
  });
};
</script>
</body>
</html>
