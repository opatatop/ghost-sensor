<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXCELLENCE - ASSISTANT REALME</title>
    <style>
        :root {
            --primary: #FFD700; /* Or pour Excellence */
            --secondary: #FF4500;
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --text: #ffffff;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: 'Arial', sans-serif; /* Police plus moderne pour Excellence */
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            background: linear-gradient(90deg, #000, #222, #000);
            border-bottom: 3px solid var(--primary);
            padding: 12px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px var(--primary);
        }
        h1 { 
            margin: 0; font-size: 1.4rem; 
            color: var(--primary); text-shadow: 0 0 8px var(--primary); 
            letter-spacing: 2px; text-transform: uppercase;
            font-weight: 900;
        }
        #status { 
            font-size: 0.8rem; font-weight: bold; padding: 5px 12px; 
            border: 1px solid var(--secondary); color: var(--secondary); 
            text-transform: uppercase; letter-spacing: 1px;
        }
        #status.active { 
            background: var(--secondary); color: #fff; 
            box-shadow: 0 0 10px var(--secondary); 
        }

        main { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        #visualizer {
            flex: 1; background: radial-gradient(circle, #111, #000);
            position: relative; border-bottom: 1px solid #333;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        #displayOverlay {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            text-align: center; pointer-events: none; z-index: 10;
        }
        #mainText {
            font-size: 2.2rem; font-weight: 900; color: #fff;
            background: rgba(0,0,0,0.85); padding: 15px;
            text-transform: uppercase; border: 3px solid var(--primary);
            margin-bottom: 8px; min-height: 3.5rem;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            font-family: 'Impact', sans-serif; letter-spacing: 1px;
        }
        #subText { 
            font-size: 0.9rem; color: var(--primary); 
            letter-spacing: 3px; text-transform: uppercase; font-weight: bold;
        }

        #controls {
            background: var(--panel); padding: 15px;
            display: grid; gap: 12px;
            max-height: 40vh; overflow-y: auto;
        }
        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .control-row.full { grid-template-columns: 1fr; }

        button {
            background: linear-gradient(180deg, #333, #111); 
            border: 2px solid var(--primary); color: var(--primary);
            padding: 18px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; font-family: inherit;
            letter-spacing: 1px;
        }
        button:active { transform: scale(0.96); background: var(--primary); color: #000; }
        button.active-mode { 
            background: var(--primary); color: #000; 
            box-shadow: 0 0 20px var(--primary); 
        }
        button.danger { border-color: #ff3333; color: #ff3333; }
        button.danger:active { background: #ff3333; color: #fff; }

        #terminal {
            height: 100px; background: #000; border-top: 1px solid #333;
            padding: 8px; font-size: 0.7rem; overflow-y: auto; 
            color: var(--primary); font-family: 'Courier New', monospace;
        }
        .log-line { margin-bottom: 4px; border-left: 2px solid var(--primary); padding-left: 5px; }
        .log-sys { color: #888; border-color: #555; }
        .log-cmd { color: var(--secondary); border-color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Excellence</h1>
    <div id="status">OFFLINE</div>
</header>

<main>
    <div id="visualizer">
        <canvas id="scopeCanvas"></canvas>
        <div id="displayOverlay">
            <div id="mainText">EN ATTENTE</div>
            <div id="subText">INITIALISATION SYSTÈME</div>
        </div>
    </div>
</main>

<div id="controls">
    <div class="control-row full">
        <button class="active-mode" onclick="App.startExcellenceMode()">👑 ACTIVER EXCELLENCE</button>
    </div>
    <div class="control-row">
        <button onclick="App.startFullSystem()">📊 VISUELS COMPLETS</button>
        <button class="danger" onclick="App.stopSystem()">⏹ DÉSACTIVER</button>
    </div>
    <div style="font-size: 0.7rem; color:#888; text-align:center; margin-top:5px;">
        Contrôle Realme : "Ouvre les réglages", "Mises à jour", "Ouvre Wi-Fi"
    </div>
</div>

<div id="terminal">
    <div class="log-line log-sys">> Excellence noyau v1.0 chargé.</div>
    <div class="log-line log-sys">> Modules de contrôle système prêts.</div>
</div>

<script>
/**
 * =========================================================================
 * EXCELLENCE v1.0 - ASSISTANT À CONTRÔLE SYSTÈME
 * =========================================================================
 */

const AudioEngine = {
    ctx: null, stream: null, analyser: null, isInit: false,
    async init() {
        if (this.isInit) return true;
        try {
            const AC = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AC();
            if (this.ctx.state === 'suspended') await this.ctx.resume();
            this.stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
            this.analyser = this.ctx.createAnalyser();
            this.analyser.fftSize = 256;
            this.ctx.createMediaStreamSource(this.stream).connect(this.analyser);
            this.isInit = true;
            return true;
        } catch (e) {
            App.log("Erreur Micro : " + e.message, 'sys');
            return false;
        }
    },
    getDataArray() {
        if (!this.analyser) return new Uint8Array(0);
        const arr = new Uint8Array(this.analyser.frequencyBinCount);
        this.analyser.getByteFrequencyData(arr);
        return arr;
    },
    destroy() {
        if (this.stream) this.stream.getTracks().forEach(t => t.stop());
        if (this.ctx) this.ctx.close();
        this.isInit = false;
    }
};

const VisualEngine = {
    canvas: null, ctx: null, isRunning: false, animId: null,
    init() {
        this.canvas = document.getElementById('scopeCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
    },
    resize() {
        if (this.canvas) {
            this.canvas.width = this.canvas.parentElement.clientWidth;
            this.canvas.height = this.canvas.parentElement.clientHeight;
        }
    },
    start() { if (!this.isRunning) { this.isRunning = true; this.loop(); } },
    stop() { this.isRunning = false; if (this.animId) cancelAnimationFrame(this.animId); },
    loop() {
        if (!this.isRunning) return;
        const w = this.canvas.width, h = canvas.height = this.canvas.height; // Fix height sync
        this.ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
        this.ctx.fillRect(0,0,w,h);

        let data = AudioEngine.isInit ? AudioEngine.getDataArray() : new Uint8Array(128).map(()=>Math.random()*30);
        const barW = (w/data.length)*2.5;
        let x = 0;
        for(let i=0; i<data.length; i++) {
            const barH = (data[i]/255)*h;
            // Couleur Or Excellence
            const g = data[i] + 100; 
            const r = 255;
            const b = 0;
            this.ctx.fillStyle = `rgb(${r},${g},${b})`;
            this.ctx.fillRect(x, h-barH, barW, barH);
            x+=barW+1;
        }
        this.animId = requestAnimationFrame(()=>this.loop());
    }
};

// --- MOTEUR DE CONTRÔLE SYSTÈME (INTENTS ANDROID) ---
const ControlEngine = {
    execute(text) {
        const lower = text.toLowerCase();
        let action = null;
        let msg = "";

        // 1. COMMANDES PARAMÈTRES RÉALME/ANDROID
        if (lower.includes('réglage') || lower.includes('paramètre')) {
            action = "intent://#Intent;action=android.settings.SETTINGS;end";
            msg = "Ouverture des paramètres système.";
        }
        else if (lower.includes('mise à jour') || lower.includes('maj') || lower.includes('version')) {
            // Sur Realme/Android, 'DEVICE_INFO_SETTINGS' est le menu "À propos du téléphone" où sont les mises à jour
            action = "intent://#Intent;action=android.settings.DEVICE_INFO_SETTINGS;end";
            msg = "Ouverture des informations système pour les mises à jour.";
        }
        else if (lower.includes('wi-fi') || lower.includes('wifi')) {
            action = "intent://#Intent;action=android.settings.WIFI_SETTINGS;end";
            msg = "Ouverture des paramètres Wi-Fi.";
        }
        else if (lower.includes('bluetooth') || lower.includes('blue')) {
            action = "intent://#Intent;action=android.settings.BLUETOOTH_SETTINGS;end";
            msg = "Ouverture des paramètres Bluetooth.";
        }
        else if (lower.includes('application') || lower.includes('apps')) {
            action = "intent://#Intent;action=android.settings.APPLICATION_SETTINGS;end";
            msg = "Ouverture du gestionnaire d'applications.";
        }
        else if (lower.includes('stockage')) {
            action = "intent://#Intent;action=android.settings.INTERNAL_STORAGE_SETTINGS;end";
            msg = "Ouverture des paramètres de stockage.";
        }
        
        // 2. LANCEMENT D'APPLICATIONS SPÉCIFIQUES
        else if (lower.includes('youtube')) {
            action = "vnd.youtube://"; 
            msg = "Lancement YouTube.";
        }
        else if (lower.includes('whatsapp')) {
            action = "whatsapp://";
            msg = "Lancement WhatsApp.";
        }
        else if (lower.includes('google') || lower.includes('chrome')) {
            action = "googlechrome://navigate?url=https://www.google.com";
            msg = "Ouverture Google Chrome.";
        }

        // EXÉCUTION
        if (action) {
            BrainEngine.speak(msg, false); // Parle sans relancer l'écoute tout de suite
            App.log("COMMANDE SYSTÈME: " + action, 'cmd');
            
            // Délai pour laisser le temps de parler avant de changer de fenêtre
            setTimeout(() => {
                window.location.href = action;
                // On relance l'écoute après l'action
                setTimeout(() => {
                     BrainEngine.startListening();
                     BrainEngine.speak("Action effectuée. Je vous écoute.", false);
                }, 1000);
            }, 2000);
            return true; // Commande traitée
        }
        
        return false; // Pas une commande système
    }
};

const BrainEngine = {
    recognition: null, synthesis: window.speechSynthesis, voice: null, isListening: false,

    init() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return false;
        this.recognition = new SR();
        this.recognition.continuous = true;
        this.recognition.interimResults = false;
        this.recognition.lang = 'fr-FR';

        this.recognition.onresult = (e) => {
            const text = e.results[e.results.length-1][0].transcript.trim();
            this.processInput(text);
        };

        this.recognition.onend = () => {
            if (this.isListening && App.isRunning) {
                setTimeout(() => { 
                    if (this.isListening) try{this.recognition.start()}catch(e){} 
                }, 1000);
            }
        };

        this.recognition.onerror = (e) => {
            if (e.error === 'not-allowed') { App.log("Micro refusé", 'sys'); App.stopSystem(); }
        };

        this.loadVoice();
        window.speechSynthesis.onvoiceschanged = () => this.loadVoice();
        return true;
    },

    loadVoice() {
        const voices = this.synthesis.getVoices();
        // On essaie de prendre une voix masculine ou neutre pour "Excellence"
        this.voice = voices.find(v => v.lang === 'fr-FR' && v.name.includes('Google')) 
                 || voices.find(v => v.lang === 'fr-FR')
                 || voices[0];
    },

    startListening() {
        if (!this.recognition) return;
        this.isListening = true;
        try { this.recognition.start(); } catch(e){}
        App.updateSubText("EXCELLENCE ÉCOUTE");
    },

    stopListening() {
        this.isListening = false;
        if (this.recognition) try { this.recognition.stop(); } catch(e){}
        App.updateSubText("TRAITEMENT...");
    },

    speak(text, autoResume = true) {
        this.synthesis.cancel();
        if (!text) return;
        
        if(autoResume) this.stopListening();

        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'fr-FR'; u.pitch = 0.5; u.rate = 1.0; // Voix plus grave pour l'autorité
        if (this.voice) u.voice = this.voice;
        
        u.onstart = () => { 
            App.updateMainText("EXCELLENCE PARLE"); 
            App.log("Excellence: " + text.substring(0, 40) + "...", 'sys'); 
        };
        
        u.onend = () => {
            if (autoResume && App.isRunning) {
                App.updateMainText("EN ATTENTE");
                this.startListening();
            } else {
                App.updateMainText("STANDBY");
            }
        };
        
        this.synthesis.speak(u);
    },

    async performWebSearch(query) {
        this.stopListening();
        this.speak("Je recherche sur internet pour vous, Excellence.", false);

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            const url = `https://fr.wikipedia.org/w/api.php?origin=*&action=query&format=json&prop=extracts&exintro&explaintext&redirects=1&titles=${encodeURIComponent(query)}`;
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            const data = await response.json();
            const pages = data.query.pages;
            const pageId = Object.keys(pages)[0];

            if (pageId !== "-1" && pages[pageId].extract) {
                let fullText = pages[pageId].extract;
                let sentences = fullText.split('.').filter(s => s.trim().length > 20 && !s.startsWith('('));
                let summary = sentences.slice(0, 2).join('. ') + ".";
                this.speak("Voici l'information : " + summary, true);
            } else {
                throw new Error("Non trouvé");
            }
        } catch (e) {
            this.speak("Information introuvable.", true);
        }
    },

    processInput(text) {
        App.updateMainText(text.toUpperCase());
        const lower = text.toLowerCase();

        // 1. COMMANDE STOP
        if (lower === 'stop' || lower === 'arrête' || lower === 'silence') {
            this.isListening = false; 
            if (this.recognition) this.recognition.stop();
            this.synthesis.cancel();
            App.updateSubText("PAUSE");
            this.speak("Excellence se met en veille.", false);
            return;
        }
        
        // 2. RÉVEIL / RE ÉCOUTE
        if (lower.includes('excellence') || lower.includes('réveille-toi') || lower.includes('écoute')) {
             if (!this.isListening) {
                this.startListening();
                this.speak("Excellence est à votre écoute.", false);
            }
            return;
        }

        // 3. CONTRÔLE SYSTÈME (Nouveau Moteur)
        if (ControlEngine.execute(text)) {
            return; // La commande a été gérée par le moteur de contrôle
        }

        // 4. RECHERCHE WEB
        const searchKeywords = ['cherche', 'recherche', 'c\'est quoi', 'qui est', 'dis moi sur', 'info sur'];
        if (searchKeywords.some(kw => lower.includes(kw))) {
            let cleanQuery = text;
            searchKeywords.forEach(kw => { cleanQuery = cleanQuery.replace(new RegExp(kw, 'gi'), ''); });
            cleanQuery = cleanQuery.trim();
            if (cleanQuery.length > 2) { this.performWebSearch(cleanQuery); return; }
        }

        // 5. BASE DE CONNAISSANCE
        let response = null;
        if (lower.includes('qui es-tu') || lower.includes('ton nom')) response = "Je suis Excellence, votre assistant personnel pour Realme.";
        else if (lower.includes('heure')) {
            const d = new Date();
            response = `Il est ${d.getHours()} heures ${d.getMinutes()}.`;
        }
        else if (lower.includes('merci')) response = "À votre service.";

        if (response) { this.speak(response, true); } 
        else if (this.isListening) { this.speak(text, true); } // Répétition par défaut
    }
};

const App = {
    isRunning: false,
    init() {
        VisualEngine.init();
        BrainEngine.init();
        this.log("Excellence initialisé. Prêt à servir.", 'sys');
    },
    log(msg, type='sys') {
        const t = document.getElementById('terminal');
        const d = document.createElement('div');
        d.className = 'log-line log-'+type;
        d.innerText = `[${new Date().toLocaleTimeString('fr-FR')}] ${msg}`;
        t.appendChild(d); t.scrollTop = t.scrollHeight;
    },
    updateMainText(t) { document.getElementById('mainText').innerText = t; },
    updateSubText(t) { document.getElementById('subText').innerText = t; },
    updateStatus(active) {
        const b = document.getElementById('status');
        if (active) { b.classList.add('active'); b.innerText="EN LIGNE"; }
        else { b.classList.remove('active'); b.innerText="HORS LIGNE"; }
    },
    startFullSystem() {
        this.stopSystem();
        AudioEngine.init().then(ok => {
            if(!ok) return;
            VisualEngine.start();
            BrainEngine.startListening();
            this.isRunning=true;
            this.updateStatus(true);
            BrainEngine.speak("Système visuel activé.");
        });
    },
    startExcellenceMode() {
        this.stopSystem();
        VisualEngine.start();
        BrainEngine.startListening();
        this.isRunning=true;
        this.updateStatus(true);
        BrainEngine.speak("Excellence est en ligne. Que puis-je faire pour vous ?");
    },
    stopSystem() {
        this.isRunning=false;
        AudioEngine.destroy();
        VisualEngine.stop();
        BrainEngine.stopListening();
        BrainEngine.synthesis.cancel();
        this.updateMainText("DÉSACTIVÉ"); 
        this.updateSubText("");
        this.updateStatus(false);
        const c = document.getElementById('scopeCanvas');
        c.getContext('2d').clearRect(0,0,c.width,c.height);
    }
};

window.onload = () => App.init();
</script>
</body>
</html>
