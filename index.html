<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY MOBILE LAB</title>
<style>
:root {
  --primary: #00ffd0;
  --bg: #000814;
  --panel: rgba(0, 0, 0, 0.9);
  --button: #001f30;
  --voice: #ffaa00;
  --evp: #aa00ff;
  --error: #ff0000;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  touch-action: manipulation;
}

#header {
  padding: 15px;
  text-align: center;
  background: var(--panel);
  border-bottom: 2px solid var(--primary);
}

#controls {
  padding: 15px;
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

#visualization {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#logZone {
  height: 150px;
  overflow-y: auto;
  padding: 10px;
  background: rgba(0, 0, 0, 0.6);
  border-top: 1px solid var(--primary);
  font-size: 0.9em;
}

button {
  background: var(--button);
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 12px;
  margin: 5px 0;
  border-radius: 5px;
  font-weight: bold;
  touch-action: manipulation;
  width: 100%;
}

button:active {
  background: rgba(0, 31, 48, 0.8);
}

button:disabled {
  background: #333;
  color: #666;
}

#voiceBar {
  height: 12px;
  width: 0%;
  background: var(--voice);
  margin: 5px 0;
  transition: width 0.1s;
}

.status {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 0.9em;
}

.error {
  color: var(--error);
  margin: 10px 0;
  text-align: center;
}

.loading {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

#waterfallCanvas {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100px;
}

@media (max-width: 768px) {
  #controls {
    grid-template-columns: 1fr;
  }
  button {
    padding: 10px;
  }
}
</style>
</head>
<body>
<div class="loading" id="loadingScreen">
  <div class="progress">Initialisation...</div>
</div>

<div id="header">
  <h3>ETERNITY MOBILE LAB</h3>
</div>

<div id="controls">
  <div class="status">
    <span>MIC: <span id="micStatus">OFF</span></span>
    <span>IA: <span id="aiStatus">OFF</span></span>
  </div>

  <div>
    <div>VOICE LEVEL:</div>
    <div id="voiceBar"></div>
  </div>

  <button id="startBtn">START</button>
  <button id="fftBtn" disabled>FFT 1024</button>
  <button id="recBtn" disabled>AUTO REC</button>
  <button id="evpBtn" disabled>EVP MODE</button>
</div>

<div id="visualization"></div>
<div id="logZone"></div>

<script>
// État de l'application
const state = {
  audioContext: null,
  analyser: null,
  dataArray: null,
  stream: null,
  recorder: null,
  isRecording: false,
  fftSize: 1024,
  autoRec: false,
  evpMode: false,
  initialized: false,
  waterfallCtx: null,
  animationId: null
};

// Éléments DOM
const elements = {
  micStatus: document.getElementById('micStatus'),
  aiStatus: document.getElementById('aiStatus'),
  voiceBar: document.getElementById('voiceBar'),
  logZone: document.getElementById('logZone'),
  startBtn: document.getElementById('startBtn'),
  fftBtn: document.getElementById('fftBtn'),
  recBtn: document.getElementById('recBtn'),
  evpBtn: document.getElementById('evpBtn'),
  loadingScreen: document.getElementById('loadingScreen'),
  visualization: document.getElementById('visualization')
};

// Journalisation
function log(msg, color = "--primary") {
  const div = document.createElement("div");
  div.style.color = `var(${color})`;
  const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'});
  div.textContent = `[${time}] ${msg}`;
  elements.logZone.appendChild(div);
  elements.logZone.scrollTop = elements.logZone.scrollHeight;
  console.log(msg);
}

// Initialisation audio
async function initAudio() {
  try {
    log("Initialisation audio...");

    // Vérifier la compatibilité
    if (!window.AudioContext && !window.webkitAudioContext) {
      throw new Error("Web Audio API non supporté");
    }

    // Demander le microphone
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false
    });

    // Configurer le contexte audio
    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = state.audioContext.createMediaStreamSource(stream);

    state.analyser = state.audioContext.createAnalyser();
    state.analyser.fftSize = state.fftSize;
    state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
    source.connect(state.analyser);

    // Configurer l'enregistrement
    state.recorder = new MediaRecorder(stream);
    state.recorder.ondataavailable = handleDataAvailable;
    state.recorder.onstop = () => {
      state.isRecording = false;
      log("Enregistrement terminé");
    };

    // Créer le canvas waterfall
    createWaterfall();

    // Mettre à jour l'interface
    elements.micStatus.textContent = "ON";
    elements.startBtn.textContent = "STOP";
    elements.fftBtn.disabled = false;
    elements.recBtn.disabled = false;
    elements.evpBtn.disabled = false;

    // Cacher l'écran de chargement
    elements.loadingScreen.style.display = 'none';

    // Démarrer la visualisation
    state.initialized = true;
    state.animationId = requestAnimationFrame(updateVisual);
    log("Audio initialisé avec succès");

  } catch (error) {
    log(`Erreur: ${error.message}`, "--error");
    console.error(error);
  }
}

// Gestion des données audio
function handleDataAvailable(event) {
  const blob = new Blob([event.data], { type: "audio/webm" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `recording_${Date.now()}.webm`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  log("Fichier enregistré");
}

// Créer le canvas waterfall
function createWaterfall() {
  const canvas = document.createElement('canvas');
  canvas.id = 'waterfallCanvas';
  canvas.width = elements.visualization.clientWidth;
  canvas.height = 100;
  elements.visualization.appendChild(canvas);
  state.waterfallCtx = canvas.getContext('2d');
}

// Mise à jour visuelle
function updateVisual() {
  if (!state.initialized || !state.analyser) return;

  // Mettre à jour les données audio
  state.analyser.getByteFrequencyData(state.dataArray);

  // Niveau sonore
  const sum = state.dataArray.reduce((acc, val) => acc + val, 0);
  const avg = Math.min(100, sum / state.dataArray.length);
  elements.voiceBar.style.width = `${avg}%`;

  // Waterfall
  if (state.waterfallCtx) {
    const w = state.waterfallCtx.canvas.width;
    const h = state.waterfallCtx.canvas.height;
    const img = state.waterfallCtx.getImageData(0, 0, w, h);
    state.waterfallCtx.putImageData(img, 0, 1);

    for (let i = 0; i < state.dataArray.length; i++) {
      const v = state.dataArray[i];
      state.waterfallCtx.fillStyle = `hsl(${200 - v}, 100%, 50%)`;
      state.waterfallCtx.fillRect(i * (w / state.dataArray.length), 0, 2, 1);
    }
  }

  // Auto-record
  if (state.autoRec && avg > 30 && !state.isRecording) {
    startRecording(3000);
  }

  state.animationId = requestAnimationFrame(updateVisual);
}

// Enregistrement
function startRecording(duration) {
  if (!state.recorder || state.isRecording) return;

  state.isRecording = true;
  state.recorder.start();
  log(`Enregistrement démarré (${duration/1000}s)`);

  setTimeout(() => {
    if (state.isRecording) {
      state.recorder.stop();
    }
  }, duration);
}

// Configuration des boutons
function setupButtons() {
  elements.startBtn.onclick = toggleApp;
  elements.fftBtn.onclick = toggleFFT;
  elements.recBtn.onclick = toggleAutoRec;
  elements.evpBtn.onclick = toggleEVP;
}

function toggleApp() {
  if (state.initialized) {
    // Arrêter tout
    if (state.animationId) cancelAnimationFrame(state.animationId);
    if (state.audioContext) state.audioContext.close();
    if (state.stream) state.stream.getTracks().forEach(track => track.stop());

    // Réinitialiser
    state.initialized = false;
    elements.micStatus.textContent = "OFF";
    elements.aiStatus.textContent = "OFF";
    elements.startBtn.textContent = "START";
    elements.fftBtn.disabled = true;
    elements.recBtn.disabled = true;
    elements.evpBtn.disabled = true;
    log("Application arrêtée");

  } else {
    initAudio();
  }
}

function toggleFFT() {
  state.fftSize = state.fftSize === 1024 ? 2048 : 1024;
  if (state.analyser) {
    state.analyser.fftSize = state.fftSize;
    state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
  }
  elements.fftBtn.textContent = `FFT ${state.fftSize}`;
  log(`Taille FFT: ${state.fftSize}`);
}

function toggleAutoRec() {
  state.autoRec = !state.autoRec;
  elements.recBtn.style.backgroundColor = state.autoRec ? "var(--primary)" : "";
  log(`Auto Rec: ${state.autoRec ? "ON" : "OFF"}`);
}

function toggleEVP() {
  state.evpMode = !state.evpMode;
  elements.evpBtn.style.backgroundColor = state.evpMode ? "var(--evp)" : "";
  elements.aiStatus.textContent = state.evpMode ? "ON" : "OFF";
  log(`Mode EVP: ${state.evpMode ? "ON" : "OFF"}`);
}

// Initialisation
log("Prêt à démarrer");
setupButtons();
</script>
</body>
</html>
