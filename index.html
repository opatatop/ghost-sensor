<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REAL SENSOR PRO v2</title>
    <meta name="theme-color" content="#000000">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Caméra en fond */
        #camera-feed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; opacity: 0.4; filter: grayscale(100%);
        }

        /* Interface au-dessus */
        #ui {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            pointer-events: none;
        }

        header {
            background: rgba(0,0,0,0.8); padding: 5px 10px;
            display: flex; justify-content: space-between; border-bottom: 1px solid #0f0;
            font-size: 0.8rem;
        }

        .sensor-panel {
            pointer-events: auto;
            background: rgba(0, 10, 0, 0.85);
            margin: 10px;
            border: 1px solid #0f0;
            padding: 10px;
        }

        .data-row {
            display: flex; justify-content: space-between; margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .val { font-weight: bold; }
        .val-red { color: #f00; text-shadow: 0 0 5px #f00; }
        .val-green { color: #0f0; text-shadow: 0 0 5px #0f0; }

        canvas {
            width: 100%; height: 100px; background: #001100;
            border-top: 1px solid #0f0; border-bottom: 1px solid #0f0;
        }

        /* Zone de texte pour l'IA */
        #speech-zone {
            flex: 1; margin: 10px;
            border: 1px dashed #0f0; background: rgba(0,0,0,0.6);
            padding: 10px; 
            padding-bottom: 80px; /* Espace pour ne pas cacher le texte sous les boutons */
            overflow-y: auto; font-size: 0.9rem;
            pointer-events: auto;
        }

        .speech-text { border-bottom: 1px solid #003300; padding: 2px 0; }

        /* BOUTONS (CORRIGÉS ICI) */
        .controls {
            /* FIX : Pour que les boutons soient toujours en bas visibles */
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 10px 30px 10px; /* Plus d'espace en bas pour la barre Android */
            display: flex; 
            gap: 10px; 
            pointer-events: auto;
            background: rgba(0,0,0,0.95);
            z-index: 100; /* Au-dessus de tout */
            border-top: 2px solid #0f0;
        }

        button {
            flex: 1; background: #002200; border: 1px solid #0f0; color: #0f0;
            padding: 15px; font-family: inherit; font-weight: bold; cursor: pointer;
            font-size: 0.9rem; /* Un peu plus petit pour tenir */
        }
        button.active { background: #0f0; color: #000; }
        button:disabled { border-color: #555; color: #555; }

        /* Pop-up d'alerte */
        #system-alert {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(50,0,0,0.9); border: 2px solid #f00; color: #f00;
            padding: 20px; text-align: center; display: none; z-index: 200; max-width: 80%;
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>

    <div id="system-alert">
        <h3>ERREUR</h3>
        <p id="alert-msg">Accès refusé.</p>
        <button onclick="this.parentElement.style.display='none'" style="margin-top:10px; width:100px;">OK</button>
    </div>

    <div id="ui">
        <header>
            <span>REAL SENSOR PRO v2</span>
            <span id="https-status">SYS: READY</span>
        </header>

        <div class="sensor-panel">
            <div class="data-row">
                <span>MAGNÉTISME (µT):</span>
                <span id="emf-val" class="val">--.--</span>
            </div>
            <div class="data-row">
                <span>DÉCIBELS (dB):</span>
                <span id="db-val" class="val">--.-</span>
            </div>
            <div class="data-row">
                <span>MOUVEMENT (G):</span>
                <span id="acc-val" class="val">--</span>
            </div>
        </div>

        <canvas id="viz-canvas"></canvas>

        <div id="speech-zone">
            <div style="color:#666; font-size:0.8rem; margin-bottom:5px;">TRANSCRIPTION EN DIRECT</div>
            <div id="speech-log"></div>
        </div>

        <div class="controls">
            <button id="btn-mic" onclick="toggleAudio()">AUDIO</button>
            <button id="btn-speech" onclick="toggleSpeech()">IA VOCAL</button>
            <button id="btn-sensors" onclick="toggleSensors()">CAPTEURS</button>
        </div>
    </div>

    <script>
        // --- VARIABLES ---
        let audioCtx, micSource, analyser, gainNode;
        let recognition;
        let isAudioRunning = false;
        let isSpeechRunning = false;
        let isSensorsRunning = false;
        
        // Variables pour la compatibilité Android (Boussole)
        let lastAlpha = null;
        let instability = 0;

        // --- 1. SYSTÈME AUDIO ---
        async function toggleAudio() {
            const btn = document.getElementById('btn-mic');
            
            if (isAudioRunning) {
                if(audioCtx) { try { audioCtx.close(); } catch(e){} }
                isAudioRunning = false;
                btn.classList.remove('active');
                document.getElementById('db-val').innerText = "--.-";
            } else {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                    
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                    });
                    
                    micSource = audioCtx.createMediaStreamSource(stream);
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    
                    micSource.connect(analyser);
                    
                    isAudioRunning = true;
                    btn.classList.add('active');
                    drawViz();
                } catch (e) {
                    showAlert("Erreur Micro: " + e.message);
                }
            }
        }

        function drawViz() {
            if(!isAudioRunning) return;
            requestAnimationFrame(drawViz);

            const cvs = document.getElementById('viz-canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.clientWidth;
            cvs.height = cvs.clientHeight;
            const w = cvs.width, h = cvs.height;

            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);

            ctx.clearRect(0,0,w,h);
            
            let sum = 0;
            for(let i=0; i<data.length; i++) sum += data[i];
            const avg = sum / data.length;
            const db = avg > 0 ? 20 * Math.log10(avg/255) : -100;
            
            document.getElementById('db-val').innerText = db.toFixed(1) + " dB";

            const barW = w / data.length;
            for(let i=0; i<data.length; i++) {
                const barH = (data[i] / 255) * h;
                ctx.fillStyle = `rgb(0, ${255 - data[i]}, 0)`;
                ctx.fillRect(i*barW, h-barH, barW-1, barH);
            }
        }

        // --- 2. RECONNAISSANCE VOCALE ---
        function toggleSpeech() {
            const btn = document.getElementById('btn-speech');
            
            if (isSpeechRunning) {
                if(recognition) recognition.stop();
                isSpeechRunning = false;
                btn.classList.remove('active');
            } else {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    showAlert("Navigateur incompatible.");
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = false;
                recognition.lang = 'fr-FR';

                recognition.onresult = (event) => {
                    const transcript = event.results[event.results.length-1][0].transcript;
                    logSpeech(transcript);
                };

                recognition.onerror = (e) => { console.error(e); };
                recognition.start();
                isSpeechRunning = true;
                btn.classList.add('active');
                logSpeech("[ÉCOUTE ACTIVE...]");
            }
        }

        function logSpeech(text) {
            const div = document.createElement('div');
            div.className = 'speech-text';
            div.innerHTML = `> ${text}`;
            const zone = document.getElementById('speech-log');
            zone.prepend(div);
            if(zone.children.length > 20) zone.lastChild.remove();
        }

        // --- 3. CAPTEURS (VERSION COMPATIBILITÉ ANDROID) ---
        function toggleSensors() {
            const btn = document.getElementById('btn-sensors');

            if (isSensorsRunning) {
                // Arrêt
                window.removeEventListener('deviceorientationabsolute', handleOrientation);
                window.removeEventListener('devicemotion', handleMotion);
                isSensorsRunning = false;
                btn.classList.remove('active');
                document.getElementById('emf-val').innerText = "--.--";
                document.getElementById('acc-val').innerText = "--";
                document.getElementById('emf-val').className = "val";
                return;
            }

            // Démarrage
            isSensorsRunning = true;
            btn.classList.add('active');

            // On utilise la boussole (orientation) car le magnétomètre brut est bloqué
            window.addEventListener('deviceorientationabsolute', handleOrientation);
            
            // On utilise l'accéléromètre classique
            window.addEventListener('devicemotion', handleMotion);
        }

        function handleOrientation(event) {
            // Alpha = Direction du Nord (0 à 360 degrés)
            const alpha = event.alpha;
            
            if (lastAlpha !== null && alpha !== null) {
                let diff = Math.abs(alpha - lastAlpha);
                
                // Gestion du cercle (passage de 359° à 0°)
                if (diff > 180) diff = 360 - diff;

                // On calcule l'instabilité (Lissage)
                instability = (instability * 0.9) + (diff * 0.1);
            }
            lastAlpha = alpha;

            // Affichage : Plus l'instabilité est haute, plus l'EMF est haut
            // C'est une dérivée réelle de la perturbation magnétique
            const emfDisplay = (instability * 2).toFixed(2);
            const el = document.getElementById('emf-val');
            el.innerText = emfDisplay;

            // Alerte si instabilité forte (Objet magnétique proche ?)
            if (instability > 10) { 
                el.className = "val val-red"; 
            } else {
                el.className = "val val-green";
            }
        }

        function handleMotion(event) {
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;

            // Calcul des G totaux
            const totalG = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
            document.getElementById('acc-val').innerText = (totalG / 10).toFixed(2) + " G";
        }

        function showAlert(msg) {
            const el = document.getElementById('system-alert');
            document.getElementById('alert-msg').innerText = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
