<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB ULTIMATE</title>
<style>
:root {
  --primary: #00ff41; /* Matrix Green */
  --bg: #000000;
  --panel: #001100;
  --btn-bg: #003300;
  --btn-active: #00ff41;
  --text: #ccffcc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

/* HEADER */
#header {
  padding: 5px; background: var(--panel);
  border-bottom: 2px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.7rem; flex-shrink: 0;
  color: var(--primary);
}

/* VIZ */
#vizContainer {
  flex: 1; position: relative; background: #000;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  overflow: hidden;
}

#iaBox {
  z-index: 10; text-align: center; width: 90%;
  pointer-events: none;
}
#iaLabel { color: var(--primary); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px; }
#iaText {
  font-size: 2rem; font-weight: 900; color: #fff;
  background: rgba(0,0,0,0.9); padding: 5px;
  min-height: 3rem; border: 1px solid var(--primary);
  text-transform: uppercase;
  text-shadow: 0 0 5px var(--primary);
}

canvas { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; opacity: 0.8; }

/* CONTROLS - SCROLLABLE */
#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  height: 45vh; overflow-y: auto; padding: 5px;
  display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
}

.control-group {
  border: 1px solid #005500;
  padding: 5px;
  margin-bottom: 5px;
}
.group-title {
  background: #002200; color: #00ff41; padding: 2px 5px;
  font-size: 0.65rem; font-weight: bold; margin-bottom: 5px;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px;
}

button {
  background: var(--btn-bg); border: 1px solid #005500;
  color: var(--primary); padding: 8px 1px; font-size: 0.6rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #000;
  box-shadow: 0 0 8px var(--primary);
  border-color: #fff;
}

#startBtn {
  grid-column: span 4; font-size: 1.1rem; padding: 12px;
  background: #fff; color: #000; border: 2px solid var(--primary);
  font-weight: 900;
}

/* SLIDERS */
.slider-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.6rem; margin-bottom: 2px;
}
input[type="range"] { width: 50%; accent-color: var(--primary); }

#barsArea { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.6rem; }
.bar-box { background: #002200; height: 8px; width: 100%; border: 1px solid #004400; margin-top:1px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.05s; background: var(--primary); }

#logZone {
  height: 40px; background: #000; border-top: 1px solid #333;
  padding: 2px 5px; font-size: 0.55rem; overflow-y: auto; color: #888;
  flex-shrink: 0;
}
.log-suc { color: var(--primary) !important; }
.log-warn { color: yellow !important; }

/* EFFET MATRIX */
body.matrix-mode { --primary: #00ff00; --bg: #000; --panel: #001100; --text: #00ff00; }
body.matrix-mode #iaText { font-family: 'Courier New'; text-shadow: 0 0 10px #00ff00; }
</style>
</head>
<body>

<div id="header">
  <div>MIC: <span id="micStatus">OFF</span></div>
  <div>AI: <span id="aiStatus">READY</span></div>
  <div>KEEP-ALIVE: <span id="keepAliveStatus">OFF</span></div>
</div>

<div id="vizContainer">
  <canvas id="canvas"></canvas>
  <div id="iaBox">
    <div id="iaLabel">TRADUCTION / SYNTHÈSE</div>
    <div id="iaText">... EN ATTENTE ...</div>
  </div>
</div>

<div id="controlsArea">
  <!-- BARS -->
  <div id="barsArea">
    <div>INPUT (BOOST) <div class="bar-box"><div id="voiceBar" class="bar-fill"></div></div></div>
    <div>LISTEN LEVEL <div class="bar-box"><div id="monitorBar" class="bar-fill" style="background:cyan"></div></div></div>
  </div>

  <button id="startBtn" onclick="startSystem()">DÉMARRER SYSTÈME COMPLET</button>

  <!-- GROUPE AUDIO -->
  <div class="control-group">
    <div class="group-title">AUDIO & TRAITEMENT</div>
    <div class="slider-row"><span>ÉCOUTE VOLUME</span><input type="range" id="monVolRange" min="0" max="1" step="0.01" value="0"></div>
    <div class="slider-row"><span>BOOST IA</span><input type="range" id="boostRange" min="1" max="10" step="0.5" value="5"></div>
    <div class="button-grid">
      <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 MONITOR</button>
      <button id="invertBtn" onclick="toggleOpt('invert')">🔄 INVERSION</button>
      <button id="distortBtn" onclick="toggleOpt('distortion')">⚡ DISTORSION</button>
      <button id="reverbBtn" onclick="toggleOpt('reverb')">🌊 RÉVERB</button>
    </div>
  </div>

  <!-- GROUPE GHOST BOX -->
  <div class="control-group">
    <div class="group-title">GHOST BOX & GÉNÉRATEURS</div>
    <div class="slider-row"><span>VITESSE SWEEP</span><input type="range" id="sweepRange" min="1" max="50" value="10"></div>
    <div class="button-grid">
      <button id="ghostBtn" onclick="toggleOpt('ghostBox')">📻 GHOST BOX</button>
      <button id="whiteBtn" onclick="setNoise('white')">⚪ BLANC</button>
      <button id="pinkBtn" onclick="setNoise('pink')">🌸 ROSE</button>
      <button id="brownBtn" onclick="setNoise('brown')">🟤 MARRON</button>
    </div>
  </div>

  <!-- GROUPE VISUELS -->
  <div class="control-group">
    <div class="group-title">VISUALISATION</div>
    <div class="button-grid">
      <button id="waveBtn" onclick="setViz('wave')">📈 WAVE</button>
      <button id="freqBtn" onclick="setViz('freq')">📊 FREQ</button>
      <button id="waterBtn" onclick="setViz('water')">🌊 WATERFALL</button>
      <button id="radarBtn" onclick="toggleOpt('radar')">📡 RADAR</button>
    </div>
  </div>

  <!-- GROUPE OUTILS -->
  <div class="control-group">
    <div class="group-title">OUTILS SYSTÈME</div>
    <div class="button-grid">
      <button id="voiceBtn" onclick="toggleOpt('voice')">🗣 IA VOICE</button>
      <button id="ttsBtn" onclick="speakReverse()">🗣 INVERSE PAROLE</button>
      <button id="camBtn" onclick="toggleOpt('cam')">📷 CAM</button>
      <button id="strobeBtn" onclick="toggleOpt('strobe')">⚡ STROBE</button>
      <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
      <button id="clearBtn" onclick="clearLog()">🗑 CLEAR</button>
      <button id="matrixBtn" onclick="toggleTheme()">🎨 MATRIX</button>
      <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ STOP</button>
    </div>
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
let app = {
  running: false,
  ctx: null, 
  source: null, 
  // Noeuds Séparés
  filter: null,       // Nettoyage
  analysisGain: null, // Boost pour l'IA uniquement
  monitorGain: null,  // Volume pour les oreilles
  distortion: null,
  convolver: null,
  analyser: null,
  // Ghost Box
  ghostOsc: null, ghostGain: null, noiseNode: null, noiseType: 'white',
  // Stream & Sys
  stream: null, vidStream: null, recorder: null, isRec: false,
  recognition: null, synth: window.speechSynthesis,
  keepAliveOsc: null, // Le gardien
  config: { 
    monitor: false, invert: false, distortion: false, reverb: false, 
    ghostBox: false, voice: false, autoRec: false, radar: false, cam: false, strobe: false,
    vizMode: 'freq'
  },
  canvas: null, cCtx: null, width: 0, height: 0,
  wakeLock: null
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), mic: el('micStatus'), keep: el('keepAliveStatus'), ai: el('aiStatus'),
  voiceBar: el('voiceBar'), monBar: el('monitorBar'), iaText: el('iaText'),
  canvas: el('canvas'),
  // Sliders
  sMon: el('monVolRange'), sBoost: el('boostRange'), sSweep: el('sweepRange')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

// --- START SYSTEM (UNE SEULE FOIS) ---

async function startSystem() {
  if(app.running) return;
  
  el('startBtn').textContent = "INITIALISATION...";
  el('startBtn').style.background = "orange";

  try {
    // 1. Context Audio
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();

    // 2. Demande Micro (Une seule fois)
    app.stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false 
    });

    setupAudioNodes(app.stream);
    setupVisuals();

    // 3. Wake Lock
    try {
        app.wakeLock = await navigator.wakeLock.request('screen');
        log("Wake Lock: OK");
    } catch(e) {}

    // 4. Keep-Alive (Osc silencieux pour éviter la coupure)
    startKeepAlive();

    // 5. IA
    startVoice();

    app.running = true;
    el('startBtn').textContent = "SYSTÈME ACTIF";
    el('startBtn').style.background = "var(--primary)";
    els.mic.textContent = "LOCKED";
    els.mic.style.color = "#0f0";
    els.keep.textContent = "RUNNING";
    
    drawLoop();
    log("Système démarré. Volume Écoute réglable.", 'log-suc');

  } catch (err) {
    log("Erreur: " + err.message, 'log-warn');
    el('startBtn').textContent = "ERREUR";
    el('startBtn').style.background = "red";
  }
}

function setupAudioNodes(stream) {
  app.source = app.ctx.createMediaStreamSource(stream);
  
  // Filtre Passe-Haut
  app.filter = app.ctx.createBiquadFilter();
  app.filter.type = 'highpass';
  app.filter.frequency.value = 300;

  // Gain d'Analyse (Boost pour IA/Graph) - N'impacte pas l'écoute
  app.analysisGain = app.ctx.createGain();
  app.analysisGain.gain.value = parseFloat(els.sBoost.value);

  // Gain de Monitoring (Volume pour utilisateur) - Sécurisé
  app.monitorGain = app.ctx.createGain();
  app.monitorGain.gain.value = 0; // Off par défaut

  // Analyser
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.analyser.smoothingTimeConstant = 0.5;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);

  // Effets
  app.distortion = app.ctx.createWaveShaper();
  app.distortion.curve = makeDistortionCurve(400);
  app.distortion.oversample = '4x';
  
  // Réverb (Convolver vide = pas de reverb)
  app.convolver = app.ctx.createConvolver();

  // Ghost Box
  app.ghostOsc = app.ctx.createOscillator();
  app.ghostOsc.type = 'sawtooth';
  app.ghostGain = app.ctx.createGain();
  app.ghostGain.gain.value = 0;
  createNoiseBuffer(app.noiseType); // Crée le bruit
  app.noiseNode = app.ctx.createBufferSource();
  app.noiseNode.loop = true;
  app.noiseNode.buffer = app.noiseBuffer;
  app.noiseGain = app.ctx.createGain();
  app.noiseGain.gain.value = 0;
  
  // Lancement Ghost Box
  app.ghostOsc.start();
  app.noiseNode.start();

  // ROUTAGE COMPLEXE
  // Source -> Filter -> AnalysisGain -> Analyser (Pour l'IA et les graphiques)
  // Source -> Filter -> [Distortion/Reverb] -> MonitorGain -> Destination (Pour les oreilles)
  // GhostBox -> MonitorGain -> Destination (Mixé avec le micro)

  app.source.connect(app.filter);
  
  // Branche Analyse (Interne)
  app.filter.connect(app.analysisGain);
  app.analysisGain.connect(app.analyser);

  // Branche Écoute (Externe)
  // On connecte le filtre aux effets, puis au monitor
  app.filter.connect(app.distortion);
  app.distortion.connect(app.convolver);
  app.convolver.connect(app.monitorGain);
  
  // Si pas d'effet, on bypasse (connecté direct, déconnecté plus tard si activé)
  app.filter.connect(app.monitorGain);
  app.distortion.disconnect(app.monitorGain);
  app.convolver.disconnect(app.monitorGain);

  app.monitorGain.connect(app.ctx.destination);

  // Ghost Box Mix
  app.ghostOsc.connect(app.ghostGain);
  app.ghostGain.connect(app.monitorGain);
  app.noiseNode.connect(app.noiseGain);
  app.noiseGain.connect(app.monitorGain);

  // Recorder (Sur le signal brut, boosté mais sans effets)
  app.recorder = new MediaRecorder(stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

function makeDistortionCurve(amount) {
  let k = typeof amount === 'number' ? amount : 50;
  let n_samples = 44100, curve = new Float32Array(n_samples), deg = Math.PI / 180;
  for (let i = 0; i < n_samples; ++i) {
    let x = i * 2 / n_samples - 1;
    curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
  }
  return curve;
}

function createNoiseBuffer(type) {
  const bufferSize = app.ctx.sampleRate * 2;
  const buffer = app.ctx.createBuffer(1, bufferSize, app.ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      data[i] = (lastOut + (0.02 * white)) / 1.02;
      lastOut = data[i];
      data[i] *= 3.5; 
  }
  // Pour simplifier ici, on utilise du blanc/brun simplifié. 
  // Dans une app pro, on implémenterait le filtre de rose proprement.
  app.noiseBuffer = buffer;
}
let lastOut = 0;

// --- KEEP ALIVE (Anti-Coupure) ---
function startKeepAlive() {
  // Un oscillateur à volume 0 connecté à destination force le contexte à rester actif
  app.keepAliveOsc = app.ctx.createOscillator();
  const keepGain = app.ctx.createGain();
  keepGain.gain.value = 0; // Inaudible
  app.keepAliveOsc.connect(keepGain);
  keepGain.connect(app.ctx.destination);
  app.keepAliveOsc.start();
  
  // Réveille le contexte à chaque clic sur la page (Sécurité iOS/Android)
  document.body.addEventListener('click', () => {
      if(app.ctx && app.ctx.state === 'suspended') app.ctx.resume();
  }, {once:false});
}

function stopSystem() {
  if(app.wakeLock) { app.wakeLock.release(); app.wakeLock = null; }
  if(app.stream) app.stream.getTracks().forEach(t=>t.stop());
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  if(app.recognition) app.recognition.stop();
  if(app.ctx) app.ctx.close();
  
  app.running = false;
  
  el('startBtn').textContent = "DÉMARRER SYSTÈME COMPLET";
  el('startBtn').style.background = "#fff";
  els.mic.textContent = "OFF";
  els.keep.textContent = "OFF";
  els.iaText.textContent = "ARRÊTÉ";
  
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
}

// --- GESTION OPTIONS ---

function toggleOpt(key) {
  if(!app.running && key !== 'cam') { log("Système requis", 'log-warn'); return; }
  
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');

  // Logiques spécifiques
  if(key === 'monitor') {
      // Le volume est géré par le slider, on active juste la connexion si besoin
      // Ici on fait simple : le slider gère le gain direct
      app.monitorGain.gain.value = app.config.monitor ? parseFloat(els.sMon.value) : 0;
      log(`Monitor: ${app.config.monitor?'ON':'OFF'}`);
  }

  if(key === 'invert') {
      // Inversion du gain d'analyse
      app.analysisGain.gain.value = app.config.invert ? -parseFloat(els.sBoost.value) : parseFloat(els.sBoost.value);
  }

  if(key === 'distortion') {
      // Bypass routing
      if(app.config.distortion) {
          app.filter.disconnect(app.monitorGain);
          app.filter.connect(app.distortion);
          app.distortion.connect(app.monitorGain);
      } else {
          app.filter.disconnect(app.distortion);
          app.distortion.disconnect(app.monitorGain);
          app.filter.connect(app.monitorGain);
      }
  }
  
  if(key === 'ghostBox') {
      const vol = app.config.ghostBox ? 0.15 : 0;
      app.ghostGain.gain.value = vol;
      app.noiseGain.gain.value = vol * 0.5;
  }

  if(key === 'voice') {
      if(app.config.voice) startVoice(); else app.recognition.stop();
  }
  if(key === 'cam') toggleCam();
  if(key === 'strobe') toggleStrobe();
}

// Sliders events
els.sMon.oninput = (e) => {
    if(app.config.monitor) app.monitorGain.gain.value = parseFloat(e.target.value);
    els.monBar.style.width = (parseFloat(e.target.value)*100) + '%';
};
els.sBoost.oninput = (e) => {
    const val = parseFloat(e.target.value);
    app.analysisGain.gain.value = app.config.invert ? -val : val;
};
els.sSweep.oninput = () => {}; // Géré dans la loop

function setNoise(type) {
    app.noiseType = type;
    createNoiseBuffer(type);
    if(app.noiseNode) {
        app.noiseNode.buffer = app.noiseBuffer; // Refresh buffer
    }
    log(`Bruit: ${type.toUpperCase()}`);
}

function setViz(mode) {
    app.config.vizMode = mode;
    log(`Visuel: ${mode.toUpperCase()}`);
}

// --- IA & TOOLS ---

function startVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true;
      app.recognition.lang = 'fr-FR';
      app.recognition.onresult = (e) => {
          let txt = '';
          for(let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
          if(txt) {
              els.iaText.textContent = txt;
              if(e.results[e.results.length-1].isFinal) log(`IA: "${txt}"`, 'log-suc');
          }
      };
      app.recognition.onerror = (e) => {};
      app.recognition.onend = () => { if(app.running && app.config.voice) try{app.recognition.start()}catch(e){} };
      try{ app.recognition.start(); } catch(e){}
  }
}

function speakReverse() {
    if(!app.synth) return;
    const u = new SpeechSynthesisUtterance("Attention presence detectee");
    u.rate = 0.8; u.pitch = 0.5;
    app.synth.speak(u);
    log("Synthèse vocale (Reverse effect)");
}

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          const vid = document.createElement('video');
          vid.srcObject = app.vidStream; vid.autoplay = true; vid.muted = true; vid.playsInline = true;
          vid.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.4; z-index:0;";
          els.canvas.parentNode.insertBefore(vid, els.canvas);
      } catch(e) { log("Erreur Cam", 'log-warn'); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null; document.querySelector('video')?.remove();
  }
}

function toggleStrobe() {
    if(!app.config.strobe) {
        document.body.style.animation = "blink 0.1s infinite";
    } else {
        document.body.style.animation = "none";
    }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`ULTIMATE_${Date.now()}.webm`; a.click();
  log("Enregistrement sauvé", 'log-suc');
}

function clearLog() { els.log.innerHTML = ''; }
function toggleTheme() { document.body.classList.toggle('matrix-mode'); }

// --- DRAW LOOP (MULTI MODE) ---

function setupVisuals() {
    app.canvas = els.canvas;
    app.cCtx = app.canvas.getContext('2d');
    resize();
}

function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  app.analyser.getByteFrequencyData(app.dataArray);
  
  // Ghost Box Sweep
  if(app.config.ghostBox && app.ghostOsc) {
      const t = app.ctx.currentTime;
      const speed = parseFloat(els.sSweep.value);
      const f = 100 + (Math.sin(t * speed) + 1) * 1500;
      app.ghostOsc.frequency.setTargetAtTime(f, t, 0.1);
  }

  // Volume
  let sum = 0;
  for(let i=0; i<app.dataArray.length; i++) sum += app.dataArray[i];
  const avg = sum / app.dataArray.length;
  els.voiceBar.style.width = Math.min(100, avg) + '%';

  if(app.config.autoRec && avg > 60 && !app.isRec) {
      app.isRec = true; app.recorder.start(); log("⚠️ ANOMALIE", 'log-warn');
      setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 4000);
  }

  // Dessin
  const ctx = app.cCtx, w=app.width, h=app.height;
  ctx.fillStyle = 'rgba(0, 5, 0, 0.2)'; // Fade vert sombre
  ctx.fillRect(0,0,w,h);

  if(app.config.vizMode === 'wave') {
      // Waveform
      const timeData = new Uint8Array(app.analyser.fftSize);
      app.analyser.getByteTimeDomainData(timeData);
      ctx.lineWidth = 2; ctx.strokeStyle = '#0f0'; ctx.beginPath();
      const sliceW = w / timeData.length;
      let x = 0;
      for(let i=0; i<timeData.length; i++) {
          const v = timeData[i] / 128.0;
          const y = v * h/2;
          if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          x += sliceW;
      }
      ctx.stroke();
  } else if (app.config.vizMode === 'waterfall') {
      // Waterfall scroll
      const img = ctx.getImageData(0, 0, w, h-1);
      ctx.putImageData(img, 0, 1);
      for(let i=0; i<app.dataArray.length; i++) {
          ctx.fillStyle = `hsl(120 - app.dataArray[i], 100%, 50%)`;
          ctx.fillRect(i * (w/app.dataArray.length), 0, 2, 1);
      }
  } else {
      // Freq Default
      const barW = (w / app.dataArray.length) * 2.5;
      let x = 0;
      for(let i=0; i<app.dataArray.length; i++) {
          const v = app.dataArray[i];
          const barH = (v/255)*h;
          ctx.fillStyle = `rgb(0, 255, ${v})`;
          ctx.fillRect(x, h - barH, barW, barH);
          x += barW+1;
      }
  }
  
  // Radar Overlay
  if(app.config.radar) {
      const cx = w-60, cy = 60;
      ctx.strokeStyle = '#0f0'; ctx.beginPath(); ctx.arc(cx,cy,50,0,7); ctx.stroke();
      const ang = (Date.now()/1000)%7;
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(ang);
      ctx.fillStyle = 'rgba(0,255,0,0.5)';
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,50,-0.1,0.1); ctx.fill(); ctx.restore();
      if(avg > 50) { ctx.fillStyle='red'; ctx.beginPath(); ctx.arc(cx,cy,10,0,7); ctx.fill(); }
  }
}

window.onresize = resize;
function resize() {
    if(app.canvas) {
        app.width = app.canvas.clientWidth;
        app.height = app.canvas.clientHeight;
        app.canvas.width = app.width;
        app.canvas.height = app.height;
    }
}

window.onload = () => {
    setupVisuals();
    log("ULTIMATE OPTIONS READY.");
};

// Ajout style blink
const style = document.createElement('style');
style.innerHTML = `@keyframes blink { 50% { opacity: 0.3; } }`;
document.head.appendChild(style);

</script>
