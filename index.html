<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETERNITY v11 FORCE LINK</title>
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #d4af37;
            --danger: #ff0055;
            --bg: #030508;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #cosmic-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0ibm9uZSIvPjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=');
            opacity: 0.3; pointer-events: none; z-index: 2;
        }
        #vignette-eternal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 120%);
            pointer-events: none; z-index: 3;
        }
        #camera-feed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; opacity: 0.3; 
            filter: contrast(1.5) brightness(0.6) grayscale(100%) sepia(30%) hue-rotate(170deg);
        }
        #ui {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            pointer-events: none;
        }
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9), transparent);
            padding: 10px;
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid var(--secondary);
        }
        .eternal-title { font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; margin: 0; color: var(--secondary); }
        .sub-eternal { font-size: 0.6rem; color: var(--primary); letter-spacing: 1px; }

        .data-panel {
            pointer-events: auto;
            background: rgba(0, 20, 30, 0.6);
            margin: 5px 10px;
            border: 1px solid var(--primary);
            padding: 10px;
            backdrop-filter: blur(5px);
        }
        .row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.8rem; align-items: center; }
        
        .prob-container {
            width: 100%; height: 18px; background: #111; border: 1px solid #333; margin-top: 8px;
        }
        .prob-fill {
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, var(--secondary), var(--danger));
            transition: width 0.5s ease-out; 
        }

        #spectrum-canvas {
            width: 100%; height: 120px; background: #000;
            border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary);
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        
        canvas { width: 100%; height: 100%; display: block; }

        /* BOUTON DE FORCE MICRO (Overlay) */
        #mic-force-overlay {
            position: absolute; z-index: 20; text-align: center;
            background: rgba(0,0,0,0.9); padding: 20px;
            border: 2px solid var(--danger);
            max-width: 80%;
        }
        .btn-force-mic {
            background: var(--danger); color: white; border: none;
            padding: 15px 30px; font-size: 1.2rem; font-weight: bold;
            font-family: inherit; cursor: pointer; margin-top: 10px;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red { 0% { transform: scale(1); box-shadow: 0 0 0 rgba(255,0,85,0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,0,85,0); } 100% { transform: scale(1); box-shadow: 0 0 0 rgba(255,0,85,0.7); } }


        #ai-zone {
            flex: 1; margin: 10px;
            border: 1px solid var(--secondary); background: rgba(0,0,0,0.85);
            padding: 10px; padding-bottom: 110px;
            overflow-y: auto; font-size: 0.9rem;
            pointer-events: auto;
            text-shadow: 0 0 3px var(--primary); position: relative;
        }
        .msg-final { color: var(--secondary); border-bottom: 1px dashed #444; margin: 6px 0; padding: 4px; background: rgba(212, 175, 55, 0.1); }
        .msg-system { color: #555; font-size: 0.7rem; border-left: 2px solid #333; padding-left: 5px; margin-bottom: 4px; }

        .controls {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 10px 10px 35px 10px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
            background: linear-gradient(0deg, rgba(0,0,0,1), rgba(0,0,0,0.8));
            pointer-events: auto; z-index: 100;
        }
        button {
            background: rgba(0, 20, 20, 0.8); border: 1px solid var(--secondary); color: var(--secondary);
            padding: 14px 2px; font-family: inherit; font-weight: bold; cursor: pointer;
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.3s;
        }
        button:active { transform: scale(0.96); }
        button.active { background: var(--secondary); color: #000; box-shadow: 0 0 15px var(--secondary); }
        
        #btn-echo { border-color: #ff00ff; color: #ff00ff; }
        #btn-echo.active { background: #ff00ff; color: #fff; box-shadow: 0 0 15px #ff00ff; }
        .btn-sweep { border-color: var(--danger); color: var(--danger); }
        .btn-sweep.active { background: var(--danger); color: #fff; box-shadow: 0 0 15px var(--danger); }

        @keyframes blink { 50% { opacity: 0; } }
        .live-dot { color: var(--danger); animation: blink 1.5s infinite; margin-right: 5px; font-weight: bold; }

    </style>
</head>
<body>

    <div id="cosmic-noise"></div>
    <div id="vignette-eternal"></div>
    <video id="camera-feed" autoplay playsinline muted></video>

    <div id="ui">
        <header>
            <div>
                <h1 class="eternal-title">ETERNITY v11</h1>
                <div class="sub-eternal">FORCE LINK</div>
            </div>
            <div style="text-align: right;">
                <div id="clock" style="font-size:1.1rem; color:var(--secondary)">00:00</div>
                <div style="font-size:0.6rem; color:var(--primary)">MIC STATUS: <span id="mic-status-text" style="color:var(--danger)">OFF</span></div>
            </div>
        </header>

        <div class="data-panel">
            <div class="row">
                <span style="color:var(--secondary)">PROBABILITÉ PRÉSENCE</span>
                <span id="prob-val" style="font-weight:bold; color:var(--secondary)">0.0%</span>
            </div>
            <div class="prob-container">
                <div id="prob-fill" class="prob-fill"></div>
            </div>
            <div class="row" style="margin-top:10px; font-size:0.7rem; color:#666; font-family: monospace;">
                <span>[AUD: <span id="vol-disp">--</span>]</span>
                <span>[EMF: <span id="emf-disp">--</span>]</span>
            </div>
        </div>

        <div id="spectrum-canvas">
            <canvas id="viz-canvas"></canvas>
            
            <!-- L'OVERLAY QUI FORCE LA PERMISSION -->
            <div id="mic-force-overlay">
                <h3 style="margin:0 0 10px 0; color:var(--danger)">AUDIO DÉCONNECTÉ</h3>
                <p style="font-size:0.8rem; color:#ccc;">Le micro n'est pas connecté.<br>Le Sweep fonctionne, mais l'IA et le Scope ont besoin d'écouter.</p>
                <button class="btn-force-mic" onclick="forceMicConnection()">ACTIVER MICRO</button>
                <p id="mic-error-msg" style="font-size:0.7rem; color:#ff5555; margin-top:5px; display:none;"></p>
            </div>
        </div>

        <div id="ai-zone">
            <div style="position:sticky; top:0; background:#000; padding-bottom:5px; border-bottom:1px solid var(--secondary); margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                <span style="color:var(--primary)">> TRADUCTION VOCALE</span>
                <span id="ai-status" style="color:var(--danger); font-size:0.7rem; font-weight:bold;">OFFLINE</span>
            </div>
            <div id="log-container"></div>
        </div>

        <div class="controls">
            <button id="btn-audio" onclick="toggleVisualizer()">SCOPE</button>
            <button id="btn-echo" onclick="toggleEcho()">ECHO VOIX</button>
            <button id="btn-sweep" class="btn-sweep" onclick="toggleSweep()">SWEEP</button>
            <button id="btn-sens" onclick="toggleSensors()">SENSORS</button>
        </div>
    </div>

    <script>
        // --- V11 FORCE LINK ---

        let audioCtx, globalStream, globalSource, analyser, gainNode;
        let sweepNodes = [], recognition, synth;
        let isVisualizer = false, isEcho = false, isSweep = false, isSensors = false;
        let emfVal = 0, motionVal = 0, audioLevel = 0;
        let lastAlpha = null, instability = 0, emfBase = 0;

        // 1. FONCTION FORCÉE (Le Bouton Rouge)
        async function forceMicConnection() {
            const errorMsg = document.getElementById('mic-error-msg');
            const overlay = document.getElementById('mic-force-overlay');
            const statusText = document.getElementById('mic-status-text');
            
            errorMsg.style.display = 'none';
            errorMsg.innerText = "";

            try {
                // Création du contexte si besoin
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                // DEMANDE EXPLICITE
                overlay.innerHTML = "<h3 style='color:var(--primary)'>DEMANDE EN COURS...</h3>";
                
                globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Si ça marche, on branche tout
                globalSource = audioCtx.createMediaStreamSource(globalStream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.85;
                
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.0;

                globalSource.connect(analyser);
                analyser.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                // Mise à jour UI
                overlay.style.display = 'none'; // Cache l'overlay rouge
                statusText.innerText = "ON";
                statusText.style.color = "var(--primary)";
                log("Microphone Connecté avec succès !", "system");
                
                // Lancer le scope automatiquement
                isVisualizer = true;
                document.getElementById('btn-audio').classList.add('active');
                drawSymmetricSpectrum();

            } catch (e) {
                console.error(e);
                overlay.innerHTML = `
                    <h3 style="margin:0 0 10px 0; color:var(--danger)">ÉCHEC</h3>
                    <p style="font-size:0.8rem; color:#ccc;">Le téléphone a refusé l'accès.</p>
                    <p id="mic-error-msg" style="font-size:0.7rem; color:#ff5555; margin-top:5px;">Erreur: ${e.message}</p>
                    <button class="btn-force-mic" onclick="forceMicConnection()">RÉESSAYER</button>
                `;
            }
        }

        // 2. VISUALISEUR (Dépend du bouton rouge maintenant)
        async function toggleVisualizer() {
            if (!globalStream) {
                // Si on clique sur Scope sans avoir validé le micro, on montre l'overlay
                document.getElementById('mic-force-overlay').style.display = 'block';
                return;
            }
            const btn = document.getElementById('btn-audio');
            isVisualizer = !isVisualizer;
            btn.classList.toggle('active', isVisualizer);
            if(isVisualizer) drawSymmetricSpectrum();
        }

        // 3. MODE ECHO (Dépend du bouton rouge)
        async function toggleEcho() {
            if (!globalStream) {
                document.getElementById('mic-force-overlay').style.display = 'block';
                return;
            }
            const btn = document.getElementById('btn-echo');
            const statusEl = document.getElementById('ai-status');

            if (isEcho) {
                isEcho = false; btn.classList.remove('active');
                statusEl.innerText = "OFFLINE"; statusEl.style.color = "var(--danger)";
                if(recognition) recognition.stop();
            } else {
                synth = window.speechSynthesis;
                if (!synth) return alert("TTS indisponible");

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return alert("IA indisponible");
                
                isEcho = true; btn.classList.add('active');
                statusEl.innerHTML = '<span class="live-dot">●</span>ÉCOUTE ACTIVE';
                statusEl.style.color = "var(--primary)";

                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = false; 
                recognition.lang = 'fr-FR';

                recognition.onstart = () => {
                    statusEl.innerHTML = '<span class="live-dot">●</span>ÉCOUTE ACTIVE';
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[event.results.length - 1][0].transcript;
                    const confidence = event.results[event.results.length - 1][0].confidence;
                    if (transcript.trim().length > 0 && confidence > 0.5) {
                        eternalLog(transcript, "msg-final");
                        speakText(transcript);
                    }
                };

                recognition.onerror = (e) => {
                     if(e.error === 'not-allowed') { isEcho = false; btn.classList.remove('active'); statusEl.innerText = "BLOQUÉ"; }
                };

                recognition.onend = () => {
                    if (isEcho) {
                        statusEl.innerText = "RECONNECTION...";
                        setTimeout(() => { if (isEcho) recognition.start(); }, 1000);
                    } else {
                        statusEl.innerText = "OFFLINE";
                    }
                };

                recognition.start();
                log("Mode Echo Activé.", "system");
            }
        }

        function speakText(text) {
            if (!synth) return;
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fr-FR';
            utterance.rate = 1.2; utterance.volume = 1.0;
            const voices = synth.getVoices();
            const frenchVoice = voices.find(v => v.lang.includes('fr'));
            if (frenchVoice) utterance.voice = frenchVoice;
            synth.speak(utterance);
        }

        function drawSymmetricSpectrum() {
            if(!isVisualizer || !analyser) return;
            requestAnimationFrame(drawSymmetricSpectrum);

            const cvs = document.getElementById('viz-canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.clientWidth;
            cvs.height = cvs.clientHeight;
            const w = cvs.width, h = cvs.height;
            const cx = w / 2;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            ctx.clearRect(0, 0, w, h);
            const barWidth = (cx / bufferLength) * 2.5;
            let totalVol = 0;

            for(let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * (h/2);
                totalVol += dataArray[i];
                const hue = 40 + (i/bufferLength) * 160; 
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.fillRect(cx - (i * barWidth), (h/2) - barHeight, barWidth - 1, barHeight * 2);
                ctx.fillRect(cx + (i * barWidth), (h/2) - barHeight, barWidth - 1, barHeight * 2);
            }

            audioLevel = totalVol / bufferLength;
            document.getElementById('vol-disp').innerText = Math.round(audioLevel);
            updateProbability();
        }

        // 4. SWEEP (Fonctionne indépendamment)
        async function toggleSweep() {
            const btn = document.getElementById('btn-sweep');
            if (isSweep) {
                stopSweep(); isSweep = false; btn.classList.remove('active');
            } else {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                startSweep(); isSweep = true; btn.classList.add('active');
                log("Sweep Activé.", "system");
            }
        }
        function startSweep() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer; noise.loop = true;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.Q.value = 20;
            const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.1;
            const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 3000; 
            lfo.connect(lfoGain); lfoGain.connect(filter.frequency); filter.frequency.value = 1000;
            const vol = audioCtx.createGain(); vol.gain.value = 0.7; 
            noise.connect(filter); filter.connect(vol); vol.connect(audioCtx.destination);
            noise.start(); lfo.start();
            sweepNodes = [noise, lfo];
        }
        function stopSweep() { sweepNodes.forEach(n => { try{n.stop()}catch(e){} }); sweepNodes = []; }

        // 5. CAPTEURS
        function toggleSensors() {
            const btn = document.getElementById('btn-sens');
            if (isSensors) {
                window.removeEventListener('deviceorientationabsolute', handleOrientation);
                window.removeEventListener('devicemotion', handleMotion);
                isSensors = false; btn.classList.remove('active');
            } else {
                isSensors = true; btn.classList.add('active');
                window.addEventListener('deviceorientationabsolute', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                log("Capteurs Connectés.", "system");
            }
        }
        function handleOrientation(e) {
            const alpha = e.alpha;
            if (lastAlpha !== null && alpha !== null) {
                let diff = Math.abs(alpha - lastAlpha);
                if (diff > 180) diff = 360 - diff;
                instability = (instability * 0.9) + (diff * 0.1);
            }
            lastAlpha = alpha;
            emfVal = Math.max(0, (instability - emfBase) * 2);
            document.getElementById('emf-disp').innerText = emfVal.toFixed(1);
        }
        function handleMotion(e) {
            const acc = e.accelerationIncludingGravity;
            if(!acc) return;
            motionVal = Math.abs(acc.x||0) + Math.abs(acc.y||0) + Math.abs(acc.z||0);
        }

        function eternalLog(text, className) {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = className;
            const chars = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ";
            let iterations = 0;
            const interval = setInterval(() => {
                div.innerText = text.split("")
                    .map((letter, index) => {
                        if(index < iterations) return text[index];
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");
                if(iterations >= text.length) clearInterval(interval);
                iterations += 0.5;
            }, 40);
            const time = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `<span style="opacity:0.5; font-size:0.8em">[${time}]</span> ${div.innerHTML}`;
            container.prepend(div);
            if(container.children.length > 20) container.lastChild.remove();
        }
        function log(msg, type) {
            const div = document.createElement('div');
            div.className = type || "msg-system";
            const time = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `<span style="opacity:0.5">[${time}]</span> ${msg}`;
            document.getElementById('log-container').prepend(div);
        }
        function updateProbability() {
            let rawProb = (audioLevel * 0.6) + (emfVal * 3) + (motionVal * 0.2);
            if (rawProb > 100) rawProb = 100;
            if (rawProb < 0) rawProb = 0;
            const displayVal = document.getElementById('prob-val');
            const fill = document.getElementById('prob-fill');
            displayVal.innerText = rawProb.toFixed(1) + "%";
            fill.style.width = rawProb + "%";
            if (rawProb > 75) {
                displayVal.style.color = "var(--danger)";
                displayVal.style.textShadow = "0 0 15px var(--danger)";
            } else {
                displayVal.style.color = "var(--secondary)";
                displayVal.style.textShadow = "none";
            }
        }
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
