<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PuiSSancE MAXIMUM - ARCHITECTURE STABLE</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #ff00ff;
            --bg: #050505;
            --panel: #111;
            --text: #eee;
            --danger: #ff3333;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: 'Courier New', monospace;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            background: #000; border-bottom: 2px solid var(--primary);
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        h1 { margin: 0; font-size: 1.2rem; color: var(--primary); text-shadow: 0 0 5px var(--primary); }
        #status { font-size: 0.8rem; font-weight: bold; padding: 5px 10px; border: 1px solid var(--secondary); color: var(--secondary); }
        #status.active { background: var(--secondary); color: #000; box-shadow: 0 0 10px var(--secondary); }

        /* ZONE PRINCIPALE */
        main { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        #visualizer {
            flex: 1; background: #000; position: relative; border-bottom: 1px solid #333;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        #displayOverlay {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            text-align: center; pointer-events: none; z-index: 10;
        }
        #mainText {
            font-size: 2rem; font-weight: bold; color: #fff;
            background: rgba(0,0,0,0.7); padding: 10px;
            text-transform: uppercase; border: 2px solid var(--primary);
            margin-bottom: 5px; min-height: 3rem;
        }
        #subText { font-size: 0.8rem; color: var(--secondary); letter-spacing: 1px; }

        /* CONTRÔLES */
        #controls {
            background: var(--panel); padding: 15px;
            display: grid; gap: 10px;
            max-height: 40vh; overflow-y: auto;
        }
        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .control-row.full { grid-template-columns: 1fr; }

        button {
            background: #222; border: 1px solid var(--primary); color: var(--primary);
            padding: 15px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; font-family: inherit;
        }
        button:active { transform: scale(0.98); }
        button.active-mode { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        button.danger { border-color: var(--danger); color: var(--danger); }
        button.danger:active { background: var(--danger); color: #fff; }
        
        .btn-ia { border-color: var(--secondary); color: var(--secondary); }
        .btn-ia.active-mode { background: var(--secondary); color: #000; box-shadow: 0 0 15px var(--secondary); }

        /* LOG */
        #terminal {
            height: 100px; background: #000; border-top: 1px solid #333;
            padding: 8px; font-size: 0.7rem; overflow-y: auto; color: #888; font-family: monospace;
        }
        .log-line { margin-bottom: 4px; border-left: 2px solid #555; padding-left: 5px; }
        .log-sys { color: #aaa; }
        .log-ia { border-color: var(--secondary); color: #fff; background: #220022; }
        .log-err { border-color: var(--danger); color: var(--danger); }
    </style>
</head>
<body>

<header>
    <h1>PUISSANCE <span style="font-size:0.6em">v4.0 STABLE</span></h1>
    <div id="status">OFFLINE</div>
</header>

<main>
    <div id="visualizer">
        <canvas id="scopeCanvas"></canvas>
        <div id="displayOverlay">
            <div id="mainText">SYSTÈME PRÊT</div>
            <div id="subText">EN ATTENTE D'ORDRE</div>
        </div>
    </div>
</main>

<div id="controls">
    <div class="control-row full">
        <button class="btn-ia" onclick="App.startVoiceOnlyMode()">🎤 MODE VOIX SEULE (IA)</button>
    </div>
    <div class="control-row">
        <button onclick="App.startFullSystem()">⚡ DÉMARRER SYSTÈME COMPLET</button>
        <button class="danger" onclick="App.stopSystem()">⏹ ARRÊTER TOUT</button>
    </div>
    <div class="control-row full" style="font-size: 0.7rem; color:#666; text-align:center; border:1px solid #333; padding:5px;">
        Système : <span id="sysMode">Aucun</span>
    </div>
</div>

<div id="terminal">
    <div class="log-line log-sys">> Initialisation du noyau...</div>
</div>

<script>
/**
 * =========================================================================
 * ARCHITECTURE EN ENTITÉS RÉELLES (Audio, Visual, Brain)
 * =========================================================================
 */

// --- ENTITÉ 1 : MOTEUR AUDIO (Gère le micro et le contexte audio) ---
const AudioEngine = {
    ctx: null,
    stream: null,
    analyser: null,
    isInit: false,

    async init() {
        if (this.isInit) return true;
        
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            // CRUCIAL : Réveiller le contexte audio immédiatement
            if (this.ctx.state === 'suspended') {
                await this.ctx.resume();
            }

            this.stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { 
                    echoCancellation: false, 
                    noiseSuppression: false, 
                    autoGainControl: false 
                } 
            });

            this.analyser = this.ctx.createAnalyser();
            this.analyser.fftSize = 256;
            const source = this.ctx.createMediaStreamSource(this.stream);
            source.connect(this.analyser);
            
            this.isInit = true;
            return true;
        } catch (e) {
            console.error("AudioEngine Error:", e);
            App.log("Erreur Audio : " + e.message, 'err');
            return false;
        }
    },

    getDataArray() {
        if (!this.analyser) return new Uint8Array(0);
        const array = new Uint8Array(this.analyser.frequencyBinCount);
        this.analyser.getByteFrequencyData(array);
        return array;
    },

    destroy() {
        if (this.stream) {
            this.stream.getTracks().forEach(track => track.stop());
            this.stream = null;
        }
        if (this.ctx) {
            this.ctx.close();
            this.ctx = null;
        }
        this.analyser = null;
        this.isInit = false;
    }
};

// --- ENTITÉ 2 : MOTEUR VISUEL (Gère le Canvas) ---
const VisualEngine = {
    canvas: null,
    ctx: null,
    animationId: null,
    isRunning: false,

    init() {
        this.canvas = document.getElementById('scopeCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
    },

    resize() {
        if (this.canvas) {
            this.canvas.width = this.canvas.parentElement.clientWidth;
            this.canvas.height = this.canvas.parentElement.clientHeight;
        }
    },

    start() {
        if (this.isRunning) return;
        this.isRunning = true;
        this.loop();
    },

    stop() {
        this.isRunning = false;
        if (this.animationId) cancelAnimationFrame(this.animationId);
    },

    loop() {
        if (!this.isRunning) return;
        
        const w = this.canvas.width;
        const h = this.canvas.height;
        
        // Fond semi-transparent pour effet de traînée
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        this.ctx.fillRect(0, 0, w, h);

        let data = new Uint8Array(0);
        if (AudioEngine.isInit) {
            data = AudioEngine.getDataArray();
        } else {
            // Simulation si pas de micro connecté (Mode Voix Seule)
            data = new Uint8Array(128).map(() => Math.random() * 50);
        }

        const barWidth = (w / data.length) * 2.5;
        let x = 0;

        for (let i = 0; i < data.length; i++) {
            const barHeight = (data[i] / 255) * h;
            
            // Couleur dynamique
            const r = 0;
            const g = data[i] + 50;
            const b = 255;

            this.ctx.fillStyle = `rgb(${r},${g},${b})`;
            this.ctx.fillRect(x, h - barHeight, barWidth, barHeight);
            
            x += barWidth + 1;
        }

        this.animationId = requestAnimationFrame(() => this.loop());
    }
};

// --- ENTITÉ 3 : CERVEAU IA (Reconnaissance et Synthèse) ---
const BrainEngine = {
    recognition: null,
    synthesis: window.speechSynthesis,
    voice: null,
    isListening: false,

    init() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return false;

        // Configuration de la reconnaissance
        this.recognition = new SpeechRecognition();
        this.recognition.continuous = true;
        this.recognition.interimResults = false;
        this.recognition.lang = 'fr-FR';

        // Gestion des résultats
        this.recognition.onresult = (event) => {
            const last = event.results.length - 1;
            const text = event.results[last][0].transcript.trim();
            this.processInput(text);
        };

        // Gestion de la fin (redémarrage automatique si actif)
        this.recognition.onend = () => {
            if (this.isListening && App.isRunning) {
                // Petit délai pour éviter boucle infinie trop rapide
                setTimeout(() => {
                    if (this.isListening) try { this.recognition.start(); } catch(e){}
                }, 500);
            }
        };
        
        // Gestion erreurs
        this.recognition.onerror = (e) => {
            if (e.error === 'not-allowed') {
                App.log("Microphone refusé !", 'err');
                App.stopSystem();
            }
        };

        // Chargement voix
        this.loadVoice();
        window.speechSynthesis.onvoiceschanged = () => this.loadVoice();
        
        return true;
    },

    loadVoice() {
        const voices = this.synthesis.getVoices();
        this.voice = voices.find(v => v.lang === 'fr-FR') || voices.find(v => v.lang.startsWith('fr'));
    },

    startListening() {
        if (!this.recognition) return;
        this.isListening = true;
        try { this.recognition.start(); } catch(e){}
        App.updateSubText("ÉCOUTE ACTIVE...");
    },

    stopListening() {
        this.isListening = false;
        if (this.recognition) try { this.recognition.stop(); } catch(e){}
        App.updateSubText("ÉCOUTE ARRÊTÉE");
    },

    speak(text) {
        this.synthesis.cancel();
        if (!text) return;
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fr-FR';
        utterance.pitch = 0.6;
        utterance.rate = 1.1;
        if (this.voice) utterance.voice = this.voice;

        utterance.onstart = () => {
            App.updateMainText("PARLE...");
            App.log("IA: " + text, 'ia');
        };
        utterance.onend = () => {
            if (this.isListening) App.updateMainText("ÉCOUTE...");
        };

        this.synthesis.speak(utterance);
    },

    // LOGIQUE INTELLIGENTE
    processInput(text) {
        App.updateMainText(text.toUpperCase());
        const lower = text.toLowerCase();

        // 1. COMMANDE STOP
        if (lower === 'stop' || lower === 'arrête') {
            this.isListening = false; // Flag logique
            this.recognition.stop(); // Arrêt physique
            this.speak("Mode pause activé.");
            return;
        }

        // 2. COMMANDE RE ÉCOUTE
        if (lower.includes('réécoute') || lower.includes('re écoute') || lower.includes('écoute encore')) {
            if (!this.isListening) {
                this.isListening = true;
                try { this.recognition.start(); } catch(e){}
            }
            this.speak("J'écoute à nouveau.");
            return;
        }

        // 3. QUESTIONS IA
        let response = null;

        if (lower.includes('qui es-tu') || lower.includes('ton nom')) {
            response = "Je suis PuiSSancE, entité artificielle de détection spectrale.";
        } 
        else if (lower.includes('où') && (lower.includes('bruit') || lower.includes('esprit'))) {
            const dirs = ["Nord", "Sud", "Est", "Ouest", "Derrière toi", "À gauche"];
            response = "Le signal vient du " + dirs[Math.floor(Math.random() * dirs.length)] + ".";
        }
        else if (lower.includes('aide') || lower.includes('comment puis-je t\'aider')) {
            response = "Tu peux me demander où est l'esprit, qui je suis, ou dire Stop pour m'arrêter.";
        }

        // 4. RÉPONSE
        if (response) {
            this.speak(response);
        } else if (this.isListening) {
            // Par défaut : Répète si pas de commande spéciale
            this.speak(text);
        }
    }
};

// --- ENTITÉ 4 : CONTRÔLEUR PRINCIPAL (Application) ---
const App = {
    isRunning: false,
    mode: null, // 'FULL' ou 'VOICE_ONLY'

    init() {
        VisualEngine.init();
        BrainEngine.init();
        this.log("Système initialisé. Prêt.", 'sys');
    },

    log(msg, type = 'sys') {
        const term = document.getElementById('terminal');
        const div = document.createElement('div');
        div.className = 'log-line log-' + type;
        div.innerText = `[${new Date().toLocaleTimeString('fr-FR')}] ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    },

    updateMainText(text) {
        document.getElementById('mainText').innerText = text;
    },

    updateSubText(text) {
        document.getElementById('subText').innerText = text;
    },

    updateStatus(active, modeName) {
        const badge = document.getElementById('status');
        const modeSpan = document.getElementById('sysMode');
        
        if (active) {
            badge.classList.add('active');
            badge.innerText = "ONLINE";
            modeSpan.innerText = modeName;
            modeSpan.style.color = 'var(--primary)';
        } else {
            badge.classList.remove('active');
            badge.innerText = "OFFLINE";
            modeSpan.innerText = "Aucun";
            modeSpan.style.color = '#666';
        }
    },

    // --- MODE 1 : SYSTÈME COMPLET (Audio + Visuel + IA) ---
    async startFullSystem() {
        this.stopSystem(); // Reset propre avant de démarrer
        
        this.log("Démarrage Système Complet...", 'sys');
        
        // 1. Init Audio (Micro + Analyser)
        const audioOk = await AudioEngine.init();
        if (!audioOk) {
            alert("Impossible d'accéder au micro.");
            return;
        }

        // 2. Démarrer Visuel
        VisualEngine.start();

        // 3. Démarrer Cerveau
        BrainEngine.startListening();

        // 4. État
        this.isRunning = true;
        this.mode = 'FULL';
        this.updateStatus(true, "SYSTÈME COMPLET (VISUEL + IA)");
        this.speak("Système complet activé.");
    },

    // --- MODE 2 : VOIX SEULE (IA Uniquement) ---
    startVoiceOnlyMode() {
        this.stopSystem(); // Reset propre

        this.log("Activation Mode Voix Seule...", 'sys');
        
        // NOTE: Pas d'AudioEngine.init() ici pour éviter les conflits de micro si non utilisé
        // Le navigateur gère le micro interne pour SpeechRecognition
        
        VisualEngine.start(); // On garde le visuel en mode simulation (cool factor)

        BrainEngine.startListening();

        this.isRunning = true;
        this.mode = 'VOICE_ONLY';
        this.updateStatus(true, "MODE VOIX SEULE (IA UNIQUEMENT)");
        this.speak("Mode voix seule activé.");
    },

    stopSystem() {
        this.log("Arrêt en cours...", 'sys');
        this.isRunning = false;
        this.mode = null;

        // Arrêt de tout
        AudioEngine.destroy();
        VisualEngine.stop();
        BrainEngine.stopListening();
        BrainEngine.synthesis.cancel();

        this.updateStatus(false, "");
        this.updateMainText("SYSTÈME ARRÊTÉ");
        this.updateSubText("EN ATTENTE");
        
        // Nettoyage visuel
        const canvas = document.getElementById('scopeCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    },

    speak(text) {
        BrainEngine.speak(text);
    }
};

// Lancement au chargement
window.onload = () => App.init();

</script>
</body>
</html>
