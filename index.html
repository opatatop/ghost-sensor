<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPRA ETERNITY - CONTROL SYSTEM</title>
    <style>
        :root {
            /* Thème Supra Eternity */
            --primary: #00ffff; /* Cyan Néon */
            --secondary: #bc13fe; /* Violet Néon */
            --bg: #050510;
            --panel: #0a0a20;
            --text: #e0e0ff;
            --danger: #ff3333;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: 'Courier New', monospace;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            background: #000; border-bottom: 2px solid var(--primary);
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        h1 { margin: 0; font-size: 1.1rem; color: var(--primary); text-shadow: 0 0 8px var(--primary); }
        #status { font-size: 0.75rem; font-weight: bold; padding: 5px 10px; border: 1px solid var(--secondary); color: var(--secondary); border-radius: 4px; text-transform: uppercase; }
        #status.active { background: var(--secondary); color: #fff; box-shadow: 0 0 10px var(--secondary); }

        /* ZONE PRINCIPALE */
        main { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        #visualizer {
            flex: 1; background: #000; position: relative; border-bottom: 1px solid var(--primary);
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        #displayOverlay {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            text-align: center; pointer-events: none; z-index: 10;
        }
        #mainText {
            font-size: 1.8rem; font-weight: 900; color: #fff;
            background: rgba(0, 0, 0, 0.8); padding: 12px;
            text-transform: uppercase; border: 2px solid var(--primary);
            margin-bottom: 5px; min-height: 3rem;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }
        #subText { font-size: 0.8rem; color: var(--secondary); letter-spacing: 2px; font-weight: bold; }

        /* CONTRÔLES */
        #controls {
            background: var(--panel); padding: 15px;
            display: grid; gap: 10px;
            max-height: 40vh; overflow-y: auto;
        }
        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .control-row.full { grid-template-columns: 1fr; }

        button {
            background: #111; border: 1px solid var(--primary); color: var(--primary);
            padding: 15px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; font-family: inherit; border-radius: 4px;
        }
        button:active { transform: scale(0.98); }
        button.active-mode { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        button.danger { border-color: var(--danger); color: var(--danger); }
        button.danger:active { background: var(--danger); color: #fff; }
        
        .btn-supra { border-color: var(--secondary); color: var(--secondary); background: rgba(188, 19, 254, 0.1); }
        .btn-supra.active-mode { background: var(--secondary); color: #fff; box-shadow: 0 0 15px var(--secondary); }

        /* LOG */
        #terminal {
            height: 100px; background: #000; border-top: 1px solid #333;
            padding: 8px; font-size: 0.65rem; overflow-y: auto; color: #888; font-family: monospace;
        }
        .log-line { margin-bottom: 3px; border-left: 2px solid #555; padding-left: 5px; }
        .log-sys { color: #aaa; }
        .log-ia { border-color: var(--secondary); color: #fff; background: #220022; }
        .log-cmd { border-color: var(--primary); color: var(--primary); font-weight: bold; }
        .log-err { border-color: var(--danger); color: var(--danger); }
    </style>
</head>
<body>

<header>
    <h1>SUPRA <span style="font-size:0.6em; color:var(--secondary)">ETERNITY</span></h1>
    <div id="status">OFFLINE</div>
</header>

<main>
    <div id="visualizer">
        <canvas id="scopeCanvas"></canvas>
        <div id="displayOverlay">
            <div id="mainText">SYSTÈME PRÊT</div>
            <div id="subText">EN ATTENTE D'ORDRE</div>
        </div>
    </div>
</main>

<div id="controls">
    <div class="control-row full">
        <button class="btn-supra active-mode" onclick="App.startVoiceOnlyMode()">🎤 ACTIVER SUPRA ETERNITY</button>
    </div>
    <div class="control-row">
        <button onclick="App.startFullSystem()">⚡ SYSTÈME COMPLET</button>
        <button class="danger" onclick="App.stopSystem()">⏹ ARRÊTER</button>
    </div>
    <div class="control-row full" style="font-size: 0.65rem; color:#666; text-align:center; border:1px solid #333; padding:5px;">
        Commandes : "Recherche mises à jour", "Ouvre Wi-Fi", "Ouvre les réglages", "Traduis..."
    </div>
</div>

<div id="terminal">
    <div class="log-line log-sys">> Noyau Supra Eternity chargé.</div>
    <div class="log-line log-sys">> Modules : Contrôle Système, IA, Traduction.</div>
</div>

<script>
/**
 * =========================================================================
 * SUPRA ETERNITY - ARCHITECTURE DE CONTRÔLE TOTAL
 * Basé sur le code stable v4.0 avec fonctionnalités étendues
 * =========================================================================
 */

// --- GESTIONNAIRE D'ÉTAT (PERSISTANCE) ---
const StateManager = {
    save() { localStorage.setItem('supra_active', 'true'); },
    clear() { localStorage.setItem('supra_active', 'false'); },
    isActive() { return localStorage.getItem('supra_active') === 'true'; }
};

// --- ENTITÉ 1 : MOTEUR AUDIO ---
const AudioEngine = {
    ctx: null, stream: null, analyser: null, isInit: false,
    async init() {
        if (this.isInit) return true;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            if (this.ctx.state === 'suspended') await this.ctx.resume();
            this.stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
            this.analyser = this.ctx.createAnalyser();
            this.analyser.fftSize = 256;
            this.ctx.createMediaStreamSource(this.stream).connect(this.analyser);
            this.isInit = true;
            return true;
        } catch (e) {
            App.log("Erreur Audio : " + e.message, 'err');
            return false;
        }
    },
    getDataArray() {
        if (!this.analyser) return new Uint8Array(0);
        const arr = new Uint8Array(this.analyser.frequencyBinCount);
        this.analyser.getByteFrequencyData(arr);
        return arr;
    },
    destroy() {
        if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
        if (this.ctx) { this.ctx.close(); this.ctx = null; }
        this.analyser = null; this.isInit = false;
    }
};

// --- ENTITÉ 2 : MOTEUR VISUEL ---
const VisualEngine = {
    canvas: null, ctx: null, animId: null, isRunning: false,
    init() {
        this.canvas = document.getElementById('scopeCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
    },
    resize() {
        if (this.canvas) {
            this.canvas.width = this.canvas.parentElement.clientWidth;
            this.canvas.height = this.canvas.parentElement.clientHeight;
        }
    },
    start() { if (!this.isRunning) { this.isRunning = true; this.loop(); } },
    stop() { this.isRunning = false; if (this.animId) cancelAnimationFrame(this.animId); },
    loop() {
        if (!this.isRunning) return;
        const w = this.canvas.width, h = this.canvas.height;
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        this.ctx.fillRect(0, 0, w, h);
        let data = AudioEngine.isInit ? AudioEngine.getDataArray() : new Uint8Array(128).map(() => Math.random() * 30);
        const barW = (w / data.length) * 2.5;
        let x = 0;
        for (let i = 0; i < data.length; i++) {
            const barH = (data[i] / 255) * h;
            this.ctx.fillStyle = `rgb(0, ${data[i] + 100}, 255)`;
            this.ctx.fillRect(x, h - barH, barW, barH);
            x += barW + 1;
        }
        this.animId = requestAnimationFrame(() => this.loop());
    }
};

// --- ENTITÉ 3 : MOTEUR DE TRADUCTION (NOUVEAU) ---
const TranslatorEngine = {
    async translate(text, targetLang) {
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=fr|${targetLang}`;
            const res = await fetch(url);
            const data = await res.json();
            return data.responseStatus === 200 ? data.responseData.translatedText : null;
        } catch (e) { return null; }
    }
};

// --- ENTITÉ 4 : MOTEUR DE CONTRÔLE SYSTÈME (REALME/ANDROID) ---
const ControlEngine = {
    execute(text) {
        const lower = text.toLowerCase();
        let intent = null;
        let msg = "";
        let type = "intent"; // 'intent' quitte la page, 'window' ouvre un nouvel onglet

        // CONTRÔLE SYSTÈME (INTENTS)
        if (lower.includes('mise à jour') || lower.includes('maj') || lower.includes('version')) {
            intent = "intent://#Intent;action=android.settings.DEVICE_INFO_SETTINGS;end";
            msg = "Ouverture des mises à jour système.";
        }
        else if (lower.includes('réglage') || lower.includes('paramètre') || lower.includes('setting')) {
            intent = "intent://#Intent;action=android.settings.SETTINGS;end";
            msg = "Ouverture des paramètres système.";
        }
        else if (lower.includes('wi-fi') || lower.includes('wifi')) {
            intent = "intent://#Intent;action=android.settings.WIFI_SETTINGS;end";
            msg = "Ouverture des paramètres Wi-Fi.";
        }
        else if (lower.includes('bluetooth')) {
            intent = "intent://#Intent;action=android.settings.BLUETOOTH_SETTINGS;end";
            msg = "Ouverture des paramètres Bluetooth.";
        }
        else if (lower.includes('application') || lower.includes('apps') || lower.includes('gestionnaire')) {
            intent = "intent://#Intent;action=android.settings.APPLICATION_SETTINGS;end";
            msg = "Ouverture du gestionnaire d'applications.";
        }
        else if (lower.includes('stockage')) {
            intent = "intent://#Intent;action=android.settings.INTERNAL_STORAGE_SETTINGS;end";
            msg = "Ouverture du stockage.";
        }

        // APPLICATIONS EXTERNES (NOUVELLE FENÊTRE)
        else if (lower.includes('youtube')) {
            intent = "https://www.youtube.com"; type = "window"; msg = "Ouverture YouTube.";
        }
        else if (lower.includes('google')) {
            intent = "https://www.google.com"; type = "window"; msg = "Ouverture Google.";
        }

        if (intent) {
            App.log("COMMANDE SYSTÈME: " + intent, 'cmd');
            BrainEngine.speak(msg, false); // Parle sans relancer l'écoute tout de suite
            
            setTimeout(() => {
                if (type === 'intent') {
                    StateManager.save(); // On sauvegarde l'état avant de quitter
                    window.location.href = intent;
                } else {
                    window.open(intent, '_blank');
                    BrainEngine.speak("Application ouverte. Je reste à l'écoute.", true); // Relance l'écoute
                }
            }, 2000);
            return true; // Action traitée
        }
        return false;
    }
};

// --- ENTITÉ 5 : CERVEAU IA ---
const BrainEngine = {
    recognition: null, synthesis: window.speechSynthesis, voice: null, isListening: false,

    init() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return false;
        this.recognition = new SR();
        this.recognition.continuous = true;
        this.recognition.interimResults = false;
        this.recognition.lang = 'fr-FR';

        this.recognition.onresult = (e) => {
            const text = e.results[e.results.length - 1][0].transcript.trim();
            this.processInput(text);
        };

        this.recognition.onend = () => {
            if (this.isListening && App.isRunning) {
                setTimeout(() => { if (this.isListening) try { this.recognition.start(); } catch (e) {} }, 800);
            }
        };

        this.recognition.onerror = (e) => {
            if (e.error === 'not-allowed') { App.log("Micro refusé !", 'err'); App.stopSystem(); }
        };

        this.loadVoice();
        window.speechSynthesis.onvoiceschanged = () => this.loadVoice();
        return true;
    },

    loadVoice() {
        const voices = this.synthesis.getVoices();
        this.voice = voices.find(v => v.lang === 'fr-FR') || voices.find(v => v.lang.startsWith('fr'));
    },

    startListening() {
        if (!this.recognition) return;
        this.isListening = true;
        try { this.recognition.start(); } catch (e) {}
        App.updateSubText("SUPRA ÉCOUTE...");
    },

    stopListening() {
        this.isListening = false;
        if (this.recognition) try { this.recognition.stop(); } catch (e) {}
        App.updateSubText("VEILLE");
    },

    speak(text, lang = 'fr', onEnd) {
        this.synthesis.cancel();
        if (!text) return;
        
        // Si on change de langue (traduction), on arrête l'écoute pour éviter la boucle
        if (lang !== 'fr') this.stopListening();

        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang === 'fr' ? 'fr-FR' : lang + '-' + lang.toUpperCase();
        u.pitch = 0.6; u.rate = 1.1;
        
        // Sélection voix adaptée
        const voices = this.synthesis.getVoices();
        let v = voices.find(v => v.lang.startsWith(lang));
        if (!v) v = this.voice; 
        if (v) u.voice = v;

        u.onstart = () => { App.updateMainText("PARLE..."); App.log("Supra: " + text, 'ia'); };
        u.onend = () => { 
            if (onEnd) onEnd();
            else if (this.isListening && lang === 'fr') App.updateMainText("ÉCOUTE...");
        };

        this.synthesis.speak(u);
    },

    async processInput(text) {
        App.updateMainText(text.toUpperCase());
        const lower = text.toLowerCase();

        // 1. COMMANDES SYSTÈME (Priorité Absolue)
        if (ControlEngine.execute(text)) return;

        // 2. STOP / RESTART
        if (lower === 'stop' || lower === 'arrête') {
            this.isListening = false; this.recognition.stop();
            this.speak("Mode pause activé.", 'fr');
            return;
        }
        if (lower.includes('réécoute') || lower.includes('écoute encore')) {
            if (!this.isListening) { this.isListening = true; this.recognition.start(); }
            this.speak("J'écoute à nouveau.", 'fr');
            return;
        }

        // 3. TRADUCTION IA
        if (lower.includes('traduis') || lower.includes('translate')) {
            let parts = text.split(/ en | in |to /i);
            let content = parts[0].replace(/traduis |translate |dis moi comment on dit /gi, '').trim();
            let langStr = parts[1] ? parts[1].trim() : 'anglais';
            
            let langCode = 'en';
            if (langStr.includes('espagnol')) langCode = 'es';
            else if (langStr.includes('allemand')) langCode = 'de';
            else if (langStr.includes('italien')) langCode = 'it';

            if (content.length > 0) {
                App.log(`Traduction "${content}" vers ${langCode}`, 'ia');
                this.stopListening();
                const trans = await TranslatorEngine.translate(content, langCode);
                if (trans) {
                    this.speak("En " + langStr + ", cela se dit : " + trans, langCode, () => this.startListening());
                } else {
                    this.speak("Traduction impossible.", 'fr', () => this.startListening());
                }
            }
            return;
        }

        // 4. RECHERCHE WEB
        if (lower.includes('cherche') || lower.includes('c\'est quoi') || lower.includes('qui est')) {
            let q = text.replace(/cherche|c'est quoi|qui est/gi, '').trim();
            if (q.length > 2) {
                this.stopListening();
                App.log("Recherche Web : " + q, 'cmd');
                this.speak("Je recherche sur internet...", 'fr', async () => {
                    try {
                        const url = `https://fr.wikipedia.org/w/api.php?origin=*&action=query&format=json&prop=extracts&exintro&explaintext&redirects=1&titles=${encodeURIComponent(q)}`;
                        const res = await fetch(url);
                        const data = await res.json();
                        const pid = Object.keys(data.query.pages)[0];
                        if (pid !== "-1") {
                            let txt = data.query.pages[pid].extract;
                            let s = txt.split('.').filter(s => s.trim().length > 20);
                            let sum = s.slice(0, 2).join('. ') + ".";
                            this.speak("J'ai trouvé : " + sum, 'fr', () => this.startListening());
                        } else throw new Error();
                    } catch (e) {
                        this.speak("Non trouvé.", 'fr', () => this.startListening());
                    }
                });
            }
            return;
        }

        // 5. DIALOGUE
        let response = null;
        if (lower.includes('qui es-tu') || lower.includes('ton nom')) response = "Je suis Supra Eternity, votre assistant de contrôle système.";
        else if (lower.includes('heure')) {
            const d = new Date();
            response = `Il est ${d.getHours()} heures ${d.getMinutes()}.`;
        }
        else if (lower.includes('merci')) response = "Au service de l'éternité.";

        if (response) { this.speak(response, 'fr'); } 
        else if (this.isListening) { this.speak(text, 'fr'); }
    }
};

// --- ENTITÉ 6 : APPLICATION PRINCIPALE ---
const App = {
    isRunning: false, mode: null,

    init() {
        VisualEngine.init();
        BrainEngine.init();
        this.log("Supra Eternity initialisé.", 'sys');

        // AUTO-RÉVEIL (Si on revient des réglages)
        if (StateManager.isActive()) {
            this.log("Restauration session...", 'cmd');
            this.startVoiceOnlyMode(true);
        }
    },

    log(msg, type = 'sys') {
        const term = document.getElementById('terminal');
        const div = document.createElement('div');
        div.className = 'log-line log-' + type;
        div.innerText = `[${new Date().toLocaleTimeString('fr-FR')}] ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    },

    updateMainText(t) { document.getElementById('mainText').innerText = t; },
    updateSubText(t) { document.getElementById('subText').innerText = t; },
    updateStatus(active, mName) {
        const b = document.getElementById('status');
        if (active) { b.classList.add('active'); b.innerText = "ONLINE"; }
        else { b.classList.remove('active'); b.innerText = "OFFLINE"; }
        document.getElementById('sysMode').innerText = mName || "Aucun";
    },

    async startFullSystem() {
        this.stopSystem();
        this.log("Démarrage Système Complet...", 'sys');
        const audioOk = await AudioEngine.init();
        if (!audioOk) { alert("Micro requis"); return; }
        VisualEngine.start();
        BrainEngine.startListening();
        this.isRunning = true; this.mode = 'FULL';
        StateManager.save();
        this.updateStatus(true, "COMPLET (VISUEL + SYSTÈME)");
        BrainEngine.speak("Système complet activé.");
    },

    startVoiceOnlyMode(silent = false) {
        this.stopSystem();
        if(!silent) this.log("Activation Mode Voix Seule...", 'sys');
        VisualEngine.start(); // Visuel en simulation
        BrainEngine.startListening();
        this.isRunning = true; this.mode = 'VOICE';
        StateManager.save();
        this.updateStatus(true, "SUPRA ETERNITY (IA)");
        if (!silent) BrainEngine.speak("Supra Eternity est en ligne. Contrôle système actif.");
        else {
            // Mode silencieux (réveil)
            BrainEngine.speak("De retour.", 'fr', () => BrainEngine.startListening());
        }
    },

    stopSystem() {
        this.isRunning = false; this.mode = null;
        AudioEngine.destroy();
        VisualEngine.stop();
        BrainEngine.stopListening();
        BrainEngine.synthesis.cancel();
        StateManager.clear();
        this.updateStatus(false, "");
        this.updateMainText("SYSTÈME ARRÊTÉ");
        this.updateSubText("EN ATTENTE");
        const c = document.getElementById('scopeCanvas');
        c.getContext('2d').clearRect(0, 0, c.width, c.height);
    }
};

window.onload = () => App.init();
</script>
</body>
</html>
