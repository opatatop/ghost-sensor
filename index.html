<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY HAHAHA LAB - QUANTUM DECODER</title>
<style>
:root {
  --primary: #00f3ff;
  --secondary: #bc13fe;
  --bg: #020205;
  --panel: #0a0a12;
  --btn-bg: #141420;
  --btn-active: #00f3ff;
  --text: #e0f0ff;
}

body {
  margin: 0; padding: 0;
  font-family: 'Consolas', 'Monaco', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

.grid-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -2;
}

#hud {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100%;
}

#topBar {
  background: rgba(10, 10, 18, 0.9);
  border-bottom: 1px solid var(--primary);
  padding: 5px 10px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.75rem;
  color: var(--primary);
  backdrop-filter: blur(5px);
  z-index: 10;
}
.data-readout { display: flex; gap: 15px; }
.data-item span { color: var(--secondary); font-weight: bold; }

#mainStage {
  position: relative;
  flex: 1;
  overflow: hidden;
  display: flex; justify-content: center; align-items: center;
}

#iaBox {
  position: absolute; top: 10%; left: 0; right: 0;
  text-align: center;
  z-index: 5;
  pointer-events: none;
}
#iaLabel { color: var(--secondary); font-size: 0.7rem; letter-spacing: 2px; background: rgba(0,0,0,0.8); display: inline-block; padding: 2px 10px; border: 1px solid var(--secondary); }
#iaText {
  font-size: 1.8rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 10px var(--primary);
  margin-top: 5px;
  min-height: 3rem;
}

canvas { width: 100%; height: 100%; display: block; }

#controlDeck {
  background: rgba(10, 10, 18, 0.95);
  border-top: 2px solid var(--primary);
  height: 50vh;
  overflow-y: auto;
  display: flex; flex-direction: column;
  gap: 5px;
  padding: 5px;
  backdrop-filter: blur(10px);
  z-index: 10;
}

.section-title {
  color: var(--secondary); font-size: 0.65rem; font-weight: bold; 
  border-bottom: 1px solid #333; margin: 5px 0; padding-bottom: 2px; 
  text-transform: uppercase;
}

.eq-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 5px;
  background: rgba(0,0,0,0.3); padding: 5px; border-radius: 4px; border: 1px solid #333;
}
.slider-group { text-align: center; }
.slider-group label { display: block; font-size: 0.6rem; margin-bottom: 2px; color: #aaa; }
input[type="range"] { width: 100%; accent-color: var(--primary); }

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}

button {
  background: var(--btn-bg); border: 1px solid #333;
  color: var(--primary); padding: 8px 1px; font-size: 0.6rem;
  font-weight: bold; cursor: pointer; border-radius: 2px;
  text-transform: uppercase;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--btn-active); color: #000;
  box-shadow: 0 0 10px var(--primary);
  border-color: #fff;
}

#startBtn {
  grid-column: span 4; font-size: 1rem; padding: 10px;
  background: #000; color: var(--primary); border: 1px solid var(--primary);
  font-weight: 900; letter-spacing: 1px;
}
#startBtn.running {
  background: var(--primary); color: #000;
  box-shadow: 0 0 20px var(--primary);
}

#meterBridge {
  display: flex; gap: 2px; height: 6px; margin-bottom: 5px;
}
.meter-bar { flex: 1; background: #222; position: relative; overflow: hidden; }
.meter-fill { height: 100%; width: 0%; transition: width 0.05s; }
#tMeter .meter-fill { background: #ff0055; }
#vMeter .meter-fill { background: var(--primary); }

#logZone {
  height: 35px; background: #000; border-top: 1px solid #333;
  padding: 2px 5px; font-size: 0.55rem; overflow-y: auto; color: #888;
  font-family: monospace;
}
.log-ghost { color: var(--secondary) !important; } /* Pour les mots traduits du bruit */
.log-real { color: var(--primary) !important; } /* Pour les vrais mots */
</style>
</head>
<body>

<div class="grid-bg"></div>

<div id="hud">
  <div id="topBar">
    <div>ETERNITY LAB <span style="color:var(--secondary)">DECODER</span></div>
    <div class="data-readout">
      <div class="data-item">MODE: <span id="modeStatus">HYBRID</span></div>
      <div class="data-item">SIGNAL: <span id="dbReadout">-inf</span></div>
    </div>
  </div>

  <div id="mainStage">
    <canvas id="canvas"></canvas>
    <div id="iaBox">
      <div id="iaLabel">DÉCODEUR PHONÉTIQUE / IA</div>
      <div id="iaText">... INITIALISATION ...</div>
    </div>
  </div>

  <div id="controlDeck">
    <div id="meterBridge">
      <div id="vMeter" class="meter-bar" title="Niveau Audio"><div class="meter-fill" id="volBar"></div></div>
    </div>

    <button id="startBtn" onclick="startSystem()">ACTIVER DÉCODEUR</button>

    <!-- ZONE TRANSLATION -->
    <div class="section-title">Paramètres Traduction (IA)</div>
    <div class="eq-grid">
      <div class="slider-group">
        <label>SENSIBILITÉ PARANORMALE</label>
        <input type="range" id="ghostSens" min="0" max="100" value="70">
      </div>
      <div class="slider-group">
        <label>VITESSE TRADUCTION</label>
        <input type="range" id="ghostSpeed" min="10" max="100" value="50">
      </div>
      <div class="slider-group">
        <label>SEUIL AUDIO (Trigger)</label>
        <input type="range" id="threshold" min="0" max="100" value="30">
      </div>
    </div>

    <!-- ZONE AUDIO -->
    <div class="section-title">Traitement du Signal (EQ)</div>
    <div class="eq-grid">
      <div class="slider-group"><label>BASSES</label><input type="range" id="eqLow" min="-20" max="20" value="0"></div>
      <div class="slider-group"><label>VOIX</label><input type="range" id="eqMid" min="-20" max="20" value="5"></div>
      <div class="slider-group"><label>AIGUS</label><input type="range" id="eqHigh" min="-20" max="20" value="0"></div>
    </div>
    
    <div class="slider-group" style="display:flex; justify-content:space-between; align-items:center; padding:0 10px; margin-bottom:5px;">
      <label style="margin:0">GAIN IA (Amplification)</label>
      <input type="range" id="analysisGain" min="1" max="10" value="5" style="width:50%">
    </div>

    <div class="section-title">Visualisation & Outils</div>
    <div class="button-grid">
      <button id="vizSpec" onclick="setViz('spectrum')">SPECTRE</button>
      <button id="vizLissa" onclick="setViz('lissajous')">INTERFÉRENCE</button>
      <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE</button>
      <button id="voiceBtn" onclick="toggleOpt('voice')">🗣 IA HYBRIDE</button>
      
      <button id="ghostBtn" onclick="toggleOpt('ghostBox')">📻 RÉCEPTEUR</button>
      <button id="invBtn" onclick="toggleOpt('invert')">⚛ INVERSION</button>
      <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
      <button id="camBtn" onclick="toggleOpt('cam')">📷 CAM</button>
      
      <button id="clearBtn" onclick="clearLog()">🗑 PURGE</button>
      <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ ARRÊTER</button>
    </div>
  </div>
</div>

<div id="logZone"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// --- DICTIONNAIRE DE TRADUCTION (Pour le bruit) ---
const GHOST_DICTIONARY = [
  "OMBRE", "SOMBRE", "ICI", "TOI", "AIDE", "MORT", "FROID", "VENT", 
  "REGARD", "VOIX", "SORT", "LOINTAIN", "ESPRIT", "QUI", "NOIR", 
  "PEUR", "TEMPS", "PASSÉ", "VIE", "FIN", "SANG", "NUIT", "SILENCE",
  "ATTENDS", "VA", "TUE", "MEURT", "CRY", "HELP", "RUN", "DARK",
  "LIGHT", "GATE", "OPEN", "CLOSE", "KEY", "DOOR", "SEE", "EYE"
];

let app = {
  running: false,
  ctx: null, source: null,
  lowShelf: null, peaking: null, highShelf: null,
  analysisGain: null, monitorGain: null, analyser: null,
  carrier: null, modulator: null, modGain: null, synthGain: null,
  stream: null, vidStream: null, recorder: null, isRec: false,
  recognition: null,
  config: {
    monitor: false, invert: false, ghostBox: false, voice: true, autoRec: false, cam: false,
    vizMode: 'spectrum',
    lastRealSpeechTime: 0,
    lastGhostTime: 0
  },
  canvas: null, cCtx: null, width: 0, height: 0,
  particles: [], tachyonLevel: 0, wakeLock: null
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), db: el('dbReadout'), iaText: el('iaText'),
  canvas: el('canvas'),
  // Sliders
  sLow: el('eqLow'), sMid: el('eqMid'), sHigh: el('eqHigh'),
  sAna: el('analysisGain'),
  sGhostSens: el('ghostSens'), // Nouveau slider sensibilité
  sGhostSpeed: el('ghostSpeed'), // Nouveau slider vitesse
  sThreshold: el('threshold') // Seuil
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

// --- STARTUP ---

async function startSystem() {
  if(app.running) return;
  
  el('startBtn').textContent = "CALIBRATION...";
  el('startBtn').style.background = "var(--secondary)";
  
  try {
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();

    app.stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false 
    });

    buildAudioGraph(app.stream);
    initViz();

    try { app.wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
    startKeepAlive();
    startHybridVoice(); // Démarrage IA Hybride

    app.running = true;
    el('startBtn').textContent = "DÉCODEUR ACTIF";
    el('startBtn').classList.add('running');
    
    renderLoop();
    log("Décodeur Hybride prêt. Traduction du bruit activée.", 'log-suc');

  } catch (e) {
    log("Erreur: " + e.message, 'log-warn');
    el('startBtn').textContent = "ERREUR";
    el('startBtn').style.background = "red";
  }
}

function buildAudioGraph(stream) {
  app.source = app.ctx.createMediaStreamSource(stream);
  app.lowShelf = app.ctx.createBiquadFilter(); app.lowShelf.type = 'lowshelf'; app.lowShelf.frequency.value = 200;
  app.peaking = app.ctx.createBiquadFilter(); app.peaking.type = 'peaking'; app.peaking.frequency.value = 1000; app.peaking.Q.value = 1;
  app.highShelf = app.ctx.createBiquadFilter(); app.highShelf.type = 'highshelf'; app.highShelf.frequency.value = 3000;
  app.analysisGain = app.ctx.createGain(); app.analysisGain.gain.value = parseFloat(els.sAna.value);
  app.monitorGain = app.ctx.createGain(); app.monitorGain.gain.value = 0;
  app.analyser = app.ctx.createAnalyser(); app.analyser.fftSize = 2048; app.analyser.smoothingTimeConstant = 0.5;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);
  app.timeDataArray = new Uint8Array(app.analyser.fftSize);

  // Synth Ghost Box
  app.carrier = app.ctx.createOscillator(); app.carrier.type = 'sine'; app.carrier.frequency.value = 440;
  app.modulator = app.ctx.createOscillator(); app.modulator.type = 'sawtooth'; app.modulator.frequency.value = 5;
  app.modGain = app.ctx.createGain(); app.modGain.gain.value = 1000;
  app.synthGain = app.ctx.createGain(); app.synthGain.gain.value = 0;

  app.source.connect(app.lowShelf);
  app.lowShelf.connect(app.peaking);
  app.peaking.connect(app.highShelf);
  app.highShelf.connect(app.analysisGain);
  app.analysisGain.connect(app.analyser);
  app.highShelf.connect(app.monitorGain);
  app.monitorGain.connect(app.ctx.destination);

  app.modulator.connect(app.modGain); app.modGain.connect(app.carrier.frequency);
  app.carrier.connect(app.synthGain); app.synthGain.connect(app.monitorGain);
  app.carrier.start(); app.modulator.start();

  app.recorder = new MediaRecorder(stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

function updateAudioParams() {
  if(!app.running) return;
  app.lowShelf.gain.value = parseFloat(els.sLow.value);
  app.peaking.gain.value = parseFloat(els.sMid.value);
  app.highShelf.gain.value = parseFloat(els.sHigh.value);
  app.analysisGain.gain.value = parseFloat(els.sAna.value);
  app.monitorGain.gain.value = app.config.monitor ? parseFloat(els.sMon?.value || 0.5) : 0; // Default 0.5 if slider missing
}
[els.sLow, els.sMid, els.sHigh, els.sAna].forEach(s => s?.addEventListener('input', updateAudioParams));

// --- HYBRID VOICE ENGINE (C'est ici que la magie opère) ---

function startHybridVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true;
      app.recognition.lang = 'fr-FR';
      
      app.recognition.onresult = (e) => {
          let txt = '';
          for(let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
          if(txt) {
              displayDecodedText(txt, false); // False = Réel
              if(e.results[e.results.length-1].isFinal) {
                  log(`RÉEL: "${txt}"`, 'log-real');
                  app.config.lastRealSpeechTime = Date.now();
              }
          }
      };
      app.recognition.onerror = () => {};
      app.recognition.onend = () => { if(app.running && app.config.voice) try{app.recognition.start()}catch(e){} };
      try{ app.recognition.start(); } catch(e){}
  }
}

// Fonction pour traduire le bruit (Appelée dans la boucle de rendu)
function checkNoiseTranslation(volume, threshold) {
    if(!app.config.voice) return;
    
    const now = Date.now();
    const sensitivity = parseInt(els.sGhostSens.value); // 0 à 100
    const speed = parseInt(els.sGhostSpeed.value); // 10 à 100 (plus bas = plus rapide)
    
    // Si le volume dépasse le seuil
    if (volume > threshold) {
        
        // COOLDOWN : On ne traduit pas si on vient juste de traduire quelque chose
        // Le cooldown dépend de la vitesse choisie
        const cooldown = 3000 - (speed * 20); // 1000ms à 2800ms d'attente
        const lastActionTime = Math.max(app.config.lastRealSpeechTime, app.config.lastGhostTime);
        
        if (now - lastActionTime > cooldown) {
            
            // CALCUL DE CHANCE : Basé sur la sensibilité
            // Si sensibilité 100, on traduit tout le temps.
            // Si sensibilité 10, on traduit rarement.
            const chance = Math.random() * 100;
            
            if (chance < sensitivity) {
                // On traduit le bruit !
                const word = GHOST_DICTIONARY[Math.floor(Math.random() * GHOST_DICTIONARY.length)];
                displayDecodedText(word, true); // True = Ghost
                log(`TRADUIT (BRUIT): "${word}"`, 'log-ghost');
                app.config.lastGhostTime = now;
            }
        }
    }
}

function displayDecodedText(text, isGhost) {
    els.iaText.textContent = text;
    els.iaText.style.color = isGhost ? "var(--secondary)" : "#fff";
    
    if(isGhost) {
        // Petit effet glitch visuel
        els.iaText.style.textShadow = "2px 0 red, -2px 0 blue";
        setTimeout(() => els.iaText.style.textShadow = "0 0 10px var(--primary)", 200);
    }
}

// --- LOOP ---

function initViz() {
  app.canvas = els.canvas;
  app.cCtx = app.canvas.getContext('2d');
  resize();
  for(let i=0; i<100; i++) {
    app.particles.push({ x: Math.random() * app.width, y: Math.random() * app.height, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, size: Math.random()*2 + 1 });
  }
}

function renderLoop() {
  if(!app.running) return;
  requestAnimationFrame(renderLoop);
  updateAudioParams();

  app.analyser.getByteFrequencyData(app.dataArray);
  app.analyser.getByteTimeDomainData(app.timeDataArray);

  let sum = 0;
  for(let i=0; i<app.dataArray.length; i++) sum += app.dataArray[i];
  const avg = sum / app.dataArray.length;
  const db = 20 * Math.log10(avg / 255);
  const threshold = parseInt(els.sThreshold.value); // Récupérer le seuil du slider

  els.volBar.style.width = Math.min(100, avg) + '%';
  els.db.textContent = db.toFixed(1) + " dB";

  // APPEL DU TRADUCTEUR DE BRUIT
  checkNoiseTranslation(avg, threshold);

  if(app.config.autoRec && avg > 60 && !app.isRec) {
    app.isRec = true; app.recorder.start(); log("⚠ ANOMALIE CAPTÉE", 'log-warn');
    setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 3000);
  }

  const ctx = app.cCtx, w = app.width, h = app.height;
  ctx.fillStyle = 'rgba(2, 2, 5, 0.2)'; ctx.fillRect(0,0,w,h);

  if(app.config.vizMode === 'spectrum') {
    const barW = (w / app.dataArray.length) * 2.5; let x = 0;
    for(let i=0; i<app.dataArray.length; i++) {
      const v = app.dataArray[i]; const barH = (v/255)*h;
      const freq = i * (app.ctx.sampleRate/2) / app.dataArray.length;
      let r=0, g=0, b=0;
      if(freq < 200) r = v; else if(freq < 2000) g = v; else b = v;
      ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fillRect(x, h - barH, barW, barH); x += barW+1;
    }
  } else if (app.config.vizMode === 'lissajous') {
    ctx.lineWidth = 2; ctx.strokeStyle = '#00f3ff'; ctx.beginPath();
    const bufferLength = app.analyser.frequencyBinCount; const sliceWidth = w * 1.0 / bufferLength; let x = 0;
    for(let i = 0; i < bufferLength; i++) {
      const v = app.timeDataArray[i] / 128.0; const y = v * h/2; const xOffset = (v - 1) * (w/2);
      if(i === 0) ctx.moveTo(x + xOffset, y); else ctx.lineTo(x + xOffset, y); x += sliceWidth;
    }
    ctx.stroke();
    ctx.strokeStyle = 'rgba(188, 19, 254, 0.5)'; ctx.beginPath(); ctx.arc(w/2, h/2, 100, 0, Math.PI*2); ctx.stroke();
  }
}

// --- TOOLS ---

function setViz(mode) {
  app.config.vizMode = mode;
  document.querySelectorAll('.button-grid button').forEach(b => b.classList.remove('active'));
  if(mode==='spectrum') el('vizSpec').classList.add('active');
  if(mode==='lissajous') el('vizLissa').classList.add('active');
}

function toggleOpt(key) {
  if(!app.running && key !== 'cam') return;
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');
  
  if(key === 'monitor') {
      // Gestion simple monitor
      const vol = app.config.monitor ? 0.5 : 0;
      if(app.monitorGain) app.monitorGain.gain.value = vol;
  }
  if(key === 'invert') {
      app.analysisGain.gain.value = app.config.invert ? -parseFloat(els.sAna.value) : parseFloat(els.sAna.value);
  }
  if(key === 'ghostBox') {
      app.synthGain.gain.value = app.config.ghostBox ? 0.15 : 0;
  }
  if(key === 'voice') {
      if(app.config.voice) startHybridVoice(); else if(app.recognition) app.recognition.stop();
  }
  if(key === 'cam') toggleCam();
}

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          const vid = document.createElement('video');
          vid.srcObject = app.vidStream; vid.autoplay = true; vid.muted = true; vid.playsInline = true;
          vid.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.3; z-index:-1;";
          app.canvas.parentNode.insertBefore(vid, app.canvas);
      } catch(e) { log("Erreur Cam", 'log-warn'); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null; document.querySelector('video')?.remove();
  }
}

function startKeepAlive() {
  app.keepAlive = app.ctx.createOscillator();
  const g = app.ctx.createGain(); g.gain.value = 0;
  app.keepAlive.connect(g); g.connect(app.ctx.destination); app.keepAlive.start();
}

function stopSystem() {
  if(app.wakeLock) app.wakeLock.release();
  if(app.stream) app.stream.getTracks().forEach(t=>t.stop());
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  if(app.recognition) app.recognition.stop();
  if(app.ctx) app.ctx.close();
  app.running = false;
  el('startBtn').textContent = "ACTIVER DÉCODEUR";
  el('startBtn').classList.remove('running');
  els.iaText.textContent = "ARRÊTÉ";
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`DECODED_${Date.now()}.webm`; a.click();
  log("Données sauvées", 'log-suc');
}

function clearLog() { els.log.innerHTML = ''; }

window.onresize = resize;
function resize() {
    if(app.canvas) { app.width = app.canvas.clientWidth; app.height = app.canvas.clientHeight; app.canvas.width = app.width; app.canvas.height = app.height; }
}

window.onload = () => { initViz(); log("DÉCODEUR QUANTIQUE PRÊT."); };

</script>
</body>
</html>
