<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA // ARCHITECTURE INTÉGRALE</title>
    <style>
        :root {
            --primary-color: #00ccff;
            --secondary-color: #ffd700;
            --background-color: #050510;
            --panel-color: #0a0a20;
            --text-color: #e0e0ff;
            --grid-color: #1a2a3a;
            --alert-color: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: var(--background-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-y: auto;
        }

        .app-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }

        header {
            background-color: #000000;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
        }

        .app-title {
            font-size: 1.2rem;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
        }

        .status-badge {
            padding: 5px 10px;
            border: 1px solid var(--secondary-color);
            border-radius: 4px;
            color: var(--secondary-color);
            font-weight: bold;
        }

        .status-badge.active {
            background-color: var(--secondary-color);
            color: #000;
            box-shadow: 0 0 10px var(--secondary-color);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            height: 100%;
        }

        .sidebar {
            background-color: #111;
            padding: 20px;
            overflow-y: auto;
        }

        .center-stage {
            background-color: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #scope-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .ai-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .ai-text {
            font-size: 2rem;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border: 2px solid var(--secondary-color);
            color: white;
            text-transform: uppercase;
        }

        .controls {
            background-color: var(--panel-color);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .control-panel {
            border: 1px solid var(--grid-color);
            padding: 15px;
            border-radius: 5px;
        }

        .panel-title {
            color: var(--secondary-color);
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid var(--grid-color);
            padding-bottom: 5px;
        }

        button {
            background-color: #222;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }

        button.active {
            background-color: var(--primary-color);
            color: black;
            box-shadow: 0 0 10px var(--primary-color);
        }

        .btn-start {
            background-color: var(--secondary-color);
            color: black;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            width: 100%;
        }

        .slider-container {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }

        .slider-container label {
            flex: 1;
            margin-right: 10px;
        }

        input[type="range"] {
            flex: 2;
        }

        .system-log {
            height: 100px;
            background-color: #000;
            border: 1px solid var(--grid-color);
            padding: 10px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            color: #aaa;
        }

        .log-entry {
            margin-bottom: 5px;
            padding-left: 10px;
            border-left: 2px solid var(--grid-color);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: #111;
            padding: 20px;
            border-radius: 5px;
            max-width: 600px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="app-title">OMEGA // ARCHITECTURE INTÉGRALE</div>
            <div id="status-badge" class="status-badge">OFFLINE</div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <h3>Données Capteurs</h3>
                <div class="sensor-data">
                    <div><span>ACC X:</span> <span id="acc-x">0.0</span></div>
                    <div><span>ACC Y:</span> <span id="acc-y">0.0</span></div>
                    <div><span>ACC Z:</span> <span id="acc-z">0.0</span></div>
                </div>
            </aside>

            <main class="center-stage">
                <canvas id="scope-canvas"></canvas>
                <div class="ai-overlay">
                    <div id="ai-text" class="ai-text">INITIALISATION...</div>
                </div>
            </main>

            <aside class="sidebar">
                <h3>Analyse</h3>
                <div class="analysis-data">
                    <div><span>Fréquence Pic:</span> <span id="peak-freq">0 Hz</span></div>
                    <div><span>Niveau RMS:</span> <span id="rms-level">-∞ dB</span></div>
                </div>
            </aside>
        </div>

        <div class="controls">
            <div class="control-panel">
                <div class="panel-title">Contrôle Principal</div>
                <button id="start-btn" class="btn-start" onclick="startSystem()">DÉMARRER L'ANALYSE</button>
                <button id="stop-btn" class="btn-start" onclick="stopSystem()" style="display: none; background-color: var(--alert-color);">ARRÊTER SYSTÈME</button>
            </div>

            <div class="control-panel">
                <div class="panel-title">Modules</div>
                <div class="grid-4">
                    <button id="mic-btn" class="active" onclick="toggleModule('mic')">Microphone</button>
                    <button id="tts-btn" class="active" onclick="toggleModule('tts')">Synthèse Vocale</button>
                    <button id="ghost-btn" class="active" onclick="toggleModule('ghost')">Mode Fantôme</button>
                </div>
            </div>

            <div class="control-panel">
                <div class="panel-title">Paramètres Audio</div>
                <div class="slider-container">
                    <label for="volume-slider">Volume:</label>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" oninput="updateConfig('volume', this.value)">
                    <span id="volume-value">1.0</span>
                </div>
            </div>

            <div class="control-panel" style="grid-column: 1 / -1;">
                <div class="panel-title">Journal Système</div>
                <div id="system-log" class="system-log">
                    <div class="log-entry">Système initialisé</div>
                </div>
            </div>
        </div>
    </div>

    <div id="config-modal" class="modal">
        <div class="modal-content">
            <h2>Configuration Avancée</h2>
            <button onclick="closeConfigModal()">Fermer</button>
        </div>
    </div>

    <script>
        // État de l'application
        const appState = {
            running: false,
            audioContext: null,
            analyser: null,
            microphone: null,
            recognition: null,
            config: {
                volume: 1.0,
                pitch: 1.0,
                rate: 1.0,
                fftSize: 2048,
                smoothing: 0.8
            },
            modules: {
                mic: true,
                tts: true,
                ghost: true
            }
        };

        // Journalisation
        function log(message) {
            const logElement = document.getElementById('system-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = message;
            logElement.appendChild(entry);
            logElement.scrollTop = logElement.scrollHeight;
        }

        // Initialisation du système
        async function startSystem() {
            if (appState.running) return;

            try {
                // Mise à jour interface
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('stop-btn').style.display = 'block';
                document.getElementById('status-badge').classList.add('active');
                document.getElementById('status-badge').innerText = 'ONLINE';
                document.getElementById('ai-text').innerText = 'DÉMARRAGE...';

                log('Initialisation du système...');

                // Création du contexte audio
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                appState.audioContext = new AudioContext();

                // Résolution de la promesse pour le contexte audio
                if (appState.audioContext.state === 'suspended') {
                    await appState.audioContext.resume();
                }

                // Accès au microphone
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: true
                    },
                    video: false
                });

                log('Accès microphone obtenu');

                // Configuration de l'analyseur
                appState.microphone = appState.audioContext.createMediaStreamSource(stream);
                appState.analyser = appState.audioContext.createAnalyser();
                appState.analyser.fftSize = appState.config.fftSize;
                appState.analyser.smoothingTimeConstant = appState.config.smoothing;

                appState.microphone.connect(appState.analyser);

                // Initialisation de la reconnaissance vocale
                initSpeechRecognition();

                // Démarrage de la boucle de rendu
                appState.running = true;
                renderLoop();

                log('Système démarré avec succès');
                document.getElementById('ai-text').innerText = 'ÉCOUTE ACTIVE...';

            } catch (error) {
                log('ERREUR DÉMARRAGE: ' + error.message);
                console.error(error);
                stopSystem();
            }
        }

        // Initialisation de la reconnaissance vocale
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                log('API Reconnaissance Vocale non supportée');
                return;
            }

            appState.recognition = new SpeechRecognition();
            appState.recognition.continuous = true;
            appState.recognition.interimResults = true;
            appState.recognition.lang = 'fr-FR';

            appState.recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    finalTranscript += event.results[i][0].transcript;
                }
                document.getElementById('ai-text').innerText = finalTranscript;
                if (appState.modules.tts && finalTranscript) {
                    speak(finalTranscript);
                }
            };

            appState.recognition.start();
            log('Reconnaissance vocale activée');
        }

        // Boucle de rendu
        function renderLoop() {
            if (!appState.running || !appState.analyser) return;

            const canvas = document.getElementById('scope-canvas');
            const ctx = canvas.getContext('2d');

            // Redimensionnement
            if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
            }

            // Effacement
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Récupération des données
            const frequencyData = new Uint8Array(appState.analyser.frequencyBinCount);
            const timeDomainData = new Uint8Array(appState.analyser.frequencyBinCount);
            appState.analyser.getByteFrequencyData(frequencyData);
            appState.analyser.getByteTimeDomainData(timeDomainData);

            // Dessin de l'oscilloscope
            ctx.lineWidth = 2;
            ctx.strokeStyle = var(--primary-color);
            ctx.beginPath();

            const sliceWidth = canvas.width * 1.0 / timeDomainData.length;
            let x = 0;

            for (let i = 0; i < timeDomainData.length; i++) {
                const v = timeDomainData[i] / 128.0;
                const y = v * canvas.height / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.stroke();

            // Mise à jour des données affichées
            const avg = frequencyData.reduce((a, b) => a + b, 0) / frequencyData.length;
            document.getElementById('peak-freq').innerText = `${Math.round(avg * 10)} Hz`;
            document.getElementById('rms-level').innerText = `${Math.round(avg / 2.5 - 100)} dB`;

            // Planification de la prochaine frame
            requestAnimationFrame(renderLoop);
        }

        // Synthèse vocale
        function speak(text) {
            if (!text || !appState.running) return;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fr-FR';
            utterance.volume = appState.config.volume;
            utterance.pitch = appState.config.pitch;
            utterance.rate = appState.config.rate;

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        // Arrêt du système
        function stopSystem() {
            if (!appState.running) return;

            appState.running = false;

            if (appState.audioContext) {
                appState.audioContext.close();
            }

            if (appState.recognition) {
                appState.recognition.stop();
            }

            window.speechSynthesis.cancel();

            // Réinitialisation interface
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('status-badge').classList.remove('active');
            document.getElementById('status-badge').innerText = 'OFFLINE';
            document.getElementById('ai-text').innerText = 'SYSTÈME ARRÊTÉ';

            log('Système arrêté');
        }

        // Basculer les modules
        function toggleModule(module) {
            appState.modules[module] = !appState.modules[module];
            const button = document.getElementById(`${module}-btn`);

            if (appState.modules[module]) {
                button.classList.add('active');
            } else {
                button.classList.remove('active');
            }
        }

        // Mettre à jour la configuration
        function updateConfig(key, value) {
            appState.config[key] = value;
            document.getElementById(`${key}-value`).innerText = value;

            if (appState.running && appState.analyser) {
                if (key === 'fftSize') {
                    appState.analyser.fftSize = parseInt(value);
                } else if (key === 'smoothing') {
                    appState.analyser.smoothingTimeConstant = parseFloat(value);
                }
            }
        }

        // Gestion de la modale
        function openConfigModal() {
            document.getElementById('config-modal').style.display = 'flex';
        }

        function closeConfigModal() {
            document.getElementById('config-modal').style.display = 'none';
        }

        // Initialisation
        window.addEventListener('load', () => {
            log('OMEGA // ARCHITECTURE INTÉGRALE');
            log('Système prêt');
        });
    </script>
</body>
</html>
