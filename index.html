<html lang="fr">

<head>

<meta charset="UTF-8">
<title>ETERNITY v26 QUANTUM</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<style>

body{
background:#000814;
color:#00ffd0;
font-family:Courier New;
margin:0;
overflow:hidden;
}

#panel{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,.7);
border:1px solid #00ffd0;
padding:10px;
z-index:10;
}

button{
padding:6px;
margin:4px;
background:#001f30;
border:1px solid #00ffd0;
color:#00ffd0;
cursor:pointer;
}

#waterfall{
position:absolute;
bottom:0;
left:0;
width:100%;
height:200px;
}

#voiceBar{
height:8px;
background:#ffaa00;
width:0%;
}

</style>

</head>

<body>

<div id="panel">

<h3>ETERNITY v26 QUANTUM</h3>

MIC : <span id="mic">OFF</span><br>
CLASS : <span id="class">---</span>

<div style="margin-top:6px">
VOIX
<div id="voiceBar"></div>
</div>

<button id="evp">EVP FILTER</button> <button id="record">AUTO RECORD</button>

</div>

<canvas id="waterfall"></canvas>

<script>

let ctx
let analyser
let data

let scene
let camera
let renderer

let waterfallCanvas=document.getElementById("waterfall")
let wfCtx=waterfallCanvas.getContext("2d")

let evpMode=false
let autoRecord=false

let cubes=[]

// AUDIO INIT

async function init(){

ctx=new AudioContext()

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

const source=ctx.createMediaStreamSource(stream)

analyser=ctx.createAnalyser()

analyser.fftSize=2048

data=new Uint8Array(analyser.frequencyBinCount)

source.connect(analyser)

document.getElementById("mic").textContent="ACTIVE"

init3D()

loop()

}

// 3D ENGINE

function init3D(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z=150

}

// MAIN LOOP

function loop(){

requestAnimationFrame(loop)

analyser.getByteFrequencyData(data)

update3D()

drawWaterfall()

classifyAudio()

renderer.render(scene,camera)

}

// 3D SPECTROGRAM

function update3D(){

for(let i=0;i<data.length;i+=8){

let v=data[i]/255

let geometry=new THREE.BoxGeometry(2,2,v*50)

let color=evpMode?
`hsl(${300-data[i]},100%,50%)`:
`hsl(${200-data[i]},100%,50%)`

let material=new THREE.MeshBasicMaterial({
color:new THREE.Color(color)
})

let cube=new THREE.Mesh(geometry,material)

cube.position.x=i-128
cube.position.y=-60
cube.position.z=v*30

scene.add(cube)

cubes.push(cube)

}

if(cubes.length>4000){

let old=cubes.shift()

scene.remove(old)

}

}

// WATERFALL

function drawWaterfall(){

const w=waterfallCanvas.width=window.innerWidth
const h=waterfallCanvas.height=200

let img=wfCtx.getImageData(0,0,w,h)

wfCtx.putImageData(img,0,1)

for(let i=0;i<data.length;i++){

let v=data[i]

wfCtx.fillStyle=`hsl(${200-v},100%,50%)`

wfCtx.fillRect(i*(w/data.length),0,2,1)

}

}

// AUDIO CLASSIFICATION

function classifyAudio(){

let voice=0
let music=0
let noise=0

for(let i=0;i<data.length;i++){

let freq=i*(44100/2048)

let v=data[i]

if(freq>300 && freq<3400)
voice+=v

if(v>120)
music++

if(v<20)
noise++

}

voice/=100

document.getElementById("voiceBar").style.width=Math.min(100,voice)+"%"

let result="Noise"

if(voice>90)
result="Voice"

else if(music>80)
result="Music"

document.getElementById("class").textContent=result

detectAnomaly(result)

}

// ANOMALY DETECTOR

function detectAnomaly(type){

if(type==="Voice" && autoRecord){

recordEvent()

}

}

// EVENT RECORDER

function recordEvent(){

console.log("EVENT RECORDED")

}

// BUTTONS

document.getElementById("evp").onclick=()=>{

evpMode=!evpMode

}

document.getElementById("record").onclick=()=>{

autoRecord=!autoRecord

}

// START

init()

</script>

</body>

</html>
