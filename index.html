<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB DEBUG</title>
<style>
:root {
  --primary: #00ffd0;
  --bg: #000814;
  --panel: rgba(0, 15, 25, 0.95);
  --btn-bg: #001f30;
  --btn-active: #00ffd0;
  --text: #e0e0e0;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* HEADER */
#header {
  padding: 8px; background: var(--panel);
  border-bottom: 2px solid var(--primary);
  display: flex; justify-content: space-between;
  font-size: 0.8rem; flex-shrink: 0;
}

/* VIZ */
#vizContainer {
  flex: 1; position: relative; background: #000; overflow: hidden;
  display: flex; justify-content: center; align-items: center;
}

#iaBox {
  position: absolute; top: 20%; width: 100%; text-align: center; z-index: 10;
}
#iaText {
  font-size: 1.8rem; font-weight: bold; color: #fff;
  text-shadow: 0 0 10px var(--primary);
  background: rgba(0,0,0,0.7); padding: 5px;
}
#iaLabel { font-size: 0.7rem; color: var(--primary); }

/* CONTROLS (SCROLLABLE) */
#controlsArea {
  background: var(--panel); border-top: 2px solid var(--primary);
  max-height: 40vh; overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}

.button-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px 2px; font-size: 0.7rem;
  font-weight: bold; cursor: pointer; border-radius: 4px;
}

button:disabled { opacity: 0.2; }
button.active {
  background: var(--btn-active); color: #000; box-shadow: 0 0 10px var(--primary);
}

/* START BUTTON SPECIAL */
#startBtn {
  font-size: 1.1rem; padding: 15px; background: var(--success);
  color: #000; border: none; font-weight: 900;
}
#startBtn.error {
  background: red; animation: blink 1s infinite;
}

@keyframes blink { 50% { opacity: 0.5; } }

/* LOGS */
#logZone {
  height: 100px; background: #000; border-top: 1px solid #333;
  padding: 5px; font-size: 0.7rem; overflow-y: auto; color: #aaa;
  font-family: monospace; flex-shrink: 0;
}
.log-err { color: red !important; background: rgba(50,0,0,0.5); }
.log-suc { color: #0f0 !important; }
.log-warn { color: yellow !important; }

/* SLIDERS */
.sliders { background: #111; padding: 8px; border-radius: 4px; font-size: 0.75rem; }
.slider-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
input[type="range"] { width: 50%; accent-color: var(--primary); }

/* BARS */
.bar-box { background: #222; height: 10px; width: 100%; border: 1px solid #444; margin-top:2px; }
.bar-fill { height: 100%; width: 0%; transition: width 0.1s; }

#loading {
  position: fixed; inset: 0; background: #000; z-index: 999;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
</style>
</head>
<body>

<div id="loading"><h2 style="color:var(--primary)">CHARGEMENT...</h2></div>

<div id="header">
  <div>MIC: <span id="micStatus" style="color:red">OFF</span></div>
  <div>IA: <span id="aiStatus">...</span></div>
</div>

<div id="vizContainer">
  <div id="iaBox">
    <div id="iaLabel">DÉTECTION VOCALE</div>
    <div id="iaText">...</div>
  </div>
  <canvas id="canvas" style="width:100%; height:100%;"></canvas>
</div>

<div id="controlsArea">
  <div id="barsArea" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; font-size:0.7rem;">
    <div>INPUT <div class="bar-box"><div id="voiceBar" class="bar-fill" style="background:orange"></div></div></div>
    <div>TRIGGER <div class="bar-box"><div id="threshBar" class="bar-fill" style="width:30%"></div></div></div>
  </div>

  <button id="startBtn">START SYSTEM</button>

  <div class="button-grid">
    <button id="monitorBtn" disabled>🎧 MONITOR</button>
    <button id="recBtn" disabled>⏺ AUTO REC</button>
    <button id="voiceBtn" disabled>🗣 IA VOICE</button>
    <button id="evpBtn" disabled>🔮 EVP MODE</button>
    <button id="radarBtn" disabled>📡 RADAR</button>
    <button id="camBtn" disabled>📷 CAMERA</button>
    <button id="wakeBtn">📱 SCREEN ON</button>
    <button id="themeBtn">🎨 THEME</button>
    <button id="clearBtn">🗑 CLEAR</button>
  </div>

  <div class="sliders">
    <div class="slider-row">
      <span>Gain Mic</span>
      <input type="range" id="gainRange" min="0" max="3" step="0.1" value="1">
    </div>
    <div class="slider-row">
      <span>Seuil Trigger</span>
      <input type="range" id="threshRange" min="0" max="100" value="30">
    </div>
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
// --- CONFIG ---
const config = {
  fftSize: 2048, // Plus précis
  gain: 1,
  threshold: 30,
  monitor: false,
  evp: false,
  radar: false,
  voiceReco: false,
  autoRec: false
};

const state = {
  ctx: null, analyser: null, source: null, gainNode: null,
  stream: null, vidStream: null, recorder: null, isRec: false,
  running: false, radarAngle: 0,
  dataArray: null,
  recognition: null,
  canvas: null, cCtx: null
};

// --- DOM ---
const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), mic: el('micStatus'), ai: el('aiStatus'),
  start: el('startBtn'),
  monitor: el('monitorBtn'), rec: el('recBtn'), voice: el('voiceBtn'),
  evp: el('evpBtn'), radar: el('radarBtn'), cam: el('camBtn'),
  wake: el('wakeBtn'), theme: el('themeBtn'), clear: el('clearBtn'),
  voiceBar: el('voiceBar'), threshBar: el('threshBar'),
  iaText: el('iaText'), canvas: el('canvas'),
  sGain: el('gainRange'), sThresh: el('threshRange')
};

// --- LOGS ---
function log(msg, type='') {
  const div = document.createElement('div');
  div.textContent = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
  if(type) div.className = type;
  els.log.appendChild(div);
  els.log.scrollTop = els.log.scrollHeight;
  console.log(msg);
}

// --- INIT ---
window.onload = () => {
  el('loading').style.display = 'none';
  log("Application chargée.");
  
  // Check IA
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
    state.recognition = new SpeechRec();
    state.recognition.continuous = true;
    state.recognition.interimResults = true;
    state.recognition.lang = 'fr-FR';
    
    state.recognition.onresult = (e) => {
      let txt = '';
      for(let i=e.resultIndex; i<e.results.length; i++){
        txt += e.results[i][0].transcript;
      }
      if(txt) {
        els.iaText.textContent = txt;
        if(e.results[e.results.length-1].isFinal) log(`IA: "${txt}"`, 'log-suc');
      }
    };
    state.recognition.onerror = (e) => {
       if(e.error !== 'no-speech') log(`IA Err: ${e.error}`, 'log-err');
    };
    state.recognition.onend = () => {
      if(config.voiceReco && state.running) {
        try{ state.recognition.start(); }catch(e){}
      }
    };
    els.ai.textContent = "READY";
    els.ai.style.color = "#0f0";
    log("Module IA Native OK.", 'log-suc');
  } else {
    els.ai.textContent = "NO";
    log("IA non supportée.", 'log-err');
  }

  // Setup Canvas
  state.canvas = els.canvas;
  state.cCtx = state.canvas.getContext('2d');
  resizeCanvas();
};

window.onresize = resizeCanvas;
function resizeCanvas() {
  if(state.canvas) {
    state.canvas.width = els.canvas.clientWidth;
    state.canvas.height = els.canvas.clientHeight;
  }
}

// --- AUDIO SYSTEM ---
async function startSystem() {
  els.start.textContent = "INIT...";
  els.start.classList.remove('error');
  log("Demande d'accès Micro...", 'log-warn');

  try {
    // CONTRAINTES AUDIO BRUTES (Ghost Hunting Mode)
    // Désactive les traitements Android (Noise Suppression, Echo Cancellation)
    const constraints = {
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
        latency: 0
      },
      video: false
    };

    log("Tentative connexion avec contraintes brutes...", 'log-warn');
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    state.stream = stream;
    log("Flux Micro reçu !", 'log-suc');

    state.ctx = new (window.AudioContext || window.webkitAudioContext)();
    log("Contexte Audio créé.", 'log-suc');
    
    // FORCE RESUME (CRUCIAL POUR ANDROID)
    if (state.ctx.state === 'suspended') {
      log("Contexte suspendu, tentative de réveil...", 'log-warn');
      await state.ctx.resume();
    }
    log(`Contexte Audio État: ${state.ctx.state}`, 'log-suc');

    state.analyser = state.ctx.createAnalyser();
    state.analyser.fftSize = config.fftSize;
    state.analyser.smoothingTimeConstant = 0.5;
    state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);

    state.gainNode = state.ctx.createGain();
    state.gainNode.gain.value = config.gain;

    state.source = state.ctx.createMediaStreamSource(stream);
    state.source.connect(state.gainNode);
    state.gainNode.connect(state.analyser);

    // Recorder
    state.recorder = new MediaRecorder(stream);
    state.recorder.ondataavailable = (e) => {
      if(e.data.size > 0) {
        const url = URL.createObjectURL(e.data);
        const a = document.createElement('a');
        a.href = url; a.download = `evp_${Date.now()}.webm`;
        a.click();
        log("Enregistrement sauvegardé.", 'log-suc');
      }
    };

    // UI UPDATE
    state.running = true;
    els.mic.textContent = "ON"; els.mic.style.color = "#0f0";
    els.start.textContent = "STOP SYSTEM";
    els.start.style.background = "red";
    
    enableButtons(true);
    log("SYSTÈME ACTIF.", 'log-suc');

    drawLoop();

  } catch (err) {
    console.error(err);
    log(`ERREUR FATALE: ${err.name} - ${err.message}`, 'log-err');
    els.start.textContent = "ERROR (SEE LOG)";
    els.start.classList.add('error');
    
    if(err.name === 'NotAllowedError') {
      log("SOLUTION: Allez dans Paramètres > Chrome > Permissions > Microphone.", 'log-err');
    } else if (err.name === 'NotFoundError') {
      log("ERREUR: Aucun micro détecté.", 'log-err');
    }
  }
}

function stopSystem() {
  if(state.recognition) try{ state.recognition.stop(); }catch(e){ config.voiceReco=false; els.voice.classList.remove('active'); }
  if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
  if(state.vidStream) stopCam();
  if(state.ctx) state.ctx.close();
  
  state.running = false;
  els.mic.textContent = "OFF"; els.mic.style.color = "red";
  els.start.textContent = "START SYSTEM";
  els.start.style.background = "var(--success)";
  els.start.classList.remove('error');
  enableButtons(false);
  log("Système arrêté.");
  
  // Clear canvas
  state.cCtx.clearRect(0,0,state.canvas.width, state.canvas.height);
}

// --- LOGIC ---
function toggleMonitor() {
  config.monitor = !config.monitor;
  if(config.monitor) {
    state.analyser.connect(state.ctx.destination);
    els.monitor.classList.add('active');
    log("Monitor ON - Attention au feedback !");
  } else {
    state.analyser.disconnect(state.ctx.destination);
    els.monitor.classList.remove('active');
    log("Monitor OFF");
  }
}

function toggleVoice() {
  if(!state.recognition) return;
  config.voiceReco = !config.voiceReco;
  if(config.voiceReco) {
    state.recognition.start();
    els.voice.classList.add('active');
    log("IA Voice ON", 'log-suc');
  } else {
    state.recognition.stop();
    els.voice.classList.remove('active');
    log("IA Voice OFF");
  }
}

function toggleAutoRec() {
  config.autoRec = !config.autoRec;
  els.rec.classList.toggle('active');
  log(`Auto Rec: ${config.autoRec ? 'ON' : 'OFF'}`);
}

function checkAutoRec(avg) {
  if(config.autoRec && avg > config.threshold && !state.isRec) {
    state.isRec = true;
    state.recorder.start();
    log(">>> ENREGISTREMENT AUTOMATIQUE <<<", 'log-warn');
    setTimeout(() => {
      if(state.isRec) { state.recorder.stop(); state.isRec = false; }
    }, 5000);
  }
}

// --- DRAW ---
function drawLoop() {
  if(!state.running) return;
  requestAnimationFrame(drawLoop);
  
  state.analyser.getByteFrequencyData(state.dataArray);
  
  let sum = 0;
  for(let i=0; i<state.dataArray.length; i++) sum += state.dataArray[i];
  const avg = sum / state.dataArray.length;
  
  els.voiceBar.style.width = Math.min(100, avg) + '%';
  checkAutoRec(avg);
  
  const w = state.canvas.width;
  const h = state.canvas.height;
  const ctx = state.cCtx;
  
  // Effet de traînée
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(0,0,w,h);
  
  // Barres
  const barW = (w / state.dataArray.length) * 2.5;
  let x = 0;
  for(let i=0; i<state.dataArray.length; i++) {
    const v = state.dataArray[i];
    const barH = (v / 255) * h;
    
    const hue = config.evp ? 280 - v : 180 - v;
    ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
    
    if(config.evp) {
       // Mode EVP: Spectre continu
       ctx.fillRect(x, h - barH, barW, barH);
    } else {
       // Mode Normal: Ligne simple
       ctx.fillRect(x, h/2 - barH/2, barW, barH);
    }
    x += barW + 1;
  }
  
  // Radar Overlay
  if(config.radar) {
    const cx = w - 60, cy = 60;
    ctx.strokeStyle = '#0f0';
    ctx.beginPath(); ctx.arc(cx,cy,50,0,7); ctx.stroke();
    state.radarAngle += 0.1;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(state.radarAngle);
    ctx.fillStyle = 'rgba(0,255,0,0.5)';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,50,-0.2,0.2); ctx.fill(); ctx.restore();
    
    if(avg > config.threshold) {
      ctx.fillStyle='red';
      ctx.beginPath(); ctx.arc(cx + Math.random()*40-20, cy + Math.random()*40-20, 3,0,7); ctx.fill();
    }
  }
}

// --- UTILS ---
function enableButtons(en) {
  const btns = [els.monitor, els.rec, els.voice, els.evp, els.radar, els.cam];
  btns.forEach(b => b.disabled = !en);
}

async function toggleCam() {
  if(!state.vidStream) {
    try {
      state.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      const vid = document.createElement('video');
      vid.srcObject = state.vidStream;
      vid.autoplay = true; vid.muted = true; vid.playsInline = true;
      vid.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.3; z-index:-1;";
      els.canvas.parentNode.insertBefore(vid, els.canvas);
      els.cam.classList.add('active');
      log("Caméra ON");
    } catch(e) { log("Erreur Caméra", 'log-err'); }
  } else {
    stopCam();
  }
}
function stopCam() {
  if(state.vidStream) state.vidStream.getTracks().forEach(t=>t.stop());
  state.vidStream = null;
  const vid = document.querySelector('video');
  if(vid) vid.remove();
  els.cam.classList.remove('active');
}

// --- EVENTS ---
els.start.onclick = () => state.running ? stopSystem() : startSystem();
els.monitor.onclick = toggleMonitor;
els.voice.onclick = toggleVoice;
els.rec.onclick = toggleAutoRec;
els.evp.onclick = () => { config.evp = !config.evp; els.evp.classList.toggle('active'); };
els.radar.onclick = () => { config.radar = !config.radar; els.radar.classList.toggle('active'); };
els.cam.onclick = toggleCam;

els.wake.onclick = async () => {
  try {
    const lock = await navigator.wakeLock.request('screen');
    els.wake.classList.add('active');
    log("Ecran verrouillé ON");
    lock.addEventListener('release', () => { els.wake.classList.remove('active'); });
  } catch(e) { log("Wake Lock error", 'log-err'); }
};

els.theme.onclick = () => {
  const colors = ['#00ffd0', '#00ff00', '#ff0055', '#ffffff'];
  const cur = colors.indexOf(getComputedStyle(document.documentElement).getPropertyValue('--primary').trim());
  const next = (cur + 1) % colors.length;
  document.documentElement.style.setProperty('--primary', colors[next]);
};

els.clear.onclick = () => { els.log.innerHTML = ''; };

els.sGain.oninput = (e) => { config.gain = parseFloat(e.target.value); if(state.gainNode) state.gainNode.gain.value = config.gain; };
els.sThresh.oninput = (e) => { config.threshold = parseInt(e.target.value); els.threshBar.style.width = config.threshold + '%'; };

</script>
</body>
</html>
