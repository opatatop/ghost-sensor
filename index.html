<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB - TSE de iufULTIMATE BUILD</title>
<style>
:root {
  --primary: #00ff00; /* Vert Matrix */
  --alert: #ff0000; /* Rouge Alerte */
  --bg: #000000;
  --panel: #050a05;
  --btn-bg: #111;
  --btn-active: #00ff00;
  --text: #ccffcc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Consolas', 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

/* ANIMATION ALERTE */
body.alert-mode {
  animation: pulseRed 0.5s infinite;
}
@keyframes pulseRed {
  0% { box-shadow: inset 0 0 0 red; }
  50% { box-shadow: inset 0 0 50px red; }
  100% { box-shadow: inset 0 0 0 red; }
}

#header {
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  padding: 5px 10px;
  display: flex; justify-content: space-between;
  align-items: center;
  font-size: 0.8rem; color: var(--primary);
}
.status-light {
  width: 10px; height: 10px; background: #333; border-radius: 50%; display: inline-block; margin-right: 5px;
}
.status-light.on { background: #0f0; box-shadow: 0 0 5px #0f0; }
.status-light.alert { background: #f00; box-shadow: 0 0 5px #f00; }

#mainStage {
  flex: 1; position: relative;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 5;
}
#iaText {
  font-size: 2rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 10px var(--primary);
  background: rgba(0,0,0,0.9);
  padding: 15px;
  border: 2px solid var(--primary);
  min-width: 80%;
  text-align: center;
  text-transform: uppercase;
  min-height: 3.5rem;
  pointer-events: none;
}

#controls {
  background: var(--panel);
  border-top: 2px solid var(--primary);
  height: 45vh;
  overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 10px;
}

/* BARS */
#meters {
  display: flex; gap: 5px; margin-bottom: 5px;
}
.meter-box { flex: 1; background: #222; height: 10px; border: 1px solid #444; position: relative; }
.meter-fill { height: 100%; width: 0%; transition: width 0.05s; }

/* BUTTONS */
.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px; font-size: 0.7rem;
  font-weight: bold; cursor: pointer; font-family: inherit;
}
button:active { background: var(--primary); color: #000; }
button.active { background: var(--btn-active); color: #000; box-shadow: 0 0 10px var(--primary); }
button:disabled { opacity: 0.3; cursor: not-allowed; }

#startBtn {
  width: 100%; font-size: 1.2rem; padding: 15px;
  background: #000; color: var(--primary); border: 2px solid var(--primary);
  font-weight: 900; text-transform: uppercase;
}
#alertBtn {
  width: 100%; font-size: 1rem; padding: 12px;
  background: #330000; color: #ffcccc; border: 1px solid red;
  font-weight: bold;
}
#alertBtn.active { background: red; color: white; animation: blink 0.2s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

#logZone {
  height: 40px; background: #000; border-top: 1px solid #333;
  padding: 5px; font-size: 0.7rem; overflow-y: auto; color: #888;
}
.log-sys { color: yellow; }
.log-suc { color: var(--primary); font-weight: bold; }
.log-err { color: red; font-weight: bold; }
.log-warn { color: orange; }

/* VISUALS */
#canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.5;
}
#cameraFeed {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: 0.2; z-index: 0; display: none;
}
</style>
</head>
<body>

<video id="cameraFeed" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="header">
  <div>ETERNITY LAB <span style="font-size:0.7em; opacity:0.7">ULTIMATE</span></div>
  <div>
    <span id="micLed" class="status-light"></span> 
    <span id="aiLed" class="status-light"></span> 
    <span id="sensorLed" class="status-light"></span> SENSORS
  </div>
</div>

<div id="mainStage">
  <div id="iaText">... EN ATTENTE DE DÉMARRAGE ...</div>
</div>

<div id="controls">
  <div id="meters">
    <div class="meter-box" title="Audio"><div id="audioMeter" class="meter-fill" style="background:var(--primary)"></div></div>
    <div class="meter-box" title="Sensors (Motion/Mag)"><div id="sensorMeter" class="meter-fill" style="background:yellow"></div></div>
  </div>

  <button id="startBtn" onclick="startSystem()">ACTIVER LE SYSTÈME</button>
  <button id="alertBtn" onclick="toggleAlert()">⚠ MODE ALERTE (TOUS SENS)</button>

  <div class="button-grid">
    <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE</button>
    <button id="boostBtn" class="active" onclick="toggleOpt('boost')">⚡ BOOST AUDIO</button>
    <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
    <button id="camBtn" onclick="toggleOpt('cam')">📷 CAMÉRA</button>
    
    <button id="vizSpec" class="active" onclick="setViz('spectrum')">SPECTRE</button>
    <button id="vizWave" onclick="setViz('wave')">ONDE</button>
    <button id="clearBtn" onclick="clearLog()">🗑 LOGS</button>
    <button id="stopBtn" style="border-color:white; color:white" onclick="stopSystem()">⏹ STOP</button>
  </div>
  
  <div style="font-size:0.7rem; color:#666; text-align:center; margin-top:5px;">
    Build Final : IA Réelle + Watchdog + Capteurs Physiques.
  </div>
</div>

<div id="logZone"></div>

<!-- CHARGEMENT DIFFÉRÉ DES LIBS LOURDES POUR NE PAS BLOQUER LE BOUTON -->
<script>
  // On charge les grosses libs de manière asynchrone
  function loadScript(src, callback) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = callback;
    s.onerror = () => { log("Erreur chargement lib", 'log-err'); };
    document.head.appendChild(s);
  }
  
  // On ne lance pas les libs immédiatement, on attend le clic
</script>

<script>
// --- CONFIGURATION ---
let app = {
  running: false,
  redAlert: false,
  ctx: null, stream: null, vidStream: null,
  source: null, analyser: null,
  monitorGain: null, booster: null, filter: null,
  recorder: null, isRec: false,
  recognition: null, keepAliveOsc: null, aiWatchdog: null,
  lastAIActivityTime: 0, lastSpeechTime: 0,
  // State
  config: { monitor: false, boost: true, autoRec: false, cam: false, vizMode: 'spectrum' },
  // Sensors
  motionBaseline: null, magBaseline: 0,
  wakeLock: null
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), ia: el('iaText'),
  micLed: el('micLed'), aiLed: el('aiLed'), sensorLed: el('sensorLed'),
  audioMeter: el('audioMeter'), sensorMeter: el('sensorMeter'),
  canvas: el('canvas'), camera: el('cameraFeed')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
  console.log(msg);
}

// --- START SYSTEM (LE COEUR DU PROBLÈME) ---

async function startSystem() {
  // 1. FEEDBACK VISUEL IMMÉDIAT (Pour prouver que le bouton marche)
  const btn = el('startBtn');
  btn.textContent = "INITIALISATION...";
  btn.disabled = true;
  log("Tentative de démarrage...", 'log-sys');

  // 2. CHARGEMENT LIBS SI NÉCESSAIRE (Lazy load)
  if (typeof THREE === 'undefined' || typeof tf === 'undefined') {
      log("Chargement des librairies...", 'log-sys');
      await new Promise(resolve => loadScript('https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js', resolve));
      await new Promise(resolve => loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js', resolve));
      log("Librairies chargées.", 'log-suc');
  }

  try {
    // 3. AUDIO
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();

    if (!app.stream) {
      log("Demande Micro...", 'log-sys');
      app.stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
          video: false 
      });
    }

    setupAudioGraph();
    startAIWithWatchdog();
    initSensors();
    
    try { app.wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}

    startKeepAlive();
    initViz();

    app.running = true;
    btn.textContent = "SYSTÈME ACTIF";
    btn.classList.add('active');
    els.micLed.classList.add('on');
    
    drawLoop();
    log("Système Ultimate démarré.", 'log-suc');

  } catch (err) {
    console.error(err);
    log("ERREUR BLOQUANTE: " + err.message, 'log-err');
    // Réactiver le bouton en cas d'erreur
    btn.disabled = false;
    btn.textContent = "ERREUR (VOIR LOG)";
    
    if(err.name === 'NotAllowedError') {
        alert("Permission Micro refusée. Vérifiez les paramètres de votre navigateur.");
    }
  }
}

function stopSystem() {
  if(app.wakeLock) { app.wakeLock.release(); app.wakeLock = null; }
  if(app.stream) { app.stream.getTracks().forEach(t=>t.stop()); app.stream = null; }
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  if(app.recognition) stopAI();
  if(app.ctx) app.ctx.close();
  
  // Stop Sensors
  window.removeEventListener('devicemotion', handleMotion);
  window.removeEventListener('deviceorientation', handleMagnetic);

  app.running = false;
  
  el('startBtn').disabled = false;
  el('startBtn').textContent = "ACTIVER LE SYSTÈME";
  el('startBtn').classList.remove('active');
  els.micLed.classList.remove('on');
  els.aiLed.classList.remove('on');
  els.sensorLed.classList.remove('on');
  
  els.ia.textContent = "ARRÊTÉ";
  document.body.classList.remove('alert-mode');
  el('alertBtn').classList.remove('active');
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
}

// --- AUDIO GRAPH ---

function setupAudioGraph() {
  app.source = app.ctx.createMediaStreamSource(app.stream);
  
  // Filtre Passe-Haut (Enlève le ronronnement du téléphone)
  app.filter = app.ctx.createBiquadFilter();
  app.filter.type = 'highpass';
  app.filter.frequency.value = 300;

  // Booster (Augmente le gain)
  app.booster = app.ctx.createGain();
  app.booster.gain.value = app.config.boost ? 3.0 : 1.0;

  // Monitor
  app.monitorGain = app.ctx.createGain();
  app.monitorGain.gain.value = 0;

  // Analyser
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.analyser.smoothingTimeConstant = 0.5;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);

  // Route: Source -> Filter -> Booster -> Analyser
  app.source.connect(app.filter);
  app.filter.connect(app.booster);
  app.booster.connect(app.analyser);
  app.booster.connect(app.monitorGain);
  app.monitorGain.connect(app.ctx.destination);

  app.recorder = new MediaRecorder(app.stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

// --- IA & WATCHDOG ---

function startAIWithWatchdog() {
  startRealAI();
  // Watchdog toutes les 3 secondes
  app.aiWatchdog = setInterval(() => {
    if(!app.running) { clearInterval(app.aiWatchdog); return; }
    const now = Date.now();
    if (now - app.lastAIActivityTime > 4000) {
      log("Watchdog: Redémarrage IA...", 'log-warn');
      stopAI();
      setTimeout(() => startRealAI(), 200);
    }
  }, 3000);
}

function stopAI() {
  if(app.recognition) {
    try { app.recognition.stop(); } catch(e){}
    app.recognition = null;
  }
  els.aiLed.classList.remove('on');
}

function startRealAI() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true;
      app.recognition.lang = 'fr-FR';
      
      app.recognition.onstart = () => {
          els.aiLed.classList.add('on');
          app.lastAIActivityTime = Date.now();
      };

      app.recognition.onresult = (e) => {
          app.lastAIActivityTime = Date.now();
          let txt = ''; let isFinal = false;
          for(let i = e.resultIndex; i < e.results.length; i++) {
              txt += e.results[i][0].transcript;
              if(e.results[i].isFinal) isFinal = true;
          }
          if (txt) {
              els.ia.textContent = txt;
              els.ia.style.color = "#fff";
              if (isFinal) {
                  log(`MOT: "${txt}"`, 'log-suc');
                  app.lastSpeechTime = Date.now();
              }
          }
      };
      
      app.recognition.onerror = (e) => { if(e.error !== 'no-speech') log(`IA Err: ${e.error}`, 'log-warn'); };
      app.recognition.onend = () => { };
      try { app.recognition.start(); } catch(e){}
  } else { log("IA non dispo", 'log-err'); }
}

// --- SENSORS (MOTION & MAG) ---

function initSensors() {
  // Motion
  if (window.DeviceMotionEvent) {
      window.addEventListener('devicemotion', handleMotion);
      // Calibration
      window.addEventListener('devicemotion', (e) => {
          if(!app.motionBaseline && e.accelerationIncludingGravity) {
              app.motionBaseline = e.accelerationIncludingGravity;
              window.removeEventListener('devicemotion', arguments.callee);
          }
      }, {once:true});
  }
  
  // Magnetic
  if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', handleMagnetic);
      window.addEventListener('deviceorientation', (e) => {
          if(!app.magBaseline && e.alpha !== null) {
              app.magBaseline = e.alpha;
              window.removeEventListener('deviceorientation', arguments.callee);
          }
      }, {once:true});
  }
  els.sensorLed.classList.add('on');
}

function handleMotion(e) {
  if(!app.redAlert) return;
  const cur = e.accelerationIncludingGravity || e.acceleration;
  if(!cur) return;
  
  const diff = Math.abs(cur.x - app.motionBaseline.x) + Math.abs(cur.y - app.motionBaseline.y) + Math.abs(cur.z - app.motionBaseline.z);
  if (diff > 2.0) {
    triggerSensorAlert("MOTION");
    if(navigator.vibrate) navigator.vibrate(200);
  }
}

function handleMagnetic(e) {
  if(!app.redAlert) return;
  if (e.alpha === null) return;
  const diff = Math.abs(e.alpha - app.magBaseline);
  if (diff > 10) {
    triggerSensorAlert("MAGNÉTIQUE");
    if(navigator.vibrate) navigator.vibrate(50);
  }
}

function toggleAlert() {
  if(!app.running) { log("Démarrez d'abord", 'log-warn'); return; }
  app.redAlert = !app.redAlert;
  const btn = el('alertBtn');
  btn.classList.toggle('active');
  
  if(app.redAlert) {
    document.body.classList.add('alert-mode');
    log("⚠ MODE ALERTE ACTIVÉ", 'log-warn');
  } else {
    document.body.classList.remove('alert-mode');
    log("Mode Normal", 'log-sys');
  }
}

function triggerSensorAlert(type) {
  // Flash visuel
  const flash = document.createElement('div');
  flash.style.cssText = "position:fixed; inset:0; background:white; z-index:999; opacity:0.8;";
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 100);
  
  // Log & Audio Beep
  log(`⚠ ${type} DÉTECTÉ`, 'log-warn');
  playBeep();
  
  els.ia.textContent = `⚠ ${type}`;
  els.ia.style.color = "red";
  els.ia.style.fontSize = "1.5rem";
  
  els.sensorMeter.style.width = "100%";
  setTimeout(() => els.sensorMeter.style.width = "0%", 500);
}

function playBeep() {
  if(!app.ctx) return;
  const osc = app.ctx.createOscillator();
  const g = app.ctx.createGain();
  osc.connect(g);
  g.connect(app.ctx.destination);
  osc.frequency.setValueAtTime(800, app.ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, app.ctx.currentTime + 0.1);
  g.gain.setValueAtTime(0.5, app.ctx.currentTime);
  g.gain.linearRampToValueAtTime(0, app.ctx.currentTime + 0.1);
  osc.start(); osc.stop(app.ctx.currentTime + 0.1);
}

// --- MAIN LOOP ---

function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  app.analyser.getByteFrequencyData(app.dataArray);
  
  // Volume
  let sum = 0;
  for(let i=0; i<app.dataArray.length; i++) sum += app.dataArray[i];
  const avg = sum / app.dataArray.length;
  
  els.audioMeter.style.width = Math.min(100, avg) + '%';
  
  // Traduction / Signal
  const now = Date.now();
  // Seuil bas si Alerte (sensible)
  const threshold = app.redAlert ? 15 : 30; 
  
  if (avg > threshold) {
      if (now - app.lastSpeechTime > 1000) {
          // Son sans mot
          if(app.redAlert) {
              triggerSensorAlert("BRUIT INCOMPRÉHENSIBLE");
              if(navigator.vibrate) navigator.vibrate(50);
          } else {
              els.ia.textContent = "[SIGNAL AUDIO - NON TRADUIT]";
              els.ia.style.color = "yellow";
          }
          els.audioMeter.style.background = "red";
      }
  } else {
      els.audioMeter.style.background = "var(--primary)";
      if(els.ia.textContent.includes("SIGNAL") && !app.redAlert) els.ia.textContent = "...";
  }

  if(app.config.autoRec && avg > 60 && !app.isRec) {
      app.isRec = true; app.recorder.start(); log("⚠ ENREGISTREMENT", 'log-warn');
      setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 3000);
  }

  // Dessin
  const ctx = app.cCtx, w = app.width, h = app.height;
  ctx.fillStyle = 'rgba(0, 10, 0, 0.2)';
  ctx.fillRect(0,0,w,h);
  
  if(app.config.vizMode === 'spectrum') {
      const barW = (w / app.dataArray.length) * 2.5;
      let x = 0;
      for(let i=0; i<app.dataArray.length; i++) {
          const v = app.dataArray[i];
          const barH = (v/255)*h;
          ctx.fillStyle = `rgb(0, 255, ${v})`;
          ctx.fillRect(x, h - barH, barW, barH);
          x += barW+1;
      }
  } else {
      const timeData = new Uint8Array(app.analyser.fftSize);
      app.analyser.getByteTimeDomainData(timeData);
      ctx.lineWidth = 2; ctx.strokeStyle = '#00ff00'; ctx.beginPath();
      const sliceW = w / timeData.length; let x = 0;
      for(let i = 0; i < timeData.length; i++) {
          const v = timeData[i] / 128.0; const y = v * h/2;
          if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y); x += sliceW;
      }
      ctx.stroke();
  }
}

// --- TOOLS ---

function toggleOpt(key) {
  if(!app.running && key !== 'cam') return;
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');
  
  if(key === 'monitor') {
      app.monitorGain.gain.value = app.config.monitor ? 1.0 : 0;
      log(app.config.monitor ? "Écoute ON" : "Écute OFF");
  }
  if(key === 'boost') {
      app.booster.gain.value = app.config.boost ? 3.0 : 1.0;
      log(app.config.boost ? "Boost MAX" : "Boost OFF");
  }
  if(key === 'cam') toggleCam();
}

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          els.camera.srcObject = app.vidStream;
          els.camera.style.display = 'block';
      } catch(e) { log("Erreur Cam"); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null; els.camera.style.display = 'none';
  }
}

function setViz(mode) {
  app.config.vizMode = mode;
  document.querySelectorAll('.button-grid button').forEach(b => b.classList.remove('active'));
  if(mode==='spectrum') el('vizSpec').classList.add('active');
  if(mode==='wave') el('vizWave').classList.add('active');
}

function initViz() {
  app.canvas = el('canvas');
  app.cCtx = app.canvas.getContext('2d');
  resize();
}
window.onresize = resize;
function resize() {
    if(app.canvas) {
        app.width = app.canvas.clientWidth;
        app.height = app.canvas.clientHeight;
        app.canvas.width = app.width;
        app.canvas.height = app.height;
    }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`ULTIMATE_${Date.now()}.webm`; a.click();
  log("Fichier sauvé", 'log-suc');
}

function startKeepAlive() {
  app.keepAliveOsc = app.ctx.createOscillator();
  const keepGain = app.ctx.createGain();
  keepGain.gain.value = 0.001;
  app.keepAliveOsc.connect(keepGain);
  keepGain.connect(app.ctx.destination);
  app.keepAliveOsc.start();
  document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && app.ctx && app.ctx.state === 'suspended') app.ctx.resume();
  });
}

function clearLog() { els.log.innerHTML = ''; }

// INIT GLOBAL
window.onload = () => {
    log("ETERNITY LAB ULTIMATE PRÊT. Bouton actif.", 'log-suc');
};
</script>
</body>
</html>
