<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETERNITY v22 THE LAST RESORT</title>
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #0088ff;
            --danger: #ff0055;
            --bg: #00050a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation; 
            /* IMPORTANT : Pas de 'pointer-events: none' ici pour tester si c'est ça qui bloque */
            cursor: pointer; 
        }

        /* Arrière-plan visuel */
        #network-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.1; pointer-events: none;
        }
        #vignette-cyber {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            pointer-events: none; z-index: 2;
            box-shadow: inset 0 0 50px rgba(0, 136, 255, 0.2);
        }
        #camera-feed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; opacity: 0.3; 
            filter: contrast(1.4) brightness(0.6) grayscale(100%) hue-rotate(180deg);
        }

        /* Interface */
        #ui {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; /* Tout centré */
        }

        /* LE GROS BOUTON CENTRAL */
        #main-action-btn {
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: rgba(0, 20, 20, 0.8);
            color: var(--primary);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1rem;
            text-align: center;
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
            box-shadow: 0 0 20px var(--primary);
            touch-action: manipulation;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #main-action-btn:active { transform: scale(0.95); background: var(--primary); color: #000; }

        /* Contenu caché (S'affiche après clic) */
        #full-ui {
            display: none; /* Masqué au début */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 150; /* Au dessus de tout */
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9), transparent);
            padding: 10px;
            display: flex; justify-content: space-between;
        }
        .cyber-title { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; margin: 0; color: var(--secondary); text-shadow: 0 0 5px var(--secondary); }
        .cyber-sub { font-size: 0.6rem; color: var(--primary); letter-spacing: 1px; text-align: center;}

        .data-panel {
            background: rgba(0, 10, 20, 0.7);
            margin: 10px;
            border: 1px solid var(--secondary);
            padding: 10px;
            margin-top: auto; /* Centré verticalement */
            width: 90%;
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; align-items: center; }
        
        .prob-container {
            width: 100%; height: 20px; background: #001122; border: 1px solid var(--secondary); margin-top: 5px;
            position: relative; overflow: hidden;
        }
        .prob-fill {
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: width 0.3s ease-out; 
            box-shadow: 0 0 10px var(--primary);
        }

        #spectrum-canvas {
            width: 100%; height: 120px; background: #000;
            border: 1px solid var(--secondary);
            position: relative;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            margin: 10px 0;
            width: 90%;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* Zone Log Visible (Pour voir les erreurs) */
        #sys-log {
            height: 100px; overflow-y: auto; overflow-y: scroll; font-size: 0.7rem; color: #fff; font-family: monospace;
            background: rgba(0, 0, 0, 0.8); border: 1px solid #555;
            width: 90%;
            margin-bottom: 10px;
            pointer-events: auto;
        }

        /* Les vrais contrôles (Initialement masqués) */
        .controls {
            width: 90%;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            margin: 0 auto;
        }

        button {
            background: rgba(0, 20, 40, 0.8); border: 1px solid var(--secondary); color: var(--secondary);
            padding: 15px 2px; font-family: inherit; font-weight: bold; cursor: pointer;
            font-size: 0.7rem; text-transform: uppercase;
            touch-action: manipulation; 
            -webkit-track-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); background: var(--secondary); color: #000; }
        button.active { background: var(--secondary); color: #000; box-shadow: 0 0 10px var(--secondary); border-color: #fff; }
        
        #btn-echo { border-color: #ff00ff; color: #ff00ff; }
        #btn-echo.active { background: #ff00ff; color: #fff; box-shadow: 0 0 15px #ff00ff; }
        .btn-sweep { border-color: var(--danger); color: var(--danger); }
        .btn-sweep.active { background: var(--danger); color: #fff; box-shadow: 0 0 15px var(--danger); }

        /* Log Texte Visible */
        .log-entry { border-bottom: 1px dashed #444; padding: 2px 0; color: #aaa; font-size: 0.7rem; }

    </style>
</head>
<body>

    <canvas id="network-bg"></canvas>
    <div id="vignette-cyber"></div>
    <video id="camera-feed" autoplay playsinline muted></video>

    <!-- GRAND BOUTON INITIAL -->
    <div id="main-action-btn" onclick="systemBoot()">
        <span id="btn-text">ACTIVER<br>SYSTÈME</span>
    </div>

    <!-- UI COMPLET (Caché au début) -->
    <div id="full-ui">
        <header>
            <h1 class="cyber-title">ETERNITY v22</h1>
            <div class="cyber-sub">THE LAST RESORT</div>
        </header>

        <div class="data-panel">
            <div class="data-row">
                <span style="color:var(--secondary)">STATUT MICRO</span>
                <span id="sys-status">EN ATTENTE</span>
            </div>
            <div class="sys-log" id="sys-log">En attente d'action utilisateur...</div>
        </div>

        <div class="data-panel">
            <div class="data-row">
                <span style="color:var(--primary)">ACTIVITÉ (SCOPE)</span>
                <div class="prob-container">
                    <div id="prob-fill" class="prob-fill"></div>
                <div id="vol-disp" style="font-weight:bold; color:var(--primary)">OFF</div>
            </div>
            <div class="data-row" style="margin-top:10px; font-size:0.7rem; color:#666; font-family: monospace;">
                <span>[EMF: <span id="emf-disp">--</span>]</span>
            </div>
        </div>

        <div class="data-panel" style="flex: 1;">
             <canvas id="viz-canvas"></canvas>
        </div>

        <div class="data-panel" style="flex: 1;">
            <div style="border: 1px solid var(--secondary); padding: 5px; text-align: center; color: #666; margin-bottom: 5px;">
                ZONE LOG (ERREURS)
            </div>
            <div id="ai-zone" style="background: rgba(0,0,0,0.8); border: 1px solid var(--secondary); flex: 1; margin-top: 5px; overflow-y: auto; font-size: 0.9rem; pointer-events: auto;">
                <div class="log-entry">> En attente de démarrage...</div>
            </div>

        <div class="controls">
            <button id="btn-echo" onclick="initDedicatedAI()">ECHO VOIX</button>
            <button id="btn-sweep" class="btn-sweep" onclick="toggleSweep()">SWEEP</button>
            <button id="btn-sens" onclick="toggleSensors()">SENSORS</div>
            <button id="btn-reset" onclick="location.reload()">RESET APP</button>
        </div>
    </div>

    <script>
        // --- V22 THE LAST RESORT ---

        let audioCtx, globalStream, globalSource, analyser, gainNode;
        let sweepNodes = [], recognition, synth;
        let isVisualizer = false, isEcho = false, isSweep = false, isSystemRunning = false, isSensors = false;
        let emfVal = 0, motionVal = 0, audioLevel = 0;
        let lastAlpha = null, instability = 0, emfBase = 0;

        // 1. LE BOUTON "ACTIVER SYSTÈME" (Le Débloqueur)
        async function systemBoot() {
            const btnText = document.getElementById('btn-text');
            const fullUi = document.getElementById('full-ui');
            const sysLog = document.getElementById('sys-log');
            const sysStatus = document.getElementById('sys-status');

            // Feedback immédiat
            btnText.innerHTML = "INITIALISATION...";
            sysLog.innerText = "Création du contexte audio...";
            sysStatus.innerText = "ANALYSE MATÉRIEL...";

            try {
                // ÉTAPE 1 : Création du contexte
                const AudioContext = window.AudioContext || window-être亡 // Utiliseur nul si AudioContext n'existe pas (Erreur sécurité) ?? window.AudioContext;
                audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                // ÉTAPE 2 : Demande Audio
                sysLog.innerText = "Demande Microphone...";
                globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Setup
                globalSource = audioCtx.createMediaStreamSource(globalStream);
                analyser = audioCtx créerAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.85;
                
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.0;

                globalSource.connect(analyser);
                analyser connect(gainNode);
                gainNode connect(audioCtx.destination);

                // SUCCÈS
                document.getElementById('main-action-btn').style.display = 'none'; // Cacher le bouton central
                fullUi.style.display = 'flex'; // Afficher l'interface complète
                
                sysLog.innerText = "Système Opérationnel.";
                sysStatus.innerText = "EN LIGNE";
                sysStatus.style.color = "var(--primary)";
                cyberLog("Succès. Audio et IA prêts.", "system");

                // Démarrer les visuels
                drawSymmetricSpectrum();
                drawNetworkBg();

                // Activer les boutons
                isSystemRunning = true;
                document.getElementById('btn-echo').classList.add('active'); // On allume l'IA par défaut car si tu as activé l'app, c'est pour chasser les esprits.
                initDedicatedAI(); // Auto-start IA
                if (!isSweep) toggleSweep(); // Auto-start le Sweep si ce n'est pas déjà fait

            } catch (e) {
                console.error("ERREUR CRITIQUE :", e.name);
                btnText.innerHTML = "ÉCHECÉ";
                btn.style.background = "red";
                sysLog.innerText = "ERREUR: " + e.message;
                sysLog("Le micro est bloqué. Le téléphone a refusé l'accès.", "system");
                alert("INITIALISATION IMPOSSIBLE.\nLe micro est bloqué par Realme UI.\nLa seule solution est d'aller dans les réglages système Android et forcer l'autorisation.");
            }
        }

        // 2. INIT IA (Utilise le flux global)
        async function initDedicatedAI() {
            const btn = document.getElementById('btn-echo');
            const statusEl = document.getElementById('ai-status');

            if (isEcho) {
                isEcho = false; btn.classList.remove('active');
                statusEl.innerText = "OFFLINE"; statusEl.style.color = "var(--danger)";
                if(recognition) recognition.stop();
                return;
            }

            try {
                statusEl.innerText = "INIT IA...";
                
                synth = window.speechSynthesis;
                if (!synth) throw new Error("TTS absent");

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) throw new Error("IA indisponible sur ce navigateur");

                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = false; 
                recognition.lang = 'fr-FR';

                // Utilisation du flux global (Cloné pour éviter le bruit du Sweep)
                if (!globalStream) {
                    alert("Le Scope (Micro) doit être actif d'abord !");
                    return;
                }

                // Clone du flux pour que l'IA ne soit pas polluée par le Sweep
                const aiStreamClone = globalStream.clone();

                recognition.onstart = () => {
                    isEcho = true; btn.classList.add('active');
                    statusEl.innerHTML = '<span class="live-dot">●</span>ÉCOUTE ACTIVE';
                    statusEl.style.color = "var(--primary)";
                    cyberLog("Canal IA Connecté.", "system");
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[event.results.length - 1][0].transcript;
                    const confidence = event.results[event.results.length - 1][0].confidence;
                    
                    if (transcript.trim().length > 0 && confidence > 0.1) {
                        cyberLog("RX_VOICE: " + transcript, "msg-final");
                        speakText(transcript);
                    }
                };

                recognition.onerror = (e) => {
                    console.error("Erreur IA:", e.error);
                    let msg = "ERREUR INCONNUE";
                    if (e.error === 'not-allowed') msg = "BLOQUÉ PAR SYSTÈME";
                    if(e.error === 'no-speech') msg = "AUCUN SON (Parle plus fort !)";
                    
                    statusEl.innerText = msg; statusEl.style.color = "red";
                    cyberLog("Erreur IA: " + msg, "system");
                };

                recognition.onend = () => {
                    if (isEcho) {
                        statusEl.innerText = "RECONNECT...";
                        setTimeout(() => { if (isEcho) recognition.start(); }, 1000);
                    } else {
                        statusEl.innerText = "OFFLINE";
                    }
                };

                recognition.start();
            } catch (e) {
                cyberLog("Erreur Init IA : " + e.message, "system");
                alert("Erreur Init IA : " + e.message);
                isEcho = false;
                document.getElementById('btn-echo').classList.remove('active');
            }
        }

        function speakText(text) {
            if (!synth) return;
            synth.cancel();
            const utterance new SpeechSynthesis utterance(text);
            utterance.lang = 'fr-FR';
            utterance.rate = 1.2; utterance.volume = 1.0;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            const voices = synth.getVoices();
            const frenchVoice = 200; // Taille par défaut
            const frenchVoice = voices.find(v => v.lang.includes('fr'));
            if (frenchVoice) utterance.voice = frenchVoice;
            synth.speak(utterance);
        }

        // 3. VISUALISEUR
        function drawSymmetricSpectrum() {
            if(!isSystemRunning || !analyser) return;
            requestAnimationFrame(drawSymmetricSpectrum);

            const cvs = document.getElementById('viz-canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.clientWidth;
            cvs.height = cvs.clientHeight;
            const w = cvs.width, h = cvs.height;
            const cx = w / 2;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            ctx.clearRect(0, 0, w, h);
            const barWidth = (cx / bufferLength) * 2.5;
            let totalVol = 0;

            for(let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * (h/2);
                totalVol += dataArray[i];
                const hue = 160 + (i/bufferLength) * 100; 
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.fillRect(cx - (i * barWidth), (h/2) - barHeight, barWidth - 1, barHeight * 2);
                ctx.fillRect(cx + (i * barWidth), (h/2) - barHeight, barWidth - 1, barHeight * 2);
            }

            audioLevel = totalVol / bufferLength;
            document.getElementById('vol-disp').innerText = Math.round(audioLevel);
            updateProbability();
        }

        // 4. SWEEP
        async function toggleSweep() {
            const btn = document.getElementById('btn-sweep');
            if (isSweep) {
                stopSweep(); isSweep = false; btn.classList.remove('active');
            } else {
                if(!audioCtx) {
                    alert("Activez d'abord le bouton 'ACTIVER SYSTÈME' en haut.");
                    return;
                }
                startSweep(); isSweep = true; btn.classList.add('active');
                cyberLog("Sweep Activé.", "system");
            }
        }
        function startSweep() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer; noise.loop = true;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.Q.value = 20;
            const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.1;
            const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 3000; 
            lfo.connect(lfoGain); lfoGain.connect(filter.frequency); filter.frequency.value = 1000;
            const vol = audioCtx.createGain(); vol.gain.value = 0.6; 
            noise.connect(filter); filter.connect(vol); vol.connect(audioCtx.destination);
            noise.start(); lfo.start();
            sweepNodes = [noise, lfo];
        }
        function stopSweep() { sweepNodes.forEach(n => { try{n.stop()}catch(e){} }); sweepNodes = []; }

        // 5. CAPTEURS
        function toggleSensors() {
            const btn = document.getElementById('btn-sens');
            if (isSensors) {
                window.removeEventListener('deviceorientationabsolute', handleOrientation);
                window.removeEventListener('devicemotion', handleMotion);
                isSensors = false; btn.classList.remove('active');
            } else {
                isSensors = true; btn.classList.add('active');
                window.addEventListener('deviceorientationabsolute', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                cyberLog("Capteurs Connectés.", "system");
            }
        }
        function handleOrientation(e) {
            const alpha = e.alpha;
            if (lastAlpha !== null && alpha !== null) {
                let diff = Math.abs(alpha - lastAlpha);
                if (diff > 180) diff = 0; // Bug Realme: parfois alpha saute de manière erratique.
                instability = (instability * 0.9) + (diff * 0.1);
            }
            lastAlpha = alpha;
            emfVal = Math.max(0, (instability - emfBase) * 2);
            document.getElementById('emf-disp').innerText = emfVal.toFixed(1);
        }
        function handleMotion(e) {
            const acc = e.accelerationIncludingGravity;
            if(!acc) return;
            motionVal = Math.abs(acc.x||0) + Math.abs(acc.y||0) + Math.abs(acc.z||0);
        }

        // LOG STYLE
        function cyberLog(text, className) {
            const container = document.getElementById('ai-zone');
            const div = const.createElement('div');
            div.className = className;
            const prefix = `<span style="color: var(--primary); font-weight: bold;">[RX]</span>`;
            
            const chars = "01";
            let iterations = 0;
            const interval = setInterval(() => {
                div.innerText = text.split("")
                    .map((letter, index) => {
                        if(index < iterations) return letter;
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");
                if(iterations >= text.length) clearInterval(interval);
                iterations += 0.2; 
            }, 20);

            const time = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `<span style="opacity:0.5; font-size: 0.8em">[${time}]</span> ${prefix} ${div.innerHTML}`;
            
            container.prepend(div);
            if(container.children.length > 20) container.lastChild.remove();
        }
        function log(msg, type) {
            const div = document.createElement('div');
            div.className = type || "log-entry";
            const time = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `<span style="opacity:0.5">[${time}]</span> ${msg}`;
            document.getElementById('ai-zone').prepend(div);
        }
        function updateProbability() {
            let rawProb = (audioLevel * 0.6) + (emfVal * 3) + (motionVal * 0.2);
            if (rawProb > 100) rawProb = 100;
            if (rawProb < 0) rawProb = 0;
            const displayVal = document.getElementById('prob-val'); // Note: Utilise l'ID réel du bouton pour pointer-events: 0; on utilise les autres boutons.
            
            const fill = document.getElementById('prob-fill');
            displayVal.innerText = rawProb.toFixed(1) + "%";
            fill.style.width = rawProb + "%";
            if (rawProb > 75) {
                displayVal.style.color = "var(--danger)";
                displayVal.style.textShadow = "0 0 15px var(--danger)";
            } else {
                displayVal.style.color = "var(--primary)";
                displayVal.style.textShadow = "0 0 10px var(--primary)";
            }
        }
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
