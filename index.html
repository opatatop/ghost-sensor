<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY Mobile</title>
<style>
:root {
  --primary: #00ffd0;
  --bg: #000814;
  --panel: rgba(0, 0, 0, 0.9);
  --button: #001f30;
  --voice: #ffaa00;
  --evp: #aa00ff;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  touch-action: manipulation;
}

#header {
  padding: 15px;
  text-align: center;
  background: var(--panel);
  border-bottom: 2px solid var(--primary);
}

#controls {
  padding: 15px;
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

#visualization {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#logZone {
  height: 150px;
  overflow-y: auto;
  padding: 10px;
  background: rgba(0, 0, 0, 0.6);
  border-top: 1px solid var(--primary);
  font-size: 0.9em;
}

button {
  background: var(--button);
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 12px;
  margin: 5px 0;
  border-radius: 5px;
  font-weight: bold;
  touch-action: manipulation;
  width: 100%;
}

button:active {
  background: rgba(0, 31, 48, 0.8);
}

#voiceBar {
  height: 12px;
  width: 0%;
  background: var(--voice);
  margin: 5px 0;
  transition: width 0.1s;
}

.status {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 0.9em;
}

.error {
  color: #ff0000;
  margin: 10px 0;
  text-align: center;
}

@media (max-width: 768px) {
  #controls {
    grid-template-columns: 1fr;
  }
  button {
    padding: 10px;
  }
}
</style>
</head>
<body>
<div id="header">
  <h3>ETERNITY Mobile</h3>
</div>

<div id="controls">
  <div class="status">
    <span>MIC: <span id="micStatus">OFF</span></span>
    <span>IA: <span id="aiStatus">---</span></span>
  </div>

  <div>
    <div>VOICE LEVEL:</div>
    <div id="voiceBar"></div>
  </div>

  <button id="startBtn">DÉMARRER</button>
  <button id="fftBtn">FFT 2048</button>
  <button id="recBtn">AUTO REC</button>
  <button id="evpBtn">EVP MODE</button>
</div>

<div id="visualization"></div>
<div id="logZone"></div>

<script>
// Configuration pour mobile
const config = {
  fftSize: 1024, // Plus petit pour les performances
  autoRec: false,
  evpMode: false
};

// Éléments DOM
const elements = {
  micStatus: document.getElementById('micStatus'),
  aiStatus: document.getElementById('aiStatus'),
  voiceBar: document.getElementById('voiceBar'),
  logZone: document.getElementById('logZone'),
  startBtn: document.getElementById('startBtn'),
  fftBtn: document.getElementById('fftBtn'),
  recBtn: document.getElementById('recBtn'),
  evpBtn: document.getElementById('evpBtn')
};

// Variables audio
let audioCtx;
let analyser;
let dataArray;
let mediaRecorder;
let animationFrameId;

// Journalisation
function log(msg, color = config.evpMode ? "#aa00ff" : "#00ff88") {
  const div = document.createElement("div");
  div.style.color = color;
  const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'});
  div.textContent = `[${time}] ${msg}`;
  elements.logZone.appendChild(div);
  elements.logZone.scrollTop = elements.logZone.scrollHeight;
}

// Initialisation mobile
async function initMobile() {
  try {
    log("Initialisation...");

    // Demander l'accès au microphone
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false
    });

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = config.fftSize;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);

    config.micActive = true;
    elements.micStatus.textContent = "ON";
    log("Micro activé");

    updateVisual();
    setupButtons();

  } catch (error) {
    log(`Erreur: ${error.message}`, "#ff0000");
    if (error.name === 'NotAllowedError') {
      alert("Veuillez autoriser l'accès au microphone dans les paramètres");
    }
  }
}

// Mise à jour visuelle optimisée
function updateVisual() {
  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  // Calcul simplifié pour mobile
  const sum = dataArray.reduce((acc, val) => acc + val, 0);
  const avg = Math.min(100, sum / dataArray.length);
  elements.voiceBar.style.width = `${avg}%`;

  // Détection vocale basique
  if (config.autoRec && avg > 30) {
    startRecording(3000); // Enregistrement court pour mobile
  }

  animationFrameId = requestAnimationFrame(updateVisual);
}

// Enregistrement audio
function startRecording(duration) {
  if (!mediaRecorder) {
    const stream = audioCtx.createMediaStreamDestination().stream;
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = saveRecording;
  }

  log("Enregistrement démarré");
  mediaRecorder.start();

  setTimeout(() => {
    if (mediaRecorder.state !== "inactive") {
      mediaRecorder.stop();
    }
  }, duration);
}

function saveRecording(event) {
  const blob = new Blob([event.data], { type: "audio/webm" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `recording_${Date.now()}.webm`;
  a.click();
  log("Enregistrement sauvegardé");
}

// Gestion des boutons
function setupButtons() {
  elements.startBtn.onclick = initMobile;
  elements.fftBtn.onclick = toggleFFT;
  elements.recBtn.onclick = toggleAutoRec;
  elements.evpBtn.onclick = toggleEVP;
}

function toggleFFT() {
  config.fftSize = config.fftSize === 1024 ? 2048 : 1024;
  if (analyser) {
    analyser.fftSize = config.fftSize;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
  }
  elements.fftBtn.textContent = `FFT ${config.fftSize}`;
  log(`FFT: ${config.fftSize}`);
}

function toggleAutoRec() {
  config.autoRec = !config.autoRec;
  elements.recBtn.style.backgroundColor = config.autoRec ? "#00aa00" : "";
  log(`Auto Rec: ${config.autoRec ? "ON" : "OFF"}`);
}

function toggleEVP() {
  config.evpMode = !config.evpMode;
  elements.evpBtn.style.backgroundColor = config.evpMode ? "#aa00ff" : "";
  log(`EVP Mode: ${config.evpMode ? "ON" : "OFF"}`);
}

// Optimisation pour Android
function optimizeForAndroid() {
  // Désactiver le rendu 3D (trop gourmand pour mobile)
  // Utiliser des intervalles au lieu de requestAnimationFrame si problèmes
  if (window.matchMedia('(max-width: 768px)').matches) {
    log("Mode mobile activé");
    // Réduire la fréquence de mise à jour
    setInterval(updateVisual, 200); // 5fps
    cancelAnimationFrame(animationFrameId);
  }
}

// Démarrage
log("Appuyez sur DÉMARRER pour commencer");
optimizeForAndroid();
</script>
</body>
</html>
