<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUISSANCE MAXIMUM - GHOSTBOX AI</title>
    <style>
        /* 
         * ==========================================
         * CSS - THÈME TONNERRE DE ZEUS
         * ==========================================
         */
        :root {
            --primary-color: #00ccff;      /* Bleu Néon */
            --secondary-color: #ffd700;    /* Or Divin */
            --alert-color: #ff3333;        /* Rouge Alerte */
            --bg-color: #050510;           /* Noir Profond */
            --panel-bg: #0a0a20;           /* Gris Sombre */
            --grid-color: rgba(0, 204, 255, 0.1);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: #e0e0ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--secondary-color);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1rem; color: var(--primary-color); text-shadow: 0 0 8px var(--primary-color); }
        .status { font-size: 0.7rem; color: var(--secondary-color); border: 1px solid var(--secondary-color); padding: 2px 6px; border-radius: 4px; }

        /* --- ZONE CAPTEURS --- */
        #sensorGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: #000;
            border-bottom: 1px solid #333;
        }
        .sensor {
            background: var(--panel-bg);
            padding: 5px;
            text-align: center;
            font-size: 0.7rem;
        }
        .sensor span { display: block; color: #666; font-size: 0.6rem; }
        .sensor div { color: var(--primary-color); font-weight: bold; }
        .sensor.active { background: rgba(255, 51, 51, 0.2); animation: blink 0.2s infinite; }

        /* --- ZONE VISUELLE (SCOPE + WEBGL) --- */
        #visualContainer {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
            border-bottom: 2px solid var(--primary-color);
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Oscilloscope (2D) au dessus */
        #scopeCanvas { z-index: 2; pointer-events: none; opacity: 0.8; }
        /* Spectrogramme 3D (WebGL) en fond */
        #webglCanvas { z-index: 1; }

        /* Overlay AI */
        #aiOverlay {
            position: absolute;
            bottom: 20px;
            left: 0; width: 100%;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }
        #aiText {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--secondary-color), 0 0 20px var(--primary-color);
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 5px 15px;
            border: 1px solid var(--secondary-color);
        }
        #aiSub { font-size: 0.8rem; color: var(--primary-color); margin-top: 5px; letter-spacing: 2px; }

        /* --- CONTROLES --- */
        #controls {
            background: var(--panel-bg);
            padding: 10px;
            height: 35vh;
            overflow-y: auto;
            border-top: 1px solid #333;
        }

        .control-group { margin-bottom: 15px; border: 1px solid #333; padding: 8px; border-radius: 4px; }
        .group-title { color: var(--secondary-color); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 2px;}

        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }

        button {
            background: #111; border: 1px solid var(--primary-color);
            color: var(--primary-color); padding: 10px;
            font-family: inherit; font-size: 0.7rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            border-radius: 2px;
        }
        button:active { background: var(--primary-color); color: #000; }
        button.active { background: var(--primary-color); color: #000; box-shadow: 0 0 8px var(--primary-color); }
        
        #btnStart { background: var(--secondary-color); color: #000; border: none; font-size: 1rem; width: 100%; }
        #btnStart:active { background: #fff; }

        /* Sliders */
        .slider-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.7rem; }
        .slider-row label { flex: 1; color: #aaa; }
        input[type="range"] { flex: 2; accent-color: var(--secondary-color); }
        .val { width: 30px; text-align: right; color: var(--secondary-color); }

        /* Terminal */
        #terminal {
            height: 80px; background: #000; color: #888; font-size: 0.6rem;
            padding: 5px; overflow-y: auto; border: 1px solid #333; margin-top: 10px;
            font-family: monospace;
        }
        .log-sys { color: #aaa; }
        .log-ai { color: var(--secondary-color); }
        .log-emp { color: var(--alert-color); font-weight: bold; }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <header>
        <h1>PUISSANCE <span style="color:var(--secondary-color)">MAXIMUM</span></h1>
        <div id="sysStatus" class="status">OFFLINE</div>
    </header>

    <div id="sensorGrid">
        <div class="sensor" id="sAcc"><span>ACC (G)</span><div id="valAcc">0.00</div></div>
        <div class="sensor" id="sMag"><span>MAG (µT)</span><div id="valMag">0</div></div>
        <div class="sensor" id="sEmp"><span>EMP DETECT</span><div id="valEmp">NON</div></div>
    </div>

    <div id="visualContainer">
        <!-- Canvas WebGL pour le Spectrogramme 3D -->
        <canvas id="webglCanvas"></canvas>
        <!-- Canvas 2D pour l'Oscilloscope -->
        <canvas id="scopeCanvas"></canvas>
        
        <div id="aiOverlay">
            <div id="aiText">INITIALISATION...</div>
            <div id="aiSub">SYSTÈME EN ATTENTE</div>
        </div>
    </div>

    <div id="controls">
        <!-- Group: Alimentation -->
        <div class="control-group">
            <button id="btnStart" onclick="toggleSystem()">⚡ DÉMARRER SYSTÈME AUDIO</button>
        </div>

        <!-- Group: Modules Actifs -->
        <div class="control-group" id="moduleControls" style="opacity:0.5; pointer-events:none;">
            <div class="group-title">Modules Actifs</div>
            <div class="btn-grid-4">
                <button id="btnMic" class="active" onclick="setMod('mic')">MIC</button>
                <button id="btnLoop" class="active" onclick="setMod('loop')">LOOP IA</button>
                <button id="btnFilter" onclick="setMod('filter')">FILTRE</button>
                <button id="btnGhost" class="active" onclick="setMod('ghost')">GHOST</button>
            </div>
        </div>

        <!-- Group: Paramètres -->
        <div class="control-group" id="paramControls" style="opacity:0.5; pointer-events:none;">
            <div class="group-title">Traitement Signal & Synthèse</div>
            
            <div class="slider-row">
                <label>Seuil Energie</label>
                <input type="range" id="threshSlider" min="0" max="100" value="15" oninput="updateParam('threshold', this.value)">
                <span class="val" id="dispThresh">15</span>
            </div>
            
            <div class="slider-row">
                <label>Sensibilité Ghost</label>
                <input type="range" id="ghostSlider" min="0" max="100" value="50" oninput="updateParam('ghostSens', this.value)">
                <span class="val" id="dispGhost">50</span>
            </div>

            <div class="slider-row">
                <label>Volume Voix (TTS)</label>
                <input type="range" id="volSlider" min="0" max="100" value="80" oninput="updateParam('volume', this.value)">
                <span class="val" id="dispVol">80</span>
            </div>
        </div>

        <div id="terminal">
            <div class="log-sys">> Prêt. Appuyez sur DÉMARRER.</div>
        </div>
    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script>
        // --- 1. CONFIGURATION & ÉTAT ---
        const CONFIG = {
            fftSize: 4096,
            smoothing: 0.8,
            bandsCount: 40, // Bandes de fréquences analysées
            ghostWords: [
                "énergie", "magnétique", "présence", "esprit", "qui est là", "obscurité", 
                "aidez-moi", "sortez", "sueur froide", "vision", "passage", "onde",
                "fréquence", "porte", "entre deux mondes", "silence", "écoute", "thêta",
                "alpha", "impulsion", "écho", "tempête", " Zeus", "foudre"
            ]
        };

        const STATE = {
            isRunning: false,
            modules: { mic: true, loop: true, filter: false, ghost: true },
            params: { threshold: 15, ghostSens: 50, volume: 0.8 },
            audioCtx: null,
            micSource: null,
            analyser: null,
            gainNode: null,
            recognition: null,
            synthesis: window.speechSynthesis,
            lastSpeechTime: 0,
            micLevel: 0
        };

        // --- 2. WEBGL ENGINE (Spectrogramme 3D) ---
        // Un moteur WebGL simple pour dessiner des barres de fréquence en 3D
        const GL = {
            canvas: document.getElementById('webglCanvas'),
            gl: null,
            program: null,
            positionLocation: null,
            colorLocation: null,
            matrixLocation: null,
            count: 0
        };

        function initWebGL() {
            const gl = GL.canvas.getContext('webgl');
            if (!gl) { log("WebGL non supporté", "sys"); return; }
            GL.gl = gl;

            // Shaders simples
            const vs = `
                attribute vec4 a_position;
                attribute vec4 a_color;
                uniform mat4 u_matrix;
                varying vec4 v_color;
                void main() { gl_Position = u_matrix * a_position; v_color = a_color; gl_PointSize = 4.0; }
            `;
            const fs = `
                precision mediump float;
                varying vec4 v_color;
                void main() { gl_FragColor = v_color; }
            `;

            const program = createProgram(gl, vs, fs);
            GL.program = program;
            GL.positionLocation = gl.getAttribLocation(program, "a_position");
            GL.colorLocation = gl.getAttribLocation(program, "a_color");
            GL.matrixLocation = gl.getUniformLocation(program, "u_matrix");
        }

        function createProgram(gl, vs, fs) {
            const p = gl.createProgram();
            const v = gl.createShader(gl.VERTEX_SHADER);
            const f = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(v, vs); gl.compileShader(v);
            gl.shaderSource(f, fs); gl.compileShader(f);
            gl.attachShader(p, v); gl.attachShader(p, f);
            gl.linkProgram(p);
            return p;
        }

        // Matrice de projection simple (Perspective)
        function makeProjection(w, h) {
            const fov = 60 * Math.PI / 180;
            const aspect = w / h;
            const near = 1;
            const far = 2000;
            const f = Math.tan(Math.PI * 0.5 - 0.5 * fov);
            const rangeInv = 1.0 / (near - far);
            return [
                f / aspect, 0, 0, 0,
                0, f, 0, 0,
                0, 0, (near + far) * rangeInv, -1,
                0, 0, near * far * rangeInv * 2, 0
            ];
        }

        // --- 3. SYSTÈME AUDIO & IA ---

        async function toggleSystem() {
            if (STATE.isRunning) {
                stopSystem();
            } else {
                await startSystem();
            }
        }

        async function startSystem() {
            const btn = document.getElementById('btnStart');
            btn.innerText = "INITIALISATION...";
            
            try {
                // Contexte Audio
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                STATE.audioCtx = new AudioContext();
                
                // Microphone
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                STATE.micSource = STATE.audioCtx.createMediaStreamSource(stream);

                // Analyseur
                STATE.analyser = STATE.audioCtx.createAnalyser();
                STATE.analyser.fftSize = CONFIG.fftSize;
                STATE.analyser.smoothingTimeConstant = CONFIG.smoothing;
                STATE.micSource.connect(STATE.analyser);

                // Gain (Volume In)
                STATE.gainNode = STATE.audioCtx.createGain();
                STATE.micSource.connect(STATE.gainNode);

                // Initialisation IA (Speech Recognition)
                initAI();

                // UI Updates
                STATE.isRunning = true;
                document.getElementById('sysStatus').innerText = "ONLINE";
                document.getElementById('sysStatus').style.background = "var(--secondary-color)";
                document.getElementById('sysStatus').style.color = "#000";
                document.getElementById('moduleControls').style.opacity = "1";
                document.getElementById('moduleControls').style.pointerEvents = "auto";
                document.getElementById('paramControls').style.opacity = "1";
                document.getElementById('paramControls').style.pointerEvents = "auto";
                btn.innerText = "⏹ ARRÊTER SYSTÈME";
                btn.style.background = "var(--alert-color)";
                btn.style.color = "#fff";

                log("Système Démarré. FFT 4096 actif.", "sys");

                // Démarrage Boucles Visuelles
                initWebGL();
                resizeCanvas();
                requestAnimationFrame(renderLoop);
                startSensors();

            } catch (e) {
                log("Erreur: " + e.message, "sys");
                btn.innerText = "ERREUR";
            }
        }

        function stopSystem() {
            if (STATE.audioCtx) STATE.audioCtx.close();
            if (STATE.recognition) STATE.recognition.stop();
            STATE.synthesis.cancel();
            STATE.isRunning = false;
            location.reload(); // Simple reload pour reset propre
        }

        function initAI() {
            // Speech to Text (Boucle d'écoute)
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                STATE.recognition = new SpeechRecognition();
                STATE.recognition.continuous = true;
                STATE.recognition.interimResults = true;
                STATE.recognition.lang = 'fr-FR';

                STATE.recognition.onresult = (event) => {
                    if (!STATE.modules.loop) return;

                    let final = "";
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            final += event.results[i][0].transcript;
                        }
                    }

                    if (final) {
                        // Traduction et Répétition
                        handleVoiceInput(final);
                    }
                };

                STATE.recognition.onend = () => {
                    if (STATE.isRunning) STATE.recognition.start(); // Auto-restart
                };

                STATE.recognition.start();
                log("Moteur IA (STT) Actif", "sys");
            } else {
                log("Reconnaissance vocale non supportée", "sys");
            }
        }

        function handleVoiceInput(text) {
            log("Detecté: " + text, "ai");
            document.getElementById('aiText').innerText = text;
            
            // Effet visuel sur l'interface
            document.getElementById('visualContainer').style.boxShadow = "inset 0 0 50px rgba(255, 215, 0, 0.2)";
            setTimeout(() => document.getElementById('visualContainer').style.boxShadow = "none", 200);

            // Répétition vocale (TTS)
            speak(text);
        }

        function speak(text) {
            STATE.synthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'fr-FR';
            u.volume = STATE.params.volume;
            u.rate = 1.2; // Un peu plus rapide pour effet GhostBox
            u.pitch = 0.8; // Voix plus grave
            STATE.synthesis.speak(u);
        }

        // --- 4. LOGIQUE PARANORMALE (Traduction Bruit/Emp) ---
        
        function checkPhoneticTranslation(energy, freqBands) {
            if (!STATE.modules.ghost || !STATE.isRunning) return;

            const now = Date.now();
            // Si l'énergie dépasse le seuil et qu'on n'a pas parlé depuis 2 secondes
            if (energy > STATE.params.threshold && (now - STATE.lastSpeechTime > 2000)) {
                
                // Chance aléatoire basée sur la sensibilité
                const chance = Math.random() * 100;
                if (chance < STATE.params.ghostSens) {
                    
                    // Choisir un mot aléatoire
                    const word = CONFIG.ghostWords[Math.floor(Math.random() * CONFIG.ghostWords.length)];
                    
                    document.getElementById('aiText').innerText = word;
                    document.getElementById('aiSub').innerText = "TRADUCTION ÉNERGÉTIQUE";
                    
                    log("Traduction Signal: " + word, "ai");
                    speak(word);
                    STATE.lastSpeechTime = now;
                }
            }
        }

        // --- 5. CAPTEURS (EMP/MAG) ---
        function startSensors() {
            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', (e) => {
                    const acc = e.accelerationIncludingGravity;
                    if (!acc) return;

                    const totalAcc = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
                    document.getElementById('valAcc').innerText = totalAcc.toFixed(2);

                    // Simulation Magnétomètre via Orientation (plus dispo)
                    if (window.DeviceOrientationEvent) {
                        window.addEventListener('deviceorientation', (evt) => {
                             if(evt.alpha) document.getElementById('valMag').innerText = Math.floor(evt.alpha);
                        });
                    }

                    // Détection EMP (Choc soudain)
                    if (totalAcc > 25) { // Seuil arbitraire haut
                        triggerEMP();
                    }
                });
            }
        }

        function triggerEMP() {
            const el = document.getElementById('sEmp');
            el.classList.add('active');
            document.getElementById('valEmp').innerText = "DETECTÉ";
            document.getElementById('valEmp').style.color = "red";
            log("IMPULSION ÉLECTROMAGNÉTIQUE DÉTECTÉE", "emp");
            
            // Jouer un son ou parler
            if (STATE.modules.ghost) {
                speak("Impulsion");
                document.getElementById('aiText').innerText = "EMP";
            }

            setTimeout(() => {
                el.classList.remove('active');
                document.getElementById('valEmp').innerText = "NON";
                document.getElementById('valEmp').style.color = "var(--primary-color)";
            }, 1000);
        }

        // --- 6. BOUCLE DE RENDU (CORE) ---

        function renderLoop() {
            if (!STATE.isRunning) return;

            // 1. Get Audio Data
            const bufferLength = STATE.analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            STATE.analyser.getByteFrequencyData(dataArray);

            // 2. Calcul 40 Bandes (Logarithmique) & Niveau Moyen
            const bands = new Array(CONFIG.bandsCount).fill(0);
            let sum = 0;
            const step = Math.floor(bufferLength / CONFIG.bandsCount);

            for (let i = 0; i < CONFIG.bandsCount; i++) {
                // Moyenne de la bande
                let bandSum = 0;
                for (let j = 0; j < step; j++) {
                    bandSum += dataArray[i * step + j];
                }
                bands[i] = bandSum / step;
                sum += bands[i];
            }
            const avgLevel = sum / CONFIG.bandsCount; // 0-255

            // 3. Logique IA (Trigger)
            checkPhoneticTranslation(avgLevel, bands);

            // 4. Rendu Canvas 2D (Oscilloscope)
            drawOscilloscope();

            // 5. Rendu WebGL (Spectrogramme 3D)
            drawWebGLSpectrum(bands);

            requestAnimationFrame(renderLoop);
        }

        function drawOscilloscope() {
            const canvas = document.getElementById('scopeCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const bufferLength = STATE.analyser.frequencyBinCount;
            const timeData = new Uint8Array(bufferLength);
            STATE.analyser.getByteTimeDomainData(timeData);

            ctx.clearRect(0, 0, w, h);
            ctx.lineWidth = 2;
            ctx.strokeStyle = "rgba(0, 204, 255, 0.5)";
            ctx.beginPath();

            const sliceWidth = w * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = timeData[i] / 128.0;
                const y = v * h / 2;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                x += sliceWidth;
            }
            ctx.stroke();
        }

        function drawWebGLSpectrum(bands) {
            const gl = GL.gl;
            if (!gl) return;

            gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
            gl.clearColor(0, 0, 0, 0); // Transparent pour voir le scope au dessus
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

            gl.useProgram(GL.program);

            // Préparer les données vertex (Barres 3D)
            // On dessine des points ou lignes qui montent en fonction de l'amplitude
            const positions = [];
            const colors = [];
            const numBars = bands.length;
            
            // Caméra simple
            const aspect = gl.canvas.width / gl.canvas.height;
            const projection = makeProjection(gl.canvas.width, gl.canvas.height);
            // Rotation légère automatique
            const time = Date.now() * 0.001;
            const matrix = m4RotateY(projection, time);
            matrix[14] = -6.0; // Zoom arrière

            gl.uniformMatrix4fv(GL.matrixLocation, false, matrix);

            // Générer géométrie pour les 40 bandes
            for (let i = 0; i < numBars; i++) {
                const val = bands[i]; // 0-255
                const height = (val / 255) * 4.0; // Hauteur max 4.0 en 3D
                
                // Position X centrée
                const x = (i - numBars / 2) * 0.3;
                
                // Couleur basée sur l'intensité (Bleu -> Or -> Rouge)
                let r = 0, g = 0.8, b = 1;
                if (val > 150) { r = 1; g = 0.8; b = 0; } // Or
                if (val > 220) { r = 1; g = 0.2; b = 0.2; } // Rouge Alerte

                // Créer une ligne verticale (bas -> haut)
                positions.push(x, -2, 0);
                positions.push(x, -2 + height, 0);
                
                colors.push(r, g, b, 1);
                colors.push(r, g, b, 0.5);
            }

            // Buffer Position
            const pBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, pBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
            gl.enableVertexAttribArray(GL.positionLocation);
            gl.vertexAttribPointer(GL.positionLocation, 3, gl.FLOAT, false, 0, 0);

            // Buffer Couleur
            const cBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, cBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
            gl.enableVertexAttribArray(GL.colorLocation);
            gl.vertexAttribPointer(GL.colorLocation, 4, gl.FLOAT, false, 0, 0);

            gl.drawArrays(gl.LINES, 0, positions.length / 3);
        }

        // --- UTILITAIRES MATHS (Matrice simple pour WebGL) ---
        function m4RotateY(m, angleInRadians) {
            const c = Math.cos(angleInRadians);
            const s = Math.sin(angleInRadians);
            // Copie simple de la matrice de projection
            const dst = new Float32Array(m);
            
            // Rotation sur l'axe Y (modifie les indices 0,2,8,10)
            const m00 = m[0], m01 = m[1], m02 = m[2], m03 = m[3];
            const m20 = m[8], m21 = m[9], m22 = m[10], m23 = m[11];

            dst[0] = c * m00 - s * m20;
            dst[2] = c * m02 - s * m22;
            dst[8] = c * m20 + s * m00;
            dst[10] = c * m22 + s * m02;
            return dst;
        }

        // --- GESTION UI ---
        function setMod(mod) {
            STATE.modules[mod] = !STATE.modules[mod];
            const btn = document.getElementById('btn' + mod.charAt(0).toUpperCase() + mod.slice(1));
            if (STATE.modules[mod]) btn.classList.add('active');
            else btn.classList.remove('active');
            log("Module " + mod.toUpperCase() + ": " + STATE.modules[mod], "sys");
        }

        function updateParam(key, val) {
            if (key === 'volume') STATE.params[key] = val / 100;
            else STATE.params[key] = parseInt(val);
            
            document.getElementById('disp' + key.charAt(0).toUpperCase() + key.slice(1)).innerText = val;
        }

        function log(msg, type) {
            const t = document.getElementById('terminal');
            const d = document.createElement('div');
            d.className = "log-" + type;
            d.innerText = "> " + msg;
            t.appendChild(d);
            t.scrollTop = t.scrollHeight;
        }

        function resizeCanvas() {
            const c1 = document.getElementById('scopeCanvas');
            const c2 = document.getElementById('webglCanvas');
            const p = document.getElementById('visualContainer');
            
            c1.width = p.clientWidth;
            c1.height = p.clientHeight;
            c2.width = p.clientWidth;
            c2.height = p.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

    </script>
</body>
</html>
