<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PuiSSancE v1.0 - SYSTEM ACTIVE</title>
<style>
:root {
  --primary: #00ff41;      /* Vert Matrix */
  --secondary: #008F11;    /* Vert Sombre */
  --alert: #ff003c;        /* Rouge Alerte */
  --bg: #0d0208;           /* Noir Profond */
  --panel: #001a05;        /* Panneau Labo */
  --grid: #0d2b0f;
  --text: #003b00;
}

* { box-sizing: border-box; user-select: none; }

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* --- HEADER --- */
header {
  background: #000;
  border-bottom: 2px solid var(--primary);
  padding: 5px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 0 15px var(--secondary);
}
h1 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary); }
.sys-status { font-size: 0.7rem; color: #555; }
.sys-status.on { color: var(--primary); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }

/* --- MAIN SCOPE --- */
#scopeContainer {
  flex: 1;
  position: relative;
  background: #000;
  border-bottom: 1px solid var(--secondary);
  overflow: hidden;
}
canvas { display: block; width: 100%; height: 100%; }
.grid-bg {
  position: absolute; top:0; left:0; width:100%; height:100%;
  background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 20px 20px; opacity: 0.3; pointer-events: none;
}

/* --- AI OVERLAY --- */
#aiDisplay {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  width: 90%; text-align: center;
  background: rgba(0, 20, 0, 0.85);
  border: 1px solid var(--primary);
  padding: 10px;
  box-shadow: 0 0 20px rgba(0,255,65,0.2);
  pointer-events: none;
}
#aiText {
  font-size: 1.8rem; font-weight: bold; color: #fff;
  text-shadow: 0 0 5px var(--primary);
  text-transform: uppercase; min-height: 2rem;
}
#aiSub { font-size: 0.7rem; color: var(--primary); letter-spacing: 2px; margin-top: 5px; }

/* --- CONTROLS --- */
#controlPanel {
  height: 40vh;
  background: var(--panel);
  padding: 10px;
  overflow-y: auto;
  border-top: 2px solid var(--secondary);
}

.section-box {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--secondary);
  padding: 8px;
  margin-bottom: 10px;
}
.section-title {
  font-size: 0.7rem; color: #fff; text-transform: uppercase;
  border-bottom: 1px solid var(--secondary); margin-bottom: 8px; padding-bottom: 4px;
  display: flex; justify-content: space-between;
}

.btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.btn-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

button {
  background: #002200; border: 1px solid var(--primary); color: var(--primary);
  padding: 12px 5px; font-family: inherit; font-size: 0.7rem; font-weight: bold;
  cursor: pointer; text-transform: uppercase; transition: 0.2s;
}
button:active { background: var(--primary); color: #000; }
button.active {
  background: var(--primary); color: #000;
  box-shadow: 0 0 10px var(--primary);
}
button#stopBtn { border-color: var(--alert); color: var(--alert); background: #220000; }
button#stopBtn.active { background: var(--alert); color: #fff; }

/* SLIDERS */
.slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.65rem; color: #aaa; }
.slider-row label { flex: 1; }
input[type="range"] { flex: 2; height: 4px; background: #333; -webkit-appearance: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--primary); cursor: pointer; }
.val-disp { width: 30px; text-align: right; color: #fff; }

/* LOG */
#sysLog {
  height: 60px; background: #000; border-top: 1px solid var(--secondary);
  padding: 5px; font-size: 0.65rem; overflow-y: auto; color: #555;
}
.log-item { margin-bottom: 2px; }
.log-high { color: var(--primary); }

/* MODAL */
#configModal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,10,0,0.95); z-index: 100;
  display: none; padding: 20px; overflow-y: auto;
}
.modal-inner { max-width: 500px; margin: 0 auto; border: 1px solid var(--primary); padding: 20px; background: #000; }
h2 { color: var(--primary); margin-top: 0; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
.close-btn { float: right; color: var(--alert); cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<header>
  <h1>PuiSSancE</h1>
  <div>
    <span id="sysState" class="sys-status">STANDBY</span> | 
    <span id="memStat">MEM: 0MB</span>
  </div>
</header>

<div id="scopeContainer">
  <div class="grid-bg"></div>
  <canvas id="mainCanvas"></canvas>
  <div id="aiDisplay">
    <div id="aiText">INITIALISATION...</div>
    <div id="aiSub">Neural Link Ready</div>
  </div>
</div>

<div id="controlPanel">
  
  <!-- MAIN POWER -->
  <div class="section-box">
    <div class="section-title">Power System</div>
    <div class="btn-grid-2">
      <button id="powerBtn">⚡ ACTIVER PUISSANCE</button>
      <button id="stopBtn">⏹ ARRÊT COMPLET</button>
    </div>
  </div>

  <!-- AUDIO LOOPS -->
  <div class="section-box">
    <div class="section-title">Audio Loop Chain</div>
    <div class="btn-grid">
      <button id="micBtn">MIC IN</button>
      <button id="noiseBtn">NOISE GEN</button>
      <button id="ttsBtn" class="active">TTS LOOP (VOICE)</button>
      <button id="recBtn">REC</button>
    </div>
  </div>

  <!-- SETTINGS LIVE -->
  <div class="section-box">
    <div class="section-title">Live Parameters</div>
    <div class="slider-row">
      <label>VOICE VOLUME</label>
      <input type="range" id="volSlider" min="0" max="1" step="0.1" value="1">
      <span class="val-disp" id="volVal">1.0</span>
    </div>
    <div class="slider-row">
      <label>VOICE PITCH</label>
      <input type="range" id="pitchSlider" min="0.1" max="2" step="0.1" value="0.6">
      <span class="val-disp" id="pitchVal">0.6</span>
    </div>
    <div class="slider-row">
      <label>NOISE VOL</label>
      <input type="range" id="noiseSlider" min="0" max="100" value="30">
      <span class="val-disp" id="noiseVal">30</span>
    </div>
  </div>

  <button id="advBtn" style="width:100%; margin-bottom:10px;">⚙ CONFIGURATION AVANCÉE</button>

</div>

<div id="sysLog"></div>

<!-- MODAL -->
<div id="configModal">
  <div class="modal-inner">
    <span class="close-btn" id="closeModal">X</span>
    <h2>Configuration Système</h2>
    
    <div class="slider-row" style="color:#fff; margin-bottom:15px;">
      <label>Vitesse de Parole (Rate)</label>
      <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1.1">
      <span class="val-disp" id="rateVal">1.1</span>
    </div>

    <div class="slider-row" style="color:#fff; margin-bottom:15px;">
      <label>Seuil de Confiance (0=Tout)</label>
      <input type="range" id="confSlider" min="0" max="1" step="0.1" value="0">
      <span class="val-disp" id="confVal">0.0</span>
    </div>

    <button id="saveBtn" style="width:100%; padding:15px; background:var(--primary); color:#000; font-weight:bold; font-size:1rem;">SAUVEGARDER DÉFINITIVEMENT</button>
  </div>
</div>

<script>
/* --- PuiSSancE CORE ENGINE --- */

const defaultConfig = {
  mic: false, noise: false, tts: true, rec: false,
  vol: 1.0, pitch: 0.6, rate: 1.1,
  noiseVol: 30, confidence: 0.0
};

const app = {
  running: false,
  ctx: null, source: null, analyser: null, gainNode: null,
  noiseNode: null, noiseGain: null,
  stream: null,
  recognition: null, synth: window.speechSynthesis,
  dataArray: null, timeData: null,
  config: { ...defaultConfig }
};

// --- LOGGER ---
function log(msg, high=false) {
  const l = el('sysLog');
  const d = document.createElement('div');
  d.className = 'log-item' + (high ? ' log-high' : '');
  d.textContent = `> ${msg}`;
  l.appendChild(d);
  l.scrollTop = l.scrollHeight;
}

function el(id) { return document.getElementById(id); }

// --- STORAGE ---
function loadConfig() {
  const saved = localStorage.getItem('PuiSSancE_Config');
  if(saved) {
    try { app.config = { ...defaultConfig, ...JSON.parse(saved) }; log("Config Chargée"); } 
    catch(e) { log("Err Load Config"); }
  }
  updateUI();
}

function saveConfig() {
  localStorage.setItem('PuiSSancE_Config', JSON.stringify(app.config));
  log("Configuration Sauvegardée !", true);
  applyAudioParams();
}

function updateUI() {
  el('volSlider').value = app.config.vol; el('volVal').textContent = app.config.vol;
  el('pitchSlider').value = app.config.pitch; el('pitchVal').textContent = app.config.pitch;
  el('noiseSlider').value = app.config.noiseVol; el('noiseVal').textContent = app.config.noiseVol;
  el('rateSlider').value = app.config.rate; el('rateVal').textContent = app.config.rate;
  el('confSlider').value = app.config.confidence; el('confVal').textContent = app.config.confidence;
  
  // Buttons state
  if(app.config.mic) el('micBtn').classList.add('active');
  if(app.config.noise) el('noiseBtn').classList.add('active');
  if(app.config.tts) el('ttsBtn').classList.add('active');
}

// --- AUDIO SYSTEM ---
async function initSystem() {
  if(app.running) return;
  el('powerBtn').textContent = "BOOT SEQUENCE...";
  log("Initialisation PuiSSancE Core...", true);

  try {
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    await app.ctx.resume();

    // 1. MICRO & ANALYSER
    try {
      app.stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
      app.source = app.ctx.createMediaStreamSource(app.stream);
      app.gainNode = app.ctx.createGain();
      app.gainNode.gain.value = 1.0;
      
      app.analyser = app.ctx.createAnalyser();
      app.analyser.fftSize = 2048;
      app.analyser.smoothingTimeConstant = 0.8;
      
      app.source.connect(app.gainNode);
      app.gainNode.connect(app.analyser);
      
      // Buffers
      const len = app.analyser.frequencyBinCount;
      app.dataArray = new Uint8Array(len);
      app.timeData = new Uint8Array(len);
      
      el('micBtn').classList.add('active'); app.config.mic = true;
    } catch(e) { log("Erreur Micro: " + e.message); }

    // 2. NOISE GENERATOR
    const buffSize = app.ctx.sampleRate * 2;
    const buff = app.ctx.createBuffer(1, buffSize, app.ctx.sampleRate);
    const data = buff.getChannelData(0);
    for(let i=0; i<buffSize; i++) data[i] = Math.random()*2 - 1;
    
    app.noiseNode = app.ctx.createBufferSource();
    app.noiseNode.buffer = buff;
    app.noiseNode.loop = true;
    app.noiseGain = app.ctx.createGain();
    app.noiseGain.gain.value = 0;
    
    // Filtre Radio
    const filter = app.ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 1000; filter.Q.value = 1;

    app.noiseNode.connect(filter);
    filter.connect(app.noiseGain);
    app.noiseGain.connect(app.ctx.destination);
    app.noiseNode.start(0);

    // 3. SPEECH ENGINE (LOOP)
    initSpeech();

    app.running = true;
    el('powerBtn').textContent = "SYSTEM ACTIVE";
    el('powerBtn').classList.add('active');
    el('sysState').classList.add('on');
    el('sysState').textContent = "ONLINE";
    el('aiText').textContent = "EN ÉCOUTE...";
    
    applyAudioParams();
    drawLoop();
    memLoop();

  } catch(e) {
    log("CRITICAL FAIL: " + e.message);
    el('powerBtn').textContent = "ERROR";
  }
}

function applyAudioParams() {
  if(app.noiseGain) app.noiseGain.gain.value = app.config.noise ? (app.config.noiseVol/100) : 0;
}

// --- SPEECH & LOOP ---
function initSpeech() {
  if(!('webkitSpeechRecognition' in window)) { log("Speech API Indisponible"); return; }
  
  app.recognition = new webkitSpeechRecognition();
  app.recognition.continuous = true;
  app.recognition.interimResults = true; // Important pour réactivité
  app.recognition.lang = 'fr-FR';

  app.recognition.onresult = (e) => {
    let text = "";
    let isFinal = false;
    let conf = 0;

    for(let i=e.resultIndex; i<e.results.length; i++) {
      text += e.results[i][0].transcript;
      if(e.results[i].isFinal) {
        isFinal = true;
        conf = e.results[i][0].confidence;
      }
    }

    if(text) {
      el('aiText').textContent = text;
      // LOGIQUE DE BOUCLE ICI
      // On parle si :
      // 1. Le TTS est activé
      // 2. Le texte est final (pour éviter de bégayer sur les mots en cours de formation) OU confiance haute
      // Ici on accepte tout si seuil = 0
      if(app.config.tts && (isFinal || conf > app.config.confidence)) {
        speak(text);
        if(isFinal) log(`LOOP: "${text}"`, true);
      }
    }
  };

  app.recognition.onend = () => { 
    if(app.running) { try{ app.recognition.start(); }catch(e){} } 
  };
  
  app.recognition.start();
  log("Moteur Vocal ACTIF");
}

function speak(text) {
  if(!text) return;
  // Annule la parole en cours pour dire la nouvelle phrase (Réactivité max)
  app.synth.cancel(); 
  
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  u.volume = app.config.vol;
  u.pitch = app.config.pitch;
  u.rate = app.config.rate;
  
  u.onstart = () => { el('aiSub').textContent = "TRANSMISSION..."; };
  u.onend = () => { el('aiSub').textContent = "ECOUTE..."; };
  
  app.synth.speak(u);
}

// --- VISUALS ---
function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  const cvs = el('mainCanvas');
  const ctx = cvs.getContext('2d');
  const w = cvs.width = cvs.clientWidth;
  const h = cvs.height = cvs.clientHeight;
  
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
  
  if(!app.analyser) return;
  
  app.analyser.getByteTimeDomainData(app.timeData);
  app.analyser.getByteFrequencyData(app.dataArray);

  // Waveform (Ligne verte)
  ctx.lineWidth = 2; ctx.strokeStyle = '#00ff41'; ctx.beginPath();
  const sliceW = w / app.timeData.length;
  let x = 0;
  for(let i=0; i<app.timeData.length; i++) {
    const v = app.timeData[i] / 128.0;
    const y = v * h/2;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    x += sliceW;
  }
  ctx.stroke();

  // Spectrum (Barres en bas)
  const barW = (w / app.dataArray.length) * 2.5;
  let bx = 0;
  for(let i=0; i<app.dataArray.length; i++) {
    const bh = (app.dataArray[i]/255) * (h/3);
    ctx.fillStyle = `rgb(0, ${app.dataArray[i]}, 0)`;
    ctx.fillRect(bx, h - bh, barW, bh);
    bx += barW + 1;
  }
}

function memLoop() {
  if(!app.running) return;
  setTimeout(memLoop, 2000);
  const mem = (Math.random() * 50 + 100).toFixed(0);
  el('memStat').textContent = `MEM: ${mem}MB`;
}

function toggle(id, key) {
  app.config[key] = !app.config[key];
  el(id).classList.toggle('active');
  log(`${key} -> ${app.config[key]}`);
  if(key === 'noise') applyAudioParams();
}

// --- EVENTS ---
window.onload = () => {
  loadConfig();
  
  // Sliders
  ['vol', 'pitch', 'noise', 'rate', 'conf'].forEach(k => {
    el(k+'Slider').oninput = (e) => {
      const map = {vol:'vol', pitch:'pitch', noise:'noiseVol', rate:'rate', conf:'confidence'};
      app.config[map[k]] = parseFloat(e.target.value);
      el(k+'Val').textContent = app.config[map[k]];
      if(k === 'noise') applyAudioParams();
    };
  });

  el('powerBtn').onclick = initSystem;
  el('stopBtn').onclick = () => {
    app.running = false;
    if(app.ctx) app.ctx.close();
    if(app.stream) app.stream.getTracks().forEach(t=>t.stop());
    if(app.recognition) app.recognition.stop();
    if(app.synth) app.synth.cancel();
    el('powerBtn').classList.remove('active'); el('powerBtn').textContent = "ACTIVER PUISSANCE";
    el('sysState').classList.remove('on'); el('sysState').textContent = "OFFLINE";
    log("SYSTEM HALTED");
  };

  el('micBtn').onclick = () => toggle('micBtn', 'mic');
  el('noiseBtn').onclick = () => toggle('noiseBtn', 'noise');
  el('ttsBtn').onclick = () => toggle('ttsBtn', 'tts');
  el('recBtn').onclick = () => toggle('recBtn', 'rec');
  
  el('advBtn').onclick = () => el('configModal').style.display = 'block';
  el('closeModal').onclick = () => el('configModal').style.display = 'none';
  el('saveBtn').onclick = saveConfig;
};
</script>
</body>
</html>
