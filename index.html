<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ETERNITY v22 – GOD MODE (Realme Fix)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<style>
:root{--primary:#00ffcc;--secondary:#0088ff;--danger:#ff0055;--ghost:#aa00ff;--voice:#ffaa00;--bg:#00050a}
*{box-sizing:border-box;margin:0;padding:0}
body{height:100dvh;background:var(--bg);color:var(--primary);font-family:'Courier New',monospace;overflow:hidden;display:grid;place-items:center}
#boot-screen{z-index:100;padding:2.5rem 4rem;border:3px solid var(--primary);border-radius:50%;font-size:clamp(1.5rem,8vw,2.2rem);text-align:center;cursor:pointer;transition:all .3s}
#boot-screen:active{transform:scale(.92)}
#main-ui{inset:0;position:absolute;z-index:10;display:none;flex-direction:column;background:rgba(0,0,0,.95);padding:1rem;gap:1rem;overflow-y:auto}
.panel{background:rgba(0,10,20,.75);border:1px solid var(--secondary);border-radius:4px;padding:1rem}
button{padding:.9rem .6rem;font-weight:bold;text-transform:uppercase;background:rgba(0,20,40,.8);border:1px solid var(--secondary);color:var(--secondary);border-radius:4px;cursor:pointer;transition:all .15s}
button.active{background:var(--secondary);color:#000;box-shadow:0 0 20px var(--secondary)}
#btn-ghost.active{background:var(--ghost);color:white;box-shadow:0 0 25px var(--ghost)}
canvas.viz{width:100%;height:160px;background:#000;border:1px solid var(--secondary)}
</style>
</head>
<body>

<canvas id="bg-network"></canvas>
<div id="vignette"></div>
<video id="camera-feed" autoplay playsinline muted></video>

<div id="boot-screen">GOD MODE<br>ACTIVER (Realme Fix)</div>

<div id="main-ui">
  <header><h1 style="font-size:1.6rem">ETERNITY v22</h1><div style="color:var(--ghost)">EVP AVANCÉE</div></header>

  <div class="panel"><div style="display:flex;justify-content:space-between"><span>MICRO</span><span id="mic-status">OFF</span></div><div id="sys-log">En attente des esprits...</div></div>

  <div class="panel">
    <div style="display:flex;justify-content:space-between"><span>ACTIVITÉ</span><span id="activity-pct">0 %</span></div>
    <div style="height:12px;background:#001122;border:1px solid var(--secondary)"><div id="progress-bar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--secondary),var(--primary))"></div></div>
  </div>

  <div class="panel" style="flex:1.6;position:relative">
    <canvas id="spectrum-canvas" class="viz"></canvas>
    <div style="margin-top:8px">VOIX <div id="voice-bar" style="height:10px;background:var(--voice);width:0%"></div></div>
    <div style="margin-top:4px">EVP <div id="ghost-bar" style="height:10px;background:var(--ghost);width:0%"></div></div>
  </div>

  <div class="panel">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button id="btn-sweep">SWEEP</button>
      <button id="btn-boost">BOOST ×2</button>
      <button id="btn-ultra">ULTRA ×4</button>
      <button id="btn-fixed">TON FIXE</button>
      <button id="btn-ghost">EVP GHOST BOX</button>
    </div>
    <div style="margin-top:12px">
      <button id="btn-record-sweep">RECORD SWEEP ONLY</button>
    </div>
  </div>

  <div class="panel" style="flex:1"><div id="log-zone" style="max-height:240px;overflow-y:auto;font-size:0.8rem"></div></div>
</div>

<script type="module">
const DOM = {
  boot: document.getElementById('boot-screen'),
  ui: document.getElementById('main-ui'),
  micStatus: document.getElementById('mic-status'),
  sysLog: document.getElementById('sys-log'),
  activity: document.getElementById('activity-pct'),
  progress: document.getElementById('progress-bar'),
  canvas: document.getElementById('spectrum-canvas'),
  voiceBar: document.getElementById('voice-bar'),
  ghostBar: document.getElementById('ghost-bar'),
  logZone: document.getElementById('log-zone'),
  btnSweep: document.getElementById('btn-sweep'),
  btnBoost: document.getElementById('btn-boost'),
  btnUltra: document.getElementById('btn-ultra'),
  btnFixed: document.getElementById('btn-fixed'),
  btnGhost: document.getElementById('btn-ghost'),
  btnRecordSweep: document.getElementById('btn-record-sweep')
};

let state = {
  audioCtx: null,
  stream: null,
  analyser: null,
  workletNode: null,
  masterGain: null,
  sweepRecorder: null,
  isSweep: false,
  gainLevel: 0,
  voiceEnergy: 0,
  isGhost: false,
  ghostWords: ["OUI","NON","ICI","JE SUIS","TU ES","AIDE","MORT","VIVANT","DANGER","MAMAN","QUI","POURQUOI","VA-T-EN","LUMIÈRE","NOIR","MAINTENANT","ESPRIT","ENTENDS","REGARDE","TOUCHE","SENT","VIENS","LÂCHE-MOI","PARLE","ÉCOUTE","ICI","JE SUIS LÀ","AIDE-MOI"]
};

const log = (txt, type='info') => {
  const d = document.createElement('div');
  d.innerHTML = `<span style="opacity:.6">[${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}]</span> ${txt}`;
  if(type==='ghost') d.style.color = '#aa00ff';
  DOM.logZone.prepend(d);
  if(DOM.logZone.children.length > 60) DOM.logZone.lastChild.remove();
};

// ====================== BOOT (Realme Fix) ======================
DOM.boot.onclick = async () => {
  DOM.boot.textContent = "INITIALISATION REALME...";
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    state.audioCtx = new AudioCtx();
    await state.audioCtx.resume();                     // ← FIX Realme

    // Worklet
    await state.audioCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([`
      class EVPSweep extends AudioWorkletProcessor {
        static get parameterDescriptors(){return [{name:'gain',defaultValue:0.45}]}
        constructor(){super();this.phase=0;this.bp=0;}
        process(inputs,outputs,parameters){
          const out = outputs[0][0];
          const g = parameters.gain[0]||0.45;
          for(let i=0;i<128;i++){
            const f = 850 + Math.sin(this.phase+=0.0008)*700;
            const omega = 2*Math.PI*Math.max(30,f)/sampleRate;
            const alpha = Math.sin(omega)/32;
            const noise = Math.random()*2-1;
            this.bp = this.bp + alpha*(noise-this.bp);
            out[i] = this.bp * g;
          }
          return true;
        }
      }
      registerProcessor('evp-sweep',EVPSweep);
    `],{type:'application/javascript'})));

    // MICRO MONO (plus stable sur Realme Note 60)
    state.stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const source = state.audioCtx.createMediaStreamSource(state.stream);
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 1024;
    source.connect(state.analyser);

    // Master Gain (son garanti)
    state.masterGain = state.audioCtx.createGain();
    state.masterGain.gain.value = 1.0;
    state.masterGain.connect(state.audioCtx.destination);

    DOM.boot.style.display = 'none';
    DOM.ui.style.display = 'flex';
    DOM.micStatus.textContent = "ACTIF";
    DOM.micStatus.style.color = "var(--primary)";

    log("✅ AudioContext + Micro OK (Realme Fix)", "success");
    startVisualizer();
    toggleSweep(); // auto-start sweep
  } catch(e){
    log("❌ ERREUR : " + e.message + " (vérifie permissions micro dans Paramètres → Applications)", "error");
    DOM.boot.textContent = "ÉCHEC – Réessayer";
  }
};

// ====================== SWEEP + BOOST (FONCTIONNE MAINTENANT) ======================
async function toggleSweep(){
  if(state.isSweep){
    state.workletNode?.disconnect();
    state.isSweep = false;
    DOM.btnSweep.classList.remove('active');
    return;
  }
  state.workletNode = new AudioWorkletNode(state.audioCtx, 'evp-sweep');
  state.workletNode.connect(state.masterGain);
  state.isSweep = true;
  DOM.btnSweep.classList.add('active');
  applyBoost();
}

function applyBoost(){
  if(!state.workletNode) return;
  let g = 0.45;
  if(state.gainLevel===1) g = 1.15;
  if(state.gainLevel===2) g = 2.2;
  state.workletNode.parameters.get('gain').setTargetAtTime(g, state.audioCtx.currentTime, 0.08);
  log(`BOOST → ${state.gainLevel===2?'ULTRA ×4':state.gainLevel===1?'×2':'normal'}`, 'warn');
}

DOM.btnBoost.onclick = () => { state.gainLevel = state.gainLevel===1?0:1; applyBoost(); };
DOM.btnUltra.onclick = () => { state.gainLevel = state.gainLevel===2?0:2; applyBoost(); };

// ====================== EVP GHOST BOX AVANCÉE ======================
DOM.btnGhost.onclick = () => {
  state.isGhost = !state.isGhost;
  DOM.btnGhost.classList.toggle('active', state.isGhost);
  if(state.isGhost) ghostLoop();
};

function ghostLoop(){
  if(!state.isGhost) return;
  if(state.voiceEnergy > 0.42 || Math.random() < 0.15){
    const phrase = [];
    for(let i=0; i<Math.random()*3+2; i++){
      phrase.push(state.ghostWords[Math.floor(Math.random()*state.ghostWords.length)]);
    }
    const text = phrase.join(' ');
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.65; u.pitch = 0.7; u.volume = 0.95;
    speechSynthesis.speak(u);
    log(`EVP → "${text}"`, 'ghost');
  }
  setTimeout(ghostLoop, 380);
}

// ====================== VISUALISEUR ======================
function startVisualizer(){
  const ctx = DOM.canvas.getContext('2d');
  const loop = () => {
    requestAnimationFrame(loop);
    const data = new Uint8Array(state.analyser.frequencyBinCount);
    state.analyser.getByteFrequencyData(data);
    const w = DOM.canvas.width = DOM.canvas.clientWidth;
    const h = DOM.canvas.height;
    ctx.clearRect(0,0,w,h);

    let sum = 0, voice = 0;
    for(let i=0;i<data.length;i++){
      const v = data[i];
      sum += v;
      if(i>3 && i<95) voice += v;
      ctx.fillStyle = `hsl(${200-v*0.7},100%,45%)`;
      ctx.fillRect(i*(w/data.length), h-(v/255)*h*0.92, (w/data.length)-1, (v/255)*h*0.92);
    }
    state.voiceEnergy = (voice/92)/255;
    DOM.voiceBar.style.width = `${Math.min(100,state.voiceEnergy*160)}%`;
    DOM.ghostBar.style.width = state.isGhost ? `${30+Math.random()*50}%` : '0%';

    const prob = Math.min(100, (sum/data.length/2.55)*1.2 + state.voiceEnergy*70);
    DOM.activity.textContent = Math.round(prob)+'%';
    DOM.progress.style.width = prob+'%';
  };
  loop();
}

// ====================== RECORD SWEEP ONLY ======================
DOM.btnRecordSweep.onclick = () => {
  if(state.sweepRecorder){
    state.sweepRecorder.stop();
    state.sweepRecorder = null;
    DOM.btnRecordSweep.textContent = "RECORD SWEEP ONLY";
    return;
  }
  const dest = state.audioCtx.createMediaStreamDestination();
  state.workletNode?.connect(dest);
  state.sweepRecorder = new MediaRecorder(dest.stream, {mimeType:'audio/webm;codecs=opus'});
  let chunks = [];
  state.sweepRecorder.ondataavailable = e => chunks.push(e.data);
  state.sweepRecorder.onstop = () => {
    const blob = new Blob(chunks,{type:'audio/webm'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `EVP-SWEEP-${Date.now()}.webm`;
    a.click();
  };
  state.sweepRecorder.start();
  DOM.btnRecordSweep.textContent = "STOP RECORD SWEEP";
  log("ENREGISTREMENT SWEEP ONLY DÉMARRÉ", 'warn');
};

log("ETERNITY v22 GOD MODE chargé – clique sur ACTIVER", 'ghost');
</script>
</body>
</html>
