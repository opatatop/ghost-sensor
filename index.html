<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB - AUTO-RESTART</title>
<style>
:root {
  --primary: #00ff00;
  --secondary: #003300;
  --bg: #000000;
  --panel: #050a05;
  --btn-bg: #111;
  --btn-active: #00ff00;
  --text: #ccffcc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

#header {
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  padding: 5px 10px;
  display: flex; justify-content: space-between;
  font-size: 0.8rem; color: var(--primary);
}
#aiState {
  font-weight: bold;
  color: orange;
}
#aiState.listening {
  color: #00ff00;
  animation: pulse 1s infinite;
}
@keyframes pulse { 50% { opacity: 0.5; } }

#mainStage {
  flex: 1; position: relative;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
#iaText {
  font-size: 2rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 10px var(--primary);
  background: rgba(0,0,0,0.9);
  padding: 15px;
  border: 2px solid var(--primary);
  min-width: 80%;
  text-align: center;
  text-transform: uppercase;
  min-height: 3.5rem;
}

#controls {
  background: var(--panel);
  border-top: 2px solid var(--primary);
  height: 40vh;
  overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 10px;
}

.button-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 10px; font-size: 0.7rem;
  font-weight: bold; cursor: pointer; font-family: inherit;
}
button:active { background: var(--primary); color: #000; }
button.active { background: var(--btn-active); color: #000; box-shadow: 0 0 10px var(--primary); }
button:disabled { opacity: 0.3; cursor: not-allowed; }

#startBtn {
  width: 100%; font-size: 1.2rem; padding: 15px;
  background: #000; color: var(--primary); border: 2px solid var(--primary);
}

#bars {
  display: flex; gap: 5px; margin-bottom: 10px;
}
.bar-container { flex: 1; background: #222; height: 10px; border: 1px solid #444; position: relative; }
.bar-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.1s; }

#logZone {
  height: 40px; background: #000; border-top: 1px solid #333;
  padding: 5px; font-size: 0.7rem; overflow-y: auto; color: #888;
}
.log-real { color: var(--primary) !important; font-weight: bold; }
.log-sys { color: orange !important; }
</style>
</head>
<body>

<div id="header">
  <div>REALITY CORE V2</div>
  <div id="aiState">IA: OFF</div>
  <div id="status">IDLE</div>
</div>

<div id="mainStage">
  <div id="iaText">... INITIALISATION ...</div>
</div>

<div id="controls">
  <div id="bars">
    <div class="bar-container"><div id="volBar" class="bar-fill"></div></div>
    <div class="bar-container"><div id="confBar" class="bar-fill" style="background:yellow"></div></div>
  </div>

  <button id="startBtn" onclick="startSystem()">DÉMARRER & FORCER IA</button>

  <div class="button-grid">
    <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE</button>
    <button id="boostBtn" onclick="toggleOpt('boost')">📡 BOOST SIGNAL</button>
    <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
    <button id="camBtn" onclick="toggleOpt('cam')">📷 CAM</button>
    <button id="vizSpec" onclick="setViz('spectrum')">SPECTRE</button>
    <button id="vizWave" onclick="setViz('wave')">ONDE</button>
    <button id="stopBtn" style="border-color:red; color:red" onclick="stopSystem()">⏹ STOP</button>
  </div>
  
  <div style="font-size:0.7rem; color:#aaa; text-align:center; margin-top:5px;">
    Si pas de mots : Le bruit n'est pas du français.<br>
    L'IA affichera "[SIGNAL]" si elle entend du son.
  </div>
</div>

<div id="logZone"></div>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>

<script>
let app = {
  running: false,
  ctx: null,
  stream: null,
  vidStream: null,
  source: null,
  analyser: null,
  monitorGain: null,
  booster: null, // Noeud de gain pour booster l'entrée vers l'IA
  recorder: null,
  isRec: false,
  recognition: null,
  keepAliveOsc: null,
  aiWatchdog: null, // TIMER POUR REDÉMARRER L'IA
  lastAIActivityTime: 0,
  config: {
    monitor: false,
    boost: false,
    autoRec: false,
    cam: false,
    vizMode: 'spectrum'
  },
  canvas: null, cCtx: null, width: 0, height: 0,
  lastSpeechTime: 0,
  wakeLock: null
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), ia: el('iaText'), status: el('status'), aiState: el('aiState'),
  volBar: el('volBar'), confBar: el('confBar')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d); els.log.scrollTop = els.log.scrollHeight;
}

// --- START ---

async function startSystem() {
  if(app.running) return;
  
  el('startBtn').disabled = true;
  el('startBtn').textContent = "INIT SYSTÈME...";
  
  try {
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();

    if (!app.stream) {
      log("Demande Micro...", 'log-sys');
      app.stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
          video: false 
      });
    }

    setupAudioGraph();
    try { app.wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
    startKeepAlive();
    startAIWithWatchdog(); // IMPORTANT : Démarrage avec Chien de garde
    initViz();

    app.running = true;
    el('startBtn').textContent = "SYSTÈME ACTIF (AUTO-RESTART)";
    el('startBtn').style.background = "var(--btn-active)";
    el('startBtn').style.color = "#000";
    
    drawLoop();
    log("Système V2 démarré. Watchdog IA actif.", 'log-sys');

  } catch (err) {
    console.error(err);
    log("ERREUR: " + err.message, 'log-sys');
    el('startBtn').disabled = false;
    el('startBtn').textContent = "ERREUR";
  }
}

function stopSystem() {
  if(app.wakeLock) { app.wakeLock.release(); app.wakeLock = null; }
  if(app.stream) { app.stream.getTracks().forEach(t=>t.stop()); app.stream = null; }
  if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
  if(app.recognition) stopAI(); // Arrêt propre
  if(app.ctx) app.ctx.close();
  
  app.running = false;
  
  el('startBtn').disabled = false;
  el('startBtn').textContent = "DÉMARRER & FORCER IA";
  el('startBtn').style.background = "#000";
  el('startBtn').style.color = "var(--primary)";
  els.ia.textContent = "ARRÊTÉ";
  els.aiState.textContent = "IA: OFF";
  document.querySelectorAll('.active').forEach(b => b.classList.remove('active'));
}

// --- AUDIO GRAPH ---

function setupAudioGraph() {
  app.source = app.ctx.createMediaStreamSource(app.stream);
  
  // Booster (Augmente le volume pour aider l'IA à capter les chuchotements)
  app.booster = app.ctx.createGain();
  app.booster.gain.value = 1.0;
  
  // Monitor
  app.monitorGain = app.ctx.createGain();
  app.monitorGain.gain.value = 0;

  // Analyser
  app.analyser = app.ctx.createAnalyser();
  app.analyser.fftSize = 2048;
  app.analyser.smoothingTimeConstant = 0.5;
  app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);

  // Route: Source -> Booster -> Analyser
  app.source.connect(app.booster);
  app.booster.connect(app.analyser);
  
  // Monitor branch
  app.booster.connect(app.monitorGain);
  app.monitorGain.connect(app.ctx.destination);

  app.recorder = new MediaRecorder(app.stream);
  app.recorder.ondataavailable = e => saveBlob(e.data);
}

// --- IA & WATCHDOG (NOUVEAU) ---

function startAIWithWatchdog() {
  startRealAI();
  
  // LANCEMENT DU CHIEN DE GARDE (Toutes les 3 secondes)
  app.aiWatchdog = setInterval(() => {
    if(!app.running) {
      clearInterval(app.aiWatchdog);
      return;
    }
    
    const now = Date.now();
    // Si l'IA n'a rien fait depuis 4 secondes, on la relance
    if (now - app.lastAIActivityTime > 4000) {
      log("Watchdog: Redémarrage IA...", 'log-sys');
      stopAI();
      setTimeout(() => startRealAI(), 200); // Petit délai
    }
  }, 3000);
}

function stopAI() {
  if(app.recognition) {
    try { app.recognition.stop(); } catch(e){}
    app.recognition = null;
  }
  els.aiState.textContent = "IA: OFF";
  els.aiState.className = "";
}

function startRealAI() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true;
      app.recognition.lang = 'fr-FR'; // Force Français
      
      app.recognition.onstart = () => {
          els.aiState.textContent = "IA: LISTENING";
          els.aiState.classList.add('listening');
          app.lastAIActivityTime = Date.now(); // Heartbeat
      };

      app.recognition.onresult = (e) => {
          app.lastAIActivityTime = Date.now(); // Heartbeat
          
          let txt = '';
          let isFinal = false;
          
          for(let i = e.resultIndex; i < e.results.length; i++) {
              txt += e.results[i][0].transcript;
              if(e.results[i].isFinal) isFinal = true;
          }
          
          if (txt) {
              // Si mot détecté
              els.ia.textContent = txt;
              els.ia.style.color = "#fff";
              if (isFinal) {
                  log(`MOT: "${txt}"`, 'log-real');
                  app.lastSpeechTime = Date.now();
              }
          }
      };
      
      app.recognition.onerror = (e) => {
          log(`Erreur IA: ${e.error}`, 'log-sys');
          // L'erreur va déclencher le watchdog
      };
      
      app.recognition.onend = () => {
          // Si le système tourne encore, c'est un crash silencieux (ou fin naturelle)
          // Le watchdog s'en chargera.
      };

      try {
          app.recognition.start();
      } catch(e) {
          log("Erreur start IA", 'log-sys');
      }
  } else {
      log("IA non supportée", 'log-sys');
  }
}

// --- LOGIC ---

function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  app.analyser.getByteFrequencyData(app.dataArray);
  
  let sum = 0;
  for(let i=0; i<app.dataArray.length; i++) sum += app.dataArray[i];
  const avg = sum / app.dataArray.length;
  
  els.volBar.style.width = Math.min(100, avg) + '%';
  
  // LOGIQUE D'AFFICHAGE DES BRUITS (SANS MOTS)
  const now = Date.now();
  // Si audio fort mais aucun mot depuis 2 secondes
  if (avg > 40 && (now - app.lastSpeechTime > 2000)) {
      els.ia.textContent = "[SIGNAL AUDIO - NON TRADUIT]";
      els.ia.style.color = "yellow";
      els.confBar.style.width = "100%";
      els.status.textContent = "BRUIT SANS MOTS";
  } else {
      els.confBar.style.width = "0%";
      if(els.ia.textContent.includes("SIGNAL")) {
           els.ia.textContent = "..."; // Effacer le message de bruit si silence revient
      }
      els.status.textContent = "SURVEILLANCE";
  }

  if(app.config.autoRec && avg > 60 && !app.isRec) {
      app.isRec = true; app.recorder.start(); log("⚠ ENREGISTREMENT", 'log-real');
      setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 3000);
  }

  // Dessin
  const ctx = app.cCtx, w = app.width, h = app.height;
  ctx.fillStyle = 'rgba(0, 10, 0, 0.2)';
  ctx.fillRect(0,0,w,h);
  
  if(app.config.vizMode === 'spectrum') {
      const barW = (w / app.dataArray.length) * 2.5;
      let x = 0;
      for(let i=0; i<app.dataArray.length; i++) {
          const v = app.dataArray[i];
          const barH = (v/255)*h;
          ctx.fillStyle = `rgb(0, 255, ${v})`;
          ctx.fillRect(x, h - barH, barW, barH);
          x += barW+1;
      }
  } else {
      const timeData = new Uint8Array(app.analyser.fftSize);
      app.analyser.getByteTimeDomainData(timeData);
      ctx.lineWidth = 2; ctx.strokeStyle = '#00ff00'; ctx.beginPath();
      const sliceW = w / timeData.length; let x = 0;
      for(let i = 0; i < timeData.length; i++) {
          const v = timeData[i] / 128.0; const y = v * h/2;
          if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y); x += sliceW;
      }
      ctx.stroke();
  }
}

// --- TOOLS ---

function toggleOpt(key) {
  if(!app.running && key !== 'cam') return;
  
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');
  
  if(key === 'monitor') {
      app.monitorGain.gain.value = app.config.monitor ? 1.0 : 0;
      log(app.config.monitor ? "Écoute ON" : "Écute OFF");
  }
  
  if(key === 'boost') {
      // Boost le gain d'entrée pour aider l'IA
      app.booster.gain.value = app.config.boost ? 3.0 : 1.0;
      log(app.config.boost ? "Boost Signal ON" : "Boost Signal OFF");
  }
  
  if(key === 'cam') toggleCam();
}

async function toggleCam() {
  if(!app.config.cam) {
      try {
          app.vidStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          const vid = document.createElement('video');
          vid.srcObject = app.vidStream; vid.autoplay = true; vid.muted = true; vid.playsInline = true;
          vid.style.cssText = "position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.2; z-index:-1;";
          document.body.appendChild(vid);
      } catch(e) { log("Erreur Cam", 'log-sys'); app.config.cam=false; el('camBtn').classList.remove('active'); }
  } else {
      if(app.vidStream) app.vidStream.getTracks().forEach(t=>t.stop());
      app.vidStream = null; document.querySelector('video')?.remove();
  }
}

function setViz(mode) {
  app.config.vizMode = mode;
  document.querySelectorAll('.button-grid button').forEach(b => b.classList.remove('active'));
  if(mode==='spectrum') el('vizSpec').classList.add('active');
  if(mode==='wave') el('vizWave').classList.add('active');
}

function initViz() {
  app.canvas = document.createElement('canvas');
  app.canvas.style.cssText = "width:100%; height:100%; position:absolute; top:0; left:0; z-index:-1;";
  document.getElementById('mainStage').insertBefore(app.canvas, el('iaText'));
  app.cCtx = app.canvas.getContext('2d');
  resize();
}
window.onresize = resize;
function resize() {
    if(app.canvas) {
        app.width = app.canvas.clientWidth;
        app.height = app.canvas.clientHeight;
        app.canvas.width = app.width;
        app.canvas.height = app.height;
    }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`REALITY_V2_${Date.now()}.webm`; a.click();
  log("Fichier sauvé", 'log-real');
}

// KEEP ALIVE
function startKeepAlive() {
  app.keepAliveOsc = app.ctx.createOscillator();
  const keepGain = app.ctx.createGain();
  keepGain.gain.value = 0.001;
  app.keepAliveOsc.connect(keepGain);
  keepGain.connect(app.ctx.destination);
  app.keepAliveOsc.start();
  document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && app.ctx && app.ctx.state === 'suspended') app.ctx.resume();
  });
}

window.onload = () => {
    log("REALITY CORE V2 PRÊT. Watchdog actif.", 'log-sys');
};
</script>
</body>
</html>
