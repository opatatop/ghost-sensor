<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETERNITY v33 OMEGA ULTIMATE LAB</title>
<style>
:root {
  --primary-color: #00ffd0;
  --background-color: #000814;
  --panel-bg: rgba(0, 0, 0, 0.85);
  --button-bg: #001f30;
  --voice-color: #ffaa00;
  --evp-color: #aa00ff;
  --ai-color: #00ff88;
}

body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: var(--background-color);
  color: var(--primary-color);
  overflow: hidden;
  height: 100vh;
}

#panel {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--panel-bg);
  border: 2px solid var(--primary-color);
  padding: 12px;
  z-index: 20;
  width: 320px;
}

button {
  background: var(--button-bg);
  border: 1px solid var(--primary-color);
  color: var(--primary-color);
  padding: 6px 10px;
  margin: 4px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
}

button:hover {
  background: rgba(0, 31, 48, 0.8);
}

#voiceBar {
  height: 12px;
  width: 0%;
  background: var(--voice-color);
  margin-top: 4px;
  transition: width 0.1s linear;
}

#logZone {
  position: absolute;
  bottom: 10px;
  left: 10px;
  width: 400px;
  max-height: 300px;
  overflow-y: auto;
  font-size: 0.8rem;
  background: rgba(0, 0, 0, 0.6);
  padding: 6px;
  border: 1px solid var(--primary-color);
}

#waterfallCanvas {
  position: absolute;
  bottom: 0;
  left: 0;
}

#radarCanvas {
  position: absolute;
  top: 10px;
  right: 10px;
}

/* Style pour les boutons dynamiques */
.dynamic-btn {
  position: absolute;
  left: 10px;
}
</style>
</head>
<body>
<div id="panel">
  <h3>ETERNITY v33 OMEGA ULTIMATE LAB</h3>
  <div>MIC : <span id="mic">OFF</span></div>
  <div>IA CLASS : <span id="ai">---</span></div>
  <div>VOICE <div id="voiceBar"></div></div>
  <div class="btn-group">
    <button id="fftLarge">FFT 4096</button>
    <button id="fftMedium">FFT 2048</button>
    <button id="fftSmall">FFT 1024</button>
    <button id="autoRec">AUTO REC</button>
    <button id="evp">EVP MODE</button>
  </div>
</div>
<div id="logZone"></div>

<script>
// Configuration initiale
const config = {
  fftSize: 2048,
  autoRec: false,
  evpMode: false,
  spectro3D: true,
  radar: true,
  ai: true,
  evpThreshold: 0.5
};

// Variables globales
let audioCtx, analyser, dataArray;
let mediaRecorder, chunks = [];
let scene, camera, renderer;
let cubes = [];
let model, predictions = [];
let recBuffers = [], isRecordingWAV = false;

// DOM Elements
const elements = {
  mic: document.getElementById("mic"),
  ai: document.getElementById("ai"),
  voiceBar: document.getElementById("voiceBar"),
  logZone: document.getElementById("logZone")
};

// ======================= UTILITIES =======================
function log(msg, color = "#00ff88") {
  const div = document.createElement("div");
  div.style.color = color;
  const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'});
  div.textContent = `[${time}] ${msg}`;
  elements.logZone.prepend(div);

  // Limiter le nombre de logs
  if (elements.logZone.children.length > 200) {
    elements.logZone.removeChild(elements.logZone.lastChild);
  }
}

// ======================= AUDIO INITIALIZATION =======================
async function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = saveRecording;

    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = config.fftSize;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);

    elements.mic.textContent = "ACTIVE";
    log("Audio actif et analysable");

    // Démarrer la boucle audio
    audioLoop();
  } catch (error) {
    log(`Erreur audio: ${error.message}`, "#ff0000");
  }
}

// ======================= AUDIO LOOP =======================
function audioLoop() {
  requestAnimationFrame(audioLoop);

  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  // Calcul de l'énergie vocale
  const sum = dataArray.reduce((acc, val) => acc + val, 0);
  const voiceEnergy = Math.min(100, sum / dataArray.length);
  elements.voiceBar.style.width = `${voiceEnergy}%`;

  // Auto record si activé
  if (config.autoRec && voiceEnergy > 30) {
    record();
  }
}

// ======================= RECORDING =======================
function record() {
  if (mediaRecorder.state === "inactive") {
    chunks = [];
    mediaRecorder.start();
    log("Enregistrement démarré");

    // Arrêter après 3 secondes
    setTimeout(() => {
      if (mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
    }, 3000);
  }
}

function saveRecording() {
  const blob = new Blob(chunks, { type: "audio/webm" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `event_audio_${Date.now()}.webm`;
  a.click();
  log("Enregistrement sauvegardé");
}

// ======================= 3D VISUALIZATION =======================
function init3D() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.z = 200;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Créer les éléments visuels
  createWaterfall();
  createRadar();

  // Démarrer la boucle 3D
  renderLoop();
}

function createWaterfall() {
  const waterfall = document.createElement('canvas');
  waterfall.id = 'waterfallCanvas';
  waterfall.width = window.innerWidth;
  waterfall.height = 300;
  document.body.appendChild(waterfall);
  return waterfall.getContext('2d');
}

function createRadar() {
  const radar = document.createElement('canvas');
  radar.id = 'radarCanvas';
  radar.width = 180;
  radar.height = 180;
  document.body.appendChild(radar);
  return radar.getContext('2d');
}

function drawWaterfall(ctx) {
  const w = ctx.canvas.width;
  const h = ctx.canvas.height;
  const img = ctx.getImageData(0, 0, w, h);
  ctx.putImageData(img, 0, 1);

  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i];
    ctx.fillStyle = `hsl(${200 - v}, 100%, 50%)`;
    ctx.fillRect(i * (w / dataArray.length), 0, 2, 1);
  }
}

function drawRadar(ctx) {
  if (!config.radar) return;

  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  ctx.strokeStyle = "#00ffd0";
  ctx.beginPath();
  ctx.arc(90, 90, 80, 0, Math.PI * 2);
  ctx.stroke();

  const energy = dataArray.reduce((acc, val) => acc + val, 0);
  const angle = Math.random() * Math.PI * 2;
  const r = energy / 1500;
  const x = 90 + Math.cos(angle) * r;
  const y = 90 + Math.sin(angle) * r;

  ctx.fillStyle = "#00ff88";
  ctx.fillRect(x, y, 4, 4);
}

function draw3DSpectro() {
  if (!config.spectro3D || !dataArray) return;

  for (let i = 0; i < dataArray.length; i += 2) {
    const v = dataArray[i] / 255;
    const color = config.evpMode
      ? `hsl(${300 - dataArray[i]}, 100%, 50%)`
      : `hsl(${200 - dataArray[i]}, 100%, 50%)`;

    const geometry = new THREE.BoxGeometry(2, 2, v * 60);
    const material = new THREE.MeshBasicMaterial({ color: new THREE.Color(color) });
    const cube = new THREE.Mesh(geometry, material);

    cube.position.x = i - 256;
    cube.position.y = -60;
    cube.position.z = v * 30;
    scene.add(cube);
    cubes.push(cube);
  }

  // Limiter le nombre de cubes
  if (cubes.length > 10000) {
    const old = cubes.shift();
    scene.remove(old);
  }
}

function renderLoop() {
  requestAnimationFrame(renderLoop);

  if (analyser) {
    analyser.getByteFrequencyData(dataArray);
    draw3DSpectro();
    drawRadar(radarCtx);
    drawWaterfall(waterfallCtx);
  }

  renderer.render(scene, camera);
}

// ======================= AI ANALYSIS =======================
async function loadModel() {
  try {
    log("Chargement du modèle TensorFlow YAMNet...");
    model = await yamnet.load();
    log("Modèle chargé ✅");
  } catch (error) {
    log(`Erreur chargement modèle: ${error.message}`, "#ff0000");
  }
}

async function analyseAudio() {
  if (!model || !analyser) return;

  const floatData = new Float32Array(dataArray.length);
  for (let i = 0; i < dataArray.length; i++) {
    floatData[i] = (dataArray[i] - 128) / 128;
  }

  const inputTensor = tf.tensor(floatData).reshape([floatData.length, 1]);
  const scores = await model.predict(inputTensor);

  const topScores = Array.from(scores.dataSync())
    .map((s, i) => ({ score: s, index: i }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);

  predictions = topScores.map(p =>
    `${model.classes[p.index]} (${(p.score * 100).toFixed(1)}%)`
  );

  elements.ai.textContent = predictions[0];

  // Détection EVP
  if (config.evpMode && topScores[0].score < config.evpThreshold) {
    log(`EVP détecté : signal faible et mystérieux`, "#aa00ff");
    if (config.autoRec) record();
  }
}

function aiLoop() {
  if (config.ai) {
    analyseAudio();
  }
  requestAnimationFrame(aiLoop);
}

// ======================= UI CONTROLS =======================
function createButton(text, top, onclick) {
  const btn = document.createElement('button');
  btn.textContent = text;
  btn.style.position = 'absolute';
  btn.style.top = `${top}px`;
  btn.style.left = '10px';
  btn.onclick = onclick;
  document.body.appendChild(btn);
  return btn;
}

// Créer tous les boutons
function createUI() {
  // Boutons FFT
  document.getElementById("fftLarge").onclick = () => {
    config.fftSize = 4096;
    if (analyser) {
      analyser.fftSize = config.fftSize;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
    }
    log("FFT 4096 activée");
  };

  document.getElementById("fftMedium").onclick = () => {
    config.fftSize = 2048;
    if (analyser) {
      analyser.fftSize = config.fftSize;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
    }
    log("FFT 2048 activée");
  };

  document.getElementById("fftSmall").onclick = () => {
    config.fftSize = 1024;
    if (analyser) {
      analyser.fftSize = config.fftSize;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
    }
    log("FFT 1024 activée");
  };

  document.getElementById("autoRec").onclick = () => {
    config.autoRec = !config.autoRec;
    log(`Auto Recording ${config.autoRec ? "ON" : "OFF"}`);
  };

  document.getElementById("evp").onclick = () => {
    config.evpMode = !config.evpMode;
    log(`EVP Mode ${config.evpMode ? "ON" : "OFF"}`, "#aa00ff");
  };

  // Boutons dynamiques
  createButton('Spectro 3D ON/OFF', 200, () => {
    config.spectro3D = !config.spectro3D;
    log(`Spectro 3D ${config.spectro3D ? "ON" : "OFF"}`);
  });

  createButton('Radar ON/OFF', 230, () => {
    config.radar = !config.radar;
    log(`Radar ${config.radar ? "ON" : "OFF"}`);
  });

  createButton('IA ON/OFF', 260, () => {
    config.ai = !config.ai;
    log(`IA ${config.ai ? "ON" : "OFF"}`, "#00ff88");
  });

  createButton('EVP Seuil+', 290, () => {
    config.evpThreshold = Math.min(1, config.evpThreshold + 0.05);
    log(`Seuil EVP = ${config.evpThreshold.toFixed(2)}`, "#aa00ff");
  });

  createButton('EVP Seuil-', 320, () => {
    config.evpThreshold = Math.max(0, config.evpThreshold - 0.05);
    log(`Seuil EVP = ${config.evpThreshold.toFixed(2)}`, "#aa00ff");
  });

  createButton('EXPORT JOURNAL', 350, () => {
    const blob = new Blob([elements.logZone.innerText], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ETERNITY_JOURNAL_${Date.now()}.txt`;
    a.click();
    log("Journal scientifique exporté", "#ffaa00");
  });

  createButton('WAV ON/OFF', 380, () => {
    if (isRecordingWAV) {
      stopWAVRecording();
    } else {
      startWAVRecording();
    }
  });
}

// ======================= WAV RECORDING =======================
function startWAVRecording() {
  if (isRecordingWAV) return;
  isRecordingWAV = true;
  recBuffers = [];
  log("Enregistrement WAV démarré", "#ffaa00");
}

function stopWAVRecording() {
  if (!isRecordingWAV) return;
  isRecordingWAV = false;

  const bufferLength = recBuffers.reduce((sum, b) => sum + b.length, 0);
  const interleaved = new Float32Array(bufferLength);
  let offset = 0;

  for (const buffer of recBuffers) {
    interleaved.set(buffer, offset);
    offset += buffer.length;
  }

  const wavBlob = encodeWAV(interleaved, audioCtx.sampleRate);
  const url = URL.createObjectURL(wavBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ETERNITY_EVENT_${Date.now()}.wav`;
  a.click();
  log("WAV sauvegardé automatiquement", "#ffaa00");
}

function encodeWAV(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);

  function writeString(offset, string) {
    for (let i = 0; i < string.length; i++) {
      view.setUint8(offset + i, string.charCodeAt(i));
    }
  }

  let offset = 0;
  writeString(offset, 'RIFF'); offset += 4;
  view.setUint32(offset, 36 + samples.length * 2, true); offset += 4;
  writeString(offset, 'WAVE'); offset += 4;
  writeString(offset, 'fmt '); offset += 4;
  view.setUint32(offset, 16, true); offset += 4;
  view.setUint16(offset, 1, true); offset += 2;
  view.setUint16(offset, 1, true); offset += 2;
  view.setUint32(offset, sampleRate, true); offset += 4;
  view.setUint32(offset, sampleRate * 2, true); offset += 4;
  view.setUint16(offset, 2, true); offset += 2;
  view.setUint16(offset, 16, true); offset += 2;
  writeString(offset, 'data'); offset += 4;
  view.setUint32(offset, samples.length * 2, true); offset += 4;

  // PCM data
  let pos = 44;
  for (const s of samples) {
    const sample = Math.max(-1, Math.min(1, s));
    view.setInt16(pos, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
    pos += 2;
  }

  return new Blob([view], { type: "audio/wav" });
}

function captureWAV() {
  if (!isRecordingWAV || !analyser) return;

  const floatData = new Float32Array(dataArray.length);
  for (let i = 0; i < dataArray.length; i++) {
    floatData[i] = (dataArray[i] - 128) / 128;
  }
  recBuffers.push(floatData);
}

function wavLoop() {
  if (isRecordingWAV) {
    captureWAV();
  }
  requestAnimationFrame(wavLoop);
}

// ======================= INITIALIZATION =======================
function init() {
  // Charger les scripts externes
  loadScript('https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js', () => {
    loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.9.0/dist/tf.min.js', () => {
      loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/yamnet@0.1.0/dist/yamnet.min.js', () => {
        initAudio();
        init3D();
        loadModel();
        createUI();
        aiLoop();
        wavLoop();

        // Logs initiaux
        log("Système ETERNITY v33 OMEGA ULTIMATE LAB initialisé");
      });
    });
  });
}

function loadScript(url, callback) {
  const script = document.createElement('script');
  script.src = url;
  script.onload = callback;
  document.head.appendChild(script);
}

// Démarrer l'application
init();
</script>
</body>
</html>
