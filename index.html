<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ETERNITY v29 NEURAL</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<style>

body{
margin:0;
background:#000814;
color:#00ffd0;
font-family:Courier New;
overflow:hidden;
}

#panel{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,.75);
border:1px solid #00ffd0;
padding:10px;
z-index:10;
}

button{
background:#001f30;
border:1px solid #00ffd0;
color:#00ffd0;
padding:6px;
margin:3px;
cursor:pointer;
}

#voiceBar{
height:8px;
background:#ffaa00;
width:0%;
}

#radar{
position:absolute;
right:10px;
top:10px;
width:160px;
height:160px;
border-radius:50%;
border:2px solid #00ffd0;
}

#waterfall{
position:absolute;
bottom:0;
left:0;
width:100%;
height:200px;
}

</style>

</head>

<body>

<div id="panel">

<h3>ETERNITY v29 NEURAL</h3>

MIC : <span id="mic">OFF</span><br>
AI CLASS : <span id="ai">---</span>

<div style="margin-top:6px">
VOICE
<div id="voiceBar"></div>
</div>

<button id="evp">EVP MODE</button> <button id="rec">AUTO REC</button>

</div>

<canvas id="radar"></canvas> <canvas id="waterfall"></canvas>

<script>

let audioCtx
let analyser
let dataArray

let scene
let camera
let renderer

let cubes=[]

let radar=document.getElementById("radar")
let radarCtx=radar.getContext("2d")

let waterfall=document.getElementById("waterfall")
let wfCtx=waterfall.getContext("2d")

let evpMode=false
let autoRec=false

let mediaRecorder
let chunks=[]

// AUDIO INIT

async function initAudio(){

audioCtx=new AudioContext()

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

mediaRecorder=new MediaRecorder(stream)

mediaRecorder.ondataavailable=e=>chunks.push(e.data)

mediaRecorder.onstop=saveRecording

const source=audioCtx.createMediaStreamSource(stream)

analyser=audioCtx.createAnalyser()

analyser.fftSize=2048

dataArray=new Uint8Array(analyser.frequencyBinCount)

source.connect(analyser)

document.getElementById("mic").textContent="ACTIVE"

}

// 3D ENGINE

function init3D(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z=150

}

// LOOP

function loop(){

requestAnimationFrame(loop)

analyser.getByteFrequencyData(dataArray)

draw3D()

drawRadar()

drawWaterfall()

detectVoice()

renderer.render(scene,camera)

}

// 3D SPECTRUM

function draw3D(){

for(let i=0;i<dataArray.length;i+=8){

let v=dataArray[i]/255

let geometry=new THREE.BoxGeometry(2,2,v*50)

let color=evpMode?
`hsl(${300-dataArray[i]},100%,50%)`:
`hsl(${200-dataArray[i]},100%,50%)`

let material=new THREE.MeshBasicMaterial({
color:new THREE.Color(color)
})

let cube=new THREE.Mesh(geometry,material)

cube.position.x=i-128
cube.position.y=-60
cube.position.z=v*30

scene.add(cube)

cubes.push(cube)

}

if(cubes.length>6000){

let old=cubes.shift()

scene.remove(old)

}

}

// RADAR

function drawRadar(){

radar.width=160
radar.height=160

radarCtx.clearRect(0,0,160,160)

radarCtx.strokeStyle="#00ffd0"

radarCtx.beginPath()
radarCtx.arc(80,80,70,0,Math.PI*2)
radarCtx.stroke()

let energy=0

for(let i=0;i<dataArray.length;i++)
energy+=dataArray[i]

let angle=Math.random()*Math.PI*2

let r=energy/1200

let x=80+Math.cos(angle)*r
let y=80+Math.sin(angle)*r

radarCtx.fillStyle="#00ff88"
radarCtx.fillRect(x,y,3,3)

}

// WATERFALL

function drawWaterfall(){

const w=waterfall.width=window.innerWidth
const h=waterfall.height=200

let img=wfCtx.getImageData(0,0,w,h)

wfCtx.putImageData(img,0,1)

for(let i=0;i<dataArray.length;i++){

let v=dataArray[i]

wfCtx.fillStyle=`hsl(${200-v},100%,50%)`

wfCtx.fillRect(i*(w/dataArray.length),0,2,1)

}

}

// VOICE DETECTION

function detectVoice(){

let voice=0

for(let i=0;i<dataArray.length;i++){

let freq=i*(44100/2048)

if(freq>300 && freq<3400)
voice+=dataArray[i]

}

voice/=100

document.getElementById("voiceBar").style.width=
Math.min(100,voice)+"%"

let result="Noise"

if(voice>90)
result="Voice"

document.getElementById("ai").textContent=result

if(result==="Voice" && autoRec)
record()

}

// RECORDING

function record(){

if(mediaRecorder.state==="inactive"){

chunks=[]

mediaRecorder.start()

setTimeout(()=>mediaRecorder.stop(),3000)

}

}

function saveRecording(){

let blob=new Blob(chunks,{type:"audio/webm"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="eternity_event_audio.webm"

a.click()

}

// BUTTONS

document.getElementById("evp").onclick=()=>{
evpMode=!evpMode
}

document.getElementById("rec").onclick=()=>{
autoRec=!autoRec
}

// START

async function start(){

await initAudio()

init3D()

loop()

}

start()

</script>

</body>

</html>
