<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ETERNITY v16 CYBER NETWORK</title>
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #0088ff; /* Bleu Cyber */
            --danger: #ff0055;
            --bg: #00050a; /* Bleu nuit très sombre */
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation; 
        }

        /* EFFET FOND RÉSEAU (Matrix) */
        #network-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.1; pointer-events: none;
        }

        #vignette-cyber {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, #000 120%);
            pointer-events: none; z-index: 3;
            box-shadow: inset 0 0 50px rgba(0, 136, 255, 0.2);
        }
        #camera-feed {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; opacity: 0.3; 
            filter: contrast(1.4) brightness(0.5) grayscale(100%) hue-rotate(180deg); /* Bleu */
        }

        /* UI */
        #ui {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.95), transparent);
            padding: 10px;
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid var(--secondary);
        }
        .cyber-title { font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; margin: 0; color: var(--secondary); text-shadow: 0 0 5px var(--secondary); }
        .cyber-sub { font-size: 0.6rem; color: var(--primary); letter-spacing: 1px; }

        /* Panneau Données Réseau */
        .data-panel {
            background: rgba(0, 10, 20, 0.7);
            margin: 5px 10px;
            border: 1px solid var(--secondary);
            padding: 8px;
            backdrop-filter: blur(4px);
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.75rem; align-items: center; }
        
        .prob-container {
            width: 100%; height: 16px; background: #001122; border: 1px solid var(--secondary); margin-top: 6px;
            position: relative; overflow: hidden;
        }
        .prob-fill {
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: width 0.3s ease-out; 
            box-shadow: 0 0 10px var(--primary);
        }

        #spectrum-canvas {
            width: 100%; height: 120px; background: #000;
            border-top: 1px solid var(--secondary); border-bottom: 1px solid var(--secondary);
            position: relative;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        #error-text {
            position: absolute; z-index: 5; text-align: center; pointer-events: none;
            color: var(--secondary); font-weight: bold; font-size: 0.9rem;
            padding: 10px; text-shadow: 0 0 5px var(--secondary);
        }

        #ai-zone {
            flex: 1; margin: 10px;
            border: 1px solid var(--secondary); background: rgba(0, 5, 10, 0.85);
            padding: 10px; padding-bottom: 110px;
            overflow-y: auto; font-size: 0.85rem;
            pointer-events: auto;
            text-shadow: 0 0 2px var(--secondary); position: relative;
        }
        .msg-final { color: var(--primary); border-bottom: 1px solid var(--secondary); margin: 4px 0; padding: 4px; background: rgba(0, 255, 204, 0.1); }
        .msg-system { color: #446677; font-size: 0.7rem; margin-bottom: 4px; font-family: monospace; }
        
        .msg-prefix { color: var(--secondary); font-weight: bold; margin-right: 5px; }

        .controls {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 10px 10px 35px 10px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
            background: linear-gradient(0deg, rgba(0,0,0,1), rgba(0,0,0,0.8));
            z-index: 100; 
        }

        button {
            background: rgba(0, 20, 40, 0.8); border: 1px solid var(--secondary); color: var(--secondary);
            padding: 14px 2px; font-family: inherit; font-weight: bold; cursor: pointer;
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s;
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); background: var(--secondary); color: #000; }
        button.active { background: var(--secondary); color: #000; box-shadow: 0 0 15px var(--secondary); border-color: #fff; }
        
        #btn-echo { border-color: #ff00ff; color: #ff00ff; }
        #btn-echo.active { background: #ff00ff; color: #fff; box-shadow: 0 0 15px #ff00ff; }
        .btn-sweep { border-color: var(--danger); color: var(--danger); }
        .btn-sweep.active { background: var(--danger); color: #fff; box-shadow: 0 0 15px var(--danger); }

        @keyframes blink { 50% { opacity: 0; } }
        .live-dot { color: var(--danger); animation: blink 1.5s infinite; margin-right: 5px; font-weight: bold; }

    </style>
</head>
<body>

    <canvas id="network-bg"></canvas>
    <div id="vignette-cyber"></div>
    <video id="camera-feed" autoplay playsinline muted></video>

    <div id="ui">
        <header>
            <div>
                <h1 class="cyber-title">ETERNITY v16</h1>
                <div class="cyber-sub">CYBER NETWORK LINK</div>
            </div>
            <div style="text-align: right;">
                <div id="clock" style="font-size:1.1rem; color:var(--secondary)">00:00</div>
                <div style="font-size:0.6rem; color:var(--primary)">NET: <span id="net-status" style="color:var(--primary)">OFFLINE</span></div>
                <div style="font-size:0.6rem; color:var(--secondary)">PING: <span id="ping-val">--</span>ms</div>
            </div>
        </header>

        <div class="data-panel">
            <div class="data-row">
                <span style="color:var(--secondary)">LIAISON ENTITÉ (PACKETS)</span>
                <span id="prob-val" style="font-weight:bold; color:var(--primary)">0.0%</span>
            </div>
            <div class="prob-container">
                <div id="prob-fill" class="prob-fill"></div>
            </div>
            <div class="data-row" style="margin-top:8px; font-size:0.7rem; color:#666; font-family: monospace;">
                <span>[UPL: <span id="vol-disp">--</span>]</span>
                <span>[EMF: <span id="emf-disp">--</span>]</span>
            </div>
        </div>

        <div id="spectrum-canvas">
            <canvas id="viz-canvas"></canvas>
            <div id="error-text">INITIALISER CONNEXION AUDIO (SCOPE)</div>
        </div>

        <div id="ai-zone">
            <div style="position:sticky; top:0; background:#000; padding-bottom:5px; border-bottom:1px solid var(--secondary); margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                <span style="color:var(--primary)">> FLUX DE DONNÉES (IA)</span>
                <span id="ai-status" style="color:var(--danger); font-size:0.7rem; font-weight:bold;">HORS LIGNE</span>
            </div>
            <div id="log-container"></div>
        </div>

        <div class="controls">
            <button id="btn-audio" onclick="initAudioSimple()">SCOPE</button>
            <button id="btn-echo" onclick="toggleEcho()">ECHO VOIX</button>
            <button id="btn-sweep" class="btn-sweep" onclick="toggleSweep()">SWEEP</button>
            <button id="btn-sens" onclick="toggleSensors()">SENSORS</button>
        </div>
    </div>

    <script>
        // --- V16 CYBER NETWORK ---

        let audioCtx, globalStream, globalSource, analyser, gainNode;
        let sweepNodes = [], recognition, synth;
        let isVisualizer = false, isEcho = false, isSweep = false, isSensors = false;
        let emfVal = 0, motionVal = 0, audioLevel = 0;
        let lastAlpha = null, instability = 0, emfBase = 0;

        // 1. INITIALISATION (Identique à V15, stable)
        async function initAudioSimple() {
            const btn = document.getElementById('btn-audio');
            const errorText = document.getElementById('error-text');
            const statusText = document.getElementById('net-status');

            if (globalStream) {
                isVisualizer = !isVisualizer;
                btn.classList.toggle('active', isVisualizer);
                errorText.style.display = isVisualizer ? 'none' : 'block';
                if(isVisualizer) drawSymmetricSpectrum();
                return;
            }

            btn.innerText = "CONNEXION...";
            errorText.innerText = "HANDSHAKE EN COURS...";

            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                globalSource = audioCtx.createMediaStreamSource(globalStream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.85;
                
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.0;

                globalSource.connect(analyser);
                analyser.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                btn.innerText = "SCOPE";
                btn.classList.add('active');
                errorText.style.display = 'none';
                statusText.innerText = "CONNECTÉ";
                statusText.style.color = "var(--primary)";
                
                isVisualizer = true;
                drawSymmetricSpectrum();
                drawNetworkBg(); // Lancer le fond réseau
                log("Connexion Audio Établie.", "system");
                startPing(); // Simuler le ping

            } catch (e) {
                console.error(e);
                btn.innerText = "ERREUR";
                btn.style.borderColor = "red";
                errorText.innerText = "CONNEXION REFUSÉE\n(Vérifiez le cadenas)";
                errorText.style.color = "red";
                alert("Micro bloqué. Regardez le cadenas en haut.");
            }
        }

        // 2. FOND RÉSEAU (NOUVEAU)
        function drawNetworkBg() {
            const cvs = document.getElementById('network-bg');
            const ctx = cvs.getContext('2d');
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Effet de trainée
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            ctx.fillStyle = 'rgba(0, 255, 204, 0.15)';
            
            // Simuler des paquets
            for(let i=0; i<5; i++) {
                const x = Math.random() * cvs.width;
                const y = Math.random() * cvs.height;
                const h = Math.random() * 20 + 5;
                ctx.fillRect(x, y, 2, h);
            }

            requestAnimationFrame(drawNetworkBg);
        }

        function startPing() {
            setInterval(() => {
                if(!isVisualizer) return;
                // Ping aléatoire entre 12ms et 45ms
                const ping = Math.floor(Math.random() * 33) + 12;
                document.getElementById('ping-val').innerText = ping;
            }, 2000);
        }

        // 3. VISUALISEUR (Style Réseau)
        function drawSymmetricSpectrum() {
            if(!isVisualizer || !analyser) return;
            requestAnimationFrame(drawSymmetricSpectrum);

            const cvs = document.getElementById('viz-canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = cvs.clientWidth;
            cvs.height = cvs.clientHeight;
            const w = cvs.width, h = cvs.height;
            const cx = w / 2;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            ctx.clearRect(0, 0, w, h);
            const barWidth = (cx / bufferLength) * 2.5;
            let totalVol = 0;

            for(let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * (h/2);
                totalVol += dataArray[i];
                const hue = 160 + (i/bufferLength) * 100; // Bleu -> Cyan
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.fillRect(cx - (i * barWidth), (h/2) - barHeight, barWidth - 1, barHeight * 2);
                ctx.fillRect(cx + (i * barWidth), (h/2) - barHeight, barWidth - 1, barHeight * 2);
            }

            audioLevel = totalVol / bufferLength;
            document.getElementById('vol-disp').innerText = Math.round(audioLevel);
            updateProbability();
        }

        // 4. MODE ECHO (Identique mais log stylisé)
        async function toggleEcho() {
            if (!globalStream) {
                alert("Activez SCOPE d'abord.");
                return;
            }
            const btn = document.getElementById('btn-echo');
            const statusEl = document.getElementById('ai-status');

            if (isEcho) {
                isEcho = false; btn.classList.remove('active');
                statusEl.innerText = "HORS LIGNE"; statusEl.style.color = "var(--danger)";
                if(recognition) recognition.stop();
            } else {
                synth = window.speechSynthesis;
                if (!synth) return alert("TTS indisponible");

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return alert("IA indisponible");
                
                isEcho = true; btn.classList.add('active');
                statusEl.innerHTML = '<span class="live-dot">●</span>EN LIGNE';
                statusEl.style.color = "var(--primary)";

                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = false; 
                recognition.lang = 'fr-FR';

                recognition.onstart = () => {
                    statusEl.innerHTML = '<span class="live-dot">●</span>EN LIGNE';
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[event.results.length - 1][0].transcript;
                    const confidence = event.results[event.results.length - 1][0].confidence;
                    if (transcript.trim().length > 0 && confidence > 0.5) {
                        cyberLog(transcript, "msg-final");
                        speakText(transcript);
                    }
                };

                recognition.onerror = (e) => {
                     if(e.error === 'not-allowed') { isEcho = false; btn.classList.remove('active'); statusEl.innerText = "DÉCONNECTÉ"; }
                };

                recognition.onend = () => {
                    if (isEcho) {
                        statusEl.innerText = "RECONNECTION...";
                        setTimeout(() => { if (isEcho) recognition.start(); }, 1000);
                    } else {
                        statusEl.innerText = "HORS LIGNE";
                    }
                };

                recognition.start();
                cyberLog("Mode Echo Activé.", "system");
            }
        }

        function speakText(text) {
            if (!synth) return;
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fr-FR';
            utterance.rate = 1.2; utterance.volume = 1.0;
            const voices = synth.getVoices();
            const frenchVoice = voices.find(v => v.lang.includes('fr'));
            if (frenchVoice) utterance.voice = frenchVoice;
            synth.speak(utterance);
        }

        // 5. SWEEP
        async function toggleSweep() {
            const btn = document.getElementById('btn-sweep');
            if (isSweep) {
                stopSweep(); isSweep = false; btn.classList.remove('active');
            } else {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                startSweep(); isSweep = true; btn.classList.add('active');
                cyberLog("Sweep Activé.", "system");
            }
        }
        function startSweep() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer; noise.loop = true;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.Q.value = 20;
            const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.1;
            const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 3000; 
            lfo.connect(lfoGain); lfoGain.connect(filter.frequency); filter.frequency.value = 1000;
            const vol = audioCtx.createGain(); vol.gain.value = 0.7; 
            noise.connect(filter); filter.connect(vol); vol.connect(audioCtx.destination);
            noise.start(); lfo.start();
            sweepNodes = [noise, lfo];
        }
        function stopSweep() { sweepNodes.forEach(n => { try{n.stop()}catch(e){} }); sweepNodes = []; }

        // 6. CAPTEURS
        function toggleSensors() {
            const btn = document.getElementById('btn-sens');
            if (isSensors) {
                window.removeEventListener('deviceorientationabsolute', handleOrientation);
                window.removeEventListener('devicemotion', handleMotion);
                isSensors = false; btn.classList.remove('active');
            } else {
                isSensors = true; btn.classList.add('active');
                window.addEventListener('deviceorientationabsolute', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                cyberLog("Capteurs Connectés.", "system");
            }
        }
        function handleOrientation(e) {
            const alpha = e.alpha;
            if (lastAlpha !== null && alpha !== null) {
                let diff = Math.abs(alpha - lastAlpha);
                if (diff > 180) diff = 360 - diff;
                instability = (instability * 0.9) + (diff * 0.1);
            }
            lastAlpha = alpha;
            emfVal = Math.max(0, (instability - emfBase) * 2);
            document.getElementById('emf-disp').innerText = emfVal.toFixed(1);
        }
        function handleMotion(e) {
            const acc = e.accelerationIncludingGravity;
            if(!acc) return;
            motionVal = Math.abs(acc.x||0) + Math.abs(acc.y||0) + Math.abs(acc.z||0);
        }

        // LOG STYLISÉ CYBER
        function cyberLog(text, className) {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = className;
            
            // Prefixe style "Paquet"
            const prefix = `<span class="msg-prefix">[PKT_RX]</span>`;

            const chars = "01";
            let iterations = 0;
            const interval = setInterval(() => {
                div.innerText = text.split("")
                    .map((letter, index) => {
                        if(index < iterations) return letter;
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");
                if(iterations >= text.length) clearInterval(interval);
                iterations += 0.2; // Décryptage rapide
            }, 20);

            const time = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `<span style="opacity:0.5; font-size:0.7em">[${time}]</span> ${prefix} ${div.innerHTML}`;
            
            container.prepend(div);
            if(container.children.length > 20) container.lastChild.remove();
        }
        function log(msg, type) {
            const div = document.createElement('div');
            div.className = type || "msg-system";
            const time = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `<span style="opacity:0.5">[${time}]</span> ${msg}`;
            document.getElementById('log-container').prepend(div);
        }
        function updateProbability() {
            let rawProb = (audioLevel * 0.6) + (emfVal * 3) + (motionVal * 0.2);
            if (rawProb > 100) rawProb = 100;
            if (rawProb < 0) rawProb = 0;
            const displayVal = document.getElementById('prob-val');
            const fill = document.getElementById('prob-fill');
            displayVal.innerText = rawProb.toFixed(1) + "%";
            fill.style.width = rawProb + "%";
            if (rawProb > 75) {
                displayVal.style.color = "var(--danger)";
                displayVal.style.textShadow = "0 0 15px var(--danger)";
            } else {
                displayVal.style.color = "var(--primary)";
                displayVal.style.textShadow = "0 0 10px var(--primary)";
            }
        }
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
