<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ETERNITY LAB - SPEEDRUN</title>
<style>
:root {
  --primary: #00ff00; /* Vert Matrix */
  --bg: #000000;
  --panel: #050a05;
  --btn-bg: #111;
  --btn-active: #00ff00;
  --text: #ccffcc;
}

body {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  touch-action: manipulation;
}

#header {
  background: var(--panel);
  border-bottom: 1px solid var(--primary);
  padding: 5px 10px;
  display: flex; justify-content: space-between;
  font-size: 0.8rem; color: var(--primary);
}
.status-light {
  width: 10px; height: 10px; background: #333; border-radius: 50%; display: inline-block; margin-right: 5px;
}
.status-light.on { background: #0f0; box-shadow: 0 0 10px #0f0; }

#mainStage {
  flex: 1; position: relative;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 5;
}
#iaText {
  font-size: 2rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 10px var(--primary);
  background: rgba(0,0,0,0.9);
  padding: 15px;
  border: 2px solid var(--primary);
  min-width: 80%;
  text-align: center;
  text-transform: uppercase;
  min-height: 3.5rem;
  pointer-events: none;
}

#controls {
  background: var(--panel);
  border-top: 2px solid var(--primary);
  height: 40vh;
  overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 10px;
}

.button-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px;
}

button {
  background: var(--btn-bg); border: 1px solid var(--primary);
  color: var(--primary); padding: 15px; font-size: 1rem;
  font-weight: bold; cursor: pointer; font-family: inherit;
}
button:active { background: var(--primary); color: #000; }
button.active { background: var(--btn-active); color: #000; }
button:disabled { opacity: 0.3; cursor: not-allowed; }

#startBtn {
  width: 100%; font-size: 1.5rem; padding: 20px;
  background: #000; color: var(--primary); border: 2px solid var(--primary);
  font-weight: 900;
}

#logZone {
  height: 60px; background: #000; border-top: 1px solid #333;
  padding: 5px; font-size: 0.8rem; overflow-y: auto; color: #888;
  font-family: monospace;
}
.log-suc { color: var(--primary); font-weight: bold; }
.log-warn { color: yellow; }

/* CANVAS */
#canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.5;
}
</style>
</head>
<body>

<div id="header">
  <div>ETERNITY LAB SPEEDRUN</div>
  <div>
    <span id="micLed" class="status-light"></span> MIC 
    <span id="aiLed" class="status-light"></span> IA
  </div>
</div>

<div id="mainStage">
  <div id="iaText">... EN ATTENTE ...</div>
</div>

<div id="controls">
  <div id="meters" style="display:flex; gap:5px; margin-bottom:10px;">
    <div style="flex:1; background:#222; height:10px; border:1px solid #444; position:relative;">
      <div id="audioMeter" style="height:100%; width:0%; background:var(--primary); transition:width 0.1s;"></div>
    </div>
  </div>

  <button id="startBtn" onclick="startSystem()">ACTIVER (TEST AUDIO)</button>

  <div class="button-grid">
    <button id="monitorBtn" onclick="toggleOpt('monitor')">🎧 ÉCOUTE</button>
    <button id="recBtn" onclick="toggleOpt('autoRec')">⏺ AUTO REC</button>
    <button id="stopBtn" style="border-color:white; color:white" onclick="stopSystem()">⏹ STOP</button>
  </div>

  <div style="font-size:0.7rem; color:#666; text-align:center; margin-top:10px;">
    Code optimisé. Pas de chargement lent.
  </div>
</div>

<div id="logZone"></div>

<canvas id="canvas"></canvas>

<script>
// --- 1. CONFIGURATION (Ici vous réglez "à qui s'adresser") ---
const CONFIG = {
  // IMPORTANT : Changez 'fr-FR' pour le Français.
  // Changez 'en-US' pour l'Anglais.
  // Le script ne peut pas "deviner" qui parle, il traduit juste la langue détectée.
  lang: 'fr-FR', 
  
  // Seuil de détection audio (0-100)
  threshold: 30,
  
  // Boost du micro (1.0 = normal, 5.0 = très sensible)
  gain: 2.0
};

let app = {
  running: false,
  ctx: null, stream: null,
  source: null, analyser: null,
  monitorGain: null, booster: null,
  recorder: null, isRec: false,
  recognition: null,
  aiWatchdog: null,
  lastAIActivityTime: 0,
  lastSpeechTime: 0
};

const el = (id) => document.getElementById(id);
const els = {
  log: el('logZone'), ia: el('iaText'),
  micLed: el('micLed'), aiLed: el('aiLed'),
  audioMeter: el('audioMeter'),
  canvas: el('canvas')
};

function log(msg, type='') {
  const d = document.createElement('div');
  d.textContent = `> ${msg}`;
  if(type) d.className = type;
  els.log.appendChild(d);
  els.log.scrollTop = els.log.scrollHeight;
  console.log(msg);
}

// --- 2. DÉMARRAGE (C'est ici que le bouton doit réagir) ---

async function startSystem() {
  if(app.running) return;
  
  // PREUVE : Si vous voyez cette alerte, le bouton MARCHE.
  alert("Clic reçu ! Initialisation Audio en cours...");
  
  const btn = el('startBtn');
  btn.textContent = "INIT...";
  btn.disabled = true;

  try {
    // Création Audio Context
    app.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (app.ctx.state === 'suspended') await app.ctx.resume();

    // Demande Micro
    log("Demande Micro...", 'log-warn');
    app.stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
        video: false 
    });

    // Graphique Audio
    app.source = app.ctx.createMediaStreamSource(app.stream);
    app.booster = app.ctx.createGain();
    app.booster.gain.value = CONFIG.gain;
    app.monitorGain = app.ctx.createGain();
    app.monitorGain.gain.value = 0;
    app.analyser = app.ctx.createAnalyser();
    app.analyser.fftSize = 2048;
    app.dataArray = new Uint8Array(app.analyser.frequencyBinCount);

    // Connexions
    app.source.connect(app.booster);
    app.booster.connect(app.analyser);
    app.booster.connect(app.monitorGain);
    app.monitorGain.connect(app.ctx.destination);

    // Recorder
    app.recorder = new MediaRecorder(app.stream);
    app.recorder.ondataavailable = e => saveBlob(e.data);

    // Démarrage IA
    startAI();

    // Visuels
    initViz();

    app.running = true;
    btn.textContent = "SYSTÈME ACTIF";
    btn.classList.add('active'); // Change la couleur du bouton
    els.micLed.classList.add('on');
    
    // BIP DE CONFIRMATION
    playBeep();

    drawLoop();
    log("Système démarré avec succès.", 'log-suc');

  } catch (err) {
    console.error(err);
    log("ERREUR: " + err.message, 'log-warn');
    alert("ERREUR: " + err.message + "\nVérifiez que vous avez accepté le micro.");
    btn.disabled = false;
    btn.textContent = "ERREUR (VOIR LOG)";
  }
}

function stopSystem() {
  if(app.stream) { app.stream.getTracks().forEach(t=>t.stop()); app.stream = null; }
  if(app.recognition) stopAI();
  if(app.ctx) app.ctx.close();
  
  app.running = false;
  
  el('startBtn').disabled = false;
  el('startBtn').textContent = "ACTIVER (TEST AUDIO)";
  el('startBtn').classList.remove('active');
  els.micLed.classList.remove('on');
  els.ia.textContent = "ARRÊTÉ";
}

// --- 3. IA & TRADUCTION (Savoir à qui s'adresser) ---

function startAI() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
      app.recognition = new SpeechRec();
      app.recognition.continuous = true;
      app.recognition.interimResults = true;
      
      // C'EST ICI QUE L'ON DIT QUELLE LANGUE UTILISER
      app.recognition.lang = CONFIG.lang; 
      
      app.recognition.onstart = () => {
          els.aiLed.classList.add('on');
          app.lastAIActivityTime = Date.now();
          log(`IA Active (Langue: ${CONFIG.lang})`, 'log-suc');
      };

      app.recognition.onresult = (e) => {
          app.lastAIActivityTime = Date.now();
          let txt = ''; let isFinal = false;
          for(let i = e.resultIndex; i < e.results.length; i++) {
              txt += e.results[i][0].transcript;
              if(e.results[i].isFinal) isFinal = true;
          }
          if (txt) {
              els.ia.textContent = txt;
              if (isFinal) {
                  log(`DÉTECTION: "${txt}"`, 'log-suc');
                  app.lastSpeechTime = Date.now();
              }
          }
      };
      
      app.recognition.onerror = (e) => { if(e.error !== 'no-speech') log(`IA Err: ${e.error}`); };
      
      // IMPORTANT : Redémarrage automatique (Watchdog) pour éviter que l'IA dorme
      app.recognition.onend = () => {
          if(app.running) setTimeout(startAI, 1000);
      };
      
      try { app.recognition.start(); } catch(e){}
  } else {
      log("IA non supportée par ce navigateur", 'log-warn');
  }
}

function stopAI() {
  if(app.recognition) {
      try { app.recognition.stop(); } catch(e){}
      app.recognition = null;
  }
  els.aiLed.classList.remove('on');
}

// --- 4. LOGIQUE VISUELLE & AUDIO ---

function drawLoop() {
  if(!app.running) return;
  requestAnimationFrame(drawLoop);
  
  // 1. Obtenir les données
  app.analyser.getByteFrequencyData(app.dataArray);
  
  // 2. Calculer le volume moyen
  let sum = 0;
  for(let i=0; i<app.dataArray.length; i++) sum += app.dataArray[i];
  const avg = sum / app.dataArray.length;
  
  // 3. Afficher le volume (VU Meter)
  els.audioMeter.style.width = Math.min(100, avg) + '%';
  
  // 4. Si audio mais pas de mot -> Afficher "SIGNAL"
  const now = Date.now();
  if (avg > CONFIG.threshold && (now - app.lastSpeechTime > 2000)) {
      els.ia.textContent = "[SIGNAL AUDIO - NON TRADUIT]";
      els.ia.style.color = "yellow";
  }

  // 5. Auto Rec
  if(app.config && app.config.autoRec && avg > 60 && !app.isRec) {
      app.isRec = true; app.recorder.start(); log("⚠ ENREGISTREMENT", 'log-warn');
      setTimeout(() => { if(app.isRec) { app.recorder.stop(); app.isRec=false; }}, 3000);
  }

  // 6. Dessin
  const ctx = app.canvas.getContext('2d');
  const w = app.canvas.width;
  const h = app.canvas.height;
  ctx.fillStyle = 'rgba(0, 10, 0, 0.2)'; // Trainée verte
  ctx.fillRect(0,0,w,h);
  
  // Barres
  const barW = (w / app.dataArray.length) * 2.5;
  let x = 0;
  for(let i=0; i<app.dataArray.length; i++) {
      const v = app.dataArray[i];
      const barH = (v/255)*h;
      ctx.fillStyle = `rgb(0, 255, ${v})`;
      ctx.fillRect(x, h - barH, barW, barH);
      x += barW+1;
  }
}

// --- OUTILS ---

function toggleOpt(key) {
  if(!app.running) { log("Démarrage requis", 'log-warn'); return; }
  
  if(!app.config) app.config = {}; // Init config if missing
  
  app.config[key] = !app.config[key];
  const btn = el(key + 'Btn');
  if(btn) btn.classList.toggle('active');
  
  if(key === 'monitor') {
      app.monitorGain.gain.value = app.config[key] ? 1.0 : 0;
      log(app.config[key] ? "Écoute ON" : "Écute OFF");
  }
}

function saveBlob(data) {
  const url = URL.createObjectURL(new Blob([data], {type:'audio/webm'}));
  const a = document.createElement('a'); a.href=url; a.download=`EVP_${Date.now()}.webm`; a.click();
  log("Fichier sauvé", 'log-suc');
}

function playBeep() {
  if(!app.ctx) return;
  const osc = app.ctx.createOscillator();
  const g = app.ctx.createGain();
  osc.connect(g);
  g.connect(app.ctx.destination);
  osc.frequency.setValueAtTime(880, app.ctx.currentTime);
  g.gain.setValueAtTime(0.5, app.ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, app.ctx.currentTime + 0.1);
  osc.start();
  osc.stop(app.ctx.currentTime + 0.1);
}

// Initialisation Canvas (au cas où le DOM est prêt)
window.onload = () => {
  const canvas = el('canvas');
  canvas.width = document.body.clientWidth;
  canvas.height = window.innerHeight / 2;
  window.onresize = () => {
      canvas.width = document.body.clientWidth;
      canvas.height = window.innerHeight / 2;
  };
  log("SPEEDRUN PRÊT. Cliquez sur Activer.", 'log-suc');
};
</script>
</body>
</html>
